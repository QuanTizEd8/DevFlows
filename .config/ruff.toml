line-length = 100
target-version = "py311"
# The importable package now lives under .dev/src (pyproject.toml moved to .dev/).
# Tell ruff's isort where first-party code is so `import devflows` is classified
# first-party from anywhere in the repo (tests/, .dev/src/) and import order stays
# stable. Paths are resolved from the invocation directory (repo root) when the
# config is passed with --config.
src = [".dev/src", "."]
# The python-lint scenario fixtures are standalone projects that the workflow
# lints under their own nested ruff config; the violations fixture is broken on
# purpose, so exclude the tree from the repository's own ruff run.
extend-exclude = ["tests/scenarios/python-lint"]

[lint]
select = ["B", "E", "F", "I", "N", "UP", "W"]

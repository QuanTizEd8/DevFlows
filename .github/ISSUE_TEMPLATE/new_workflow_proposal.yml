name: New workflow proposal
description: Propose a new reusable workflow for the DevFlows catalog.
labels:
  - new-workflow
body:
  - type: markdown
    attributes:
      value: >
        Proposes adding a new reusable workflow. See the promotion checklist in
        docs/dev-guide/workflow-lifecycle.md for what a workflow needs before it
        can be promoted out of workflows/_drafts/.
  - type: input
    id: workflow-id
    attributes:
      label: Proposed workflow ID
      description: A stable, lowercase, hyphenated identifier (e.g. build-devcontainer).
      placeholder: "my-workflow"
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: What does this workflow do, and what problem does it solve for callers?
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Catalog tier
      options:
        - general-purpose core
        - research-software
        - not sure
    validations:
      required: true
  - type: textarea
    id: interface
    attributes:
      label: Proposed interface
      description: Key inputs, secrets, outputs, and which shared IO channels (checkout, artifact, writeback) it needs.
    validations:
      required: true
  - type: textarea
    id: tools
    attributes:
      label: Underlying tools or actions
      description: The container images or third-party actions this workflow would wrap.
    validations:
      required: false
  - type: textarea
    id: prior-art
    attributes:
      label: Prior art or draft
      description: Link an existing draft under workflows/_drafts/ or similar workflows elsewhere, if any.
    validations:
      required: false

name: 'DevFlows Hosted Scenarios: Writeback'
'on':
  pull_request: null
  push:
    branches:
      - main
  workflow_dispatch: null
permissions:
  contents: read
  actions: read
jobs:
  writeback_ephemeral_branch_writeback_setup:
    name: 'Writeback: Writeback to ephemeral branch setup'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      artifact-name: ${{ steps.setup.outputs.artifact-name }}
      base-sha: ${{ steps.setup.outputs.base-sha }}
      branch: ${{ steps.setup.outputs.branch }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    runs-on: ubuntu-latest
    steps:
      - name: Assert validation rejects the inputs
        shell: bash
        env:
          DEVFLOWS_VALIDATE_SCRIPT: workflows/zenodo-release/scripts/validate-inputs.py
          PUBLISH_DRY_RUN_ENABLED: 'false'
          PUBLISH_TIMEOUT_MINUTES: '15'
          RELEASE_ENABLED: 'true'
          RELEASE_TAG: v1.0.0
          RELEASE_NOTES: ''
          RELEASE_NOTES_FILE: ''
          RELEASE_DRAFT_ENABLED: 'false'
          RELEASE_DISCUSSION_CATEGORY: ''
          RELEASE_EXISTING_MODE: fail
          RELEASE_ASSET_GLOBS: ''
          RELEASE_ASSET_SOURCE_PATH: ''
          RELEASE_ASSET_IF_NO_FILES_FOUND: error
          RELEASE_ENVIRONMENT_NAME: ''
          ZENODO_ENABLED: 'true'
          ZENODO_SANDBOX_ENABLED: 'false'
          ZENODO_PUBLISH_ENABLED: 'false'
          ZENODO_PUBLISH_CONFIRM: ''
          ZENODO_NEW_VERSION_FILE_MODE: replace
          ZENODO_ENVIRONMENT_NAME: zenodo
          ZENODO_UPLOAD_TYPE: software
          ZENODO_TITLE: ''
          ZENODO_CREATORS: ''
          ZENODO_DESCRIPTION: ''
          ZENODO_METADATA_CFF_PATH: ''
          ZENODO_METADATA_EXTRA: '["not", "an", "object"]'
          ZENODO_ASSET_GLOBS: '*.tar.gz'
          ZENODO_ASSET_SOURCE_PATH: ''
          ZENODO_ASSET_IF_NO_FILES_FOUND: error
          PUBLISH_DIST_MANIFEST: ''
          ARTIFACT_DOWNLOAD_ENABLED: 'true'
          DEVFLOWS_FAILURE_MESSAGE_CONTAINS: must be a JSON object
        run: python .dev/harness/scenarios/assert-validation-failure.py
    needs: require_act

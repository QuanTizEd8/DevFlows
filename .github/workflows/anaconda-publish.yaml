          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Re-verify distributions before upload
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          EMIT_PLAN: 'false'
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          UPLOAD_ENABLED: ${{ inputs.upload-enabled }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/parsing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/arguments.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/manifest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/digest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/verify-dist.py"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false
      - name: Assert publishing credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_TOKEN_PRESENT: ${{ secrets.anaconda-token != '' }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/preflight-token.py"
      - name: Upload to anaconda.org
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_API_TOKEN: ${{ secrets.anaconda-token }}
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          UPLOAD_EXISTING_MODE: ${{ inputs.upload-existing-mode }}
          UPLOAD_ARGUMENTS: ${{ inputs.upload-arguments }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/parsing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/arguments.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/manifest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/digest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/upload.py"
  promote:
    name: Promote to the final label
    needs:
      - validate
      - verify
      - upload
    if: ${{ !cancelled() && !inputs.publish-dry-run-enabled && inputs.promote-enabled && needs.validate.result == 'success' && needs.verify.result == 'success' && (needs.upload.result == 'success' || needs.upload.result == 'skipped') }}

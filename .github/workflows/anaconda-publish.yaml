                      client_version,
                      commands.build_move_argv(
                          server_url=server_url, from_label=from_label, to_label=to_label, target=target
                      ),
                  )
                  print(f"promoting {target}: {from_label} -> {to_label}", flush=True)
                  _run(argv)
              print(f"promoted {len(targets)} spec(s) from {from_label} to {to_label}.")
              return 0


          def _run(argv: list[str]) -> None:
              result = subprocess.run(argv, check=False)  # noqa: S603 - argv is fully constructed, no shell
              if result.returncode != 0:
                  sys.stderr.write(f"command failed (exit {result.returncode}): {' '.join(argv)}\n")
                  raise SystemExit(result.returncode)


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false
      - name: Assert publishing credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_TOKEN_PRESENT: ${{ secrets.anaconda-token != '' }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/preflight-token.py"
      - name: Promote on anaconda.org
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_API_TOKEN: ${{ secrets.anaconda-token }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          PROMOTE_LABEL: ${{ inputs.promote-label }}
          PROMOTED_SPECS: ${{ needs.verify.outputs.promoted-specs }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/promote.py"
  maintain:
    name: Remove packages (destructive)
    needs:
      - validate
      - verify
    if: ${{ !inputs.publish-dry-run-enabled && inputs.maintain-enabled }}
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    environment:
      name: ${{ inputs.maintain-environment-name }}
    concurrency:
      group: anaconda-publish-${{ inputs.maintain-environment-name }}
      cancel-in-progress: false
    steps:
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/anaconda-publish"
          cat > "$RUNNER_TEMP/devflows/anaconda-publish/preflight-token.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Tokenless per-job credential preflight.

          Each credentialed job asserts the publishing credential is present before any CLI
          step (validate cannot check secrets). Tokenless by design: it receives only the
          boolean ANACONDA_TOKEN_PRESENT, never the token value.
          """

          from __future__ import annotations

          import os


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}


          def main() -> int:
              if _bool("PUBLISH_DRY_RUN_ENABLED"):
                  return 0
              if not _bool("ANACONDA_TOKEN_PRESENT"):
                  raise SystemExit(
                      "The anaconda-token secret is empty. anaconda.org has no OIDC/trusted "
                      "publishing, so a real publish needs a token. Store it as an environment "
                      "secret on the bound environment and pass it with `secrets: inherit`, or "
                      "run with publish-dry-run-enabled to rehearse without a credential."
                  )
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/anaconda-publish"
          cat > "$RUNNER_TEMP/devflows/anaconda-publish/commands.py" <<'DEVFLOWS_SCRIPT_EOF'
          """anaconda-client argv builders (pure; every mutation is an explicit argv list)."""

          from __future__ import annotations

          # Pinned default anaconda-client, installed ephemerally via ``uvx --from`` when
          # publish-client-version is empty. Kept current by Renovate (custom pep440 manager
          # in renovate.json5); a unit test asserts the manager regex still matches this line.
          # renovate: datasource=pypi depName=anaconda-client
          ANACONDA_CLIENT_VERSION = "1.13.0"

          _EXISTING_MODE_FLAGS = {"fail": [], "skip": ["--skip-existing"], "overwrite": ["--force"]}


          def anaconda_base(server_url: str) -> list[str]:
              argv = ["anaconda"]
              server_url = server_url.strip()
              if server_url:
                  argv += ["-s", server_url]
              return argv


          def build_upload_argv(
              *,
              server_url: str,
              owner: str,
              label: str,
              mode: str,
              extra_arguments: list[str],
              file_path: str,
          ) -> list[str]:
              return (
                  anaconda_base(server_url)
                  + ["upload", "--user", owner, "--label", label]
                  + list(_EXISTING_MODE_FLAGS[mode])
                  + list(extra_arguments)
                  + [file_path]
              )


          def build_move_argv(*, server_url: str, from_label: str, to_label: str, target: str) -> list[str]:
              return anaconda_base(server_url) + [
                  "move",
                  "--from-label",
                  from_label,
                  "--to-label",
                  to_label,
                  target,
              ]


          def build_remove_argv(*, server_url: str, target: str) -> list[str]:
              return anaconda_base(server_url) + ["remove", "--force", target]


          def uvx_wrap(client_version: str, argv: list[str]) -> list[str]:
              return ["uvx", "--from", f"anaconda-client=={client_version}", *argv]


          def resolve_client_version(override: str) -> str:
              override = override.strip()
              return override or ANACONDA_CLIENT_VERSION
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/anaconda-publish"
          cat > "$RUNNER_TEMP/devflows/anaconda-publish/maintain.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Destructive channel maintenance: remove versions/files from anaconda.org.

          Runs ``anaconda remove --force`` per owner-qualified target from the verify job's
          removed-specs output (validated and owner-prefixed there); the human gate is the
          type-the-name maintain-confirm input plus the maintain environment's reviewers.
          The single token-bearing step of the maintain job. Imports sibling module commands.
          """

          from __future__ import annotations

          import os
          import subprocess
          import sys

          import commands


          def main() -> int:
              if not os.environ.get("ANACONDA_API_TOKEN", "").strip():
                  raise SystemExit(
                      "ANACONDA_API_TOKEN is empty; pass the anaconda-token secret "
                      "(secrets: inherit) to remove packages from anaconda.org."
                  )
              server_url = os.environ.get("PUBLISH_SERVER_URL", "")
              client_version = commands.resolve_client_version(os.environ.get("PUBLISH_CLIENT_VERSION", ""))

              targets = [
                  line.strip() for line in os.environ.get("REMOVED_SPECS", "").splitlines() if line.strip()
              ]
              if not targets:
                  raise SystemExit("no removal targets were computed; nothing to remove.")

              for target in targets:
                  argv = commands.uvx_wrap(
                      client_version, commands.build_remove_argv(server_url=server_url, target=target)
                  )
                  print(f"removing {target}", flush=True)
                  _run(argv)
              print(f"removed {len(targets)} spec(s).")
              return 0


          def _run(argv: list[str]) -> None:
              result = subprocess.run(argv, check=False)  # noqa: S603 - argv is fully constructed, no shell
              if result.returncode != 0:
                  sys.stderr.write(f"command failed (exit {result.returncode}): {' '.join(argv)}\n")
                  raise SystemExit(result.returncode)


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false
      - name: Assert publishing credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_TOKEN_PRESENT: ${{ secrets.anaconda-token != '' }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/preflight-token.py"
      - name: Remove from anaconda.org
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_API_TOKEN: ${{ secrets.anaconda-token }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          REMOVED_SPECS: ${{ needs.verify.outputs.removed-specs }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/maintain.py"

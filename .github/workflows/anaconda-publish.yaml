          \ = \", \".join(f\"{item.name}={item.version}\" for item in files)\n        raise SpecError(\n            f\"verified conda packages disagree on version ({detail}); refusing to \"\n            \"publish a mixed-version set.\"\n        )\n    version = versions[0]\n    expected = expected.strip()\n    if expected and version != expected:\n        raise SpecError(\n            f\"publish-expected-version {expected!r} does not match the verified \"\n            f\"package version {version!r}.\"\n        )\n    return version\n\n\n# --------------------------------------------------------------------------- #\n# argv construction                                                            #\n# --------------------------------------------------------------------------- #\ndef anaconda_base(server_url: str) -> list[str]:\n    argv = [\"anaconda\"]\n    server_url = server_url.strip()\n    if server_url:\n        argv += [\"-s\", server_url]\n    return argv\n\n\ndef build_upload_argv(\n\
          \    *,\n    server_url: str,\n    owner: str,\n    label: str,\n    mode: str,\n    extra_arguments: list[str],\n    file_path: str,\n) -> list[str]:\n    return (\n        anaconda_base(server_url)\n        + [\"upload\", \"--user\", owner, \"--label\", label]\n        + list(_EXISTING_MODE_FLAGS[mode])\n        + list(extra_arguments)\n        + [file_path]\n    )\n\n\ndef build_move_argv(*, server_url: str, from_label: str, to_label: str, target: str) -> list[str]:\n    return anaconda_base(server_url) + [\n        \"move\",\n        \"--from-label\",\n        from_label,\n        \"--to-label\",\n        to_label,\n        target,\n    ]\n\n\ndef build_remove_argv(*, server_url: str, target: str) -> list[str]:\n    return anaconda_base(server_url) + [\"remove\", \"--force\", target]\n\n\ndef uvx_wrap(client_version: str, argv: list[str]) -> list[str]:\n    \"\"\"Wrap an anaconda-client argv in an ephemeral, pinned `uvx --from` runner.\"\"\"\n    return [\"uvx\", \"--from\"\
          , f\"anaconda-client=={client_version}\", *argv]\n\n\ndef resolve_client_version(override: str) -> str:\n    \"\"\"The anaconda-client version to install: an explicit override or the pin.\"\"\"\n    override = override.strip()\n    return override or ANACONDA_CLIENT_VERSION\nDEVFLOWS_SCRIPT_EOF\nmkdir -p \"$RUNNER_TEMP/devflows/anaconda-publish\"\ncat > \"$RUNNER_TEMP/devflows/anaconda-publish/validate-inputs.py\" <<'DEVFLOWS_SCRIPT_EOF'\n\"\"\"Fail-fast input validation for anaconda-publish.\n\nRuns in the ``validate`` job with an env block that maps ONLY ``inputs.*``\nexpressions (the validation-failure harness reconstructs that env directly), so\nsecret-presence checks live in the per-job tokenless preflight instead. This\nscript imports the sibling ``specs.py`` (materialized alongside it); the\nvalidate step's run body carries a ``${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/\nspecs.py`` comment so the sync step inlines it.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport\
          \ json\nimport os\n\nimport specs\n\n\ndef main() -> int:\n    owner = _validate_owner()\n    _validate_timeout()\n\n    upload_enabled = _bool(\"UPLOAD_ENABLED\")\n    promote_enabled = _bool(\"PROMOTE_ENABLED\")\n    maintain_enabled = _bool(\"MAINTAIN_ENABLED\")\n    dry_run = _bool(\"PUBLISH_DRY_RUN_ENABLED\")\n\n    # A call either publishes (upload/promote) or destroys (maintain), never both.\n    if maintain_enabled and (upload_enabled or promote_enabled):\n        raise SystemExit(\n            \"maintain-enabled is mutually exclusive with upload-enabled and \"\n            \"promote-enabled; a call either publishes or destroys, never both.\"\n        )\n    if not (upload_enabled or promote_enabled or maintain_enabled):\n        raise SystemExit(\n            \"Nothing to do: enable at least one of upload-enabled, promote-enabled, \"\n            \"or maintain-enabled. This workflow never silently no-ops.\"\n        )\n\n    upload_label = _validate_label(\"UPLOAD_LABEL\"\
          , \"upload-label\")\n\n    if upload_enabled:\n        _validate_upload(owner)\n\n    if promote_enabled:\n        _validate_promote(upload_enabled, upload_label)\n\n    if maintain_enabled:\n        _validate_maintain(owner, dry_run)\n\n    return 0\n\n\ndef _validate_owner() -> str:\n    try:\n        return specs.validate_owner(os.environ.get(\"PUBLISH_OWNER\", \"\"))\n    except specs.SpecError as error:\n        raise SystemExit(str(error)) from error\n\n\ndef _validate_timeout() -> None:\n    raw = os.environ.get(\"PUBLISH_TIMEOUT_MINUTES\", \"\").strip()\n    if not raw:\n        return\n    try:\n        value = int(raw)\n    except ValueError as error:\n        raise SystemExit(f\"publish-timeout-minutes must be an integer; got {raw!r}.\") from error\n    if value <= 0:\n        raise SystemExit(f\"publish-timeout-minutes must be a positive integer; got {value}.\")\n\n\ndef _validate_label(env_name: str, field: str) -> str:\n    try:\n        return specs.validate_label(os.environ.get(env_name,\
          \ \"\"), field=field)\n    except specs.SpecError as error:\n        raise SystemExit(str(error)) from error\n\n\ndef _validate_upload(owner: str) -> None:\n    # Distributions can only arrive through the artifact-download channel; a build\n    # from source would bypass digest verification and coexist with the credential.\n    if not _bool(\"ARTIFACT_DOWNLOAD_ENABLED\"):\n        raise SystemExit(\n            \"upload-enabled is true but artifact-download-enabled is false; conda \"\n            \"distributions can only arrive through the artifact-download channel. \"\n            \"Set artifact-download-enabled: true and artifact-download-name to the \"\n            \"python-build conda-artifact-name output.\"\n        )\n\n    _validate_dist_path()\n\n    manifest_raw = os.environ.get(\"PUBLISH_DIST_MANIFEST\", \"\").strip()\n    if not manifest_raw:\n        raise SystemExit(\n            \"publish-dist-manifest is required when upload-enabled is true; \"\n            \"publishing\
          \ without a digest manifest is refused by design. Pass \"\n            \"python-build's dist-manifest output.\"\n        )\n    try:\n        manifest = json.loads(manifest_raw)\n    except json.JSONDecodeError as error:\n        raise SystemExit(f\"publish-dist-manifest is not valid JSON: {error}.\") from error\n    if not isinstance(manifest, dict) or manifest.get(\"schema\") != 1:\n        raise SystemExit('publish-dist-manifest must be a schema-1 object ({\"schema\": 1, ...}).')\n\n    try:\n        conda_entries = specs.conda_manifest_entries(manifest)\n    except specs.SpecError as error:\n        raise SystemExit(f\"publish-dist-manifest is malformed: {error}\") from error\n    if not conda_entries:\n        raise SystemExit(\n            \"publish-dist-manifest contains no conda packages (no kind=conda file \"\n            \"entries); nothing to upload to anaconda.org.\"\n        )\n\n    # Loud chaining-misconfig catch: the manifest's declared conda-channel artifact\n\
          \    # must be the one this call downloads.\n    download_name = os.environ.get(\"ARTIFACT_DOWNLOAD_NAME\", \"\").strip()\n    artifacts = manifest.get(\"artifacts\")\n    manifest_channel = \"\"\n    if isinstance(artifacts, dict):\n        manifest_channel = str(artifacts.get(\"conda-channel\") or \"\")\n    if download_name and manifest_channel and download_name != manifest_channel:\n        raise SystemExit(\n            f\"publish-dist-manifest artifacts.conda-channel {manifest_channel!r} \"\n            f\"does not match artifact-download-name {download_name!r}; the manifest \"\n            \"and the downloaded artifact are from different builds.\"\n        )\n\n    _validate_extra_arguments()\n    _validate_existing_mode()\n\n\ndef _validate_dist_path() -> None:\n    raw = os.environ.get(\"PUBLISH_DIST_PATH\", \"\").strip()\n    if not raw:\n        raise SystemExit(\n            \"publish-dist-path is required when upload-enabled is true; set it to \"\n            \"the\
          \ artifact-download-path the conda channel is downloaded into.\"\n        )\n    if os.path.isabs(raw) or \"..\" in raw.replace(\"\\\\\", \"/\").split(\"/\"):\n        raise SystemExit(\n            f\"publish-dist-path must be a workspace-relative path without '..': got {raw!r}.\"\n        )\n\n\ndef _validate_extra_arguments() -> None:\n    try:\n        specs.parse_extra_arguments(\n            os.environ.get(\"UPLOAD_ARGUMENTS\", \"\"), field=\"upload-arguments\"\n        )\n    except specs.SpecError as error:\n        raise SystemExit(str(error)) from error\n\n\ndef _validate_existing_mode() -> None:\n    try:\n        specs.validate_existing_mode(os.environ.get(\"UPLOAD_EXISTING_MODE\", \"\"))\n    except specs.SpecError as error:\n        raise SystemExit(str(error)) from error\n\n\ndef _validate_promote(upload_enabled: bool, upload_label: str) -> None:\n    promote_label = _validate_label(\"PROMOTE_LABEL\", \"promote-label\")\n    if promote_label == upload_label:\n  \
          \      raise SystemExit(\n            f\"upload-label and promote-label must differ (both {promote_label!r}); \"\n            \"promotion relabels packages from the staging label to the final label.\"\n        )\n    promote_specs = os.environ.get(\"PROMOTE_SPECS\", \"\")\n    if not upload_enabled:\n        # Standalone promote-only call: specs must be explicit.\n        try:\n            specs.validate_spec_list(promote_specs, field=\"promote-specs\")\n        except specs.SpecError as error:\n            if not specs.parse_spec_list(promote_specs):\n                raise SystemExit(\n                    \"promote-specs is required for a promote-only call \"\n                    \"(upload-enabled is false); list the package/version specs to \"\n                    \"relabel, typically from a previous run's staged-specs output.\"\n                ) from error\n            raise SystemExit(str(error)) from error\n    elif specs.parse_spec_list(promote_specs):\n        # Chained\
          \ mode derives specs from the verified upload set; still validate any\n        # explicit override so a smuggled owner is rejected before an irreversible run.\n        try:\n            specs.validate_spec_list(promote_specs, field=\"promote-specs\")\n        except specs.SpecError as error:\n            raise SystemExit(str(error)) from error\n\n\ndef _validate_maintain(owner: str, dry_run: bool) -> None:\n    try:\n        specs.validate_spec_list(\n            os.environ.get(\"MAINTAIN_REMOVE_SPECS\", \"\"), field=\"maintain-remove-specs\"\n        )\n    except specs.SpecError as error:\n        raise SystemExit(str(error)) from error\n    if dry_run:\n        return\n    confirm = os.environ.get(\"MAINTAIN_CONFIRM\", \"\")\n    if confirm != owner:\n        raise SystemExit(\n            \"maintain-confirm must equal publish-owner exactly to arm a destructive \"\n            \"removal (the type-the-name-to-destroy guard). Set maintain-confirm to \"\n            f\"{owner!r},\
          \ or run with publish-dry-run-enabled to rehearse.\"\n        )\n\n\ndef _bool(name: str) -> bool:\n    return os.environ.get(name, \"\").strip().lower() in {\"1\", \"true\", \"yes\", \"on\"}\n\n\nif __name__ == \"__main__\":\n    raise SystemExit(main())\nDEVFLOWS_SCRIPT_EOF\necho \"script-root=$RUNNER_TEMP/devflows\" >> \"$GITHUB_OUTPUT\""
      - name: Validate inputs
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
          PUBLISH_TIMEOUT_MINUTES: ${{ inputs.publish-timeout-minutes }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          UPLOAD_ENABLED: ${{ inputs.upload-enabled }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          UPLOAD_EXISTING_MODE: ${{ inputs.upload-existing-mode }}
          UPLOAD_ARGUMENTS: ${{ inputs.upload-arguments }}
          PROMOTE_ENABLED: ${{ inputs.promote-enabled }}
          PROMOTE_LABEL: ${{ inputs.promote-label }}
          PROMOTE_SPECS: ${{ inputs.promote-specs }}
          MAINTAIN_ENABLED: ${{ inputs.maintain-enabled }}
          MAINTAIN_REMOVE_SPECS: ${{ inputs.maintain-remove-specs }}
          MAINTAIN_CONFIRM: ${{ inputs.maintain-confirm }}
          ARTIFACT_DOWNLOAD_ENABLED: ${{ inputs.artifact-download-enabled }}
          ARTIFACT_DOWNLOAD_NAME: ${{ inputs.artifact-download-name }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/specs.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/validate-inputs.py"
  verify:
    name: Verify distributions and compute plan
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    outputs:
      package-version: ${{ steps.verify.outputs.package-version }}
      staged-specs: ${{ steps.verify.outputs.staged-specs }}
      uploaded-files: ${{ steps.verify.outputs.uploaded-files }}
      promoted-specs: ${{ steps.verify.outputs.promoted-specs }}
      removed-specs: ${{ steps.verify.outputs.removed-specs }}
    steps:
      - name: Download artifacts
        if: inputs.artifact-download-enabled
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.artifact-download-name }}
          artifact-ids: ${{ inputs.artifact-download-ids }}
          path: ${{ inputs.artifact-download-path }}
          pattern: ${{ inputs.artifact-download-pattern }}
          merge-multiple: ${{ inputs.artifact-download-merge-multiple }}
          github-token: ${{ secrets.artifact-download-token }}
          repository: ${{ inputs.artifact-download-repository }}
          run-id: ${{ inputs.artifact-download-run-id }}
          skip-decompress: ${{ inputs.artifact-download-skip-decompress }}
          digest-mismatch: ${{ inputs.artifact-download-digest-mismatch }}
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: "set -euo pipefail\nmkdir -p \"$RUNNER_TEMP/devflows/anaconda-publish\"\ncat > \"$RUNNER_TEMP/devflows/anaconda-publish/specs.py\" <<'DEVFLOWS_SCRIPT_EOF'\n\"\"\"Shared pure helpers for the anaconda-publish workflow scripts.\n\nEvery mutating operation this workflow performs is built as an explicit argv\nlist (never a shell string) from validated pieces, so this module is the single\nhome for spec parsing, filename parsing, charset validation, digest verification,\nand argv construction. It is imported by ``validate-inputs.py``, ``verify-dist.py``\nand ``upload.py`` (each of those job steps carries a ``${DEVFLOWS_SCRIPT_ROOT}/\nanaconda-publish/specs.py`` comment so the sync materialize step inlines it next\nto its importer, exactly like python-build's collect.py/reindex sibling), and it\nis unit-tested directly.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport hashlib\nimport re\nimport shlex\nfrom dataclasses import dataclass\nfrom pathlib import Path\n\n# Pinned default\
          \ anaconda-client version installed (ephemerally, via `uvx --from`)\n# on the credentialed jobs when publish-client-version is empty. Registered for\n# Renovate via a custom pep440 manager in renovate.json5 (keyed on the inline\n# `# renovate:` comment below); tests/test_anaconda_publish.py asserts the\n# manager regex still matches this constant so the pin stays auto-updated.\n# renovate: datasource=pypi depName=anaconda-client\nANACONDA_CLIENT_VERSION = \"1.13.0\"\n\n# anaconda.org owners (users/orgs): a leading alphanumeric then alphanumerics,\n# hyphen, underscore. The single blast-radius control \u2014 no spec ever carries an\n# owner, so this is the only value that selects a namespace.\n_OWNER_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9_-]*$\")\n# Channel labels (anaconda upload --label / move --to-label). Conservative safe\n# set; no slashes, spaces, or shell metacharacters.\n_LABEL_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._-]*$\")\n# conda package name and version segment\
          \ grammars. Names use the conda safe set;\n# versions additionally allow '+' and '!' (local/epoch separators).\n_PKG_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._-]*$\")\n_VERSION_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._+!-]*$\")\n_CONDA_EXTENSIONS = (\".conda\", \".tar.bz2\")\n\n# Flags a caller must not smuggle through upload-arguments: they are owned by\n# typed inputs whose validation and safety guarantees would otherwise be bypassed.\nFORBIDDEN_UPLOAD_FLAGS = (\n    \"-t\",\n    \"--token\",\n    \"-s\",\n    \"--site\",\n    \"-u\",\n    \"--user\",\n    \"-l\",\n    \"--label\",\n    \"-v\",\n    \"--version\",\n    \"--force\",\n    \"--skip-existing\",\n    \"--interactive\",\n    \"--no-progress\",\n)\n\n# upload-existing-mode enum mapped onto anaconda-client's mutually-exclusive mode\n# group. 'fail' passes neither flag (anaconda-client errors on a collision).\nEXISTING_MODES = (\"fail\", \"skip\", \"overwrite\")\n_EXISTING_MODE_FLAGS = {\"fail\": [], \"skip\": [\"\
          --skip-existing\"], \"overwrite\": [\"--force\"]}\n\n\nclass SpecError(ValueError):\n    \"\"\"A caller-supplied spec, owner, label, or argument failed validation.\"\"\"\n\n\n@dataclass(frozen=True)\nclass CondaFile:\n    \"\"\"A verified ``.conda``/``.tar.bz2`` distribution file.\"\"\"\n\n    name: str\n    path: Path\n    sha256: str\n    size: int\n    version: str\n    package: str\n\n\n# --------------------------------------------------------------------------- #\n# Charset validation                                                           #\n# --------------------------------------------------------------------------- #\ndef validate_owner(owner: str) -> str:\n    owner = owner.strip()\n    if not owner:\n        raise SpecError(\"publish-owner is required and must be non-empty.\")\n    if not _OWNER_RE.match(owner):\n        raise SpecError(\n            \"publish-owner must be an anaconda.org user or organization \"\n            \"(letters, digits, '_', '-', leading\
          \ alphanumeric); got \"\n            f\"{owner!r}.\"\n        )\n    return owner\n\n\ndef validate_label(label: str, *, field: str) -> str:\n    label = label.strip()\n    if not label:\n        raise SpecError(f\"{field} is required and must be non-empty.\")\n    if not _LABEL_RE.match(label):\n        raise SpecError(\n            f\"{field} must be a safe channel label \"\n            \"(letters, digits, '.', '_', '-', leading alphanumeric); got \"\n            f\"{label!r}.\"\n        )\n    return label\n\n\n# --------------------------------------------------------------------------- #\n# Spec parsing                                                                 #\n# --------------------------------------------------------------------------- #\ndef parse_spec(spec: str) -> tuple[str, ...]:\n    \"\"\"Validate a caller spec and return its segments.\n\n    Accepts ``package/version`` or ``package/version/filename`` ONLY. A spec must\n    never carry an owner segment (the\
          \ owner comes solely from publish-owner), so a\n    three-segment spec is accepted only when its third segment is a conda package\n    filename (ends in .conda or .tar.bz2); any other three-segment shape is\n    rejected as a smuggled owner. Returns the validated segments (no owner).\n    \"\"\"\n    raw = spec.strip()\n    if not raw:\n        raise SpecError(\"spec must be non-empty.\")\n    segments = raw.split(\"/\")\n    if len(segments) not in (2, 3):\n        raise SpecError(\n            f\"spec {spec!r} must be package/version[/filename] without an owner \"\n            \"segment (2 or 3 segments only).\"\n        )\n    package, version = segments[0], segments[1]\n    if not _PKG_RE.match(package):\n        raise SpecError(f\"spec {spec!r} has an invalid package segment {package!r}.\")\n    if not _VERSION_RE.match(version):\n        raise SpecError(f\"spec {spec!r} has an invalid version segment {version!r}.\")\n    if len(segments) == 3:\n        filename = segments[2]\n\
          \        if not filename.endswith(_CONDA_EXTENSIONS):\n            # A 3-segment spec whose third piece is not a conda filename is an\n            # owner-qualified spec (owner/package/version); reject it loudly.\n            raise SpecError(\n                f\"spec {spec!r} must be package/version[/filename] without an owner \"\n                \"segment; a three-segment spec is only valid when the third segment \"\n                \"is a package filename ending in .conda or .tar.bz2.\"\n            )\n        if not _conda_filename_re().match(filename):\n            raise SpecError(f\"spec {spec!r} has an invalid filename segment {filename!r}.\")\n    return tuple(segments)\n\n\ndef parse_spec_list(raw: str) -> list[str]:\n    \"\"\"Split a newline-separated spec block into non-empty, stripped specs.\"\"\"\n    return [line.strip() for line in raw.splitlines() if line.strip()]\n\n\ndef validate_spec_list(raw: str, *, field: str) -> list[str]:\n    \"\"\"Validate every spec in\
          \ a newline block; return the cleaned specs.\"\"\"\n    specs = parse_spec_list(raw)\n    if not specs:\n        raise SpecError(f\"{field} is required and must list at least one spec.\")\n    for spec in specs:\n        try:\n            parse_spec(spec)\n        except SpecError as error:\n            raise SpecError(f\"{field}: {error}\") from error\n    return specs\n\n\ndef owner_qualified(owner: str, spec: str) -> str:\n    \"\"\"Prepend the (already validated) owner to a (validated) spec.\"\"\"\n    return f\"{owner}/{spec}\"\n\n\n# --------------------------------------------------------------------------- #\n# Filename parsing                                                             #\n# --------------------------------------------------------------------------- #\ndef _conda_filename_re() -> re.Pattern[str]:\n    return re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._+!-]*\\.(conda|tar\\.bz2)$\")\n\n\ndef parse_conda_filename(filename: str) -> tuple[str, str]:\n    \"\"\"Return\
          \ ``(package, version)`` parsed from a conda package filename.\n\n    conda filenames are ``<name>-<version>-<build>.<ext>``; the name itself may\n    contain hyphens, so the version and build are split from the right.\n    \"\"\"\n    if filename.endswith(\".conda\"):\n        stem = filename[: -len(\".conda\")]\n    elif filename.endswith(\".tar.bz2\"):\n        stem = filename[: -len(\".tar.bz2\")]\n    else:\n        raise SpecError(\n            f\"{filename!r} is not a conda package (expected a .conda or .tar.bz2 file).\"\n        )\n    segments = stem.rsplit(\"-\", 2)\n    if len(segments) != 3 or not all(segments):\n        raise SpecError(\n            f\"cannot parse name and version from conda filename {filename!r} \"\n            \"(expected <name>-<version>-<build>).\"\n        )\n    return segments[0], segments[1]\n\n\n# --------------------------------------------------------------------------- #\n# upload-arguments hardening                                   \
          \                #\n# --------------------------------------------------------------------------- #\ndef parse_extra_arguments(raw: str, *, field: str) -> list[str]:\n    \"\"\"shlex-split extra arguments and reject any flag owned by a typed input.\"\"\"\n    try:\n        args = shlex.split(raw)\n    except ValueError as error:\n        raise SpecError(f\"{field} could not be parsed as shell arguments: {error}.\") from error\n    for arg in args:\n        flag = arg.split(\"=\", 1)[0]\n        if flag in FORBIDDEN_UPLOAD_FLAGS:\n            raise SpecError(\n                f\"{field} may not contain {flag!r}: it is owned by typed inputs \"\n                \"(publish-owner, upload-label, upload-existing-mode, \"\n                \"publish-server-url, the anaconda-token secret). Use those inputs.\"\n            )\n    return args\n\n\ndef validate_existing_mode(mode: str) -> str:\n    mode = mode.strip()\n    if mode not in EXISTING_MODES:\n        raise SpecError(\n         \
          \   f\"upload-existing-mode must be one of {', '.join(EXISTING_MODES)}; got {mode!r}.\"\n        )\n    return mode\n\n\n# --------------------------------------------------------------------------- #\n# Digest verification                                                          #\n# --------------------------------------------------------------------------- #\ndef conda_manifest_entries(manifest: dict[str, object]) -> dict[str, tuple[str, int]]:\n    \"\"\"Return ``{name: (sha256, size)}`` for every kind=conda manifest entry.\"\"\"\n    files = manifest.get(\"files\")\n    if not isinstance(files, list):\n        raise SpecError(\"dist manifest 'files' must be a list.\")\n    entries: dict[str, tuple[str, int]] = {}\n    for item in files:\n        if not isinstance(item, dict) or item.get(\"kind\") != \"conda\":\n            continue\n        name = str(item.get(\"name\") or \"\")\n        sha256 = str(item.get(\"sha256\") or \"\")\n        size = item.get(\"size\")\n      \
          \  if not name or not sha256 or not isinstance(size, int):\n            raise SpecError(f\"dist manifest conda entry is incomplete: {item!r}.\")\n        entries[name] = (sha256, int(size))\n    return entries\n\n\ndef manifest_kinds(manifest: dict[str, object]) -> dict[str, str]:\n    \"\"\"Return ``{name: kind}`` across all manifest files (for wrong-kind detection).\"\"\"\n    files = manifest.get(\"files\")\n    kinds: dict[str, str] = {}\n    if isinstance(files, list):\n        for item in files:\n            if isinstance(item, dict) and item.get(\"name\"):\n                kinds[str(item[\"name\"])] = str(item.get(\"kind\") or \"\")\n    return kinds\n\n\ndef _scan_conda_files(dist_path: Path) -> dict[str, Path]:\n    found: dict[str, Path] = {}\n    for pattern in (\"*.conda\", \"*.tar.bz2\"):\n        for path in sorted(dist_path.rglob(pattern)):\n            if not path.is_file():\n                continue\n            if path.name in found:\n                raise SpecError(\n\
          \                    f\"conda file {path.name!r} appears more than once under \"\n                    f\"{dist_path} (ambiguous across subdirectories).\"\n                )\n            found[path.name] = path\n    return found\n\n\ndef verify_files_against_manifest(dist_path: Path, manifest: dict[str, object]) -> list[CondaFile]:\n    \"\"\"Bidirectionally verify the on-disk conda files against the manifest.\n\n    Every kind=conda manifest entry must have a file on disk whose recomputed\n    sha256 AND size match, and every conda file on disk must be a kind=conda\n    manifest entry. A missing file, an unlisted file, a wrong-kind file, a digest\n    mismatch, or a size mismatch each fails loudly naming the offending file.\n    \"\"\"\n    if not dist_path.is_dir():\n        raise SpecError(f\"distribution path {dist_path} does not exist or is not a directory.\")\n    entries = conda_manifest_entries(manifest)\n    if not entries:\n        raise SpecError(\"dist manifest contains\
          \ no conda packages.\")\n    kinds = manifest_kinds(manifest)\n    on_disk = _scan_conda_files(dist_path)\n\n    for name in sorted(on_disk):\n        if name in entries:\n            continue\n        if name in kinds and kinds[name] != \"conda\":\n            raise SpecError(\n                f\"conda file {name!r} is listed in the dist manifest as kind \"\n                f\"{kinds[name]!r}, not 'conda'.\"\n            )\n        raise SpecError(\n            f\"conda file {name!r} was downloaded but is not listed in the dist manifest.\"\n        )\n\n    verified: list[CondaFile] = []\n    for name in sorted(entries):\n        expected_sha, expected_size = entries[name]\n        if name not in on_disk:\n            raise SpecError(\n                f\"dist manifest lists conda file {name!r} but it is missing from {dist_path}.\"\n            )\n        path = on_disk[name]\n        data = path.read_bytes()\n        actual_size = len(data)\n        actual_sha = hashlib.sha256(data).hexdigest()\n\
          \        if actual_size != expected_size:\n            raise SpecError(\n                f\"size mismatch for {name!r}: manifest {expected_size}, on disk {actual_size}.\"\n            )\n        if actual_sha != expected_sha:\n            raise SpecError(\n                f\"sha256 mismatch for {name!r}: manifest {expected_sha}, on disk {actual_sha}.\"\n            )\n        package, version = parse_conda_filename(name)\n        verified.append(\n            CondaFile(\n                name=name,\n                path=path,\n                sha256=actual_sha,\n                size=actual_size,\n                version=version,\n                package=package,\n            )\n        )\n    return verified\n\n\ndef resolve_version(files: list[CondaFile], *, expected: str = \"\") -> str:\n    \"\"\"Cross-check a single consistent version, honoring an expected-version guard.\"\"\"\n    versions = sorted({item.version for item in files})\n    if len(versions) != 1:\n        detail\
          \ = \", \".join(f\"{item.name}={item.version}\" for item in files)\n        raise SpecError(\n            f\"verified conda packages disagree on version ({detail}); refusing to \"\n            \"publish a mixed-version set.\"\n        )\n    version = versions[0]\n    expected = expected.strip()\n    if expected and version != expected:\n        raise SpecError(\n            f\"publish-expected-version {expected!r} does not match the verified \"\n            f\"package version {version!r}.\"\n        )\n    return version\n\n\n# --------------------------------------------------------------------------- #\n# argv construction                                                            #\n# --------------------------------------------------------------------------- #\ndef anaconda_base(server_url: str) -> list[str]:\n    argv = [\"anaconda\"]\n    server_url = server_url.strip()\n    if server_url:\n        argv += [\"-s\", server_url]\n    return argv\n\n\ndef build_upload_argv(\n\
          \    *,\n    server_url: str,\n    owner: str,\n    label: str,\n    mode: str,\n    extra_arguments: list[str],\n    file_path: str,\n) -> list[str]:\n    return (\n        anaconda_base(server_url)\n        + [\"upload\", \"--user\", owner, \"--label\", label]\n        + list(_EXISTING_MODE_FLAGS[mode])\n        + list(extra_arguments)\n        + [file_path]\n    )\n\n\ndef build_move_argv(*, server_url: str, from_label: str, to_label: str, target: str) -> list[str]:\n    return anaconda_base(server_url) + [\n        \"move\",\n        \"--from-label\",\n        from_label,\n        \"--to-label\",\n        to_label,\n        target,\n    ]\n\n\ndef build_remove_argv(*, server_url: str, target: str) -> list[str]:\n    return anaconda_base(server_url) + [\"remove\", \"--force\", target]\n\n\ndef uvx_wrap(client_version: str, argv: list[str]) -> list[str]:\n    \"\"\"Wrap an anaconda-client argv in an ephemeral, pinned `uvx --from` runner.\"\"\"\n    return [\"uvx\", \"--from\"\
          , f\"anaconda-client=={client_version}\", *argv]\n\n\ndef resolve_client_version(override: str) -> str:\n    \"\"\"The anaconda-client version to install: an explicit override or the pin.\"\"\"\n    override = override.strip()\n    return override or ANACONDA_CLIENT_VERSION\nDEVFLOWS_SCRIPT_EOF\nmkdir -p \"$RUNNER_TEMP/devflows/anaconda-publish\"\ncat > \"$RUNNER_TEMP/devflows/anaconda-publish/verify-dist.py\" <<'DEVFLOWS_SCRIPT_EOF'\n\"\"\"Credential-free supply-chain guard and dry-run plan computation.\n\nRuns in the ``verify`` job (and again, with EMIT_PLAN=false, as the tokenless\nre-verification step inside the ``upload`` job). When upload-enabled it downloads\nnothing itself (the generated artifact-download channel does) but recomputes the\nsha256 AND size of every ``.conda`` file and matches them bidirectionally against\nthe caller-supplied dist manifest. It then derives the staged/promote/remove\nplans and emits them as outputs plus a job summary of the exact argv each\n\
          credentialed job would run \u2014 the whole publish plan, produced without a token, so\na dry-run proves the wiring while every environment-bound job stays skipped.\n\nImports the sibling ``specs.py`` (a ``${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/\nspecs.py`` comment in the step run body makes the sync step inline it).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nimport os\nimport secrets\nfrom pathlib import Path\n\nimport specs\n\n\ndef main() -> int:\n    try:\n        return _run()\n    except specs.SpecError as error:\n        raise SystemExit(str(error)) from error\n\n\ndef _run() -> int:\n    owner = os.environ[\"PUBLISH_OWNER\"].strip()\n    server_url = os.environ.get(\"PUBLISH_SERVER_URL\", \"\")\n    # The plan's argv reflect the version each credentialed job resolves the same\n    # way (override or the specs.py pin), so the dry-run summary is faithful.\n    client_version = specs.resolve_client_version(os.environ.get(\"PUBLISH_CLIENT_VERSION\", \"\"\
          ))\n    emit_plan = _bool(\"EMIT_PLAN\", default=True)\n\n    upload_enabled = _bool(\"UPLOAD_ENABLED\")\n    promote_enabled = _bool(\"PROMOTE_ENABLED\")\n    maintain_enabled = _bool(\"MAINTAIN_ENABLED\")\n\n    version = \"\"\n    verified: list[specs.CondaFile] = []\n    if upload_enabled:\n        verified = _verify(owner, server_url)\n        version = specs.resolve_version(\n            verified, expected=os.environ.get(\"PUBLISH_EXPECTED_VERSION\", \"\")\n        )\n\n    if not emit_plan:\n        # Re-verification pass inside the credentialed job: digests and version are\n        # checked above; there is nothing to emit or plan.\n        return 0\n\n    staged_specs: list[str] = []\n    uploaded_files: list[str] = []\n    upload_plan: list[list[str]] = []\n    if upload_enabled:\n        uploaded_files = [item.name for item in verified]\n        staged_specs = sorted(\n            {specs.owner_qualified(owner, f\"{item.package}/{item.version}\") for item in verified}\n\
          \        )\n        mode = specs.validate_existing_mode(os.environ.get(\"UPLOAD_EXISTING_MODE\", \"fail\"))\n        extra = specs.parse_extra_arguments(\n            os.environ.get(\"UPLOAD_ARGUMENTS\", \"\"), field=\"upload-arguments\"\n        )\n        upload_label = specs.validate_label(os.environ[\"UPLOAD_LABEL\"], field=\"upload-label\")\n        upload_plan = [\n            specs.uvx_wrap(\n                client_version,\n                specs.build_upload_argv(\n                    server_url=server_url,\n                    owner=owner,\n                    label=upload_label,\n                    mode=mode,\n                    extra_arguments=extra,\n                    file_path=str(item.path),\n                ),\n            )\n            for item in verified\n        ]\n\n    promoted_specs: list[str] = []\n    promote_plan: list[list[str]] = []\n    if promote_enabled:\n        promoted_specs = _promote_targets(owner, staged_specs)\n        upload_label = specs.validate_label(os.environ[\"\
          UPLOAD_LABEL\"], field=\"upload-label\")\n        promote_label = specs.validate_label(os.environ[\"PROMOTE_LABEL\"], field=\"promote-label\")\n        promote_plan = [\n            specs.uvx_wrap(\n                client_version,\n                specs.build_move_argv(\n                    server_url=server_url,\n                    from_label=upload_label,\n                    to_label=promote_label,\n                    target=target,\n                ),\n            )\n            for target in promoted_specs\n        ]\n\n    removed_specs: list[str] = []\n    remove_plan: list[list[str]] = []\n    if maintain_enabled:\n        removed_specs = [\n            specs.owner_qualified(owner, spec)\n            for spec in specs.validate_spec_list(\n                os.environ.get(\"MAINTAIN_REMOVE_SPECS\", \"\"), field=\"maintain-remove-specs\"\n            )\n        ]\n        remove_plan = [\n            specs.uvx_wrap(\n                client_version, specs.build_remove_argv(server_url=server_url,\
          \ target=target)\n            )\n            for target in removed_specs\n        ]\n\n    _write_outputs(\n        {\n            \"package-version\": version,\n            \"staged-specs\": \"\\n\".join(staged_specs),\n            \"uploaded-files\": \"\\n\".join(uploaded_files),\n            \"promoted-specs\": \"\\n\".join(promoted_specs),\n            \"removed-specs\": \"\\n\".join(removed_specs),\n        }\n    )\n    _write_summary(\n        version=version,\n        upload_plan=upload_plan,\n        promote_plan=promote_plan,\n        remove_plan=remove_plan,\n    )\n    return 0\n\n\ndef _verify(owner: str, server_url: str) -> list[specs.CondaFile]:\n    dist_path = Path(os.environ[\"PUBLISH_DIST_PATH\"]).resolve()\n    workspace = Path(os.environ.get(\"GITHUB_WORKSPACE\", \".\")).resolve()\n    if workspace != dist_path and workspace not in dist_path.parents:\n        raise SystemExit(f\"publish-dist-path {dist_path} must stay inside the workspace.\")\n    manifest_raw\
          \ = os.environ.get(\"PUBLISH_DIST_MANIFEST\", \"\").strip()\n    try:\n        manifest = json.loads(manifest_raw)\n    except json.JSONDecodeError as error:\n        raise SystemExit(f\"publish-dist-manifest is not valid JSON: {error}.\") from error\n    if not isinstance(manifest, dict):\n        raise SystemExit(\"publish-dist-manifest must be a JSON object.\")\n    try:\n        return specs.verify_files_against_manifest(dist_path, manifest)\n    except specs.SpecError as error:\n        raise SystemExit(str(error)) from error\n\n\ndef _promote_targets(owner: str, staged_specs: list[str]) -> list[str]:\n    explicit = specs.parse_spec_list(os.environ.get(\"PROMOTE_SPECS\", \"\"))\n    if explicit:\n        try:\n            validated = specs.validate_spec_list(\n                os.environ.get(\"PROMOTE_SPECS\", \"\"), field=\"promote-specs\"\n            )\n        except specs.SpecError as error:\n            raise SystemExit(str(error)) from error\n        return [specs.owner_qualified(owner,\
          \ spec) for spec in validated]\n    # Chained mode: promote exactly the staging specs derived from the verified set.\n    return list(staged_specs)\n\n\ndef _write_outputs(outputs: dict[str, str]) -> None:\n    github_output = os.environ.get(\"GITHUB_OUTPUT\")\n    if not github_output:\n        raise SystemExit(\"GITHUB_OUTPUT is not set.\")\n    with Path(github_output).open(\"a\", encoding=\"utf-8\") as handle:\n        for name, value in outputs.items():\n            handle.write(_render_output(name, value))\n\n\ndef _render_output(name: str, value: str) -> str:\n    delimiter = f\"ghadelim_{secrets.token_hex(16)}\"\n    if delimiter in value:  # pragma: no cover - astronomically unlikely\n        raise SystemExit(\"output delimiter collision; retry.\")\n    return f\"{name}<<{delimiter}\\n{value}\\n{delimiter}\\n\"\n\n\ndef _write_summary(\n    *,\n    version: str,\n    upload_plan: list[list[str]],\n    promote_plan: list[list[str]],\n    remove_plan: list[list[str]],\n\
          ) -> None:\n    summary_path = os.environ.get(\"GITHUB_STEP_SUMMARY\")\n    if not summary_path:\n        return\n    lines = [\"## anaconda-publish plan\", \"\"]\n    if version:\n        lines += [f\"Package version: `{version}`\", \"\"]\n    for title, plan in (\n        (\"Upload\", upload_plan),\n        (\"Promote\", promote_plan),\n        (\"Remove\", remove_plan),\n    ):\n        if not plan:\n            continue\n        lines += [f\"### {title}\", \"\", \"```\"]\n        lines += [\" \".join(argv) for argv in plan]\n        lines += [\"```\", \"\"]\n    if len(lines) == 2:\n        lines += [\"No operations planned.\", \"\"]\n    with Path(summary_path).open(\"a\", encoding=\"utf-8\") as handle:\n        handle.write(\"\\n\".join(lines) + \"\\n\")\n\n\ndef _bool(name: str, *, default: bool = False) -> bool:\n    raw = os.environ.get(name, \"\").strip().lower()\n    if not raw:\n        return default\n    return raw in {\"1\", \"true\", \"yes\", \"on\"}\n\n\nif __name__\
          \ == \"__main__\":\n    raise SystemExit(main())\nDEVFLOWS_SCRIPT_EOF\necho \"script-root=$RUNNER_TEMP/devflows\" >> \"$GITHUB_OUTPUT\""
      - name: Verify distributions and compute plan
        id: verify
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          UPLOAD_ENABLED: ${{ inputs.upload-enabled }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          UPLOAD_EXISTING_MODE: ${{ inputs.upload-existing-mode }}
          UPLOAD_ARGUMENTS: ${{ inputs.upload-arguments }}
          PROMOTE_ENABLED: ${{ inputs.promote-enabled }}
          PROMOTE_LABEL: ${{ inputs.promote-label }}
          PROMOTE_SPECS: ${{ inputs.promote-specs }}
          MAINTAIN_ENABLED: ${{ inputs.maintain-enabled }}
          MAINTAIN_REMOVE_SPECS: ${{ inputs.maintain-remove-specs }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/specs.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/verify-dist.py"
  upload:
    name: Upload to anaconda.org
    needs:
      - validate
      - verify
    if: ${{ !inputs.publish-dry-run-enabled && inputs.upload-enabled }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    environment:
      name: ${{ inputs.upload-environment-name }}
    concurrency:
      group: anaconda-publish-${{ inputs.upload-environment-name }}
      cancel-in-progress: false
    steps:
      - name: Download artifacts
        if: inputs.artifact-download-enabled
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.artifact-download-name }}
          artifact-ids: ${{ inputs.artifact-download-ids }}
          path: ${{ inputs.artifact-download-path }}
          pattern: ${{ inputs.artifact-download-pattern }}
          merge-multiple: ${{ inputs.artifact-download-merge-multiple }}
          github-token: ${{ secrets.artifact-download-token }}
          repository: ${{ inputs.artifact-download-repository }}
          run-id: ${{ inputs.artifact-download-run-id }}
          skip-decompress: ${{ inputs.artifact-download-skip-decompress }}
          digest-mismatch: ${{ inputs.artifact-download-digest-mismatch }}
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: "set -euo pipefail\nmkdir -p \"$RUNNER_TEMP/devflows/anaconda-publish\"\ncat > \"$RUNNER_TEMP/devflows/anaconda-publish/specs.py\" <<'DEVFLOWS_SCRIPT_EOF'\n\"\"\"Shared pure helpers for the anaconda-publish workflow scripts.\n\nEvery mutating operation this workflow performs is built as an explicit argv\nlist (never a shell string) from validated pieces, so this module is the single\nhome for spec parsing, filename parsing, charset validation, digest verification,\nand argv construction. It is imported by ``validate-inputs.py``, ``verify-dist.py``\nand ``upload.py`` (each of those job steps carries a ``${DEVFLOWS_SCRIPT_ROOT}/\nanaconda-publish/specs.py`` comment so the sync materialize step inlines it next\nto its importer, exactly like python-build's collect.py/reindex sibling), and it\nis unit-tested directly.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport hashlib\nimport re\nimport shlex\nfrom dataclasses import dataclass\nfrom pathlib import Path\n\n# Pinned default\
          \ anaconda-client version installed (ephemerally, via `uvx --from`)\n# on the credentialed jobs when publish-client-version is empty. Registered for\n# Renovate via a custom pep440 manager in renovate.json5 (keyed on the inline\n# `# renovate:` comment below); tests/test_anaconda_publish.py asserts the\n# manager regex still matches this constant so the pin stays auto-updated.\n# renovate: datasource=pypi depName=anaconda-client\nANACONDA_CLIENT_VERSION = \"1.13.0\"\n\n# anaconda.org owners (users/orgs): a leading alphanumeric then alphanumerics,\n# hyphen, underscore. The single blast-radius control \u2014 no spec ever carries an\n# owner, so this is the only value that selects a namespace.\n_OWNER_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9_-]*$\")\n# Channel labels (anaconda upload --label / move --to-label). Conservative safe\n# set; no slashes, spaces, or shell metacharacters.\n_LABEL_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._-]*$\")\n# conda package name and version segment\
          \ grammars. Names use the conda safe set;\n# versions additionally allow '+' and '!' (local/epoch separators).\n_PKG_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._-]*$\")\n_VERSION_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._+!-]*$\")\n_CONDA_EXTENSIONS = (\".conda\", \".tar.bz2\")\n\n# Flags a caller must not smuggle through upload-arguments: they are owned by\n# typed inputs whose validation and safety guarantees would otherwise be bypassed.\nFORBIDDEN_UPLOAD_FLAGS = (\n    \"-t\",\n    \"--token\",\n    \"-s\",\n    \"--site\",\n    \"-u\",\n    \"--user\",\n    \"-l\",\n    \"--label\",\n    \"-v\",\n    \"--version\",\n    \"--force\",\n    \"--skip-existing\",\n    \"--interactive\",\n    \"--no-progress\",\n)\n\n# upload-existing-mode enum mapped onto anaconda-client's mutually-exclusive mode\n# group. 'fail' passes neither flag (anaconda-client errors on a collision).\nEXISTING_MODES = (\"fail\", \"skip\", \"overwrite\")\n_EXISTING_MODE_FLAGS = {\"fail\": [], \"skip\": [\"\
          --skip-existing\"], \"overwrite\": [\"--force\"]}\n\n\nclass SpecError(ValueError):\n    \"\"\"A caller-supplied spec, owner, label, or argument failed validation.\"\"\"\n\n\n@dataclass(frozen=True)\nclass CondaFile:\n    \"\"\"A verified ``.conda``/``.tar.bz2`` distribution file.\"\"\"\n\n    name: str\n    path: Path\n    sha256: str\n    size: int\n    version: str\n    package: str\n\n\n# --------------------------------------------------------------------------- #\n# Charset validation                                                           #\n# --------------------------------------------------------------------------- #\ndef validate_owner(owner: str) -> str:\n    owner = owner.strip()\n    if not owner:\n        raise SpecError(\"publish-owner is required and must be non-empty.\")\n    if not _OWNER_RE.match(owner):\n        raise SpecError(\n            \"publish-owner must be an anaconda.org user or organization \"\n            \"(letters, digits, '_', '-', leading\
          \ alphanumeric); got \"\n            f\"{owner!r}.\"\n        )\n    return owner\n\n\ndef validate_label(label: str, *, field: str) -> str:\n    label = label.strip()\n    if not label:\n        raise SpecError(f\"{field} is required and must be non-empty.\")\n    if not _LABEL_RE.match(label):\n        raise SpecError(\n            f\"{field} must be a safe channel label \"\n            \"(letters, digits, '.', '_', '-', leading alphanumeric); got \"\n            f\"{label!r}.\"\n        )\n    return label\n\n\n# --------------------------------------------------------------------------- #\n# Spec parsing                                                                 #\n# --------------------------------------------------------------------------- #\ndef parse_spec(spec: str) -> tuple[str, ...]:\n    \"\"\"Validate a caller spec and return its segments.\n\n    Accepts ``package/version`` or ``package/version/filename`` ONLY. A spec must\n    never carry an owner segment (the\
          \ owner comes solely from publish-owner), so a\n    three-segment spec is accepted only when its third segment is a conda package\n    filename (ends in .conda or .tar.bz2); any other three-segment shape is\n    rejected as a smuggled owner. Returns the validated segments (no owner).\n    \"\"\"\n    raw = spec.strip()\n    if not raw:\n        raise SpecError(\"spec must be non-empty.\")\n    segments = raw.split(\"/\")\n    if len(segments) not in (2, 3):\n        raise SpecError(\n            f\"spec {spec!r} must be package/version[/filename] without an owner \"\n            \"segment (2 or 3 segments only).\"\n        )\n    package, version = segments[0], segments[1]\n    if not _PKG_RE.match(package):\n        raise SpecError(f\"spec {spec!r} has an invalid package segment {package!r}.\")\n    if not _VERSION_RE.match(version):\n        raise SpecError(f\"spec {spec!r} has an invalid version segment {version!r}.\")\n    if len(segments) == 3:\n        filename = segments[2]\n\
          \        if not filename.endswith(_CONDA_EXTENSIONS):\n            # A 3-segment spec whose third piece is not a conda filename is an\n            # owner-qualified spec (owner/package/version); reject it loudly.\n            raise SpecError(\n                f\"spec {spec!r} must be package/version[/filename] without an owner \"\n                \"segment; a three-segment spec is only valid when the third segment \"\n                \"is a package filename ending in .conda or .tar.bz2.\"\n            )\n        if not _conda_filename_re().match(filename):\n            raise SpecError(f\"spec {spec!r} has an invalid filename segment {filename!r}.\")\n    return tuple(segments)\n\n\ndef parse_spec_list(raw: str) -> list[str]:\n    \"\"\"Split a newline-separated spec block into non-empty, stripped specs.\"\"\"\n    return [line.strip() for line in raw.splitlines() if line.strip()]\n\n\ndef validate_spec_list(raw: str, *, field: str) -> list[str]:\n    \"\"\"Validate every spec in\
          \ a newline block; return the cleaned specs.\"\"\"\n    specs = parse_spec_list(raw)\n    if not specs:\n        raise SpecError(f\"{field} is required and must list at least one spec.\")\n    for spec in specs:\n        try:\n            parse_spec(spec)\n        except SpecError as error:\n            raise SpecError(f\"{field}: {error}\") from error\n    return specs\n\n\ndef owner_qualified(owner: str, spec: str) -> str:\n    \"\"\"Prepend the (already validated) owner to a (validated) spec.\"\"\"\n    return f\"{owner}/{spec}\"\n\n\n# --------------------------------------------------------------------------- #\n# Filename parsing                                                             #\n# --------------------------------------------------------------------------- #\ndef _conda_filename_re() -> re.Pattern[str]:\n    return re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._+!-]*\\.(conda|tar\\.bz2)$\")\n\n\ndef parse_conda_filename(filename: str) -> tuple[str, str]:\n    \"\"\"Return\
          \ ``(package, version)`` parsed from a conda package filename.\n\n    conda filenames are ``<name>-<version>-<build>.<ext>``; the name itself may\n    contain hyphens, so the version and build are split from the right.\n    \"\"\"\n    if filename.endswith(\".conda\"):\n        stem = filename[: -len(\".conda\")]\n    elif filename.endswith(\".tar.bz2\"):\n        stem = filename[: -len(\".tar.bz2\")]\n    else:\n        raise SpecError(\n            f\"{filename!r} is not a conda package (expected a .conda or .tar.bz2 file).\"\n        )\n    segments = stem.rsplit(\"-\", 2)\n    if len(segments) != 3 or not all(segments):\n        raise SpecError(\n            f\"cannot parse name and version from conda filename {filename!r} \"\n            \"(expected <name>-<version>-<build>).\"\n        )\n    return segments[0], segments[1]\n\n\n# --------------------------------------------------------------------------- #\n# upload-arguments hardening                                   \
          \                #\n# --------------------------------------------------------------------------- #\ndef parse_extra_arguments(raw: str, *, field: str) -> list[str]:\n    \"\"\"shlex-split extra arguments and reject any flag owned by a typed input.\"\"\"\n    try:\n        args = shlex.split(raw)\n    except ValueError as error:\n        raise SpecError(f\"{field} could not be parsed as shell arguments: {error}.\") from error\n    for arg in args:\n        flag = arg.split(\"=\", 1)[0]\n        if flag in FORBIDDEN_UPLOAD_FLAGS:\n            raise SpecError(\n                f\"{field} may not contain {flag!r}: it is owned by typed inputs \"\n                \"(publish-owner, upload-label, upload-existing-mode, \"\n                \"publish-server-url, the anaconda-token secret). Use those inputs.\"\n            )\n    return args\n\n\ndef validate_existing_mode(mode: str) -> str:\n    mode = mode.strip()\n    if mode not in EXISTING_MODES:\n        raise SpecError(\n         \
          \   f\"upload-existing-mode must be one of {', '.join(EXISTING_MODES)}; got {mode!r}.\"\n        )\n    return mode\n\n\n# --------------------------------------------------------------------------- #\n# Digest verification                                                          #\n# --------------------------------------------------------------------------- #\ndef conda_manifest_entries(manifest: dict[str, object]) -> dict[str, tuple[str, int]]:\n    \"\"\"Return ``{name: (sha256, size)}`` for every kind=conda manifest entry.\"\"\"\n    files = manifest.get(\"files\")\n    if not isinstance(files, list):\n        raise SpecError(\"dist manifest 'files' must be a list.\")\n    entries: dict[str, tuple[str, int]] = {}\n    for item in files:\n        if not isinstance(item, dict) or item.get(\"kind\") != \"conda\":\n            continue\n        name = str(item.get(\"name\") or \"\")\n        sha256 = str(item.get(\"sha256\") or \"\")\n        size = item.get(\"size\")\n      \
          \  if not name or not sha256 or not isinstance(size, int):\n            raise SpecError(f\"dist manifest conda entry is incomplete: {item!r}.\")\n        entries[name] = (sha256, int(size))\n    return entries\n\n\ndef manifest_kinds(manifest: dict[str, object]) -> dict[str, str]:\n    \"\"\"Return ``{name: kind}`` across all manifest files (for wrong-kind detection).\"\"\"\n    files = manifest.get(\"files\")\n    kinds: dict[str, str] = {}\n    if isinstance(files, list):\n        for item in files:\n            if isinstance(item, dict) and item.get(\"name\"):\n                kinds[str(item[\"name\"])] = str(item.get(\"kind\") or \"\")\n    return kinds\n\n\ndef _scan_conda_files(dist_path: Path) -> dict[str, Path]:\n    found: dict[str, Path] = {}\n    for pattern in (\"*.conda\", \"*.tar.bz2\"):\n        for path in sorted(dist_path.rglob(pattern)):\n            if not path.is_file():\n                continue\n            if path.name in found:\n                raise SpecError(\n\
          \                    f\"conda file {path.name!r} appears more than once under \"\n                    f\"{dist_path} (ambiguous across subdirectories).\"\n                )\n            found[path.name] = path\n    return found\n\n\ndef verify_files_against_manifest(dist_path: Path, manifest: dict[str, object]) -> list[CondaFile]:\n    \"\"\"Bidirectionally verify the on-disk conda files against the manifest.\n\n    Every kind=conda manifest entry must have a file on disk whose recomputed\n    sha256 AND size match, and every conda file on disk must be a kind=conda\n    manifest entry. A missing file, an unlisted file, a wrong-kind file, a digest\n    mismatch, or a size mismatch each fails loudly naming the offending file.\n    \"\"\"\n    if not dist_path.is_dir():\n        raise SpecError(f\"distribution path {dist_path} does not exist or is not a directory.\")\n    entries = conda_manifest_entries(manifest)\n    if not entries:\n        raise SpecError(\"dist manifest contains\
          \ no conda packages.\")\n    kinds = manifest_kinds(manifest)\n    on_disk = _scan_conda_files(dist_path)\n\n    for name in sorted(on_disk):\n        if name in entries:\n            continue\n        if name in kinds and kinds[name] != \"conda\":\n            raise SpecError(\n                f\"conda file {name!r} is listed in the dist manifest as kind \"\n                f\"{kinds[name]!r}, not 'conda'.\"\n            )\n        raise SpecError(\n            f\"conda file {name!r} was downloaded but is not listed in the dist manifest.\"\n        )\n\n    verified: list[CondaFile] = []\n    for name in sorted(entries):\n        expected_sha, expected_size = entries[name]\n        if name not in on_disk:\n            raise SpecError(\n                f\"dist manifest lists conda file {name!r} but it is missing from {dist_path}.\"\n            )\n        path = on_disk[name]\n        data = path.read_bytes()\n        actual_size = len(data)\n        actual_sha = hashlib.sha256(data).hexdigest()\n\
          \        if actual_size != expected_size:\n            raise SpecError(\n                f\"size mismatch for {name!r}: manifest {expected_size}, on disk {actual_size}.\"\n            )\n        if actual_sha != expected_sha:\n            raise SpecError(\n                f\"sha256 mismatch for {name!r}: manifest {expected_sha}, on disk {actual_sha}.\"\n            )\n        package, version = parse_conda_filename(name)\n        verified.append(\n            CondaFile(\n                name=name,\n                path=path,\n                sha256=actual_sha,\n                size=actual_size,\n                version=version,\n                package=package,\n            )\n        )\n    return verified\n\n\ndef resolve_version(files: list[CondaFile], *, expected: str = \"\") -> str:\n    \"\"\"Cross-check a single consistent version, honoring an expected-version guard.\"\"\"\n    versions = sorted({item.version for item in files})\n    if len(versions) != 1:\n        detail\
          \ = \", \".join(f\"{item.name}={item.version}\" for item in files)\n        raise SpecError(\n            f\"verified conda packages disagree on version ({detail}); refusing to \"\n            \"publish a mixed-version set.\"\n        )\n    version = versions[0]\n    expected = expected.strip()\n    if expected and version != expected:\n        raise SpecError(\n            f\"publish-expected-version {expected!r} does not match the verified \"\n            f\"package version {version!r}.\"\n        )\n    return version\n\n\n# --------------------------------------------------------------------------- #\n# argv construction                                                            #\n# --------------------------------------------------------------------------- #\ndef anaconda_base(server_url: str) -> list[str]:\n    argv = [\"anaconda\"]\n    server_url = server_url.strip()\n    if server_url:\n        argv += [\"-s\", server_url]\n    return argv\n\n\ndef build_upload_argv(\n\
          \    *,\n    server_url: str,\n    owner: str,\n    label: str,\n    mode: str,\n    extra_arguments: list[str],\n    file_path: str,\n) -> list[str]:\n    return (\n        anaconda_base(server_url)\n        + [\"upload\", \"--user\", owner, \"--label\", label]\n        + list(_EXISTING_MODE_FLAGS[mode])\n        + list(extra_arguments)\n        + [file_path]\n    )\n\n\ndef build_move_argv(*, server_url: str, from_label: str, to_label: str, target: str) -> list[str]:\n    return anaconda_base(server_url) + [\n        \"move\",\n        \"--from-label\",\n        from_label,\n        \"--to-label\",\n        to_label,\n        target,\n    ]\n\n\ndef build_remove_argv(*, server_url: str, target: str) -> list[str]:\n    return anaconda_base(server_url) + [\"remove\", \"--force\", target]\n\n\ndef uvx_wrap(client_version: str, argv: list[str]) -> list[str]:\n    \"\"\"Wrap an anaconda-client argv in an ephemeral, pinned `uvx --from` runner.\"\"\"\n    return [\"uvx\", \"--from\"\
          , f\"anaconda-client=={client_version}\", *argv]\n\n\ndef resolve_client_version(override: str) -> str:\n    \"\"\"The anaconda-client version to install: an explicit override or the pin.\"\"\"\n    override = override.strip()\n    return override or ANACONDA_CLIENT_VERSION\nDEVFLOWS_SCRIPT_EOF\nmkdir -p \"$RUNNER_TEMP/devflows/anaconda-publish\"\ncat > \"$RUNNER_TEMP/devflows/anaconda-publish/verify-dist.py\" <<'DEVFLOWS_SCRIPT_EOF'\n\"\"\"Credential-free supply-chain guard and dry-run plan computation.\n\nRuns in the ``verify`` job (and again, with EMIT_PLAN=false, as the tokenless\nre-verification step inside the ``upload`` job). When upload-enabled it downloads\nnothing itself (the generated artifact-download channel does) but recomputes the\nsha256 AND size of every ``.conda`` file and matches them bidirectionally against\nthe caller-supplied dist manifest. It then derives the staged/promote/remove\nplans and emits them as outputs plus a job summary of the exact argv each\n\
          credentialed job would run \u2014 the whole publish plan, produced without a token, so\na dry-run proves the wiring while every environment-bound job stays skipped.\n\nImports the sibling ``specs.py`` (a ``${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/\nspecs.py`` comment in the step run body makes the sync step inline it).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nimport os\nimport secrets\nfrom pathlib import Path\n\nimport specs\n\n\ndef main() -> int:\n    try:\n        return _run()\n    except specs.SpecError as error:\n        raise SystemExit(str(error)) from error\n\n\ndef _run() -> int:\n    owner = os.environ[\"PUBLISH_OWNER\"].strip()\n    server_url = os.environ.get(\"PUBLISH_SERVER_URL\", \"\")\n    # The plan's argv reflect the version each credentialed job resolves the same\n    # way (override or the specs.py pin), so the dry-run summary is faithful.\n    client_version = specs.resolve_client_version(os.environ.get(\"PUBLISH_CLIENT_VERSION\", \"\"\
          ))\n    emit_plan = _bool(\"EMIT_PLAN\", default=True)\n\n    upload_enabled = _bool(\"UPLOAD_ENABLED\")\n    promote_enabled = _bool(\"PROMOTE_ENABLED\")\n    maintain_enabled = _bool(\"MAINTAIN_ENABLED\")\n\n    version = \"\"\n    verified: list[specs.CondaFile] = []\n    if upload_enabled:\n        verified = _verify(owner, server_url)\n        version = specs.resolve_version(\n            verified, expected=os.environ.get(\"PUBLISH_EXPECTED_VERSION\", \"\")\n        )\n\n    if not emit_plan:\n        # Re-verification pass inside the credentialed job: digests and version are\n        # checked above; there is nothing to emit or plan.\n        return 0\n\n    staged_specs: list[str] = []\n    uploaded_files: list[str] = []\n    upload_plan: list[list[str]] = []\n    if upload_enabled:\n        uploaded_files = [item.name for item in verified]\n        staged_specs = sorted(\n            {specs.owner_qualified(owner, f\"{item.package}/{item.version}\") for item in verified}\n\
          \        )\n        mode = specs.validate_existing_mode(os.environ.get(\"UPLOAD_EXISTING_MODE\", \"fail\"))\n        extra = specs.parse_extra_arguments(\n            os.environ.get(\"UPLOAD_ARGUMENTS\", \"\"), field=\"upload-arguments\"\n        )\n        upload_label = specs.validate_label(os.environ[\"UPLOAD_LABEL\"], field=\"upload-label\")\n        upload_plan = [\n            specs.uvx_wrap(\n                client_version,\n                specs.build_upload_argv(\n                    server_url=server_url,\n                    owner=owner,\n                    label=upload_label,\n                    mode=mode,\n                    extra_arguments=extra,\n                    file_path=str(item.path),\n                ),\n            )\n            for item in verified\n        ]\n\n    promoted_specs: list[str] = []\n    promote_plan: list[list[str]] = []\n    if promote_enabled:\n        promoted_specs = _promote_targets(owner, staged_specs)\n        upload_label = specs.validate_label(os.environ[\"\
          UPLOAD_LABEL\"], field=\"upload-label\")\n        promote_label = specs.validate_label(os.environ[\"PROMOTE_LABEL\"], field=\"promote-label\")\n        promote_plan = [\n            specs.uvx_wrap(\n                client_version,\n                specs.build_move_argv(\n                    server_url=server_url,\n                    from_label=upload_label,\n                    to_label=promote_label,\n                    target=target,\n                ),\n            )\n            for target in promoted_specs\n        ]\n\n    removed_specs: list[str] = []\n    remove_plan: list[list[str]] = []\n    if maintain_enabled:\n        removed_specs = [\n            specs.owner_qualified(owner, spec)\n            for spec in specs.validate_spec_list(\n                os.environ.get(\"MAINTAIN_REMOVE_SPECS\", \"\"), field=\"maintain-remove-specs\"\n            )\n        ]\n        remove_plan = [\n            specs.uvx_wrap(\n                client_version, specs.build_remove_argv(server_url=server_url,\
          \ target=target)\n            )\n            for target in removed_specs\n        ]\n\n    _write_outputs(\n        {\n            \"package-version\": version,\n            \"staged-specs\": \"\\n\".join(staged_specs),\n            \"uploaded-files\": \"\\n\".join(uploaded_files),\n            \"promoted-specs\": \"\\n\".join(promoted_specs),\n            \"removed-specs\": \"\\n\".join(removed_specs),\n        }\n    )\n    _write_summary(\n        version=version,\n        upload_plan=upload_plan,\n        promote_plan=promote_plan,\n        remove_plan=remove_plan,\n    )\n    return 0\n\n\ndef _verify(owner: str, server_url: str) -> list[specs.CondaFile]:\n    dist_path = Path(os.environ[\"PUBLISH_DIST_PATH\"]).resolve()\n    workspace = Path(os.environ.get(\"GITHUB_WORKSPACE\", \".\")).resolve()\n    if workspace != dist_path and workspace not in dist_path.parents:\n        raise SystemExit(f\"publish-dist-path {dist_path} must stay inside the workspace.\")\n    manifest_raw\
          \ = os.environ.get(\"PUBLISH_DIST_MANIFEST\", \"\").strip()\n    try:\n        manifest = json.loads(manifest_raw)\n    except json.JSONDecodeError as error:\n        raise SystemExit(f\"publish-dist-manifest is not valid JSON: {error}.\") from error\n    if not isinstance(manifest, dict):\n        raise SystemExit(\"publish-dist-manifest must be a JSON object.\")\n    try:\n        return specs.verify_files_against_manifest(dist_path, manifest)\n    except specs.SpecError as error:\n        raise SystemExit(str(error)) from error\n\n\ndef _promote_targets(owner: str, staged_specs: list[str]) -> list[str]:\n    explicit = specs.parse_spec_list(os.environ.get(\"PROMOTE_SPECS\", \"\"))\n    if explicit:\n        try:\n            validated = specs.validate_spec_list(\n                os.environ.get(\"PROMOTE_SPECS\", \"\"), field=\"promote-specs\"\n            )\n        except specs.SpecError as error:\n            raise SystemExit(str(error)) from error\n        return [specs.owner_qualified(owner,\
          \ spec) for spec in validated]\n    # Chained mode: promote exactly the staging specs derived from the verified set.\n    return list(staged_specs)\n\n\ndef _write_outputs(outputs: dict[str, str]) -> None:\n    github_output = os.environ.get(\"GITHUB_OUTPUT\")\n    if not github_output:\n        raise SystemExit(\"GITHUB_OUTPUT is not set.\")\n    with Path(github_output).open(\"a\", encoding=\"utf-8\") as handle:\n        for name, value in outputs.items():\n            handle.write(_render_output(name, value))\n\n\ndef _render_output(name: str, value: str) -> str:\n    delimiter = f\"ghadelim_{secrets.token_hex(16)}\"\n    if delimiter in value:  # pragma: no cover - astronomically unlikely\n        raise SystemExit(\"output delimiter collision; retry.\")\n    return f\"{name}<<{delimiter}\\n{value}\\n{delimiter}\\n\"\n\n\ndef _write_summary(\n    *,\n    version: str,\n    upload_plan: list[list[str]],\n    promote_plan: list[list[str]],\n    remove_plan: list[list[str]],\n\
          ) -> None:\n    summary_path = os.environ.get(\"GITHUB_STEP_SUMMARY\")\n    if not summary_path:\n        return\n    lines = [\"## anaconda-publish plan\", \"\"]\n    if version:\n        lines += [f\"Package version: `{version}`\", \"\"]\n    for title, plan in (\n        (\"Upload\", upload_plan),\n        (\"Promote\", promote_plan),\n        (\"Remove\", remove_plan),\n    ):\n        if not plan:\n            continue\n        lines += [f\"### {title}\", \"\", \"```\"]\n        lines += [\" \".join(argv) for argv in plan]\n        lines += [\"```\", \"\"]\n    if len(lines) == 2:\n        lines += [\"No operations planned.\", \"\"]\n    with Path(summary_path).open(\"a\", encoding=\"utf-8\") as handle:\n        handle.write(\"\\n\".join(lines) + \"\\n\")\n\n\ndef _bool(name: str, *, default: bool = False) -> bool:\n    raw = os.environ.get(name, \"\").strip().lower()\n    if not raw:\n        return default\n    return raw in {\"1\", \"true\", \"yes\", \"on\"}\n\n\nif __name__\
          \ == \"__main__\":\n    raise SystemExit(main())\nDEVFLOWS_SCRIPT_EOF\nmkdir -p \"$RUNNER_TEMP/devflows/anaconda-publish\"\ncat > \"$RUNNER_TEMP/devflows/anaconda-publish/preflight-token.py\" <<'DEVFLOWS_SCRIPT_EOF'\n\"\"\"Tokenless per-job credential preflight.\n\nvalidate cannot check secrets (its env maps only inputs.*), so each credentialed\njob asserts the publishing credential is present BEFORE it reaches any CLI step.\nThis step is deliberately tokenless: it receives only a boolean\n``ANACONDA_TOKEN_PRESENT`` (``${{ secrets.anaconda-token != '' }}``), never the\ntoken value, so the token stays confined to the single CLI step. The environment-\nbound jobs are already gated to skip in dry-run, so PUBLISH_DRY_RUN_ENABLED is a\nbelt-and-suspenders guard.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport os\n\n\ndef _bool(name: str) -> bool:\n    return os.environ.get(name, \"\").strip().lower() in {\"1\", \"true\", \"yes\", \"on\"}\n\n\ndef main() -> int:\n    if _bool(\"\
          PUBLISH_DRY_RUN_ENABLED\"):\n        return 0\n    if not _bool(\"ANACONDA_TOKEN_PRESENT\"):\n        raise SystemExit(\n            \"The anaconda-token secret is empty. anaconda.org has no OIDC/trusted \"\n            \"publishing, so a real publish needs a token. Store it as an environment \"\n            \"secret on the bound environment and pass it with `secrets: inherit`, or \"\n            \"run with publish-dry-run-enabled to rehearse without a credential.\"\n        )\n    return 0\n\n\nif __name__ == \"__main__\":\n    raise SystemExit(main())\nDEVFLOWS_SCRIPT_EOF\nmkdir -p \"$RUNNER_TEMP/devflows/anaconda-publish\"\ncat > \"$RUNNER_TEMP/devflows/anaconda-publish/upload.py\" <<'DEVFLOWS_SCRIPT_EOF'\n\"\"\"Stage verified conda packages onto anaconda.org under the staging label.\n\nThe ONLY step in the upload job that carries ANACONDA_API_TOKEN. It re-verifies\nevery file against the caller-supplied manifest one more time (a TOCTOU guard: the\ncredential-free verify job\
          \ ran on a different runner, and python-build uploads its\nartifacts with overwrite:true, so the artifact is not immutable within a run),\nthen runs ``anaconda upload`` for each verified file via an argv built by specs.py\n(env + shlex, never a shell string). anaconda-client reads the token from the\ninherited ANACONDA_API_TOKEN env, so it never lands in a process argument.\n\nImports the sibling ``specs.py`` (a ``${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/\nspecs.py`` comment in the step run body makes the sync step inline it).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nimport os\nimport subprocess\nimport sys\nfrom pathlib import Path\n\nimport specs\n\n\ndef main() -> int:\n    if not os.environ.get(\"ANACONDA_API_TOKEN\", \"\").strip():\n        raise SystemExit(\n            \"ANACONDA_API_TOKEN is empty; pass the anaconda-token secret \"\n            \"(secrets: inherit) to upload to anaconda.org.\"\n        )\n    owner = specs.validate_owner(os.environ[\"\
          PUBLISH_OWNER\"])\n    server_url = os.environ.get(\"PUBLISH_SERVER_URL\", \"\")\n    label = specs.validate_label(os.environ[\"UPLOAD_LABEL\"], field=\"upload-label\")\n    mode = specs.validate_existing_mode(os.environ.get(\"UPLOAD_EXISTING_MODE\", \"fail\"))\n    extra = specs.parse_extra_arguments(\n        os.environ.get(\"UPLOAD_ARGUMENTS\", \"\"), field=\"upload-arguments\"\n    )\n    client_version = specs.resolve_client_version(os.environ.get(\"PUBLISH_CLIENT_VERSION\", \"\"))\n\n    dist_path = Path(os.environ[\"PUBLISH_DIST_PATH\"]).resolve()\n    manifest = json.loads(os.environ[\"PUBLISH_DIST_MANIFEST\"])\n    try:\n        verified = specs.verify_files_against_manifest(dist_path, manifest)\n        specs.resolve_version(verified, expected=os.environ.get(\"PUBLISH_EXPECTED_VERSION\", \"\"))\n    except specs.SpecError as error:\n        raise SystemExit(f\"re-verification failed before upload: {error}\") from error\n\n    for item in verified:\n        argv = specs.uvx_wrap(\n\
          \            client_version,\n            specs.build_upload_argv(\n                server_url=server_url,\n                owner=owner,\n                label=label,\n                mode=mode,\n                extra_arguments=extra,\n                file_path=str(item.path),\n            ),\n        )\n        print(f\"uploading {item.name} -> {owner} (label {label})\", flush=True)\n        _run(argv)\n    print(f\"uploaded {len(verified)} file(s) to {owner} under label {label}.\")\n    return 0\n\n\ndef _run(argv: list[str]) -> None:\n    result = subprocess.run(argv, check=False)  # noqa: S603 - argv is fully constructed, no shell\n    if result.returncode != 0:\n        sys.stderr.write(f\"command failed (exit {result.returncode}): {' '.join(argv)}\\n\")\n        raise SystemExit(result.returncode)\n\n\nif __name__ == \"__main__\":\n    raise SystemExit(main())\nDEVFLOWS_SCRIPT_EOF\necho \"script-root=$RUNNER_TEMP/devflows\" >> \"$GITHUB_OUTPUT\""
      - name: Re-verify distributions before upload
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          EMIT_PLAN: 'false'
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          UPLOAD_ENABLED: ${{ inputs.upload-enabled }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/specs.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/verify-dist.py"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false
      - name: Assert publishing credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_TOKEN_PRESENT: ${{ secrets.anaconda-token != '' }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/preflight-token.py"
      - name: Upload to anaconda.org
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_API_TOKEN: ${{ secrets.anaconda-token }}
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          UPLOAD_EXISTING_MODE: ${{ inputs.upload-existing-mode }}
          UPLOAD_ARGUMENTS: ${{ inputs.upload-arguments }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/specs.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/upload.py"
  promote:
    name: Promote to the final label
    needs:
      - validate
      - verify
      - upload
    if: ${{ !cancelled() && !inputs.publish-dry-run-enabled && inputs.promote-enabled && needs.validate.result == 'success' && needs.verify.result == 'success' && (needs.upload.result == 'success' || needs.upload.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    environment:
      name: ${{ inputs.promote-environment-name }}
    concurrency:
      group: anaconda-publish-${{ inputs.promote-environment-name }}
      cancel-in-progress: false
    steps:
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: "set -euo pipefail\nmkdir -p \"$RUNNER_TEMP/devflows/anaconda-publish\"\ncat > \"$RUNNER_TEMP/devflows/anaconda-publish/preflight-token.py\" <<'DEVFLOWS_SCRIPT_EOF'\n\"\"\"Tokenless per-job credential preflight.\n\nvalidate cannot check secrets (its env maps only inputs.*), so each credentialed\njob asserts the publishing credential is present BEFORE it reaches any CLI step.\nThis step is deliberately tokenless: it receives only a boolean\n``ANACONDA_TOKEN_PRESENT`` (``${{ secrets.anaconda-token != '' }}``), never the\ntoken value, so the token stays confined to the single CLI step. The environment-\nbound jobs are already gated to skip in dry-run, so PUBLISH_DRY_RUN_ENABLED is a\nbelt-and-suspenders guard.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport os\n\n\ndef _bool(name: str) -> bool:\n    return os.environ.get(name, \"\").strip().lower() in {\"1\", \"true\", \"yes\", \"on\"}\n\n\ndef main() -> int:\n    if _bool(\"PUBLISH_DRY_RUN_ENABLED\"):\n        return 0\n\
          \    if not _bool(\"ANACONDA_TOKEN_PRESENT\"):\n        raise SystemExit(\n            \"The anaconda-token secret is empty. anaconda.org has no OIDC/trusted \"\n            \"publishing, so a real publish needs a token. Store it as an environment \"\n            \"secret on the bound environment and pass it with `secrets: inherit`, or \"\n            \"run with publish-dry-run-enabled to rehearse without a credential.\"\n        )\n    return 0\n\n\nif __name__ == \"__main__\":\n    raise SystemExit(main())\nDEVFLOWS_SCRIPT_EOF\nmkdir -p \"$RUNNER_TEMP/devflows/anaconda-publish\"\ncat > \"$RUNNER_TEMP/devflows/anaconda-publish/specs.py\" <<'DEVFLOWS_SCRIPT_EOF'\n\"\"\"Shared pure helpers for the anaconda-publish workflow scripts.\n\nEvery mutating operation this workflow performs is built as an explicit argv\nlist (never a shell string) from validated pieces, so this module is the single\nhome for spec parsing, filename parsing, charset validation, digest verification,\nand argv\
          \ construction. It is imported by ``validate-inputs.py``, ``verify-dist.py``\nand ``upload.py`` (each of those job steps carries a ``${DEVFLOWS_SCRIPT_ROOT}/\nanaconda-publish/specs.py`` comment so the sync materialize step inlines it next\nto its importer, exactly like python-build's collect.py/reindex sibling), and it\nis unit-tested directly.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport hashlib\nimport re\nimport shlex\nfrom dataclasses import dataclass\nfrom pathlib import Path\n\n# Pinned default anaconda-client version installed (ephemerally, via `uvx --from`)\n# on the credentialed jobs when publish-client-version is empty. Registered for\n# Renovate via a custom pep440 manager in renovate.json5 (keyed on the inline\n# `# renovate:` comment below); tests/test_anaconda_publish.py asserts the\n# manager regex still matches this constant so the pin stays auto-updated.\n# renovate: datasource=pypi depName=anaconda-client\nANACONDA_CLIENT_VERSION = \"1.13.0\"\n\n#\
          \ anaconda.org owners (users/orgs): a leading alphanumeric then alphanumerics,\n# hyphen, underscore. The single blast-radius control \u2014 no spec ever carries an\n# owner, so this is the only value that selects a namespace.\n_OWNER_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9_-]*$\")\n# Channel labels (anaconda upload --label / move --to-label). Conservative safe\n# set; no slashes, spaces, or shell metacharacters.\n_LABEL_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._-]*$\")\n# conda package name and version segment grammars. Names use the conda safe set;\n# versions additionally allow '+' and '!' (local/epoch separators).\n_PKG_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._-]*$\")\n_VERSION_RE = re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._+!-]*$\")\n_CONDA_EXTENSIONS = (\".conda\", \".tar.bz2\")\n\n# Flags a caller must not smuggle through upload-arguments: they are owned by\n# typed inputs whose validation and safety guarantees would otherwise be bypassed.\nFORBIDDEN_UPLOAD_FLAGS = (\n\
          \    \"-t\",\n    \"--token\",\n    \"-s\",\n    \"--site\",\n    \"-u\",\n    \"--user\",\n    \"-l\",\n    \"--label\",\n    \"-v\",\n    \"--version\",\n    \"--force\",\n    \"--skip-existing\",\n    \"--interactive\",\n    \"--no-progress\",\n)\n\n# upload-existing-mode enum mapped onto anaconda-client's mutually-exclusive mode\n# group. 'fail' passes neither flag (anaconda-client errors on a collision).\nEXISTING_MODES = (\"fail\", \"skip\", \"overwrite\")\n_EXISTING_MODE_FLAGS = {\"fail\": [], \"skip\": [\"--skip-existing\"], \"overwrite\": [\"--force\"]}\n\n\nclass SpecError(ValueError):\n    \"\"\"A caller-supplied spec, owner, label, or argument failed validation.\"\"\"\n\n\n@dataclass(frozen=True)\nclass CondaFile:\n    \"\"\"A verified ``.conda``/``.tar.bz2`` distribution file.\"\"\"\n\n    name: str\n    path: Path\n    sha256: str\n    size: int\n    version: str\n    package: str\n\n\n# --------------------------------------------------------------------------- #\n\
          # Charset validation                                                           #\n# --------------------------------------------------------------------------- #\ndef validate_owner(owner: str) -> str:\n    owner = owner.strip()\n    if not owner:\n        raise SpecError(\"publish-owner is required and must be non-empty.\")\n    if not _OWNER_RE.match(owner):\n        raise SpecError(\n            \"publish-owner must be an anaconda.org user or organization \"\n            \"(letters, digits, '_', '-', leading alphanumeric); got \"\n            f\"{owner!r}.\"\n        )\n    return owner\n\n\ndef validate_label(label: str, *, field: str) -> str:\n    label = label.strip()\n    if not label:\n        raise SpecError(f\"{field} is required and must be non-empty.\")\n    if not _LABEL_RE.match(label):\n        raise SpecError(\n            f\"{field} must be a safe channel label \"\n            \"(letters, digits, '.', '_', '-', leading alphanumeric); got \"\n            f\"{label!r}.\"\
          \n        )\n    return label\n\n\n# --------------------------------------------------------------------------- #\n# Spec parsing                                                                 #\n# --------------------------------------------------------------------------- #\ndef parse_spec(spec: str) -> tuple[str, ...]:\n    \"\"\"Validate a caller spec and return its segments.\n\n    Accepts ``package/version`` or ``package/version/filename`` ONLY. A spec must\n    never carry an owner segment (the owner comes solely from publish-owner), so a\n    three-segment spec is accepted only when its third segment is a conda package\n    filename (ends in .conda or .tar.bz2); any other three-segment shape is\n    rejected as a smuggled owner. Returns the validated segments (no owner).\n    \"\"\"\n    raw = spec.strip()\n    if not raw:\n        raise SpecError(\"spec must be non-empty.\")\n    segments = raw.split(\"/\")\n    if len(segments) not in (2, 3):\n        raise SpecError(\n\
          \            f\"spec {spec!r} must be package/version[/filename] without an owner \"\n            \"segment (2 or 3 segments only).\"\n        )\n    package, version = segments[0], segments[1]\n    if not _PKG_RE.match(package):\n        raise SpecError(f\"spec {spec!r} has an invalid package segment {package!r}.\")\n    if not _VERSION_RE.match(version):\n        raise SpecError(f\"spec {spec!r} has an invalid version segment {version!r}.\")\n    if len(segments) == 3:\n        filename = segments[2]\n        if not filename.endswith(_CONDA_EXTENSIONS):\n            # A 3-segment spec whose third piece is not a conda filename is an\n            # owner-qualified spec (owner/package/version); reject it loudly.\n            raise SpecError(\n                f\"spec {spec!r} must be package/version[/filename] without an owner \"\n                \"segment; a three-segment spec is only valid when the third segment \"\n                \"is a package filename ending in .conda or .tar.bz2.\"\
          \n            )\n        if not _conda_filename_re().match(filename):\n            raise SpecError(f\"spec {spec!r} has an invalid filename segment {filename!r}.\")\n    return tuple(segments)\n\n\ndef parse_spec_list(raw: str) -> list[str]:\n    \"\"\"Split a newline-separated spec block into non-empty, stripped specs.\"\"\"\n    return [line.strip() for line in raw.splitlines() if line.strip()]\n\n\ndef validate_spec_list(raw: str, *, field: str) -> list[str]:\n    \"\"\"Validate every spec in a newline block; return the cleaned specs.\"\"\"\n    specs = parse_spec_list(raw)\n    if not specs:\n        raise SpecError(f\"{field} is required and must list at least one spec.\")\n    for spec in specs:\n        try:\n            parse_spec(spec)\n        except SpecError as error:\n            raise SpecError(f\"{field}: {error}\") from error\n    return specs\n\n\ndef owner_qualified(owner: str, spec: str) -> str:\n    \"\"\"Prepend the (already validated) owner to a (validated)\
          \ spec.\"\"\"\n    return f\"{owner}/{spec}\"\n\n\n# --------------------------------------------------------------------------- #\n# Filename parsing                                                             #\n# --------------------------------------------------------------------------- #\ndef _conda_filename_re() -> re.Pattern[str]:\n    return re.compile(r\"^[A-Za-z0-9][A-Za-z0-9._+!-]*\\.(conda|tar\\.bz2)$\")\n\n\ndef parse_conda_filename(filename: str) -> tuple[str, str]:\n    \"\"\"Return ``(package, version)`` parsed from a conda package filename.\n\n    conda filenames are ``<name>-<version>-<build>.<ext>``; the name itself may\n    contain hyphens, so the version and build are split from the right.\n    \"\"\"\n    if filename.endswith(\".conda\"):\n        stem = filename[: -len(\".conda\")]\n    elif filename.endswith(\".tar.bz2\"):\n        stem = filename[: -len(\".tar.bz2\")]\n    else:\n        raise SpecError(\n            f\"{filename!r} is not a conda package\
          \ (expected a .conda or .tar.bz2 file).\"\n        )\n    segments = stem.rsplit(\"-\", 2)\n    if len(segments) != 3 or not all(segments):\n        raise SpecError(\n            f\"cannot parse name and version from conda filename {filename!r} \"\n            \"(expected <name>-<version>-<build>).\"\n        )\n    return segments[0], segments[1]\n\n\n# --------------------------------------------------------------------------- #\n# upload-arguments hardening                                                   #\n# --------------------------------------------------------------------------- #\ndef parse_extra_arguments(raw: str, *, field: str) -> list[str]:\n    \"\"\"shlex-split extra arguments and reject any flag owned by a typed input.\"\"\"\n    try:\n        args = shlex.split(raw)\n    except ValueError as error:\n        raise SpecError(f\"{field} could not be parsed as shell arguments: {error}.\") from error\n    for arg in args:\n        flag = arg.split(\"=\", 1)[0]\n \
          \       if flag in FORBIDDEN_UPLOAD_FLAGS:\n            raise SpecError(\n                f\"{field} may not contain {flag!r}: it is owned by typed inputs \"\n                \"(publish-owner, upload-label, upload-existing-mode, \"\n                \"publish-server-url, the anaconda-token secret). Use those inputs.\"\n            )\n    return args\n\n\ndef validate_existing_mode(mode: str) -> str:\n    mode = mode.strip()\n    if mode not in EXISTING_MODES:\n        raise SpecError(\n            f\"upload-existing-mode must be one of {', '.join(EXISTING_MODES)}; got {mode!r}.\"\n        )\n    return mode\n\n\n# --------------------------------------------------------------------------- #\n# Digest verification                                                          #\n# --------------------------------------------------------------------------- #\ndef conda_manifest_entries(manifest: dict[str, object]) -> dict[str, tuple[str, int]]:\n    \"\"\"Return ``{name: (sha256, size)}``\
          \ for every kind=conda manifest entry.\"\"\"\n    files = manifest.get(\"files\")\n    if not isinstance(files, list):\n        raise SpecError(\"dist manifest 'files' must be a list.\")\n    entries: dict[str, tuple[str, int]] = {}\n    for item in files:\n        if not isinstance(item, dict) or item.get(\"kind\") != \"conda\":\n            continue\n        name = str(item.get(\"name\") or \"\")\n        sha256 = str(item.get(\"sha256\") or \"\")\n        size = item.get(\"size\")\n        if not name or not sha256 or not isinstance(size, int):\n            raise SpecError(f\"dist manifest conda entry is incomplete: {item!r}.\")\n        entries[name] = (sha256, int(size))\n    return entries\n\n\ndef manifest_kinds(manifest: dict[str, object]) -> dict[str, str]:\n    \"\"\"Return ``{name: kind}`` across all manifest files (for wrong-kind detection).\"\"\"\n    files = manifest.get(\"files\")\n    kinds: dict[str, str] = {}\n    if isinstance(files, list):\n        for item\
          \ in files:\n            if isinstance(item, dict) and item.get(\"name\"):\n                kinds[str(item[\"name\"])] = str(item.get(\"kind\") or \"\")\n    return kinds\n\n\ndef _scan_conda_files(dist_path: Path) -> dict[str, Path]:\n    found: dict[str, Path] = {}\n    for pattern in (\"*.conda\", \"*.tar.bz2\"):\n        for path in sorted(dist_path.rglob(pattern)):\n            if not path.is_file():\n                continue\n            if path.name in found:\n                raise SpecError(\n                    f\"conda file {path.name!r} appears more than once under \"\n                    f\"{dist_path} (ambiguous across subdirectories).\"\n                )\n            found[path.name] = path\n    return found\n\n\ndef verify_files_against_manifest(dist_path: Path, manifest: dict[str, object]) -> list[CondaFile]:\n    \"\"\"Bidirectionally verify the on-disk conda files against the manifest.\n\n    Every kind=conda manifest entry must have a file on disk whose recomputed\n\
          \    sha256 AND size match, and every conda file on disk must be a kind=conda\n    manifest entry. A missing file, an unlisted file, a wrong-kind file, a digest\n    mismatch, or a size mismatch each fails loudly naming the offending file.\n    \"\"\"\n    if not dist_path.is_dir():\n        raise SpecError(f\"distribution path {dist_path} does not exist or is not a directory.\")\n    entries = conda_manifest_entries(manifest)\n    if not entries:\n        raise SpecError(\"dist manifest contains no conda packages.\")\n    kinds = manifest_kinds(manifest)\n    on_disk = _scan_conda_files(dist_path)\n\n    for name in sorted(on_disk):\n        if name in entries:\n            continue\n        if name in kinds and kinds[name] != \"conda\":\n            raise SpecError(\n                f\"conda file {name!r} is listed in the dist manifest as kind \"\n                f\"{kinds[name]!r}, not 'conda'.\"\n            )\n        raise SpecError(\n            f\"conda file {name!r} was\
          \ downloaded but is not listed in the dist manifest.\"\n        )\n\n    verified: list[CondaFile] = []\n    for name in sorted(entries):\n        expected_sha, expected_size = entries[name]\n        if name not in on_disk:\n            raise SpecError(\n                f\"dist manifest lists conda file {name!r} but it is missing from {dist_path}.\"\n            )\n        path = on_disk[name]\n        data = path.read_bytes()\n        actual_size = len(data)\n        actual_sha = hashlib.sha256(data).hexdigest()\n        if actual_size != expected_size:\n            raise SpecError(\n                f\"size mismatch for {name!r}: manifest {expected_size}, on disk {actual_size}.\"\n            )\n        if actual_sha != expected_sha:\n            raise SpecError(\n                f\"sha256 mismatch for {name!r}: manifest {expected_sha}, on disk {actual_sha}.\"\n            )\n        package, version = parse_conda_filename(name)\n        verified.append(\n            CondaFile(\n\
          \                name=name,\n                path=path,\n                sha256=actual_sha,\n                size=actual_size,\n                version=version,\n                package=package,\n            )\n        )\n    return verified\n\n\ndef resolve_version(files: list[CondaFile], *, expected: str = \"\") -> str:\n    \"\"\"Cross-check a single consistent version, honoring an expected-version guard.\"\"\"\n    versions = sorted({item.version for item in files})\n    if len(versions) != 1:\n        detail = \", \".join(f\"{item.name}={item.version}\" for item in files)\n        raise SpecError(\n            f\"verified conda packages disagree on version ({detail}); refusing to \"\n            \"publish a mixed-version set.\"\n        )\n    version = versions[0]\n    expected = expected.strip()\n    if expected and version != expected:\n        raise SpecError(\n            f\"publish-expected-version {expected!r} does not match the verified \"\n            f\"package version\
          \ {version!r}.\"\n        )\n    return version\n\n\n# --------------------------------------------------------------------------- #\n# argv construction                                                            #\n# --------------------------------------------------------------------------- #\ndef anaconda_base(server_url: str) -> list[str]:\n    argv = [\"anaconda\"]\n    server_url = server_url.strip()\n    if server_url:\n        argv += [\"-s\", server_url]\n    return argv\n\n\ndef build_upload_argv(\n    *,\n    server_url: str,\n    owner: str,\n    label: str,\n    mode: str,\n    extra_arguments: list[str],\n    file_path: str,\n) -> list[str]:\n    return (\n        anaconda_base(server_url)\n        + [\"upload\", \"--user\", owner, \"--label\", label]\n        + list(_EXISTING_MODE_FLAGS[mode])\n        + list(extra_arguments)\n        + [file_path]\n    )\n\n\ndef build_move_argv(*, server_url: str, from_label: str, to_label: str, target: str) -> list[str]:\n   \
          \ return anaconda_base(server_url) + [\n        \"move\",\n        \"--from-label\",\n        from_label,\n        \"--to-label\",\n        to_label,\n        target,\n    ]\n\n\ndef build_remove_argv(*, server_url: str, target: str) -> list[str]:\n    return anaconda_base(server_url) + [\"remove\", \"--force\", target]\n\n\ndef uvx_wrap(client_version: str, argv: list[str]) -> list[str]:\n    \"\"\"Wrap an anaconda-client argv in an ephemeral, pinned `uvx --from` runner.\"\"\"\n    return [\"uvx\", \"--from\", f\"anaconda-client=={client_version}\", *argv]\n\n\ndef resolve_client_version(override: str) -> str:\n    \"\"\"The anaconda-client version to install: an explicit override or the pin.\"\"\"\n    override = override.strip()\n    return override or ANACONDA_CLIENT_VERSION\nDEVFLOWS_SCRIPT_EOF\nmkdir -p \"$RUNNER_TEMP/devflows/anaconda-publish\"\ncat > \"$RUNNER_TEMP/devflows/anaconda-publish/promote.py\" <<'DEVFLOWS_SCRIPT_EOF'\n\"\"\"Relabel staged packages to the final\
          \ label (the real public-release event).\n\nRuns ``anaconda move --from-label <upload-label> --to-label <promote-label>\n<owner>/<spec>`` for each owner-qualified target. The targets come from the verify\njob's promoted-specs output (already validated and owner-prefixed there), so this\njob never re-parses caller-controlled specs; it only executes the plan. The single\ntoken-bearing step of the promote job.\n\nImports the sibling ``specs.py`` (a ``${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/\nspecs.py`` comment in the step run body makes the sync step inline it).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport os\nimport subprocess\nimport sys\n\nimport specs\n\n\ndef main() -> int:\n    if not os.environ.get(\"ANACONDA_API_TOKEN\", \"\").strip():\n        raise SystemExit(\n            \"ANACONDA_API_TOKEN is empty; pass the anaconda-token secret \"\n            \"(secrets: inherit) to promote on anaconda.org.\"\n        )\n    server_url = os.environ.get(\"PUBLISH_SERVER_URL\"\
          , \"\")\n    from_label = specs.validate_label(os.environ[\"UPLOAD_LABEL\"], field=\"upload-label\")\n    to_label = specs.validate_label(os.environ[\"PROMOTE_LABEL\"], field=\"promote-label\")\n    client_version = specs.resolve_client_version(os.environ.get(\"PUBLISH_CLIENT_VERSION\", \"\"))\n\n    targets = [\n        line.strip() for line in os.environ.get(\"PROMOTED_SPECS\", \"\").splitlines() if line.strip()\n    ]\n    if not targets:\n        raise SystemExit(\"no promote targets were computed; nothing to relabel.\")\n\n    for target in targets:\n        argv = specs.uvx_wrap(\n            client_version,\n            specs.build_move_argv(\n                server_url=server_url, from_label=from_label, to_label=to_label, target=target\n            ),\n        )\n        print(f\"promoting {target}: {from_label} -> {to_label}\", flush=True)\n        _run(argv)\n    print(f\"promoted {len(targets)} spec(s) from {from_label} to {to_label}.\")\n    return 0\n\n\ndef _run(argv:\
          \ list[str]) -> None:\n    result = subprocess.run(argv, check=False)  # noqa: S603 - argv is fully constructed, no shell\n    if result.returncode != 0:\n        sys.stderr.write(f\"command failed (exit {result.returncode}): {' '.join(argv)}\\n\")\n        raise SystemExit(result.returncode)\n\n\nif __name__ == \"__main__\":\n    raise SystemExit(main())\nDEVFLOWS_SCRIPT_EOF\necho \"script-root=$RUNNER_TEMP/devflows\" >> \"$GITHUB_OUTPUT\""
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

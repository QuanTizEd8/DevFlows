jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/binder-build"
          cat > "$RUNNER_TEMP/devflows/binder-build/parsing.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Charset, reference, and argument parsing for binder-build (no I/O, no argv run).

          Shared by validate-inputs.py (validate job) and build-binder.py (build job) so the
          repo2docker-arguments ALLOWLIST is enforced identically at validation time and again
          when the build job reconstructs the argv. Push-image.py is deliberately self-contained
          (it does not import this module) to keep the credentialed push job's inlined footprint
          lean, mirroring anaconda-publish's reverify split.
          """

          from __future__ import annotations

          import re
          import shlex

          # Internal build tag applied to the locally-built image. The build job saves the
          # image as image-name:INTERNAL_BUILD_TAG and the push job loads and re-tags from it,
          # so the two jobs must agree on this literal (also set in the workflow env).
          INTERNAL_BUILD_TAG = "devflows-binder-build"

          # Practical subset of the distribution image-reference grammar, name segment only.
          # Docker/OCI names are lowercase; ghcr.io and Docker Hub both reject uppercase.
          _ALNUM = r"[a-z0-9]+"
          _SEPARATOR = r"(?:[._]|__|[-]+)"
          _PATH_COMPONENT = rf"{_ALNUM}(?:{_SEPARATOR}{_ALNUM})*"
          _NAME = rf"{_PATH_COMPONENT}(?:/{_PATH_COMPONENT})*"
          _DOMAIN_COMPONENT = r"(?:[a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9-]*[a-zA-Z0-9])"
          _DOMAIN = rf"{_DOMAIN_COMPONENT}(?:\.{_DOMAIN_COMPONENT})*(?::[0-9]+)?"
          # image-name is a reference WITHOUT a tag or digest: a name path segment does not
          # contain ':' or '@', and a domain's ':' is only a port before the first '/'.
          _IMAGE_NAME_RE = re.compile(rf"^(?:{_DOMAIN}/)?{_NAME}$")

          # A single Docker tag token (also used for the optional commit-SHA tag once the
          # prefix is prepended).
          _TAG_RE = re.compile(r"^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$")
          # A tag PREFIX: first char tag-legal, then tag-legal chars, short enough that
          # prefix + a 40-char git SHA still fits the 128-char tag limit.
          _TAG_PREFIX_RE = re.compile(r"^[A-Za-z0-9_][A-Za-z0-9_.-]{0,87}$")
          # jupyter-repo2docker uses date-based versions (YYYY.MM.PATCH); reject anything that
          # smuggles a specifier, extras, or shell metacharacters.
          _VERSION_RE = re.compile(r"^[0-9]{4}\.[0-9]{1,2}\.[0-9]+$")
          # GitHub artifact names disallow many characters; keep to a conservative safe token.
          _ARTIFACT_NAME_RE = re.compile(r"^[A-Za-z0-9][A-Za-z0-9._-]*$")

          # mybinder provider slugs in the /build/<provider>/<repo>/<ref> URL.
          _PROVIDERS = ("gh", "gl", "git", "gist", "zenodo", "figshare", "hydroshare", "dataverse")

          # repo2docker-arguments is guarded by a strict ALLOWLIST grounded in repo2docker's
          # argparse (repo2docker/__main__.py). A denylist is not acceptable: argparse accepts
          # --flag=value, attached short options (-e X, -v X, -p X), and bare positionals, so an
          # owned flag (--image-name, --push/--no-push, --no-run/--run, --no-build/--build,
          # --ref, and the positional repo source) can be smuggled past exact-token rejection.
          # Only genuinely-safe passthrough flags that cannot change the image identity, the
          # push behavior, the build/run control, or the source are allowed.
          _ALLOWED_BOOL_FLAGS = frozenset({"--debug", "--no-clean", "--json-logs"})
          _ALLOWED_VALUE_FLAGS = frozenset({"--build-arg", "--label"})


          class SpecError(ValueError):
              """A caller-supplied input failed validation."""


          def validate_image_name(value: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError("image-name is required and must be non-empty.")
              if not _IMAGE_NAME_RE.match(value):
                  raise SpecError(
                      "image-name must be a lowercase [registry/]name reference WITHOUT a tag or "
                      f"digest (e.g. ghcr.io/owner/repo-binder); got {value!r}."
                  )
              return value


          def validate_tag_list(raw: str, *, field: str) -> list[str]:
              tags = [line.strip() for line in raw.splitlines() if line.strip()]
              if not tags:
                  raise SpecError(f"{field} must resolve to a non-empty newline-separated list of tags.")
              for tag in tags:
                  if not _TAG_RE.match(tag):
                      raise SpecError(f"{field} contains an invalid Docker tag {tag!r}.")
              return tags


          def validate_tag_prefix(value: str, *, field: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError(f"{field} is required and must be non-empty when the SHA tag is enabled.")
              if not _TAG_PREFIX_RE.match(value):
                  raise SpecError(
                      f"{field} must be a safe tag prefix (leading alphanumeric or '_', then letters, "
                      f"digits, '.', '_', '-') short enough to prepend to a commit SHA; got {value!r}."
                  )
              return value


          def validate_source_path(value: str, *, field: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError(f"{field} is required and must be non-empty.")
              normalized = value.replace("\\", "/")
              if normalized.startswith("/") or ".." in normalized.split("/"):
                  raise SpecError(
                      f"{field} must be a workspace-relative path without '..' or a leading '/'; "
                      f"got {value!r}."
                  )
              return value


          def validate_version(value: str, *, field: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError(f"{field} is required and must be non-empty.")
              if not _VERSION_RE.match(value):
                  raise SpecError(
                      f"{field} must be a date-based jupyter-repo2docker version (YYYY.MM.PATCH, e.g. "
                      f"2026.4.0); got {value!r}. Extras and specifiers are not allowed."
                  )
              return value


          def validate_artifact_name(value: str, *, field: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError(f"{field} is required and must be non-empty.")
              if not _ARTIFACT_NAME_RE.match(value):
                  raise SpecError(
                      f"{field} must be an artifact-safe token (letters, digits, '.', '_', '-', leading "
                      f"alphanumeric); got {value!r}."
                  )
              return value


          def validate_provider(value: str, *, field: str) -> str:
              value = value.strip()
              if value not in _PROVIDERS:
                  raise SpecError(f"{field} must be one of {', '.join(_PROVIDERS)}; got {value!r}.")
              return value


          def validate_https_url(value: str, *, field: str) -> str:
              value = value.strip()
              if not value.startswith("https://") or len(value) <= len("https://"):
                  raise SpecError(f"{field} must be an https:// URL; got {value!r}.")
              return value


          def validate_non_empty(value: str, *, field: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError(f"{field} is required and must be non-empty.")
              return value


          def parse_repo2docker_arguments(raw: str, *, field: str) -> list[str]:
              """shlex-split repo2docker-arguments and accept ONLY allowlisted passthrough flags."""
              try:
                  args = shlex.split(raw)
              except ValueError as error:
                  raise SpecError(f"{field} could not be parsed as shell arguments: {error}.") from error
              for arg in args:
                  _validate_argument(arg, field=field)
              return args


          def _allowed_flags_display() -> str:
              return ", ".join(sorted(_ALLOWED_BOOL_FLAGS | _ALLOWED_VALUE_FLAGS))


          def _reject(arg: str, *, field: str) -> None:
              raise SpecError(
                  f"{field} may not contain {arg!r}: only the allowlisted passthrough flags "
                  f"({_allowed_flags_display()}) are accepted (--flag or --flag=value). The image "
                  "name, tags, push behavior, build/run control (--image-name, --push/--no-push, "
                  "--no-run, --no-build), the ref, and the positional source path are owned by typed "
                  "inputs, never this input."
              )


          def _validate_argument(arg: str, *, field: str) -> None:
              # A token that is not a long option is either a bare positional (the repo source,
              # owned by repo2docker-source-path) or an attached short option (-e, -v, -p, ...),
              # both of which the allowlist rejects outright.
              if not arg.startswith("--"):
                  _reject(arg, field=field)
              flag, sep, value = arg.partition("=")
              if flag in _ALLOWED_BOOL_FLAGS:
                  if sep:
                      raise SpecError(f"{field}: {flag} is a boolean flag and takes no value; got {arg!r}.")
                  return
              if flag in _ALLOWED_VALUE_FLAGS:
                  if not sep or not value:
                      raise SpecError(
                          f"{field}: {flag} requires a value written as {flag}=VALUE; got {arg!r}."
                      )
                  return
              _reject(arg, field=field)
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/binder-build"
          cat > "$RUNNER_TEMP/devflows/binder-build/validate-inputs.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Fail-fast input validation for binder-build (validate job).

          Env maps ONLY ``inputs.*`` (no secrets, no needs, no github.*), so the
          validation-failure test harness can reconstruct the identical env from the scenario
          inputs and defaults and exercise every rejection without a reusable-workflow call.
          The non-ghcr-registry-without-docker-password check is NOT here: validate cannot
          inspect secret presence, so that loud failure lives in the push job's tokenless
          preflight (preflight-push.py) and is covered by a unit test.
          """

          from __future__ import annotations

          import os

          import parsing


          def main() -> int:
              # image identity ------------------------------------------------------------
              _guard(lambda: parsing.validate_image_name(os.environ.get("IMAGE_NAME", "")))
              _guard(lambda: parsing.validate_tag_list(os.environ.get("IMAGE_TAGS", ""), field="image-tags"))
              if _bool("IMAGE_SHA_TAG_ENABLED"):
                  _guard(
                      lambda: parsing.validate_tag_prefix(
                          os.environ.get("IMAGE_SHA_TAG_PREFIX", ""), field="image-sha-tag-prefix"
                      )
                  )

              # repo2docker build ---------------------------------------------------------
              _guard(
                  lambda: parsing.validate_source_path(
                      os.environ.get("REPO2DOCKER_SOURCE_PATH", ""), field="repo2docker-source-path"
                  )
              )
              _guard(
                  lambda: parsing.validate_version(
                      os.environ.get("REPO2DOCKER_VERSION", ""), field="repo2docker-version"
                  )
              )
              _guard(
                  lambda: parsing.parse_repo2docker_arguments(
                      os.environ.get("REPO2DOCKER_ARGUMENTS", ""), field="repo2docker-arguments"
                  )
              )
              _validate_positive("REPO2DOCKER_TIMEOUT_MINUTES", "repo2docker-timeout-minutes")
              _validate_positive("PUSH_TIMEOUT_MINUTES", "push-timeout-minutes")

              # reproducibility Dockerfile artifact --------------------------------------
              if _bool("DOCKERFILE_ARTIFACT_ENABLED"):
                  _guard(
                      lambda: parsing.validate_artifact_name(
                          os.environ.get("DOCKERFILE_ARTIFACT_NAME", ""), field="dockerfile-artifact-name"
                      )
                  )

              # best-effort mybinder cache warm ------------------------------------------
              if _bool("BINDER_CACHE_WARM_ENABLED"):
                  _guard(
                      lambda: parsing.validate_provider(
                          os.environ.get("BINDER_CACHE_PROVIDER", ""), field="binder-cache-provider"
                      )
                  )
                  _guard(
                      lambda: parsing.validate_https_url(
                          os.environ.get("BINDER_CACHE_ENDPOINT", ""), field="binder-cache-endpoint"
                      )
                  )
                  _guard(
                      lambda: parsing.validate_non_empty(
                          os.environ.get("BINDER_CACHE_REPOSITORY", ""), field="binder-cache-repository"
                      )
                  )
                  _guard(
                      lambda: parsing.validate_non_empty(
                          os.environ.get("BINDER_CACHE_REF", ""), field="binder-cache-ref"
                      )
                  )

              # environment-gated push ----------------------------------------------------
              # The push job is skipped entirely in dry-run, so an environment is only required
              # for a real push. This is the only unguarded credentialed side effect, so refuse
              # to push into an unnamed (unprotected) environment.
              if not _bool("PUBLISH_DRY_RUN_ENABLED"):
                  _guard(
                      lambda: parsing.validate_non_empty(
                          os.environ.get("PUSH_ENVIRONMENT_NAME", ""), field="push-environment-name"
                      ),
                      hint=(
                          " Set push-environment-name to a protected GitHub Environment, or run with "
                          "publish-dry-run-enabled to build without pushing."
                      ),
                  )
              return 0


          def _guard(call, *, hint: str = "") -> None:
              try:
                  call()
              except parsing.SpecError as error:
                  raise SystemExit(f"{error}{hint}") from error


          def _validate_positive(env_name: str, field: str) -> None:
              raw = os.environ.get(env_name, "").strip()
              if not raw:
                  return
              try:
                  value = int(raw)
              except ValueError as error:
                  raise SystemExit(f"{field} must be an integer; got {raw!r}.") from error
              if value <= 0:
                  raise SystemExit(f"{field} must be a positive integer; got {value}.")


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Validate inputs
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_TAGS: ${{ inputs.image-tags }}
          IMAGE_SHA_TAG_ENABLED: ${{ inputs.image-sha-tag-enabled }}
          IMAGE_SHA_TAG_PREFIX: ${{ inputs.image-sha-tag-prefix }}
          REPO2DOCKER_SOURCE_PATH: ${{ inputs.repo2docker-source-path }}
          REPO2DOCKER_VERSION: ${{ inputs.repo2docker-version }}
          REPO2DOCKER_ARGUMENTS: ${{ inputs.repo2docker-arguments }}
          REPO2DOCKER_TIMEOUT_MINUTES: ${{ inputs.repo2docker-timeout-minutes }}
          PUSH_TIMEOUT_MINUTES: ${{ inputs.push-timeout-minutes }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
          PUSH_ENVIRONMENT_NAME: ${{ inputs.push-environment-name }}
          DOCKERFILE_ARTIFACT_ENABLED: ${{ inputs.dockerfile-artifact-enabled }}
          DOCKERFILE_ARTIFACT_NAME: ${{ inputs.dockerfile-artifact-name }}
          BINDER_CACHE_WARM_ENABLED: ${{ inputs.binder-cache-warm-enabled }}
          BINDER_CACHE_PROVIDER: ${{ inputs.binder-cache-provider }}
          BINDER_CACHE_REPOSITORY: ${{ inputs.binder-cache-repository }}
          BINDER_CACHE_REF: ${{ inputs.binder-cache-ref }}
          BINDER_CACHE_ENDPOINT: ${{ inputs.binder-cache-endpoint }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/binder-build/parsing.py
          python "${DEVFLOWS_SCRIPT_ROOT}/binder-build/validate-inputs.py"
  build-binder:
    name: Build Binder image
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.repo2docker-timeout-minutes }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        if: inputs.checkout-enabled
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.checkout-repository }}
          ref: ${{ inputs.checkout-ref }}
          token: ${{ secrets.checkout-token || github.token }}
          ssh-key: ${{ secrets.checkout-ssh-key }}
          ssh-known-hosts: ${{ inputs.checkout-ssh-known-hosts }}
          ssh-strict: ${{ inputs.checkout-ssh-strict }}
          ssh-user: ${{ inputs.checkout-ssh-user }}
          persist-credentials: ${{ inputs.checkout-persist-credentials }}
          path: ${{ inputs.checkout-path }}
          clean: ${{ inputs.checkout-clean }}
          filter: ${{ inputs.checkout-filter }}
          sparse-checkout: ${{ inputs.checkout-sparse-checkout }}
          sparse-checkout-cone-mode: ${{ inputs.checkout-sparse-checkout-cone-mode }}
          fetch-depth: ${{ inputs.checkout-fetch-depth }}
          fetch-tags: ${{ inputs.checkout-fetch-tags }}
          show-progress: ${{ inputs.checkout-show-progress }}
          lfs: ${{ inputs.checkout-lfs }}
          submodules: ${{ inputs.checkout-submodules }}
          set-safe-directory: ${{ inputs.checkout-set-safe-directory }}
          github-server-url: ${{ inputs.checkout-github-server-url }}
          allow-unsafe-pr-checkout: ${{ inputs.checkout-allow-unsafe-pr-checkout }}
      - name: Download artifacts
        if: inputs.artifact-download-enabled
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.artifact-download-name }}
          artifact-ids: ${{ inputs.artifact-download-ids }}
          path: ${{ inputs.artifact-download-path }}
          pattern: ${{ inputs.artifact-download-pattern }}
          merge-multiple: ${{ inputs.artifact-download-merge-multiple }}
          github-token: ${{ secrets.artifact-download-token }}
          repository: ${{ inputs.artifact-download-repository }}
          run-id: ${{ inputs.artifact-download-run-id }}
          skip-decompress: ${{ inputs.artifact-download-skip-decompress }}
          digest-mismatch: ${{ inputs.artifact-download-digest-mismatch }}
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/binder-build"
          cat > "$RUNNER_TEMP/devflows/binder-build/parsing.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Charset, reference, and argument parsing for binder-build (no I/O, no argv run).

          Shared by validate-inputs.py (validate job) and build-binder.py (build job) so the
          repo2docker-arguments ALLOWLIST is enforced identically at validation time and again
          when the build job reconstructs the argv. Push-image.py is deliberately self-contained
          (it does not import this module) to keep the credentialed push job's inlined footprint
          lean, mirroring anaconda-publish's reverify split.
          """

          from __future__ import annotations

          import re
          import shlex

          # Internal build tag applied to the locally-built image. The build job saves the
          # image as image-name:INTERNAL_BUILD_TAG and the push job loads and re-tags from it,
          # so the two jobs must agree on this literal (also set in the workflow env).
          INTERNAL_BUILD_TAG = "devflows-binder-build"

          # Practical subset of the distribution image-reference grammar, name segment only.
          # Docker/OCI names are lowercase; ghcr.io and Docker Hub both reject uppercase.
          _ALNUM = r"[a-z0-9]+"
          _SEPARATOR = r"(?:[._]|__|[-]+)"
          _PATH_COMPONENT = rf"{_ALNUM}(?:{_SEPARATOR}{_ALNUM})*"
          _NAME = rf"{_PATH_COMPONENT}(?:/{_PATH_COMPONENT})*"
          _DOMAIN_COMPONENT = r"(?:[a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9-]*[a-zA-Z0-9])"
          _DOMAIN = rf"{_DOMAIN_COMPONENT}(?:\.{_DOMAIN_COMPONENT})*(?::[0-9]+)?"
          # image-name is a reference WITHOUT a tag or digest: a name path segment does not
          # contain ':' or '@', and a domain's ':' is only a port before the first '/'.
          _IMAGE_NAME_RE = re.compile(rf"^(?:{_DOMAIN}/)?{_NAME}$")

          # A single Docker tag token (also used for the optional commit-SHA tag once the
          # prefix is prepended).
          _TAG_RE = re.compile(r"^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$")
          # A tag PREFIX: first char tag-legal, then tag-legal chars, short enough that
          # prefix + a 40-char git SHA still fits the 128-char tag limit.
          _TAG_PREFIX_RE = re.compile(r"^[A-Za-z0-9_][A-Za-z0-9_.-]{0,87}$")
          # jupyter-repo2docker uses date-based versions (YYYY.MM.PATCH); reject anything that
          # smuggles a specifier, extras, or shell metacharacters.
          _VERSION_RE = re.compile(r"^[0-9]{4}\.[0-9]{1,2}\.[0-9]+$")
          # GitHub artifact names disallow many characters; keep to a conservative safe token.
          _ARTIFACT_NAME_RE = re.compile(r"^[A-Za-z0-9][A-Za-z0-9._-]*$")

          # mybinder provider slugs in the /build/<provider>/<repo>/<ref> URL.
          _PROVIDERS = ("gh", "gl", "git", "gist", "zenodo", "figshare", "hydroshare", "dataverse")

          # repo2docker-arguments is guarded by a strict ALLOWLIST grounded in repo2docker's
          # argparse (repo2docker/__main__.py). A denylist is not acceptable: argparse accepts
          # --flag=value, attached short options (-e X, -v X, -p X), and bare positionals, so an
          # owned flag (--image-name, --push/--no-push, --no-run/--run, --no-build/--build,
          # --ref, and the positional repo source) can be smuggled past exact-token rejection.
          # Only genuinely-safe passthrough flags that cannot change the image identity, the
          # push behavior, the build/run control, or the source are allowed.
          _ALLOWED_BOOL_FLAGS = frozenset({"--debug", "--no-clean", "--json-logs"})
          _ALLOWED_VALUE_FLAGS = frozenset({"--build-arg", "--label"})


          class SpecError(ValueError):
              """A caller-supplied input failed validation."""


          def validate_image_name(value: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError("image-name is required and must be non-empty.")
              if not _IMAGE_NAME_RE.match(value):
                  raise SpecError(
                      "image-name must be a lowercase [registry/]name reference WITHOUT a tag or "
                      f"digest (e.g. ghcr.io/owner/repo-binder); got {value!r}."
                  )
              return value


          def validate_tag_list(raw: str, *, field: str) -> list[str]:
              tags = [line.strip() for line in raw.splitlines() if line.strip()]
              if not tags:
                  raise SpecError(f"{field} must resolve to a non-empty newline-separated list of tags.")
              for tag in tags:
                  if not _TAG_RE.match(tag):
                      raise SpecError(f"{field} contains an invalid Docker tag {tag!r}.")
              return tags


          def validate_tag_prefix(value: str, *, field: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError(f"{field} is required and must be non-empty when the SHA tag is enabled.")
              if not _TAG_PREFIX_RE.match(value):
                  raise SpecError(
                      f"{field} must be a safe tag prefix (leading alphanumeric or '_', then letters, "
                      f"digits, '.', '_', '-') short enough to prepend to a commit SHA; got {value!r}."
                  )
              return value


          def validate_source_path(value: str, *, field: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError(f"{field} is required and must be non-empty.")
              normalized = value.replace("\\", "/")
              if normalized.startswith("/") or ".." in normalized.split("/"):
                  raise SpecError(
                      f"{field} must be a workspace-relative path without '..' or a leading '/'; "
                      f"got {value!r}."
                  )
              return value


          def validate_version(value: str, *, field: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError(f"{field} is required and must be non-empty.")
              if not _VERSION_RE.match(value):
                  raise SpecError(
                      f"{field} must be a date-based jupyter-repo2docker version (YYYY.MM.PATCH, e.g. "
                      f"2026.4.0); got {value!r}. Extras and specifiers are not allowed."
                  )
              return value


          def validate_artifact_name(value: str, *, field: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError(f"{field} is required and must be non-empty.")
              if not _ARTIFACT_NAME_RE.match(value):
                  raise SpecError(
                      f"{field} must be an artifact-safe token (letters, digits, '.', '_', '-', leading "
                      f"alphanumeric); got {value!r}."
                  )
              return value


          def validate_provider(value: str, *, field: str) -> str:
              value = value.strip()
              if value not in _PROVIDERS:
                  raise SpecError(f"{field} must be one of {', '.join(_PROVIDERS)}; got {value!r}.")
              return value


          def validate_https_url(value: str, *, field: str) -> str:
              value = value.strip()
              if not value.startswith("https://") or len(value) <= len("https://"):
                  raise SpecError(f"{field} must be an https:// URL; got {value!r}.")
              return value


          def validate_non_empty(value: str, *, field: str) -> str:
              value = value.strip()
              if not value:
                  raise SpecError(f"{field} is required and must be non-empty.")
              return value


          def parse_repo2docker_arguments(raw: str, *, field: str) -> list[str]:
              """shlex-split repo2docker-arguments and accept ONLY allowlisted passthrough flags."""
              try:
                  args = shlex.split(raw)
              except ValueError as error:
                  raise SpecError(f"{field} could not be parsed as shell arguments: {error}.") from error
              for arg in args:
                  _validate_argument(arg, field=field)
              return args


          def _allowed_flags_display() -> str:
              return ", ".join(sorted(_ALLOWED_BOOL_FLAGS | _ALLOWED_VALUE_FLAGS))


          def _reject(arg: str, *, field: str) -> None:
              raise SpecError(
                  f"{field} may not contain {arg!r}: only the allowlisted passthrough flags "
                  f"({_allowed_flags_display()}) are accepted (--flag or --flag=value). The image "
                  "name, tags, push behavior, build/run control (--image-name, --push/--no-push, "
                  "--no-run, --no-build), the ref, and the positional source path are owned by typed "
                  "inputs, never this input."
              )


          def _validate_argument(arg: str, *, field: str) -> None:
              # A token that is not a long option is either a bare positional (the repo source,
              # owned by repo2docker-source-path) or an attached short option (-e, -v, -p, ...),
              # both of which the allowlist rejects outright.
              if not arg.startswith("--"):
                  _reject(arg, field=field)
              flag, sep, value = arg.partition("=")
              if flag in _ALLOWED_BOOL_FLAGS:
                  if sep:
                      raise SpecError(f"{field}: {flag} is a boolean flag and takes no value; got {arg!r}.")
                  return
              if flag in _ALLOWED_VALUE_FLAGS:
                  if not sep or not value:
                      raise SpecError(
                          f"{field}: {flag} requires a value written as {flag}=VALUE; got {arg!r}."
                      )
                  return
              _reject(arg, field=field)
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/binder-build"
          cat > "$RUNNER_TEMP/devflows/binder-build/build-binder.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Credential-free repo2docker build (build-binder job).

          Runs jupyter-repo2docker (pinned via uvx) with --no-run --image-name into the local
          Docker daemon, building the caller's UNTRUSTED repository contents. Holds no registry
          credential and no id-token. Writes a build-only proof (the local image config digest)
          so a vacuous/no-op build fails the job, and -- only when NOT dry-run -- saves the image
          to an OCI archive for the isolated push job to load byte-identically.

          The repo2docker argv is built from the environment only (never shell-interpolated) and
          repo2docker-arguments is re-parsed through the SAME strict allowlist the validate job
          used, so no owned flag can slip into the build.
          """

          from __future__ import annotations

          import os
          import subprocess
          from pathlib import Path

          import parsing


          def main() -> int:
              image_name = parsing.validate_image_name(os.environ["IMAGE_NAME"])
              version = parsing.validate_version(
                  os.environ["REPO2DOCKER_VERSION"], field="repo2docker-version"
              )
              relative_source = parsing.validate_source_path(
                  os.environ["REPO2DOCKER_SOURCE_PATH"], field="repo2docker-source-path"
              )
              extra_args = parsing.parse_repo2docker_arguments(
                  os.environ.get("REPO2DOCKER_ARGUMENTS", ""), field="repo2docker-arguments"
              )

              workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
              source = (workspace / relative_source).resolve()
              if source != workspace and workspace not in source.parents:
                  raise SystemExit("repo2docker-source-path must stay inside GITHUB_WORKSPACE.")
              if not source.is_dir():
                  raise SystemExit(f"repo2docker-source-path does not exist: {relative_source}")

              local_ref = f"{image_name}:{parsing.INTERNAL_BUILD_TAG}"
              command = [
                  "uvx",
                  "--from",
                  f"jupyter-repo2docker=={version}",
                  "jupyter-repo2docker",
                  "--no-run",
                  "--image-name",
                  local_ref,
                  *extra_args,
                  str(source),
              ]
              print("Building Binder image with:", " ".join(command))
              subprocess.run(command, check=True)

              _write_proof(local_ref)
              if not _bool("PUBLISH_DRY_RUN_ENABLED"):
                  _save_archive(local_ref)
              return 0


          def _write_proof(local_ref: str) -> None:
              """Record the locally-built image config digest so a no-op build cannot pass."""
              image_id = subprocess.run(
                  ["docker", "image", "inspect", "--format", "{{.Id}}", local_ref],
                  check=True,
                  capture_output=True,
                  text=True,
              ).stdout.strip()
              if not image_id.startswith("sha256:"):
                  raise SystemExit(f"Unexpected image id from docker inspect: {image_id!r}.")
              proof_dir = Path(os.environ["PROOF_DIR"])
              proof_dir.mkdir(parents=True, exist_ok=True)
              (proof_dir / "image-id").write_text(image_id + "\n", encoding="utf-8")
              print(f"Built {local_ref} with config digest {image_id}.")


          def _save_archive(local_ref: str) -> None:
              archive_dir = Path(os.environ["ARCHIVE_DIR"])
              archive_dir.mkdir(parents=True, exist_ok=True)
              archive = archive_dir / "image.tar"
              subprocess.run(["docker", "save", "-o", str(archive), local_ref], check=True)
              print(f"Saved {local_ref} to {archive} for the push job.")


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false
      - name: Build Binder image
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          IMAGE_NAME: ${{ inputs.image-name }}
          REPO2DOCKER_VERSION: ${{ inputs.repo2docker-version }}
          REPO2DOCKER_SOURCE_PATH: ${{ inputs.repo2docker-source-path }}
          REPO2DOCKER_ARGUMENTS: ${{ inputs.repo2docker-arguments }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
          PROOF_DIR: ${{ runner.temp }}/devflows-binder/proof
          ARCHIVE_DIR: ${{ runner.temp }}/devflows-binder/image
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/binder-build/parsing.py
          python "${DEVFLOWS_SCRIPT_ROOT}/binder-build/build-binder.py"
      - name: Upload build proof
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: binder-build-proof
          path: ${{ runner.temp }}/devflows-binder/proof
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true
      - name: Upload image archive
        if: ${{ !inputs.publish-dry-run-enabled }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: binder-build-image
          path: ${{ runner.temp }}/devflows-binder/image/image.tar
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true
  push-image:
    name: Push image and attest
    needs: build-binder
    if: ${{ !inputs.publish-dry-run-enabled }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.push-timeout-minutes }}
    permissions:
      contents: read
      actions: read
      packages: write
      id-token: write
      attestations: write
    environment:
      name: ${{ inputs.push-environment-name }}
    concurrency:
      group: binder-build-${{ inputs.push-environment-name }}
      cancel-in-progress: false
    outputs:
      image-ref: ${{ steps.push.outputs.image-ref }}
      image-digest: ${{ steps.push.outputs.image-digest }}
    steps:
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/binder-build"
          cat > "$RUNNER_TEMP/devflows/binder-build/preflight-push.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Tokenless registry-credential preflight (push-image job).

          Runs before the docker/login-action step. The validate job maps only inputs.* and
          cannot inspect secret presence, so the "non-ghcr registry without docker-password"
          rejection lives here. Tokenless by design: it receives only the boolean
          DOCKER_PASSWORD_SET, never the password value. ghcr.io is exempt because
          docker/login-action falls back to github.token there.
          """

          from __future__ import annotations

          import os


          def main() -> int:
              if not _bool("DOCKER_LOGIN_ENABLED"):
                  # Login disabled: the caller is responsible for any ambient registry auth.
                  return 0
              registry = os.environ.get("DOCKER_REGISTRY", "").strip().lower()
              if registry != "ghcr.io" and not _bool("DOCKER_PASSWORD_SET"):
                  raise SystemExit(
                      f"docker-login-enabled is true for registry {registry or '(docker hub)'!r} but the "
                      "docker-password secret is empty. Only ghcr.io falls back to github.token; every "
                      "other registry needs docker-password. Store it as an environment secret on the "
                      "push environment and pass it with `secrets: inherit`, or run with "
                      "publish-dry-run-enabled to build without pushing."
                  )
              return 0


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/binder-build"
          cat > "$RUNNER_TEMP/devflows/binder-build/push-image.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Environment-gated push, digest capture, and reproducibility Dockerfile (push job).

          Loads the byte-identical OCI archive the build job produced (no rebuild, no TOCTOU:
          the pushed image is the built image), tags it with each image-tags entry (plus an
          optional commit-SHA tag), pushes them, and captures the immutable registry manifest
          digest from RepoDigests. Emits image-ref and image-digest, and -- when enabled --
          writes a one-line Dockerfile pinning the exact pushed image by digest.

          Self-contained (no shared-module import) so the credentialed job's inlined footprint
          stays lean. The registry credential never reaches this script: docker/login-action
          authenticated the daemon on its own isolated step before this runs.
          """

          from __future__ import annotations

          import json
          import os
          import secrets
          import subprocess
          from pathlib import Path


          def main() -> int:
              image_name = os.environ["IMAGE_NAME"].strip()
              build_tag = os.environ["IMAGE_BUILD_TAG"].strip()
              tags = [line.strip() for line in os.environ["IMAGE_TAGS"].splitlines() if line.strip()]
              if not tags:
                  raise SystemExit("image-tags resolved to an empty list; nothing to push.")

              archive = os.environ["IMAGE_ARCHIVE"]
              subprocess.run(["docker", "load", "-i", archive], check=True)

              local_ref = f"{image_name}:{build_tag}"
              pushed_refs: list[str] = []
              for tag in tags:
                  pushed_refs.append(_tag_and_push(local_ref, f"{image_name}:{tag}"))
              if _bool("IMAGE_SHA_TAG_ENABLED"):
                  prefix = os.environ["IMAGE_SHA_TAG_PREFIX"].strip()
                  _tag_and_push(local_ref, f"{image_name}:{prefix}{os.environ['GITHUB_SHA'].strip()}")

              digest = _capture_digest(local_ref, image_name)
              image_ref = pushed_refs[0]
              _emit_output("image-ref", image_ref)
              _emit_output("image-digest", digest)
              print(f"Pushed {image_ref} at digest {digest}.")

              if _bool("DOCKERFILE_ARTIFACT_ENABLED"):
                  dockerfile = Path(os.environ["DOCKERFILE_PATH"])
                  dockerfile.parent.mkdir(parents=True, exist_ok=True)
                  dockerfile.write_text(f"FROM {image_name}@{digest}\n", encoding="utf-8")
                  print(f"Wrote reproducibility Dockerfile pinning {image_name}@{digest}.")
              return 0


          def _tag_and_push(local_ref: str, ref: str) -> str:
              subprocess.run(["docker", "tag", local_ref, ref], check=True)
              subprocess.run(["docker", "push", ref], check=True)
              return ref


          def _capture_digest(local_ref: str, image_name: str) -> str:
              """Immutable registry manifest digest (sha256:...) from RepoDigests after push."""
              raw = subprocess.run(
                  ["docker", "image", "inspect", "--format", "{{json .RepoDigests}}", local_ref],
                  check=True,
                  capture_output=True,
                  text=True,
              ).stdout.strip()
              repo_digests = json.loads(raw) if raw else []
              for entry in repo_digests:
                  name, _, digest = str(entry).partition("@")
                  if name == image_name and digest.startswith("sha256:"):
                      return digest
              # Fallback: any sha256 digest present (all pushed tags share one manifest).
              for entry in repo_digests:
                  _, _, digest = str(entry).partition("@")
                  if digest.startswith("sha256:"):
                      return digest
              raise SystemExit(
                  f"Could not read a registry manifest digest for {image_name} from RepoDigests {raw!r}; "
                  "the push may not have completed."
              )


          def _emit_output(name: str, value: str) -> None:
              # Random-delimiter heredoc so a value can never inject additional GITHUB_OUTPUT keys.
              delimiter = f"devflows_{secrets.token_hex(16)}"
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
                  handle.write(f"{name}<<{delimiter}\n{value}\n{delimiter}\n")


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Assert registry credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DOCKER_LOGIN_ENABLED: ${{ inputs.docker-login-enabled }}
          DOCKER_REGISTRY: ${{ inputs.docker-registry }}
          DOCKER_PASSWORD_SET: ${{ secrets.docker-password != '' }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/binder-build/preflight-push.py"
      - name: Download image archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: binder-build-image
          path: ${{ runner.temp }}/devflows-binder/incoming
      - name: Docker login
        if: inputs.docker-login-enabled
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ inputs.docker-username }}
          password: ${{ secrets.docker-password || (inputs.docker-registry == 'ghcr.io' && github.token) || '' }}
      - name: Push image and capture digest
        id: push
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_BUILD_TAG: devflows-binder-build
          IMAGE_TAGS: ${{ inputs.image-tags }}
          IMAGE_SHA_TAG_ENABLED: ${{ inputs.image-sha-tag-enabled }}
          IMAGE_SHA_TAG_PREFIX: ${{ inputs.image-sha-tag-prefix }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_ARCHIVE: ${{ runner.temp }}/devflows-binder/incoming/image.tar
          DOCKERFILE_ARTIFACT_ENABLED: ${{ inputs.dockerfile-artifact-enabled }}
          DOCKERFILE_PATH: ${{ runner.temp }}/devflows-binder/dockerfile/Dockerfile
        run: python "${DEVFLOWS_SCRIPT_ROOT}/binder-build/push-image.py"
      - name: Attest build provenance
        if: inputs.attestation-enabled
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-name: ${{ inputs.image-name }}
          subject-digest: ${{ steps.push.outputs.image-digest }}
          push-to-registry: true
          show-summary: true
      - name: Upload reproducibility Dockerfile
        if: inputs.dockerfile-artifact-enabled
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.dockerfile-artifact-name }}
          path: ${{ runner.temp }}/devflows-binder/dockerfile/Dockerfile
          if-no-files-found: error
          retention-days: 1
          overwrite: true
  warm-binder-cache:
    name: Warm mybinder cache
    needs: build-binder
    if: ${{ !inputs.publish-dry-run-enabled && inputs.binder-cache-warm-enabled }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    permissions: {}
    steps:
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/binder-build"
          cat > "$RUNNER_TEMP/devflows/binder-build/warm-cache.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Best-effort mybinder.org cache warm (warm-binder-cache job).

          Triggers a BinderHub build of the repository so the first interactive launch is warm.
          The job is continue-on-error at the JOB level, so mybinder downtime can never fail the
          caller's pipeline. A connect success (curl exit 0 = already built) or a long-poll
          timeout (curl exit 28 = build triggered) both count as success. Holds no credential and
          binds no environment; the URL is assembled from the environment and passed to curl as
          an argument list (never shell-interpolated).
          """

          from __future__ import annotations

          import os
          import subprocess


          def main() -> int:
              endpoint = os.environ["BINDER_CACHE_ENDPOINT"].strip().rstrip("/")
              provider = os.environ["BINDER_CACHE_PROVIDER"].strip()
              repository = os.environ["BINDER_CACHE_REPOSITORY"].strip()
              ref = os.environ["BINDER_CACHE_REF"].strip()
              url = f"{endpoint}/build/{provider}/{repository}/{ref}"
              print(f"Warming mybinder cache: {url}")

              result = subprocess.run(
                  ["curl", "-fsSL", "--connect-timeout", "20", "--max-time", "600", url],
                  check=False,
              )
              if result.returncode == 0:
                  print("mybinder reports the image is already built.")
                  return 0
              if result.returncode == 28:
                  print("Triggered a new mybinder image build (long-poll timeout).")
                  return 0
              print(
                  f"::warning title=mybinder.org::Could not warm the cache (curl exit {result.returncode})."
              )
              return 1


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Warm mybinder cache
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          BINDER_CACHE_ENDPOINT: ${{ inputs.binder-cache-endpoint }}
          BINDER_CACHE_PROVIDER: ${{ inputs.binder-cache-provider }}
          BINDER_CACHE_REPOSITORY: ${{ inputs.binder-cache-repository }}
          BINDER_CACHE_REF: ${{ inputs.binder-cache-ref }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/binder-build/warm-cache.py"

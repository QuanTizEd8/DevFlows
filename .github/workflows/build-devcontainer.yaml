              warning that skopeo is missing and returning without building) leaves nothing
              to read here, and the scenario asserting on this digest must fail rather than
              pass vacuously.
              """
              if not archive.is_file():
                  raise SystemExit(
                      f"OCI archive not found at {archive}: the devcontainer build produced no "
                      "image (a silent no-op build, e.g. devcontainers/ci warning that skopeo "
                      "is missing)."
                  )
              index = _read_oci_index(archive)
              manifests = index.get("manifests")
              if not isinstance(manifests, list) or not manifests:
                  raise SystemExit(f"OCI archive {archive} index.json lists no manifests.")
              image_manifests = [m for m in manifests if _is_image_manifest(m)]
              if len(image_manifests) != 1:
                  raise SystemExit(
                      f"expected exactly one image manifest in {archive}, found {len(image_manifests)}."
                  )
              digest = str(image_manifests[0].get("digest", "")).strip()
              if not digest.startswith("sha256:"):
                  raise SystemExit(f"unexpected manifest digest in {archive}: {digest!r}")
              return digest


          def _read_oci_index(archive: Path) -> dict[str, Any]:
              with tarfile.open(archive, mode="r:*") as tar:
                  member = next(
                      (
                          m
                          for m in tar.getmembers()
                          if m.isfile() and m.name in ("index.json", "./index.json")
                      ),
                      None,
                  )
                  if member is None:
                      raise SystemExit(f"OCI archive {archive} is missing index.json.")
                  extracted = tar.extractfile(member)
                  if extracted is None:
                      raise SystemExit(f"OCI archive {archive} index.json is not a regular file.")
                  with extracted:
                      return json.loads(extracted.read().decode("utf-8"))


          def _is_image_manifest(manifest: Any) -> bool:
              """Skip attestation/provenance manifests BuildKit may add beside the image."""
              if not isinstance(manifest, dict):
                  return False
              annotations = manifest.get("annotations") or {}
              if annotations.get("vnd.docker.reference.type") == "attestation-manifest":
                  return False
              platform = manifest.get("platform") or {}
              return platform.get("architecture") != "unknown" and platform.get("os") != "unknown"


          def _inspect_digest(ref: str) -> str:
              """Return the manifest digest of the just-pushed per-platform image.

              Merging the multi-arch manifest from immutable digests (rather than the
              mutable per-platform tag re-read at merge time) prevents concurrent runs
              from publishing mixed-commit or stale manifests.
              """
              result = subprocess.run(
                  ["docker", "buildx", "imagetools", "inspect", ref, "--format", "{{json .Manifest}}"],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              try:
                  manifest = json.loads(result.stdout)
              except json.JSONDecodeError as error:
                  raise SystemExit(f"could not parse imagetools output for {ref}: {error}") from error
              digest = str(manifest.get("digest", "")).strip()
              if not digest.startswith("sha256:"):
                  raise SystemExit(f"unexpected manifest digest for {ref}: {digest!r}")
              return digest


          def _required(name: str) -> str:
              value = os.environ.get(name, "").strip()
              if not value:
                  raise SystemExit(f"{name} is required.")
              return value


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Prepare workspace
        if: inputs.prepare-command != ''
        working-directory: ${{ inputs.prepare-working-directory }}
        shell: bash
        env:
          PREPARE_COMMAND: ${{ inputs.prepare-command }}
        run: bash -euo pipefail -c "$PREPARE_COMMAND"
      - name: Resolve build settings
        id: build-settings
        shell: bash
        env:
          CACHE_DEPENDENCY_HASH: ${{ hashFiles(inputs.cache-dependency-path) }}
          CACHE_KEY: ${{ inputs.cache-key }}
          CACHE_KEY_PREFIX: ${{ inputs.cache-key-prefix }}
          CACHE_PATH: ${{ inputs.cache-path }}
          CACHE_RESTORE_KEYS: ${{ inputs.cache-restore-keys }}
          DEVCONTAINER_CACHE_FROM: ${{ inputs.devcontainer-cache-from }}
          DEVCONTAINER_CACHE_REGISTRY_ENABLED: ${{ inputs.devcontainer-cache-registry-enabled }}
          DEVCONTAINER_CACHE_TO: ${{ inputs.devcontainer-cache-to }}
          DEVCONTAINER_PUSH: ${{ inputs.devcontainer-push }}
          DEVCONTAINER_USER_DATA_FOLDER: ${{ inputs.devcontainer-user-data-folder }}
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          IMAGE_NAME: ${{ inputs.image-name }}
          MATRIX_PLATFORM_TAG: ${{ matrix.platform_tag }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/build-devcontainer/resolve-build-settings.py"
      - name: Docker login
        if: inputs.docker-login-enabled
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ inputs.docker-username }}
          password: ${{ secrets.docker-password || (inputs.docker-registry == 'ghcr.io' && github.token) || '' }}
          ecr: ${{ inputs.docker-ecr }}
          scope: ${{ inputs.docker-scope }}
          logout: ${{ inputs.docker-logout }}
      - name: Set up Docker Buildx
        if: inputs.buildx-enabled
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
        with:
          version: ${{ inputs.buildx-version }}
          driver: ${{ inputs.buildx-driver }}
          driver-opts: ${{ inputs.buildx-driver-opts }}
          buildkitd-flags: ${{ inputs.buildx-buildkitd-flags }}
          buildkitd-config: ${{ inputs.buildx-buildkitd-config }}
          buildkitd-config-inline: ${{ inputs.buildx-buildkitd-config-inline }}
          use: ${{ inputs.buildx-use }}
          name: ${{ inputs.buildx-name }}
          endpoint: ${{ inputs.buildx-endpoint }}
          platforms: ${{ inputs.buildx-platforms }}
          append: ${{ inputs.buildx-append }}
          keep-state: ${{ inputs.buildx-keep-state }}
          cache-binary: ${{ inputs.buildx-cache-binary }}
          cleanup: ${{ inputs.buildx-cleanup }}
      - name: Cache devcontainer user data
        if: inputs.cache-enabled
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ${{ steps.build-settings.outputs.cache-path }}
          key: ${{ steps.build-settings.outputs.cache-key }}
          restore-keys: ${{ steps.build-settings.outputs.cache-restore-keys }}
          upload-chunk-size: ${{ inputs.cache-upload-chunk-size }}
          enableCrossOsArchive: ${{ inputs.cache-enable-cross-os-archive }}
          fail-on-cache-miss: ${{ inputs.cache-fail-on-cache-miss }}
          lookup-only: ${{ inputs.cache-lookup-only }}
      - name: Build and push devcontainer
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca  # v0.3.1900000450
        with:
          imageName: ${{ inputs.image-name }}
          imageTag: ${{ inputs.image-tag }}-${{ matrix.platform_tag }}
          platform: ${{ matrix.platform }}
          configFile: ${{ inputs.devcontainer-config-file }}
          checkoutPath: ${{ inputs.devcontainer-checkout-path }}
          push: ${{ inputs.devcontainer-push }}
          refFilterForPush: ${{ inputs.devcontainer-ref-filter-for-push }}
          eventFilterForPush: ${{ inputs.devcontainer-event-filter-for-push }}
          userDataFolder: ${{ inputs.devcontainer-user-data-folder }}
          cacheFrom: ${{ steps.build-settings.outputs.cache-from }}
          cacheTo: ${{ steps.build-settings.outputs.cache-to }}
          noCache: ${{ inputs.devcontainer-no-cache }}
      - name: Capture image digest
        if: inputs.merge-enabled && inputs.devcontainer-push != 'never'
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DIGEST_DIR: ${{ runner.temp }}/devflows-digests
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          MATRIX_PLATFORM_TAG: ${{ matrix.platform_tag }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/build-devcontainer/capture-digest.py"
      - name: Upload platform digest
        if: inputs.merge-enabled && inputs.devcontainer-push != 'never'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: devflows-devcontainer-digest-${{ inputs.image-tag }}-${{ matrix.platform_tag }}
          path: ${{ runner.temp }}/devflows-digests/${{ matrix.platform_tag }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true
      - name: Capture build-only image digest
        if: inputs.build-digest-artifact-name != '' && inputs.devcontainer-push == 'never'
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DIGEST_DIR: ${{ runner.temp }}/devflows-build-only-digest
          DIGEST_SOURCE: oci
          DIGEST_OCI_ARCHIVE: /tmp/output.tar
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          MATRIX_PLATFORM_TAG: ${{ matrix.platform_tag }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/build-devcontainer/capture-digest.py"
      - name: Upload build-only image digest
        if: inputs.build-digest-artifact-name != '' && inputs.devcontainer-push == 'never'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.build-digest-artifact-name }}-${{ matrix.platform_tag }}
          path: ${{ runner.temp }}/devflows-build-only-digest/${{ matrix.platform_tag }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true
  merge-devcontainer:
    name: Merge multi-arch manifest
    needs: build-devcontainer
    if: inputs.merge-enabled && inputs.devcontainer-push != 'never'
    runs-on: ${{ inputs.merge-runner }}
    outputs:
      image-ref: ${{ steps.merge.outputs.image-ref }}
      sha-image-ref: ${{ steps.merge.outputs.sha-image-ref }}
    steps:
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/build-devcontainer"
          cat > "$RUNNER_TEMP/devflows/build-devcontainer/merge-manifest.py" <<'DEVFLOWS_SCRIPT_EOF'
          from __future__ import annotations

          import json
          import os
          import subprocess
          from pathlib import Path


          def main() -> int:
              image = _required("IMAGE_NAME")
              tag = _required("IMAGE_TAG")
              matrix = json.loads(_required("BUILD_MATRIX"))
              digest_dir = Path(_required("DIGEST_DIR"))

              platform_tags = _platform_tags(matrix)
              sources = _digest_sources(image, digest_dir, platform_tags)

              image_ref = f"{image}:{tag}"
              _imagetools_create(image_ref, sources)

              sha_image_ref = ""
              if _truthy(os.environ.get("IMAGE_SHA_TAG_ENABLED", "")):
                  sha = _required("SOURCE_SHA")
                  sha_prefix = os.environ.get("IMAGE_SHA_TAG_PREFIX", "sha-")
                  sha_image_ref = f"{image}:{sha_prefix}{sha}"
                  _imagetools_create(sha_image_ref, sources)

              github_output = os.environ.get("GITHUB_OUTPUT")
              if github_output:
                  with open(github_output, "a", encoding="utf-8") as output:
                      _emit(output, "image-ref", image_ref)
                      _emit(output, "sha-image-ref", sha_image_ref)
              return 0


          def _platform_tags(matrix: object) -> list[str]:
              if not isinstance(matrix, list) or not matrix:
                  raise SystemExit("BUILD_MATRIX must be a nonempty JSON array.")
              platform_tags: list[str] = []
              for index, entry in enumerate(matrix):
                  if not isinstance(entry, dict):
                      raise SystemExit(f"BUILD_MATRIX[{index}] must be an object.")
                  platform_tag = str(entry.get("platform_tag") or "").strip()
                  if not platform_tag:
                      raise SystemExit(f"BUILD_MATRIX[{index}].platform_tag is required.")
                  platform_tags.append(platform_tag)
              return platform_tags


          def _digest_sources(image: str, digest_dir: Path, platform_tags: list[str]) -> list[str]:
              """Build immutable ``image@sha256:...`` source refs from per-platform digests.

              Each build job captured the digest of its pushed image and handed it over
              through a per-platform artifact. Merging over these digests (instead of the
              mutable ``image:tag-platform`` tags) makes the manifest correct-by-content
              even under concurrent runs.
              """
              sources: list[str] = []
              for platform_tag in platform_tags:
                  digest_file = digest_dir / platform_tag
                  if not digest_file.is_file():
                      raise SystemExit(
                          f"missing digest for platform {platform_tag!r}; expected {digest_file}"
                      )
                  digest = digest_file.read_text(encoding="utf-8").strip()
                  if not digest.startswith("sha256:"):
                      raise SystemExit(f"invalid digest for platform {platform_tag!r}: {digest!r}")
                  sources.append(f"{image}@{digest}")
              # Preserve order while dropping any duplicate digests.
              return list(dict.fromkeys(sources))


          def _imagetools_create(tag: str, sources: list[str]) -> None:
              subprocess.run(
                  ["docker", "buildx", "imagetools", "create", "-t", tag, *sources],
                  check=True,
              )


          def _emit(output, name: str, value: str) -> None:
              if "\n" in value or "\r" in value:
                  raise SystemExit(f"{name} value must not contain newline characters: {value!r}")
              output.write(f"{name}={value}\n")


          def _required(name: str) -> str:
              value = os.environ.get(name, "").strip()
              if not value:
                  raise SystemExit(f"{name} is required.")
              return value


          def _truthy(value: str) -> bool:
              return value.strip().lower() in {"1", "true", "yes", "on"}


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Docker login
        if: inputs.docker-login-enabled
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ inputs.docker-username }}
          password: ${{ secrets.docker-password || (inputs.docker-registry == 'ghcr.io' && github.token) || '' }}
          ecr: ${{ inputs.docker-ecr }}
          scope: ${{ inputs.docker-scope }}
          logout: ${{ inputs.docker-logout }}
      - name: Set up Docker Buildx
        if: inputs.buildx-enabled
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
        with:
          version: ${{ inputs.buildx-version }}
          driver: ${{ inputs.buildx-driver }}
          driver-opts: ${{ inputs.buildx-driver-opts }}
          buildkitd-flags: ${{ inputs.buildx-buildkitd-flags }}
          buildkitd-config: ${{ inputs.buildx-buildkitd-config }}
          buildkitd-config-inline: ${{ inputs.buildx-buildkitd-config-inline }}
          use: ${{ inputs.buildx-use }}
          name: ${{ inputs.buildx-name }}
          endpoint: ${{ inputs.buildx-endpoint }}
          platforms: ${{ inputs.buildx-platforms }}
          append: ${{ inputs.buildx-append }}
          keep-state: ${{ inputs.buildx-keep-state }}
          cache-binary: ${{ inputs.buildx-cache-binary }}
          cleanup: ${{ inputs.buildx-cleanup }}
      - name: Download platform digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: devflows-devcontainer-digest-${{ inputs.image-tag }}-*
          path: ${{ runner.temp }}/devflows-digests
          merge-multiple: true
      - name: Merge manifest
        id: merge
        shell: bash
        env:
          BUILD_MATRIX: ${{ inputs.build-matrix }}
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DIGEST_DIR: ${{ runner.temp }}/devflows-digests
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_SHA_TAG_ENABLED: ${{ inputs.image-sha-tag-enabled }}
          IMAGE_SHA_TAG_PREFIX: ${{ inputs.image-sha-tag-prefix }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          SOURCE_SHA: ${{ github.sha }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/build-devcontainer/merge-manifest.py"

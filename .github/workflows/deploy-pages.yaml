          PAGES_ARTIFACT_ENABLED: ${{ inputs.pages-artifact-enabled }}
          PAGES_DEPLOY_ENABLED: ${{ inputs.pages-deploy-enabled }}
          PAGES_ARTIFACT_NAME: ${{ inputs.pages-artifact-name }}
          PAGES_TIMEOUT_MINUTES: ${{ inputs.pages-timeout-minutes }}

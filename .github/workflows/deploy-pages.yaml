        run: python "${DEVFLOWS_SCRIPT_ROOT}/deploy-pages/validate-inputs.py"
      - name: Upload Pages artifact
        if: inputs.pages-artifact-enabled
        id: upload
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          name: ${{ inputs.pages-artifact-name }}
          path: ${{ inputs.pages-path }}
          retention-days: ${{ inputs.pages-artifact-retention-days }}
          include-hidden-files: ${{ inputs.pages-artifact-include-hidden-files }}
  deploy:
    name: Deploy to GitHub Pages
    needs: package
    if: inputs.pages-deploy-enabled
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.pages-timeout-minutes }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: ${{ inputs.pages-environment-name }}
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: deploy-pages-${{ inputs.pages-environment-name }}
      cancel-in-progress: false
    outputs:
      pages-url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
        with:
          artifact_name: ${{ inputs.pages-artifact-name }}
          timeout: ${{ needs.package.outputs.deploy-timeout-ms }}

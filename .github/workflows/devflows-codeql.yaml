name: DevFlows CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Weekly, so the query pack catches newly disclosed patterns in unchanged code.
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: devflows-codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload CodeQL results
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Standard Python analysis matching GitHub default setup (no custom query
      # packs, no build step for Python), but authored so every action is
      # SHA-pinned per the repository's supply-chain policy.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          languages: python
          build-mode: none
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          category: "/language:python"

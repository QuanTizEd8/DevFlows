name: DevFlows Docs

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: devflows-docs-${{ github.ref }}
  # Supersede in-flight PR doc builds, but never cancel a main deploy mid-flight.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # pull the prebuilt CI devcontainer image / build cache
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Log in to GHCR for the devcontainer cache
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - name: Build docs in devcontainer
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          configFile: .devcontainer/devcontainer.json
          push: never
          cacheFrom: ghcr.io/quantized8/devflows-devcontainer:cache-linux-amd64
          runCmd: |
            pixi install
            task docs
      # Upload the built site as a PLAIN artifact; the deploy job hands it to the
      # repository's own deploy-pages workflow, which packages it into the
      # Pages-format artifact and deploys it. PRs build (to catch Sphinx errors)
      # but skip the upload -- only main deploys consume it.
      - name: Upload docs site artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: devflows-docs-site
          path: docs/_build/html
          if-no-files-found: error
          retention-days: 1

  # Dogfood the catalog: deploy to GitHub Pages by CALLING the repository's own
  # reusable deploy-pages workflow (same pattern as devflows-devcontainer.yaml
  # calling build-devcontainer), instead of hand-rolling configure/upload/deploy.
  deploy:
    name: Deploy
    needs: build
    # PRs build the docs but never deploy; only pushes to main (and manual
    # dispatch) reach the Pages deployment.
    if: github.event_name != 'pull_request'
    # Union of every permission deploy-pages' job tree declares. A nested
    # reusable-workflow call cannot elevate the token, so the caller must grant the
    # superset or GitHub fails the run at startup.
    permissions:
      actions: read # download the site artifact / read run metadata
      contents: read
      pages: write # deploy to GitHub Pages
      id-token: write # OIDC token the Pages deployment requires
    uses: ./.github/workflows/deploy-pages.yaml
    with:
      # No checkout needed: the site comes entirely from the downloaded artifact.
      checkout-enabled: false
      # Download the plain artifact the build job uploaded, then package that
      # directory into the Pages-format artifact and deploy it.
      artifact-download-enabled: true
      artifact-download-name: devflows-docs-site
      artifact-download-path: _site
      pages-path: _site
      pages-artifact-enabled: true
      pages-deploy-enabled: true

  # Surface the deployed site's live URL in the run summary. A reusable-call job
  # (deploy, above) cannot carry steps, so reading its pages-url output requires a
  # separate job. Needs no token: it only writes to the step summary.
  report:
    name: Report
    needs: deploy
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Write Pages URL to the run summary
        env:
          PAGES_URL: ${{ needs.deploy.outputs.pages-url }}
        run: |
          if [ -n "${PAGES_URL}" ]; then
            echo "## Deployed docs" >> "${GITHUB_STEP_SUMMARY}"
            echo "Live site: ${PAGES_URL}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "## Deployed docs" >> "${GITHUB_STEP_SUMMARY}"
            echo "No Pages URL was reported (deployment skipped)." >> "${GITHUB_STEP_SUMMARY}"
          fi

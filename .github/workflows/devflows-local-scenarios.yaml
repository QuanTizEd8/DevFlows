name: DevFlows Local Scenario Tests
'on':
  workflow_dispatch: null
permissions:
  contents: read
jobs:
  pandoc_markdown_html_local_clean:
    name: 'Pandoc: Markdown to HTML without artifact upload cleanup'
    runs-on: ubuntu-latest
    steps:
      - name: Remove previous scenario outputs
        run: rm -rf .devflows-test/pandoc/markdown-html-local
  pandoc_markdown_html_local_call:
    name: 'Pandoc: Markdown to HTML without artifact upload'
    uses: ./.github/workflows/pandoc.yaml
    with:
      checkout-enabled: false
      pandoc-image: pandoc/core:3.8
      pandoc-arguments: --standalone --output=.devflows-test/pandoc/markdown-html-local/example.html README.md
    needs: pandoc_markdown_html_local_clean
  pandoc_markdown_html_local_assert:
    name: 'Pandoc: Markdown to HTML without artifact upload assertions'
    runs-on: ubuntu-latest
    needs: pandoc_markdown_html_local_call
    if: always()
    steps:
      - name: Assert scenario succeeded
        shell: bash
        env:
          ACTUAL_RESULT: ${{ needs.pandoc_markdown_html_local_call.result }}
        run: python .github/workflows/devflows-scenarios/assert-result.py
      - name: 'Assert file exists: .devflows-test/pandoc/markdown-html-local/example.html'
        shell: bash
        env:
          ASSERT_PATH: .devflows-test/pandoc/markdown-html-local/example.html
        run: python .github/workflows/devflows-scenarios/assert-file-exists.py
      - name: 'Assert file contains: .devflows-test/pandoc/markdown-html-local/example.html'
        shell: bash
        env:
          ASSERT_PATH: .devflows-test/pandoc/markdown-html-local/example.html
          ASSERT_TEXT: <h1
        run: python .github/workflows/devflows-scenarios/assert-file-contains.py
  pandoc_working_directory_local_clean:
    name: 'Pandoc: Working directory conversion without artifact upload cleanup'
    runs-on: ubuntu-latest
    steps:
      - name: Remove previous scenario outputs
        run: rm -rf test/scenarios/pandoc/working-directory/output.html
  pandoc_working_directory_local_call:
    name: 'Pandoc: Working directory conversion without artifact upload'
    uses: ./.github/workflows/pandoc.yaml
    with:
      checkout-enabled: false
      pandoc-image: pandoc/core:3.8
      pandoc-working-directory: test/scenarios/pandoc/working-directory
      pandoc-arguments: --standalone --output=output.html input.md
    needs: pandoc_working_directory_local_clean
  pandoc_working_directory_local_assert:
    name: 'Pandoc: Working directory conversion without artifact upload assertions'
    runs-on: ubuntu-latest
    needs: pandoc_working_directory_local_call
    if: always()
    steps:
      - name: Assert scenario succeeded
        shell: bash
        env:
          ACTUAL_RESULT: ${{ needs.pandoc_working_directory_local_call.result }}
        run: python .github/workflows/devflows-scenarios/assert-result.py
      - name: 'Assert file exists: test/scenarios/pandoc/working-directory/output.html'
        shell: bash
        env:
          ASSERT_PATH: test/scenarios/pandoc/working-directory/output.html
        run: python .github/workflows/devflows-scenarios/assert-file-exists.py
      - name: 'Assert file contains: test/scenarios/pandoc/working-directory/output.html'
        shell: bash
        env:
          ASSERT_PATH: test/scenarios/pandoc/working-directory/output.html
          ASSERT_TEXT: Pandoc Working Directory
        run: python .github/workflows/devflows-scenarios/assert-file-contains.py

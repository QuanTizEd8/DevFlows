          ref: ${{ needs.writeback_ephemeral_branch_writeback_setup.outputs.branch }}
      - name: Assert scenario succeeded
        shell: bash
        env:
          ACTUAL_RESULT: ${{ needs.writeback_ephemeral_branch_writeback_call.result }}
        run: python harness/scenarios/assert-result.py
      - name: Assert ephemeral branch
        shell: bash
        env:
          DEVFLOWS_ASSERTIONS: |-
            [
              {
                "type": "branch-file-contains",
                "path": "generated/index.html",
                "text": "Updated by writeback"
              },
              {
                "type": "branch-file-missing",
                "path": "generated/stale.html"
              },
              {
                "type": "branch-file-missing",
                "path": "remove.html"
              },
              {
                "type": "branch-file-missing",
                "path": "absent-on-branch.html"
              },
              {
                "type": "latest-commit-message-equals",
                "value": "test: writeback e2e"
              }
            ]

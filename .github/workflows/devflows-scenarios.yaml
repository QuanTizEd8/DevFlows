    name: 'Writeback: Writeback to ephemeral branch setup'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      artifact-name: ${{ steps.setup.outputs.artifact-name }}
      base-sha: ${{ steps.setup.outputs.base-sha }}
      branch: ${{ steps.setup.outputs.branch }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: true
      - name: Prepare branch and writeback payload
        id: setup
        shell: bash
        env:
          DEVFLOWS_ARTIFACT_NAME: writeback-e2e-payload
          DEVFLOWS_BRANCH_PREFIX: devflows/e2e/writeback
          DEVFLOWS_DELETE_PATHS: |-
            [
              "remove.html",
              "absent-on-branch.html"
            ]
          DEVFLOWS_FIXTURE_PATH: .devflows-e2e/writeback
          DEVFLOWS_INITIAL_FILES: |-
            [
              {
                "path": "generated/stale.html",
                "content": "stale generated content\n"
              },
              {
                "path": "remove.html",
                "content": "remove this file\n"
              }
            ]
          DEVFLOWS_PAYLOAD_FILES: |-
            [
              {
                "path": "generated/index.html",
                "content": "<h1>Updated by writeback</h1>\n"
              }
            ]
          DEVFLOWS_PAYLOAD_PATHS: |-
            [
              "generated"
            ]
        run: python harness/scenarios/setup-ephemeral-writeback.py
      - name: Upload writeback payload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ steps.setup.outputs.artifact-name }}
          path: .devflows-writeback/payload
          if-no-files-found: error
          retention-days: 1
          overwrite: true
          include-hidden-files: true
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
  writeback_ephemeral_branch_writeback_call:
    name: 'Writeback: Writeback to ephemeral branch'
    uses: ./.github/workflows/writeback.yaml
    with:
      commit-author-name: DevFlows E2E
      commit-author-email: devflows-e2e@example.test
      commit-message: 'test: writeback e2e'
      commit-push: true
      commit-branch: ${{ needs.writeback_ephemeral_branch_writeback_setup.outputs.branch }}
      commit-expected-base-sha: ${{ needs.writeback_ephemeral_branch_writeback_setup.outputs.base-sha }}
      commit-repository: ${{ github.repository }}
      writeback-artifact-name: ${{ needs.writeback_ephemeral_branch_writeback_setup.outputs.artifact-name }}
    permissions:
      actions: read
      contents: write
    needs: writeback_ephemeral_branch_writeback_setup
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
  writeback_ephemeral_branch_writeback_assert:
    name: 'Writeback: Writeback to ephemeral branch assertions'
    runs-on: ubuntu-latest
    needs:
      - writeback_ephemeral_branch_writeback_setup
      - writeback_ephemeral_branch_writeback_call
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Checkout ephemeral branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:

name: DevFlows Hosted Scenario Tests
'on':
  pull_request: null
  push:
    branches:
      - main
  workflow_dispatch: null
permissions:
  contents: read
  actions: read
jobs:
  pandoc_markdown_html_artifact_call:
    name: 'Pandoc: Markdown to HTML with artifact upload'
    uses: ./.github/workflows/pandoc.yaml
    with:
      pandoc-image: pandoc/core:3.8
      pandoc-arguments: --standalone --output=.devflows-test/pandoc/markdown-html-artifact/example.html README.md
      artifact-upload-enabled: true
      artifact-upload-name: pandoc-markdown-html
      artifact-upload-path: .devflows-test/pandoc/markdown-html-artifact/example.html
      artifact-upload-if-no-files-found: error
  pandoc_markdown_html_artifact_assert:
    name: 'Pandoc: Markdown to HTML with artifact upload assertions'
    runs-on: ubuntu-latest
    needs: pandoc_markdown_html_artifact_call
    if: always()
    steps:
      - name: Assert scenario succeeded
        shell: bash
        env:
          ACTUAL_RESULT: ${{ needs.pandoc_markdown_html_artifact_call.result }}
        run: python .github/workflows/devflows-scenarios/assert-result.py
      - name: Download scenario artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: pandoc-markdown-html
          path: .devflows-test-artifacts/pandoc/markdown-html-artifact
      - name: 'Assert file exists: example.html'
        shell: bash
        env:
          ASSERT_PATH: .devflows-test-artifacts/pandoc/markdown-html-artifact/example.html
        run: python .github/workflows/devflows-scenarios/assert-file-exists.py
      - name: 'Assert file contains: example.html'
        shell: bash
        env:
          ASSERT_PATH: .devflows-test-artifacts/pandoc/markdown-html-artifact/example.html
          ASSERT_TEXT: <h1
        run: python .github/workflows/devflows-scenarios/assert-file-contains.py
  pandoc_working_directory_artifact_call:
    name: 'Pandoc: Working directory conversion with artifact upload'
    uses: ./.github/workflows/pandoc.yaml
    with:
      pandoc-image: pandoc/core:3.8
      pandoc-working-directory: test/scenarios/pandoc/working-directory
      pandoc-arguments: --standalone --output=output.html input.md
      artifact-upload-enabled: true
      artifact-upload-name: pandoc-working-directory
      artifact-upload-path: test/scenarios/pandoc/working-directory/output.html
      artifact-upload-if-no-files-found: error
  pandoc_working_directory_artifact_assert:
    name: 'Pandoc: Working directory conversion with artifact upload assertions'
    runs-on: ubuntu-latest
    needs: pandoc_working_directory_artifact_call
    if: always()
    steps:
      - name: Assert scenario succeeded
        shell: bash
        env:
          ACTUAL_RESULT: ${{ needs.pandoc_working_directory_artifact_call.result }}
        run: python .github/workflows/devflows-scenarios/assert-result.py
      - name: Download scenario artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: pandoc-working-directory
          path: .devflows-test-artifacts/pandoc/working-directory-artifact
      - name: 'Assert file exists: output.html'
        shell: bash
        env:
          ASSERT_PATH: .devflows-test-artifacts/pandoc/working-directory-artifact/output.html
        run: python .github/workflows/devflows-scenarios/assert-file-exists.py
      - name: 'Assert file contains: output.html'
        shell: bash
        env:
          ASSERT_PATH: .devflows-test-artifacts/pandoc/working-directory-artifact/output.html
          ASSERT_TEXT: Pandoc Working Directory
        run: python .github/workflows/devflows-scenarios/assert-file-contains.py
  pandoc_artifact_download_html_setup:
    name: 'Pandoc: Markdown to HTML from downloaded artifact setup'
    runs-on: ubuntu-latest
    steps:
      - name: Create setup files
        shell: bash
        env:
          DEVFLOWS_SETUP_FILES: |-
            [
              {
                "path": ".devflows-test/pandoc/artifact-download/source.md",
                "content": "# Pandoc Artifact Input\n\nThis file was provided through an artifact download.\n"
              }
            ]
        run: python .github/workflows/devflows-scenarios/create-setup-files.py
      - name: Upload setup artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pandoc-input-markdown
          path: .devflows-test/pandoc/artifact-download/source.md
          if-no-files-found: error
          retention-days: 1
          overwrite: true
  pandoc_artifact_download_html_call:
    name: 'Pandoc: Markdown to HTML from downloaded artifact'
    uses: ./.github/workflows/pandoc.yaml
    with:
      checkout-enabled: false
      pandoc-image: pandoc/core:3.8
      artifact-download-enabled: true
      artifact-download-name: pandoc-input-markdown
      artifact-download-path: input
      pandoc-arguments: --standalone --output=.devflows-test/pandoc/artifact-download/example.html input/source.md
      artifact-upload-enabled: true
      artifact-upload-name: pandoc-artifact-download-html
      artifact-upload-path: .devflows-test/pandoc/artifact-download/example.html
      artifact-upload-if-no-files-found: error
    needs: pandoc_artifact_download_html_setup
  pandoc_artifact_download_html_assert:
    name: 'Pandoc: Markdown to HTML from downloaded artifact assertions'
    runs-on: ubuntu-latest
    needs: pandoc_artifact_download_html_call
    if: always()
    steps:
      - name: Assert scenario succeeded
        shell: bash
        env:
          ACTUAL_RESULT: ${{ needs.pandoc_artifact_download_html_call.result }}
        run: python .github/workflows/devflows-scenarios/assert-result.py
      - name: Download scenario artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: pandoc-artifact-download-html
          path: .devflows-test-artifacts/pandoc/artifact-download-html
      - name: 'Assert file exists: example.html'
        shell: bash
        env:
          ASSERT_PATH: .devflows-test-artifacts/pandoc/artifact-download-html/example.html
        run: python .github/workflows/devflows-scenarios/assert-file-exists.py
      - name: 'Assert file contains: example.html'
        shell: bash
        env:
          ASSERT_PATH: .devflows-test-artifacts/pandoc/artifact-download-html/example.html
          ASSERT_TEXT: Pandoc Artifact Input
        run: python .github/workflows/devflows-scenarios/assert-file-contains.py
  writeback_ephemeral_branch_writeback_setup:
    name: 'Writeback: Writeback to ephemeral branch setup'
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    outputs:
      artifact-name: ${{ steps.setup.outputs.artifact-name }}
      base-sha: ${{ steps.setup.outputs.base-sha }}
      branch: ${{ steps.setup.outputs.branch }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: true
      - name: Prepare branch and writeback payload
        id: setup
        shell: bash
        env:
          DEVFLOWS_ARTIFACT_NAME: writeback-e2e-payload
          DEVFLOWS_BRANCH_PREFIX: devflows/e2e/writeback
          DEVFLOWS_DELETE_PATHS: |-
            [
              "remove.html"
            ]
          DEVFLOWS_FIXTURE_PATH: .devflows-e2e/writeback
          DEVFLOWS_INITIAL_FILES: |-
            [
              {
                "path": "generated/stale.html",
                "content": "stale generated content\n"
              },
              {
                "path": "remove.html",
                "content": "remove this file\n"
              }
            ]
          DEVFLOWS_PAYLOAD_FILES: |-
            [
              {
                "path": "generated/index.html",
                "content": "<h1>Updated by writeback</h1>\n"
              }
            ]
          DEVFLOWS_PAYLOAD_PATHS: |-
            [
              "generated"
            ]
        run: python .github/workflows/devflows-scenarios/setup-ephemeral-writeback.py
      - name: Upload writeback payload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ steps.setup.outputs.artifact-name }}
          path: .devflows-writeback/payload
          if-no-files-found: error
          retention-days: 1
          overwrite: true
  writeback_ephemeral_branch_writeback_call:
    name: 'Writeback: Writeback to ephemeral branch'
    uses: ./.github/workflows/writeback.yaml
    with:
      commit-author-name: DevFlows E2E
      commit-author-email: devflows-e2e@example.test
      commit-message: 'test: writeback e2e'
      commit-push: true
      commit-branch: ${{ needs.writeback_ephemeral_branch_writeback_setup.outputs.branch }}
      commit-expected-base-sha: ${{ needs.writeback_ephemeral_branch_writeback_setup.outputs.base-sha }}
      commit-repository: ${{ github.repository }}
      writeback-artifact-name: ${{ needs.writeback_ephemeral_branch_writeback_setup.outputs.artifact-name }}
    permissions:
      actions: read
      contents: write
    needs: writeback_ephemeral_branch_writeback_setup
    if: github.event_name != 'pull_request'
  writeback_ephemeral_branch_writeback_assert:
    name: 'Writeback: Writeback to ephemeral branch assertions'
    runs-on: ubuntu-latest
    needs:
      - writeback_ephemeral_branch_writeback_setup
      - writeback_ephemeral_branch_writeback_call
    if: always() && github.event_name != 'pull_request'
    steps:
      - name: Assert scenario succeeded
        shell: bash
        env:
          ACTUAL_RESULT: ${{ needs.writeback_ephemeral_branch_writeback_call.result }}
        run: python .github/workflows/devflows-scenarios/assert-result.py
      - name: Checkout ephemeral branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          ref: ${{ needs.writeback_ephemeral_branch_writeback_setup.outputs.branch }}
      - name: Assert ephemeral branch
        shell: bash
        env:
          DEVFLOWS_ASSERTIONS: |-
            [
              {
                "type": "branch-file-contains",
                "path": "generated/index.html",
                "text": "Updated by writeback"
              },
              {
                "type": "branch-file-missing",
                "path": "generated/stale.html"
              },
              {
                "type": "branch-file-missing",
                "path": "remove.html"
              },
              {
                "type": "latest-commit-message-equals",
                "value": "test: writeback e2e"
              }
            ]
          DEVFLOWS_FIXTURE_PATH: .devflows-e2e/writeback
        run: python .github/workflows/devflows-scenarios/assert-ephemeral-writeback.py
  writeback_ephemeral_branch_writeback_cleanup:
    name: 'Writeback: Writeback to ephemeral branch cleanup'
    runs-on: ubuntu-latest
    needs:
      - writeback_ephemeral_branch_writeback_setup
      - writeback_ephemeral_branch_writeback_call
      - writeback_ephemeral_branch_writeback_assert
    if: always() && github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Checkout target repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: true
      - name: Delete ephemeral branch
        shell: bash
        env:
          DEVFLOWS_BRANCH: ${{ needs.writeback_ephemeral_branch_writeback_setup.outputs.branch }}
        run: python .github/workflows/devflows-scenarios/cleanup-ephemeral-branch.py

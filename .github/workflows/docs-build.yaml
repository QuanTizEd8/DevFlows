permissions:
  contents: read
jobs:
  docs-build:
    name: Build documentation
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.docs-timeout-minutes }}
    permissions:
      contents: read
      actions: read
    outputs:
      pages-artifact-name: ${{ steps.validate.outputs.pages-artifact-name }}
      pages-artifact-id: ${{ steps.upload-pages.outputs.artifact_id }}
      docs-output-directory: ${{ steps.validate.outputs.docs-output-directory }}
      docs-linkcheck-report-directory: ${{ steps.validate.outputs.docs-linkcheck-report-directory }}
    steps:
      - name: Checkout repository
        if: inputs.checkout-enabled
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.checkout-repository }}
          ref: ${{ inputs.checkout-ref }}
          token: ${{ secrets.checkout-token || github.token }}
          ssh-key: ${{ secrets.checkout-ssh-key }}
          ssh-known-hosts: ${{ inputs.checkout-ssh-known-hosts }}
          ssh-strict: ${{ inputs.checkout-ssh-strict }}
          ssh-user: ${{ inputs.checkout-ssh-user }}
          persist-credentials: ${{ inputs.checkout-persist-credentials }}
          path: ${{ inputs.checkout-path }}
          clean: ${{ inputs.checkout-clean }}
          filter: ${{ inputs.checkout-filter }}
          sparse-checkout: ${{ inputs.checkout-sparse-checkout }}
          sparse-checkout-cone-mode: ${{ inputs.checkout-sparse-checkout-cone-mode }}
          fetch-depth: ${{ inputs.checkout-fetch-depth }}
          fetch-tags: ${{ inputs.checkout-fetch-tags }}
          show-progress: ${{ inputs.checkout-show-progress }}
          lfs: ${{ inputs.checkout-lfs }}
          submodules: ${{ inputs.checkout-submodules }}
          set-safe-directory: ${{ inputs.checkout-set-safe-directory }}
          github-server-url: ${{ inputs.checkout-github-server-url }}
          allow-unsafe-pr-checkout: ${{ inputs.checkout-allow-unsafe-pr-checkout }}
      - name: Download artifacts
        if: inputs.artifact-download-enabled
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.artifact-download-name }}
          artifact-ids: ${{ inputs.artifact-download-ids }}
          path: ${{ inputs.artifact-download-path }}
          pattern: ${{ inputs.artifact-download-pattern }}
          merge-multiple: ${{ inputs.artifact-download-merge-multiple }}
          github-token: ${{ secrets.artifact-download-token }}
          repository: ${{ inputs.artifact-download-repository }}
          run-id: ${{ inputs.artifact-download-run-id }}
          skip-decompress: ${{ inputs.artifact-download-skip-decompress }}
          digest-mismatch: ${{ inputs.artifact-download-digest-mismatch }}
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/docs-build"
          cat > "$RUNNER_TEMP/devflows/docs-build/validate-inputs.py" <<'DEVFLOWS_SCRIPT_EOF'
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          # Practical subset of the distribution/reference image-reference grammar shared
          # with pandoc's run-pandoc.py (docker.io/org/name:tag, ghcr.io/org/img@sha256:...).
          # Validation is syntactic only: any well-formed reference is accepted, so callers
          # may run official images, GHCR mirrors, or their own docs toolchain images.
          _ALNUM = r"[a-z0-9]+"
          _SEPARATOR = r"(?:[._]|__|[-]+)"
          _PATH_COMPONENT = rf"{_ALNUM}(?:{_SEPARATOR}{_ALNUM})*"
          _NAME = rf"{_PATH_COMPONENT}(?:/{_PATH_COMPONENT})*"
          _DOMAIN_COMPONENT = r"(?:[a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9-]*[a-zA-Z0-9])"
          _DOMAIN = rf"{_DOMAIN_COMPONENT}(?:\.{_DOMAIN_COMPONENT})*(?::[0-9]+)?"
          _TAG = r"[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}"
          _DIGEST = r"[A-Za-z][A-Za-z0-9]*(?:[-_+.][A-Za-z][A-Za-z0-9]*)*:[0-9A-Fa-f]{32,}"
          _IMAGE_REFERENCE = re.compile(rf"^(?:{_DOMAIN}/)?{_NAME}(?::{_TAG})?(?:@{_DIGEST})?$")

          _TOOLS = {"sphinx", "mkdocs"}
          _ENVIRONMENTS = {"pixi", "uv", "pip", "container", "micromamba"}
          _UV_CACHE_MODES = {"auto", "true", "false"}
          # Characters GitHub forbids in an artifact name (plus control characters). A
          # Pages artifact name carrying any of these would break the deploy-pages handoff.
          _ARTIFACT_NAME_FORBIDDEN = re.compile(r'[":<>|*?\r\n\\/]')


          def _bool(name: str) -> bool:
              """Parse a GitHub Actions boolean input passed through an env var."""
              return os.environ.get(name, "").strip().lower() == "true"


          def _text(name: str) -> str:
              return os.environ.get(name, "")


          def _inside_workspace(workspace: Path, relative: str) -> Path:
              """Resolve a workspace-relative path and confirm it does not escape."""
              resolved = (workspace / relative).resolve()
              if workspace != resolved and workspace not in resolved.parents:
                  raise SystemExit(f"path must stay inside GITHUB_WORKSPACE: {relative!r}")
              return resolved


          def _emit_outputs(**outputs: str) -> None:
              github_output = os.environ.get("GITHUB_OUTPUT")
              if not github_output:
                  return
              with open(github_output, "a", encoding="utf-8") as handle:
                  for name, value in outputs.items():
                      # Reject newlines so a consumer-controlled value (docs-output-directory,
                      # pages-artifact-name) cannot inject extra $GITHUB_OUTPUT lines. Mirrors
                      # python-lint's guard.
                      if "\n" in value or "\r" in value:
                          raise SystemExit(f"{name} must not contain a newline.")
                      handle.write(f"{name}={value}\n")


          def main() -> int:
              tool = _text("DOCS_TOOL").strip()
              environment = _text("DOCS_ENV_MANAGER").strip()
              build_command = _text("DOCS_BUILD_COMMAND").strip()
              working_directory = _text("DOCS_WORKING_DIRECTORY")
              output_directory = _text("DOCS_OUTPUT_DIRECTORY").strip()
              warnings_as_errors_ignored = _bool("DOCS_WARNINGS_AS_ERRORS")  # noqa: F841
              linkcheck = _bool("DOCS_LINKCHECK_ENABLED")
              sphinx_builder = _text("SPHINX_BUILDER").strip()
              sphinx_arguments = _text("SPHINX_ARGUMENTS").strip()
              mkdocs_arguments = _text("MKDOCS_ARGUMENTS").strip()
              pages_enabled = _bool("PAGES_ARTIFACT_ENABLED")
              pages_name = _text("PAGES_ARTIFACT_NAME")

              # GITHUB_WORKSPACE is always set on a runner; fail fast with a clear message
              # (not a raw KeyError) when it is absent, e.g. a misconfigured local harness.
              workspace_raw = os.environ.get("GITHUB_WORKSPACE")
              if not workspace_raw:
                  raise SystemExit("GITHUB_WORKSPACE is not set.")
              workspace = Path(workspace_raw).resolve()

              # -- pages artifact name must be non-empty and artifact-name-safe when used --
              # deploy-pages rejects an empty name; validating here keeps the chain from
              # deferring the failure to the upload step (which breaks the deploy handoff).
              if pages_enabled:
                  stripped_pages_name = pages_name.strip()
                  if not stripped_pages_name:
                      raise SystemExit(
                          "pages-artifact-name must not be empty when pages-artifact-enabled is true."
                      )
                  if _ARTIFACT_NAME_FORBIDDEN.search(stripped_pages_name):
                      raise SystemExit(
                          "pages-artifact-name contains characters forbidden in an artifact name "
                          f'(any of " : < > | * ? \\ / or a newline): {stripped_pages_name!r}.'
                      )
                  pages_name = stripped_pages_name

              # -- tool / environment enums (always validated) --------------------------
              if tool not in _TOOLS:
                  raise SystemExit(f"docs-tool must be one of {sorted(_TOOLS)}, got {tool!r}.")
              if environment not in _ENVIRONMENTS:
                  raise SystemExit(
                      f"docs-env-manager must be one of {sorted(_ENVIRONMENTS)}, got {environment!r}."
                  )

              # -- output directory is required and must not be empty or escape ---------
              if not output_directory:
                  raise SystemExit("docs-output-directory must not be empty.")
              _inside_workspace(workspace, output_directory)

              # -- working directory must exist and stay inside the workspace -----------
              working_dir = _inside_workspace(workspace, working_directory or ".")
              if not working_dir.is_dir():
                  raise SystemExit(f"docs-working-directory does not exist: {working_directory!r}")

              # -- build-command / tool-argument mutual exclusivity (always) ------------
              if build_command and sphinx_arguments:
                  raise SystemExit("sphinx-arguments must be empty when docs-build-command is set.")
              if build_command and mkdocs_arguments:
                  raise SystemExit("mkdocs-arguments must be empty when docs-build-command is set.")
              if tool == "mkdocs" and sphinx_arguments:
                  raise SystemExit("sphinx-arguments must be empty when docs-tool is mkdocs.")
              if tool == "sphinx" and mkdocs_arguments:
                  raise SystemExit("mkdocs-arguments must be empty when docs-tool is sphinx.")
              if tool == "sphinx" and not build_command and not sphinx_builder:
                  raise SystemExit(
                      "sphinx-builder must be non-empty when docs-tool is sphinx and "
                      "docs-build-command is unset."
                  )

              # -- link check is a Sphinx-only builder ----------------------------------
              if linkcheck and tool == "mkdocs":
                  raise SystemExit(
                      "docs-linkcheck-enabled requires docs-tool sphinx; MkDocs has no built-in link checker."
                  )

              # -- per-environment consistency (non-selected groups are ignored) --------
              if environment == "uv":
                  uv_cache_mode = _text("UV_CACHE_MODE").strip()
                  if uv_cache_mode not in _UV_CACHE_MODES:
                      raise SystemExit(
                          f"uv-cache-mode must be one of {sorted(_UV_CACHE_MODES)}, got {uv_cache_mode!r}."
                      )
              elif environment == "pip":
                  requirements_file = _text("PIP_REQUIREMENTS_FILE").strip()
                  install_targets = _text("PIP_INSTALL_TARGETS").strip()
                  if not requirements_file and not install_targets:
                      raise SystemExit(
                          "pip mode requires pip-requirements-file and/or pip-install-targets; "
                          "both are empty."
                      )
              elif environment == "pixi":
                  if _bool("PIXI_LOCKED") and _bool("PIXI_FROZEN"):
                      raise SystemExit("pixi-locked and pixi-frozen are mutually exclusive; set at most one.")
              elif environment == "micromamba":
                  if not _text("MICROMAMBA_ENVIRONMENT_FILE").strip():
                      raise SystemExit("micromamba mode requires micromamba-environment-file.")
              elif environment == "container":
                  image = _text("CONTAINER_IMAGE").strip()
                  if not image:
                      raise SystemExit("container mode requires container-image; it is empty.")
                  if not _IMAGE_REFERENCE.match(image):
                      raise SystemExit(
                          f"container-image is not a valid image reference: {image!r}. "
                          "Expected [registry/]name[:tag][@digest]."
                      )
                  # NOTE: the docker-login-enabled/docker-password consistency check
                  # lives in a dedicated workflow step (see workflow.yaml) rather than here,
                  # because it depends on the secret. Keeping this validate step's env
                  # inputs-only lets the expect: validation-failure harness reconstruct it.

              _emit_outputs(
                  **{
                      "docs-output-directory": output_directory,
                      "docs-linkcheck-report-directory": (
                          f"{output_directory}-linkcheck" if linkcheck else ""
                      ),
                      "pages-artifact-name": pages_name if pages_enabled else "",
                  }
              )
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/docs-build"
          cat > "$RUNNER_TEMP/devflows/docs-build/install-environment.py" <<'DEVFLOWS_SCRIPT_EOF'
          from __future__ import annotations

          import os
          import shlex
          import subprocess
          import sys
          from pathlib import Path


          def _split_lines(value: str) -> list[str]:
              """Split a newline-separated list input into stripped, non-empty tokens."""
              return [line.strip() for line in value.splitlines() if line.strip()]


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() == "true"


          def _working_directory() -> Path:
              workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
              relative = os.environ.get("DOCS_WORKING_DIRECTORY", "") or "."
              working_dir = (workspace / relative).resolve()
              if workspace != working_dir and workspace not in working_dir.parents:
                  raise SystemExit("docs-working-directory must stay inside GITHUB_WORKSPACE.")
              if not working_dir.is_dir():
                  raise SystemExit(f"docs-working-directory does not exist: {relative!r}")
              return working_dir


          def _uv_sync(working_dir: Path) -> list[str]:
              command = ["uv", "sync"]
              if _bool("UV_SYNC_LOCKED"):
                  command.append("--locked")
              for group in _split_lines(os.environ.get("UV_SYNC_GROUPS", "")):
                  command += ["--group", group]
              for extra in _split_lines(os.environ.get("UV_SYNC_EXTRAS", "")):
                  command += ["--extra", extra]
              try:
                  command += shlex.split(os.environ.get("UV_SYNC_ARGUMENTS", ""))
              except ValueError as error:
                  raise SystemExit(f"Unable to parse uv-sync-arguments: {error}") from error
              return command


          def _pip_install(working_dir: Path) -> list[str]:
              workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
              requirements_file = os.environ.get("PIP_REQUIREMENTS_FILE", "").strip()
              targets = _split_lines(os.environ.get("PIP_INSTALL_TARGETS", ""))
              if not requirements_file and not targets:
                  # validate-inputs.py already rejects this; guard the script directly too.
                  raise SystemExit("pip mode requires pip-requirements-file and/or pip-install-targets.")
              command = [sys.executable, "-m", "pip", "install"]
              if requirements_file:
                  resolved = (workspace / requirements_file).resolve()
                  if workspace != resolved and workspace not in resolved.parents:
                      raise SystemExit("pip-requirements-file must stay inside GITHUB_WORKSPACE.")
                  command += ["-r", str(resolved)]
              command += targets
              return command


          def main() -> int:
              environment = os.environ.get("DOCS_ENV_MANAGER", "").strip()
              working_dir = _working_directory()
              if environment == "uv":
                  command = _uv_sync(working_dir)
              elif environment == "pip":
                  command = _pip_install(working_dir)
              else:
                  # pixi/micromamba install through their setup actions; container has no
                  # host-side dependency install. This step should only run for uv/pip.
                  raise SystemExit(f"install-environment.py is only valid for uv/pip, got {environment!r}.")
              subprocess.run(command, cwd=working_dir, check=True)
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/docs-build"
          cat > "$RUNNER_TEMP/devflows/docs-build/run-docs-build.py" <<'DEVFLOWS_SCRIPT_EOF'
          from __future__ import annotations

          import os
          import shlex
          import subprocess
          import sys
          from pathlib import Path

          # Fixed micromamba environment name created by the setup-micromamba step in the
          # generated workflow; `micromamba run -n <name>` must match it exactly.
          MICROMAMBA_ENVIRONMENT_NAME = "docs-build"


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() == "true"


          def _split(value: str, what: str) -> list[str]:
              try:
                  return shlex.split(value)
              except ValueError as error:
                  raise SystemExit(f"Unable to parse {what}: {error}") from error


          def _relative_to_workspace(workspace: Path, relative: str) -> str:
              """Workspace-relative POSIX path, rejecting anything that escapes the tree."""
              resolved = (workspace / relative).resolve()
              if workspace != resolved and workspace not in resolved.parents:
                  raise SystemExit(f"path must stay inside GITHUB_WORKSPACE: {relative!r}")
              if resolved == workspace:
                  return ""
              return resolved.relative_to(workspace).as_posix()


          def render_path(workspace: Path, relative: str, environment: str) -> str:
              """Render a workspace-relative path as a host-absolute or /data container path."""
              posix = _relative_to_workspace(workspace, relative)
              if environment == "container":
                  return "/data" if not posix else f"/data/{posix}"
              return str(workspace if not posix else workspace / posix)


          def docs_build_argv(
              *,
              tool: str,
              builder: str,
              warnings_as_errors: bool,
              sphinx_arguments: list[str],
              mkdocs_arguments: list[str],
              source_path: str,
              output_path: str,
              config_path: str,
          ) -> list[str]:
              """Compose the sphinx-build / mkdocs build argv (paths already rendered)."""
              if tool == "sphinx":
                  argv = ["sphinx-build", "-b", builder]
                  if warnings_as_errors:
                      argv += ["-W", "--keep-going"]
                  argv += sphinx_arguments
                  argv += [source_path, output_path]
                  return argv
              if tool == "mkdocs":
                  argv = ["mkdocs", "build", "--config-file", config_path, "--site-dir", output_path]
                  if warnings_as_errors:
                      argv.append("--strict")
                  argv += mkdocs_arguments
                  return argv
              raise SystemExit(f"Unsupported docs-tool: {tool!r}.")


          def linkcheck_argv(*, sphinx_arguments: list[str], source_path: str, report_path: str) -> list[str]:
              return ["sphinx-build", "-b", "linkcheck", *sphinx_arguments, source_path, report_path]


          def wrap_in_environment(
              inner: list[str],
              *,
              environment: str,
              workspace: Path,
              container_workdir: str,
              pixi_environment: str,
              pixi_manifest_path: str,
              image: str,
          ) -> list[str]:
              """Wrap the inner tool argv in the selected environment runner."""
              if environment == "pixi":
                  command = ["pixi", "run", "--environment", pixi_environment]
                  if pixi_manifest_path.strip():
                      command += ["--manifest-path", str((workspace / pixi_manifest_path).resolve())]
                  return [*command, "--", *inner]
              if environment == "uv":
                  return ["uv", "run", "--no-sync", "--", *inner]
              if environment == "micromamba":
                  return ["micromamba", "run", "-n", MICROMAMBA_ENVIRONMENT_NAME, *inner]
              if environment == "pip":
                  return inner
              if environment == "container":
                  return [
                      "docker",
                      "run",
                      "--rm",
                      "--volume",
                      f"{workspace}:/data",
                      "--workdir",
                      container_workdir,
                      "--user",
                      f"{os.getuid()}:{os.getgid()}",
                      image,
                      *inner,
                  ]
              raise SystemExit(f"Unsupported docs-env-manager: {environment!r}.")


          def _trusted_command_inner(command: str) -> list[str]:
              return ["bash", "-euo", "pipefail", "-c", command]


          def main() -> int:
              mode = os.environ.get("DOCS_BUILD_MODE", "build").strip()
              tool = os.environ.get("DOCS_TOOL", "").strip()
              environment = os.environ.get("DOCS_ENV_MANAGER", "").strip()
              build_command = os.environ.get("DOCS_BUILD_COMMAND", "").strip()
              warnings_as_errors = _bool("DOCS_WARNINGS_AS_ERRORS")

              workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
              working_directory = os.environ.get("DOCS_WORKING_DIRECTORY", "") or "."
              output_directory = os.environ.get("DOCS_OUTPUT_DIRECTORY", "").strip()

              source_path = render_path(
                  workspace, os.environ.get("SPHINX_SOURCE_DIRECTORY", "docs"), environment
              )
              output_path = render_path(workspace, output_directory, environment)
              config_path = render_path(
                  workspace, os.environ.get("MKDOCS_CONFIG_FILE", "mkdocs.yml"), environment
              )
              container_workdir = render_path(workspace, working_directory, environment)

              if mode == "linkcheck":
                  report_path = render_path(workspace, f"{output_directory}-linkcheck", environment)
                  inner = linkcheck_argv(
                      sphinx_arguments=_split(os.environ.get("SPHINX_ARGUMENTS", ""), "sphinx-arguments"),
                      source_path=source_path,
                      report_path=report_path,
                  )
              elif mode == "build":
                  if build_command:
                      inner = _trusted_command_inner(build_command)
                  else:
                      inner = docs_build_argv(
                          tool=tool,
                          builder=os.environ.get("SPHINX_BUILDER", "").strip(),
                          warnings_as_errors=warnings_as_errors,
                          sphinx_arguments=_split(os.environ.get("SPHINX_ARGUMENTS", ""), "sphinx-arguments"),
                          mkdocs_arguments=_split(os.environ.get("MKDOCS_ARGUMENTS", ""), "mkdocs-arguments"),
                          source_path=source_path,
                          output_path=output_path,
                          config_path=config_path,
                      )
              else:
                  raise SystemExit(f"Unknown DOCS_BUILD_MODE: {mode!r}.")

              command = wrap_in_environment(
                  inner,
                  environment=environment,
                  workspace=workspace,
                  container_workdir=container_workdir,
                  pixi_environment=os.environ.get("PIXI_ENVIRONMENT", "default").strip() or "default",
                  pixi_manifest_path=os.environ.get("PIXI_MANIFEST_PATH", ""),
                  image=os.environ.get("CONTAINER_IMAGE", "").strip(),
              )
              subprocess.run(command, cwd=str((workspace / working_directory).resolve()), check=True)

              if mode == "build":
                  _assert_non_empty(workspace / output_directory, output_directory)
              return 0


          def _assert_non_empty(output_dir: Path, relative: str) -> None:
              """A build (generated or custom) that produced no output is a hard failure."""
              resolved = output_dir.resolve()
              if not resolved.is_dir():
                  raise SystemExit(f"docs-output-directory was not created by the build: {relative!r}")
              if not any(resolved.iterdir()):
                  raise SystemExit(f"docs-output-directory is empty after the build: {relative!r}")


          if __name__ == "__main__":
              sys.exit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Validate inputs
        id: validate
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DOCS_TOOL: ${{ inputs.docs-tool }}
          DOCS_ENV_MANAGER: ${{ inputs.docs-env-manager }}
          DOCS_BUILD_COMMAND: ${{ inputs.docs-build-command }}
          DOCS_WORKING_DIRECTORY: ${{ inputs.docs-working-directory }}
          DOCS_OUTPUT_DIRECTORY: ${{ inputs.docs-output-directory }}
          DOCS_WARNINGS_AS_ERRORS: ${{ inputs.docs-warnings-as-errors }}
          DOCS_LINKCHECK_ENABLED: ${{ inputs.docs-linkcheck-enabled }}
          SPHINX_BUILDER: ${{ inputs.sphinx-builder }}
          SPHINX_ARGUMENTS: ${{ inputs.sphinx-arguments }}
          MKDOCS_ARGUMENTS: ${{ inputs.mkdocs-arguments }}
          UV_CACHE_MODE: ${{ inputs.uv-cache-mode }}
          PIP_REQUIREMENTS_FILE: ${{ inputs.pip-requirements-file }}
          PIP_INSTALL_TARGETS: ${{ inputs.pip-install-targets }}
          PIXI_LOCKED: ${{ inputs.pixi-locked }}
          PIXI_FROZEN: ${{ inputs.pixi-frozen }}
          MICROMAMBA_ENVIRONMENT_FILE: ${{ inputs.micromamba-environment-file }}
          CONTAINER_IMAGE: ${{ inputs.container-image }}
          PAGES_ARTIFACT_ENABLED: ${{ inputs.pages-artifact-enabled }}
          PAGES_ARTIFACT_NAME: ${{ inputs.pages-artifact-name }}
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/docs-build/validate-inputs.py"
      - name: Set up pixi
        if: inputs.docs-env-manager == 'pixi'
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
        with:
          pixi-version: ${{ inputs.pixi-version }}
          working-directory: ${{ inputs.docs-working-directory }}
          manifest-path: ${{ inputs.pixi-manifest-path }}
          environments: ${{ inputs.pixi-environment }}
          locked: ${{ inputs.pixi-locked }}
          frozen: ${{ inputs.pixi-frozen }}
          cache: ${{ inputs.pixi-cache-enabled }}
          cache-key: ${{ inputs.pixi-cache-key }}
      - name: Set up uv
        if: inputs.docs-env-manager == 'uv'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: ${{ inputs.uv-version }}
          python-version: ${{ inputs.uv-python-version }}
          enable-cache: ${{ inputs.uv-cache-mode }}
          working-directory: ${{ inputs.docs-working-directory }}
      - name: Set up Python
        if: inputs.docs-env-manager == 'pip'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.pip-python-version }}
          cache: ${{ (inputs.pip-cache-enabled && inputs.pip-requirements-file != '') && 'pip' || '' }}
          cache-dependency-path: ${{ inputs.pip-requirements-file }}
      - name: Set up micromamba
        if: inputs.docs-env-manager == 'micromamba'
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476  # v3.0.0
        with:
          environment-file: ${{ inputs.micromamba-environment-file }}
          environment-name: docs-build
          cache-environment: ${{ inputs.micromamba-cache-enabled }}
          init-shell: bash
          micromamba-version: ${{ inputs.micromamba-version }}
      - name: Require docker-password when logging in
        if: inputs.docs-env-manager == 'container' && inputs.docker-login-enabled
        shell: bash
        env:
          DOCKER_PASSWORD: ${{ secrets.docker-password }}
        run: |
          if [ -z "${DOCKER_PASSWORD}" ]; then
            echo "::error::docker-login-enabled requires the docker-password secret; it is unset."
            exit 1
          fi
      - name: Log in to container registry
        if: inputs.docs-env-manager == 'container' && inputs.docker-login-enabled
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ inputs.docker-username }}
          password: ${{ secrets.docker-password }}
      - name: Install documentation dependencies
        if: inputs.docs-env-manager == 'uv' || inputs.docs-env-manager == 'pip'
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DOCS_ENV_MANAGER: ${{ inputs.docs-env-manager }}
          DOCS_WORKING_DIRECTORY: ${{ inputs.docs-working-directory }}
          UV_SYNC_LOCKED: ${{ inputs.uv-sync-locked }}
          UV_SYNC_GROUPS: ${{ inputs.uv-sync-groups }}
          UV_SYNC_EXTRAS: ${{ inputs.uv-sync-extras }}
          UV_SYNC_ARGUMENTS: ${{ inputs.uv-sync-arguments }}
          PIP_REQUIREMENTS_FILE: ${{ inputs.pip-requirements-file }}
          PIP_INSTALL_TARGETS: ${{ inputs.pip-install-targets }}
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/docs-build/install-environment.py"
      - name: Build docs
        id: build
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DOCS_BUILD_MODE: build
          DOCS_TOOL: ${{ inputs.docs-tool }}
          DOCS_ENV_MANAGER: ${{ inputs.docs-env-manager }}
          DOCS_BUILD_COMMAND: ${{ inputs.docs-build-command }}
          DOCS_WORKING_DIRECTORY: ${{ inputs.docs-working-directory }}
          DOCS_OUTPUT_DIRECTORY: ${{ inputs.docs-output-directory }}
          DOCS_WARNINGS_AS_ERRORS: ${{ inputs.docs-warnings-as-errors }}
          SPHINX_SOURCE_DIRECTORY: ${{ inputs.sphinx-source-directory }}
          SPHINX_BUILDER: ${{ inputs.sphinx-builder }}
          SPHINX_ARGUMENTS: ${{ inputs.sphinx-arguments }}
          MKDOCS_CONFIG_FILE: ${{ inputs.mkdocs-config-file }}
          MKDOCS_ARGUMENTS: ${{ inputs.mkdocs-arguments }}
          PIXI_ENVIRONMENT: ${{ inputs.pixi-environment }}
          PIXI_MANIFEST_PATH: ${{ inputs.pixi-manifest-path }}
          CONTAINER_IMAGE: ${{ inputs.container-image }}
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/docs-build/run-docs-build.py"
      - name: Link check
        if: inputs.docs-linkcheck-enabled
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DOCS_BUILD_MODE: linkcheck
          DOCS_TOOL: ${{ inputs.docs-tool }}
          DOCS_ENV_MANAGER: ${{ inputs.docs-env-manager }}
          DOCS_WORKING_DIRECTORY: ${{ inputs.docs-working-directory }}
          DOCS_OUTPUT_DIRECTORY: ${{ inputs.docs-output-directory }}
          SPHINX_SOURCE_DIRECTORY: ${{ inputs.sphinx-source-directory }}
          SPHINX_ARGUMENTS: ${{ inputs.sphinx-arguments }}
          PIXI_ENVIRONMENT: ${{ inputs.pixi-environment }}
          PIXI_MANIFEST_PATH: ${{ inputs.pixi-manifest-path }}
          CONTAINER_IMAGE: ${{ inputs.container-image }}
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/docs-build/run-docs-build.py"
      - name: Upload Pages artifact
        id: upload-pages
        if: inputs.pages-artifact-enabled
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          name: ${{ inputs.pages-artifact-name }}
          path: ${{ inputs.docs-output-directory }}
          retention-days: ${{ inputs.pages-artifact-retention-days }}
      - name: Upload artifact
        if: inputs.artifact-upload-enabled && inputs.artifact-upload-path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.artifact-upload-name }}
          path: ${{ inputs.artifact-upload-path }}
          if-no-files-found: ${{ inputs.artifact-upload-if-no-files-found }}
          retention-days: ${{ inputs.artifact-upload-retention-days }}
          compression-level: ${{ inputs.artifact-upload-compression-level }}
          overwrite: ${{ inputs.artifact-upload-overwrite }}
          include-hidden-files: ${{ inputs.artifact-upload-include-hidden-files }}
          archive: ${{ inputs.artifact-upload-archive }}

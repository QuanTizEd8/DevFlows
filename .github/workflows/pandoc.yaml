          def _contains_internal_part(path: Path) -> bool:
              return any(part in INTERNAL_PATH_NAMES for part in path.parts)


          def _add_file(
              workspace: Path,
              files_dir: Path,
              manifest: dict[str, Any],
              seen_files: set[str],
              file_path: Path,
          ) -> None:

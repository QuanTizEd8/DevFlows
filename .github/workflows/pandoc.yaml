                  "docker",
                  "run",
                  "--rm",
                  "--volume",
                  f"{workspace}:/data",
                  "--workdir",
                  container_workdir,
                  "--user",
                  f"{os.getuid()}:{os.getgid()}",
                  image,
                  *pandoc_args,

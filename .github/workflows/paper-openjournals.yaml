jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: ${{ inputs.paper-timeout-minutes }}
    steps:
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/paper-openjournals"
          cat > "$RUNNER_TEMP/devflows/paper-openjournals/common.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Shared validation and flavor-table helpers for paper-openjournals.

          Both validate-inputs.py (the fail-fast validate job) and run-inara.py (the build
          job) parse and validate the caller inputs through parse_and_validate() so the two
          jobs agree exactly on what is legal. Every input reaches this module only through
          os.environ (mapped from inputs.* by the workflow), never interpolated into a
          shell string, which is the whole point of the pandoc-modelled rewrite: the
          draft workflow interpolated inputs straight into run: blocks.

          DevFlows owns the flavor -> (inara argv, produced outputs) table below, so a
          caller selects flavor NAMES but never supplies inara's -o/-p/-r itself. That is
          why paper-arguments is an allowlist of only the cosmetic flags (-v, -l, -m).
          """

          from __future__ import annotations

          import re
          import shlex
          from collections.abc import Mapping
          from dataclasses import dataclass
          from pathlib import Path

          # Syntactic image-reference grammar, identical to pandoc's run-pandoc.py: a
          # well-formed [registry/]name[:tag][@digest] reference. Validation is syntactic
          # only; the caller is trusted to supply an image they trust (it runs with the
          # workspace mounted).
          _ALNUM = r"[a-z0-9]+"
          _SEPARATOR = r"(?:[._]|__|[-]+)"
          _PATH_COMPONENT = rf"{_ALNUM}(?:{_SEPARATOR}{_ALNUM})*"
          _NAME = rf"{_PATH_COMPONENT}(?:/{_PATH_COMPONENT})*"
          _DOMAIN_COMPONENT = r"(?:[a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9-]*[a-zA-Z0-9])"
          _DOMAIN = rf"{_DOMAIN_COMPONENT}(?:\.{_DOMAIN_COMPONENT})*(?::[0-9]+)?"
          _TAG = r"[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}"
          _DIGEST = r"[A-Za-z][A-Za-z0-9]*(?:[-_+.][A-Za-z][A-Za-z0-9]*)*:[0-9A-Fa-f]{32,}"
          _IMAGE_REFERENCE = re.compile(rf"^(?:{_DOMAIN}/)?{_NAME}(?::{_TAG})?(?:@{_DIGEST})?$")

          # paper-journal enum -> the JOURNAL env value inara resolves against its
          # resources/<JOURNAL>/defaults.yaml (verified against the upstream resources/
          # listing at v1.3.1: joss, jose, resciencec).
          JOURNALS: dict[str, str] = {
              "joss": "joss",
              "jose": "jose",
              "rescience-c": "resciencec",
          }


          @dataclass(frozen=True)
          class Output:
              """One artifact a flavor produces, relative to the paper source directory."""

              name: str
              required: bool


          @dataclass(frozen=True)
          class Flavor:
              """A v1 output flavor: the inara argv it emits and the outputs it produces."""

              argv: tuple[str, ...]
              outputs: tuple[Output, ...]


          # The DevFlows-owned flavor table. argv holds ONLY the inara output-selection
          # flags (-o/-p); the caller never supplies these. outputs are the fixed
          # filenames inara writes next to the source (verified against
          # data/defaults/*.yaml at v1.3.1). draft-pdf and final-pdf both write paper.pdf,
          # which is exactly why each flavor is collected into its own subdirectory.
          FLAVORS: dict[str, Flavor] = {
              "draft-pdf": Flavor(("-o", "pdf"), (Output("paper.pdf", True),)),
              "final-pdf": Flavor(("-p", "-o", "pdf"), (Output("paper.pdf", True),)),
              "jats": Flavor(("-o", "jats"), (Output("jats", True),)),
              "crossref": Flavor(("-o", "crossref"), (Output("paper.crossref", True),)),
              "cff": Flavor(("-o", "cff"), (Output("CITATION.cff", True),)),
              "html": Flavor(
                  ("-o", "html"),
                  (Output("paper.html", True), Output("media", False)),
              ),
              "preprint": Flavor(("-o", "preprint"), (Output("paper.preprint.tex", True),)),
              "tex": Flavor(("-o", "tex"), (Output("paper.tex", True),)),
              "docx": Flavor(("-o", "docx"), (Output("paper.docx", True),)),
              "context-pdf": Flavor(("-o", "contextpdf"), (Output("paper.context.pdf", True),)),
          }

          # inara's getopt string is 'lo:m:prv'. DevFlows owns output selection, so -o, -p
          # and -r are rejected in paper-arguments; the caller may add only the cosmetic
          # flags. -m takes a value (an article-info YAML file), the others take none.
          _OWNED_FLAGS = {"-o", "-p", "-r"}
          _ALLOWED_BARE_FLAGS = {"-v", "-l"}
          _ALLOWED_VALUE_FLAGS = {"-m"}


          @dataclass(frozen=True)
          class Config:
              """A fully validated invocation, shared by the validate and build jobs."""

              journal_env: str
              source_relative: str
              output_relative: str
              image: str
              flavors: tuple[str, ...]
              extra_arguments: tuple[str, ...]


          def parse_and_validate(env: Mapping[str, str], *, require_source_exists: bool) -> Config:
              """Validate every input and return the resolved Config.

              require_source_exists is False in the validate job (no checkout, so the
              source file is not present) and True in the build job (checked out).
              """
              # GITHUB_WORKSPACE is always set by GitHub-hosted runners and act, but guard it
              # explicitly (parity with binder's lexical validation) so an out-of-runner run
              # fails with a clear message instead of a bare KeyError.
              workspace_value = env.get("GITHUB_WORKSPACE")
              if not workspace_value:
                  raise SystemExit(
                      "GITHUB_WORKSPACE is not set; paper-openjournals validation must run in a "
                      "GitHub Actions or act runner environment where it is defined."
                  )
              workspace = Path(workspace_value).resolve()

              journal_env = _validate_journal(env.get("PAPER_JOURNAL", ""))
              image = _validate_image(env.get("PAPER_IMAGE", ""))
              flavors = _validate_flavors(env.get("PAPER_FLAVORS", ""))
              extra_arguments = parse_extra_arguments(env.get("PAPER_ARGUMENTS", ""))

              source_relative = _validate_source_path(
                  env.get("PAPER_SOURCE_PATH", ""),
                  workspace,
                  require_exists=require_source_exists,
              )
              output_relative = _validate_output_directory(
                  env.get("PAPER_OUTPUT_DIRECTORY", ""),
                  workspace,
              )

              return Config(
                  journal_env=journal_env,
                  source_relative=source_relative,
                  output_relative=output_relative,
                  image=image,
                  flavors=tuple(flavors),
                  extra_arguments=tuple(extra_arguments),
              )


          def _validate_journal(value: str) -> str:
              journal = value.strip()
              if journal not in JOURNALS:
                  allowed = ", ".join(JOURNALS)
                  raise SystemExit(f"paper-journal must be one of {allowed}; got {value!r}.")
              return JOURNALS[journal]


          def _validate_image(value: str) -> str:
              image = value.strip()
              if not _IMAGE_REFERENCE.match(image):
                  raise SystemExit(
                      f"paper-image is not a valid image reference: {value!r}. "
                      "Expected [registry/]name[:tag][@digest]."
                  )
              return image


          def _validate_flavors(value: str) -> list[str]:
              names = [line.strip() for line in value.splitlines() if line.strip()]
              if not names:
                  raise SystemExit("paper-flavors must list at least one paper flavor; got nothing to do.")
              resolved: list[str] = []
              for name in names:
                  if name not in FLAVORS:
                      allowed = ", ".join(FLAVORS)
                      raise SystemExit(f"unknown paper flavor: {name}. Valid flavors are: {allowed}.")
                  if name not in resolved:
                      resolved.append(name)
              return resolved


          def _validate_source_path(value: str, workspace: Path, *, require_exists: bool) -> str:
              if not value.strip():
                  raise SystemExit("paper-source-path is required; it must not be empty.")
              relative = _workspace_relative(value, workspace, "paper-source-path")
              if require_exists:
                  resolved = (workspace / relative).resolve()
                  if not resolved.is_file():
                      raise SystemExit(f"paper-source-path does not exist or is not a regular file: {value}")
              return relative


          def _validate_output_directory(value: str, workspace: Path) -> str:
              if not value.strip():
                  raise SystemExit("paper-output-directory is required; it must not be empty.")
              return _workspace_relative(value, workspace, "paper-output-directory")


          def _workspace_relative(value: str, workspace: Path, field: str) -> str:
              """Return the workspace-relative POSIX path, rejecting escapes.

              Rejects absolute paths and any '..' component before resolving, then confirms
              the resolved path stays inside GITHUB_WORKSPACE.
              """
              candidate = Path(value)
              if candidate.is_absolute() or ".." in candidate.parts:
                  raise SystemExit(
                      f"{field} must stay inside GITHUB_WORKSPACE (no absolute paths and no '..'): {value}"
                  )
              resolved = (workspace / candidate).resolve()
              if resolved != workspace and workspace not in resolved.parents:
                  raise SystemExit(f"{field} must stay inside GITHUB_WORKSPACE: {value}")
              return resolved.relative_to(workspace).as_posix()


          def parse_extra_arguments(raw: str) -> list[str]:
              """Shlex-split paper-arguments and enforce the strict allowlist.

              inara has only short flags (getopt 'lo:m:prv'), including clustered forms
              like -vl and attached values like -opdf, so this walks each option token
              character by character and rejects an owned flag (-o/-p/-r) in EVERY form as
              well as any bare positional (the source is owned by paper-source-path).
              """
              try:
                  tokens = shlex.split(raw)
              except ValueError as error:
                  raise SystemExit(f"Unable to parse paper-arguments: {error}") from error

              result: list[str] = []
              index = 0
              while index < len(tokens):
                  token = tokens[index]
                  if token == "--" or not token.startswith("-") or token == "-":
                      raise SystemExit(
                          "paper-arguments must not contain a bare positional argument "
                          "(the paper source is controlled by paper-source-path): "
                          f"{token!r}."
                      )
                  position = 1
                  while position < len(token):
                      flag = "-" + token[position]
                      if flag in _OWNED_FLAGS:
                          raise SystemExit(
                              f"paper-arguments must not contain {flag} "
                              "(output selection is controlled by paper-flavors)."
                          )
                      if flag in _ALLOWED_BARE_FLAGS:
                          result.append(flag)
                          position += 1
                          continue
                      if flag in _ALLOWED_VALUE_FLAGS:
                          attached = token[position + 1 :]
                          if attached:
                              value = attached
                          else:
                              index += 1
                              if index >= len(tokens):
                                  raise SystemExit(f"paper-arguments: {flag} requires a value.")
                              value = tokens[index]
                          result.append(flag)
                          result.append(value)
                          position = len(token)
                          continue
                      raise SystemExit(
                          f"paper-arguments contains an unsupported argument: {flag}. "
                          "Only -v, -l, and -m <file> are allowed."
                      )
                  index += 1
              return result
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/paper-openjournals"
          cat > "$RUNNER_TEMP/devflows/paper-openjournals/validate-inputs.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Fail-fast input validation for paper-openjournals (validate job).

          Env maps ONLY inputs.* so the expect: validation-failure scenario harness can
          reconstruct this step's environment from the scenario inputs and workflow
          defaults. All validation logic lives in the sibling common module, so the
          validate job and the build job agree exactly on what is legal. This job runs
          before checkout, so it never checks source-file existence (that is the build
          job's require_source_exists path).
          """

          from __future__ import annotations

          import os
          import sys

          import common


          def main() -> int:
              config = common.parse_and_validate(os.environ, require_source_exists=False)
              print(
                  "paper-openjournals inputs are valid: "
                  f"journal={config.journal_env}, "
                  f"flavors={','.join(config.flavors)}, "
                  f"source={config.source_relative}, "
                  f"output-directory={config.output_relative}."
              )
              return 0


          if __name__ == "__main__":
              sys.exit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Validate inputs
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PAPER_JOURNAL: ${{ inputs.paper-journal }}
          PAPER_SOURCE_PATH: ${{ inputs.paper-source-path }}
          PAPER_FLAVORS: ${{ inputs.paper-flavors }}
          PAPER_IMAGE: ${{ inputs.paper-image }}
          PAPER_OUTPUT_DIRECTORY: ${{ inputs.paper-output-directory }}
          PAPER_ARGUMENTS: ${{ inputs.paper-arguments }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/paper-openjournals/common.py
          python "${DEVFLOWS_SCRIPT_ROOT}/paper-openjournals/validate-inputs.py"
  build:
    name: Build paper
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.paper-timeout-minutes }}
    permissions:
      contents: read
      actions: read
    outputs:
      paper-output-directory: ${{ steps.run-inara.outputs.paper-output-directory }}
      flavors-built: ${{ steps.run-inara.outputs.flavors-built }}
      job-outputs: ${{ steps.devflows-job-output.outputs.job-outputs }}
    steps:
      - name: Checkout repository
        if: inputs.checkout-enabled
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.checkout-repository }}
          ref: ${{ inputs.checkout-ref }}
          token: ${{ secrets.checkout-token || github.token }}
          ssh-key: ${{ secrets.checkout-ssh-key }}
          ssh-known-hosts: ${{ inputs.checkout-ssh-known-hosts }}
          ssh-strict: ${{ inputs.checkout-ssh-strict }}
          ssh-user: ${{ inputs.checkout-ssh-user }}
          persist-credentials: ${{ inputs.checkout-persist-credentials }}
          path: ${{ inputs.checkout-path }}
          clean: ${{ inputs.checkout-clean }}
          filter: ${{ inputs.checkout-filter }}
          sparse-checkout: ${{ inputs.checkout-sparse-checkout }}
          sparse-checkout-cone-mode: ${{ inputs.checkout-sparse-checkout-cone-mode }}
          fetch-depth: ${{ inputs.checkout-fetch-depth }}
          fetch-tags: ${{ inputs.checkout-fetch-tags }}
          show-progress: ${{ inputs.checkout-show-progress }}
          lfs: ${{ inputs.checkout-lfs }}
          submodules: ${{ inputs.checkout-submodules }}
          set-safe-directory: ${{ inputs.checkout-set-safe-directory }}
          github-server-url: ${{ inputs.checkout-github-server-url }}
          allow-unsafe-pr-checkout: ${{ inputs.checkout-allow-unsafe-pr-checkout }}
      - name: Download artifacts
        if: inputs.artifact-download-enabled
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.artifact-download-name }}
          artifact-ids: ${{ inputs.artifact-download-ids }}
          path: ${{ inputs.artifact-download-path }}
          pattern: ${{ inputs.artifact-download-pattern }}
          merge-multiple: ${{ inputs.artifact-download-merge-multiple }}
          github-token: ${{ secrets.artifact-download-token }}
          repository: ${{ inputs.artifact-download-repository }}
          run-id: ${{ inputs.artifact-download-run-id }}
          skip-decompress: ${{ inputs.artifact-download-skip-decompress }}
          digest-mismatch: ${{ inputs.artifact-download-digest-mismatch }}
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/paper-openjournals"
          cat > "$RUNNER_TEMP/devflows/paper-openjournals/common.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Shared validation and flavor-table helpers for paper-openjournals.

          Both validate-inputs.py (the fail-fast validate job) and run-inara.py (the build
          job) parse and validate the caller inputs through parse_and_validate() so the two
          jobs agree exactly on what is legal. Every input reaches this module only through
          os.environ (mapped from inputs.* by the workflow), never interpolated into a
          shell string, which is the whole point of the pandoc-modelled rewrite: the
          draft workflow interpolated inputs straight into run: blocks.

          DevFlows owns the flavor -> (inara argv, produced outputs) table below, so a
          caller selects flavor NAMES but never supplies inara's -o/-p/-r itself. That is
          why paper-arguments is an allowlist of only the cosmetic flags (-v, -l, -m).
          """

          from __future__ import annotations

          import re
          import shlex
          from collections.abc import Mapping
          from dataclasses import dataclass
          from pathlib import Path

          # Syntactic image-reference grammar, identical to pandoc's run-pandoc.py: a
          # well-formed [registry/]name[:tag][@digest] reference. Validation is syntactic
          # only; the caller is trusted to supply an image they trust (it runs with the
          # workspace mounted).
          _ALNUM = r"[a-z0-9]+"
          _SEPARATOR = r"(?:[._]|__|[-]+)"
          _PATH_COMPONENT = rf"{_ALNUM}(?:{_SEPARATOR}{_ALNUM})*"
          _NAME = rf"{_PATH_COMPONENT}(?:/{_PATH_COMPONENT})*"
          _DOMAIN_COMPONENT = r"(?:[a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9-]*[a-zA-Z0-9])"
          _DOMAIN = rf"{_DOMAIN_COMPONENT}(?:\.{_DOMAIN_COMPONENT})*(?::[0-9]+)?"
          _TAG = r"[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}"
          _DIGEST = r"[A-Za-z][A-Za-z0-9]*(?:[-_+.][A-Za-z][A-Za-z0-9]*)*:[0-9A-Fa-f]{32,}"
          _IMAGE_REFERENCE = re.compile(rf"^(?:{_DOMAIN}/)?{_NAME}(?::{_TAG})?(?:@{_DIGEST})?$")

          # paper-journal enum -> the JOURNAL env value inara resolves against its
          # resources/<JOURNAL>/defaults.yaml (verified against the upstream resources/
          # listing at v1.3.1: joss, jose, resciencec).
          JOURNALS: dict[str, str] = {
              "joss": "joss",
              "jose": "jose",
              "rescience-c": "resciencec",
          }


          @dataclass(frozen=True)
          class Output:
              """One artifact a flavor produces, relative to the paper source directory."""

              name: str
              required: bool


          @dataclass(frozen=True)
          class Flavor:
              """A v1 output flavor: the inara argv it emits and the outputs it produces."""

              argv: tuple[str, ...]
              outputs: tuple[Output, ...]


          # The DevFlows-owned flavor table. argv holds ONLY the inara output-selection
          # flags (-o/-p); the caller never supplies these. outputs are the fixed
          # filenames inara writes next to the source (verified against
          # data/defaults/*.yaml at v1.3.1). draft-pdf and final-pdf both write paper.pdf,
          # which is exactly why each flavor is collected into its own subdirectory.
          FLAVORS: dict[str, Flavor] = {
              "draft-pdf": Flavor(("-o", "pdf"), (Output("paper.pdf", True),)),
              "final-pdf": Flavor(("-p", "-o", "pdf"), (Output("paper.pdf", True),)),
              "jats": Flavor(("-o", "jats"), (Output("jats", True),)),
              "crossref": Flavor(("-o", "crossref"), (Output("paper.crossref", True),)),
              "cff": Flavor(("-o", "cff"), (Output("CITATION.cff", True),)),
              "html": Flavor(
                  ("-o", "html"),
                  (Output("paper.html", True), Output("media", False)),
              ),
              "preprint": Flavor(("-o", "preprint"), (Output("paper.preprint.tex", True),)),
              "tex": Flavor(("-o", "tex"), (Output("paper.tex", True),)),
              "docx": Flavor(("-o", "docx"), (Output("paper.docx", True),)),
              "context-pdf": Flavor(("-o", "contextpdf"), (Output("paper.context.pdf", True),)),
          }

          # inara's getopt string is 'lo:m:prv'. DevFlows owns output selection, so -o, -p
          # and -r are rejected in paper-arguments; the caller may add only the cosmetic
          # flags. -m takes a value (an article-info YAML file), the others take none.
          _OWNED_FLAGS = {"-o", "-p", "-r"}
          _ALLOWED_BARE_FLAGS = {"-v", "-l"}
          _ALLOWED_VALUE_FLAGS = {"-m"}


          @dataclass(frozen=True)
          class Config:
              """A fully validated invocation, shared by the validate and build jobs."""

              journal_env: str
              source_relative: str
              output_relative: str
              image: str
              flavors: tuple[str, ...]
              extra_arguments: tuple[str, ...]


          def parse_and_validate(env: Mapping[str, str], *, require_source_exists: bool) -> Config:
              """Validate every input and return the resolved Config.

              require_source_exists is False in the validate job (no checkout, so the
              source file is not present) and True in the build job (checked out).
              """
              # GITHUB_WORKSPACE is always set by GitHub-hosted runners and act, but guard it
              # explicitly (parity with binder's lexical validation) so an out-of-runner run
              # fails with a clear message instead of a bare KeyError.
              workspace_value = env.get("GITHUB_WORKSPACE")
              if not workspace_value:
                  raise SystemExit(
                      "GITHUB_WORKSPACE is not set; paper-openjournals validation must run in a "
                      "GitHub Actions or act runner environment where it is defined."
                  )
              workspace = Path(workspace_value).resolve()

              journal_env = _validate_journal(env.get("PAPER_JOURNAL", ""))
              image = _validate_image(env.get("PAPER_IMAGE", ""))
              flavors = _validate_flavors(env.get("PAPER_FLAVORS", ""))
              extra_arguments = parse_extra_arguments(env.get("PAPER_ARGUMENTS", ""))

              source_relative = _validate_source_path(
                  env.get("PAPER_SOURCE_PATH", ""),
                  workspace,
                  require_exists=require_source_exists,
              )
              output_relative = _validate_output_directory(
                  env.get("PAPER_OUTPUT_DIRECTORY", ""),
                  workspace,
              )

              return Config(
                  journal_env=journal_env,
                  source_relative=source_relative,
                  output_relative=output_relative,
                  image=image,
                  flavors=tuple(flavors),
                  extra_arguments=tuple(extra_arguments),
              )


          def _validate_journal(value: str) -> str:
              journal = value.strip()
              if journal not in JOURNALS:
                  allowed = ", ".join(JOURNALS)
                  raise SystemExit(f"paper-journal must be one of {allowed}; got {value!r}.")
              return JOURNALS[journal]


          def _validate_image(value: str) -> str:
              image = value.strip()
              if not _IMAGE_REFERENCE.match(image):
                  raise SystemExit(
                      f"paper-image is not a valid image reference: {value!r}. "
                      "Expected [registry/]name[:tag][@digest]."
                  )
              return image


          def _validate_flavors(value: str) -> list[str]:
              names = [line.strip() for line in value.splitlines() if line.strip()]
              if not names:
                  raise SystemExit("paper-flavors must list at least one paper flavor; got nothing to do.")
              resolved: list[str] = []
              for name in names:
                  if name not in FLAVORS:
                      allowed = ", ".join(FLAVORS)
                      raise SystemExit(f"unknown paper flavor: {name}. Valid flavors are: {allowed}.")
                  if name not in resolved:
                      resolved.append(name)
              return resolved


          def _validate_source_path(value: str, workspace: Path, *, require_exists: bool) -> str:
              if not value.strip():
                  raise SystemExit("paper-source-path is required; it must not be empty.")
              relative = _workspace_relative(value, workspace, "paper-source-path")
              if require_exists:
                  resolved = (workspace / relative).resolve()
                  if not resolved.is_file():
                      raise SystemExit(f"paper-source-path does not exist or is not a regular file: {value}")
              return relative


          def _validate_output_directory(value: str, workspace: Path) -> str:
              if not value.strip():
                  raise SystemExit("paper-output-directory is required; it must not be empty.")
              return _workspace_relative(value, workspace, "paper-output-directory")


          def _workspace_relative(value: str, workspace: Path, field: str) -> str:
              """Return the workspace-relative POSIX path, rejecting escapes.

              Rejects absolute paths and any '..' component before resolving, then confirms
              the resolved path stays inside GITHUB_WORKSPACE.
              """
              candidate = Path(value)
              if candidate.is_absolute() or ".." in candidate.parts:
                  raise SystemExit(
                      f"{field} must stay inside GITHUB_WORKSPACE (no absolute paths and no '..'): {value}"
                  )
              resolved = (workspace / candidate).resolve()
              if resolved != workspace and workspace not in resolved.parents:
                  raise SystemExit(f"{field} must stay inside GITHUB_WORKSPACE: {value}")
              return resolved.relative_to(workspace).as_posix()


          def parse_extra_arguments(raw: str) -> list[str]:
              """Shlex-split paper-arguments and enforce the strict allowlist.

              inara has only short flags (getopt 'lo:m:prv'), including clustered forms
              like -vl and attached values like -opdf, so this walks each option token
              character by character and rejects an owned flag (-o/-p/-r) in EVERY form as
              well as any bare positional (the source is owned by paper-source-path).
              """
              try:
                  tokens = shlex.split(raw)
              except ValueError as error:
                  raise SystemExit(f"Unable to parse paper-arguments: {error}") from error

              result: list[str] = []
              index = 0
              while index < len(tokens):
                  token = tokens[index]
                  if token == "--" or not token.startswith("-") or token == "-":
                      raise SystemExit(
                          "paper-arguments must not contain a bare positional argument "
                          "(the paper source is controlled by paper-source-path): "
                          f"{token!r}."
                      )
                  position = 1
                  while position < len(token):
                      flag = "-" + token[position]
                      if flag in _OWNED_FLAGS:
                          raise SystemExit(
                              f"paper-arguments must not contain {flag} "
                              "(output selection is controlled by paper-flavors)."
                          )
                      if flag in _ALLOWED_BARE_FLAGS:
                          result.append(flag)
                          position += 1
                          continue
                      if flag in _ALLOWED_VALUE_FLAGS:
                          attached = token[position + 1 :]
                          if attached:
                              value = attached
                          else:
                              index += 1
                              if index >= len(tokens):
                                  raise SystemExit(f"paper-arguments: {flag} requires a value.")
                              value = tokens[index]
                          result.append(flag)
                          result.append(value)
                          position = len(token)
                          continue
                      raise SystemExit(
                          f"paper-arguments contains an unsupported argument: {flag}. "
                          "Only -v, -l, and -m <file> are allowed."
                      )
                  index += 1
              return result
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/paper-openjournals"
          cat > "$RUNNER_TEMP/devflows/paper-openjournals/run-inara.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Build the requested paper flavors with the pinned openjournals/inara image.

          Modelled exactly on pandoc's run-pandoc.py: every input arrives through
          os.environ, the docker argv is assembled programmatically (never a shell
          string), and subprocess.run is called without a shell. For each requested flavor
          the pinned image is run once, then that flavor's fixed inara outputs are moved
          into <paper-output-directory>/<flavor>/ BEFORE the next flavor runs, so the
          paper.pdf that both draft-pdf and final-pdf write can never collide. The
          artifact-upload channel then uploads the whole output directory as one artifact.
          """

          from __future__ import annotations

          import os
          import shutil
          import subprocess
          import sys
          from pathlib import Path

          import common


          def main() -> int:
              config = common.parse_and_validate(os.environ, require_source_exists=True)
              workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()

              source_path = (workspace / config.source_relative).resolve()
              source_directory = source_path.parent
              output_directory = (workspace / config.output_relative).resolve()

              if output_directory.exists() and any(output_directory.iterdir()):
                  raise SystemExit(
                      "paper-output-directory already exists and is not empty: "
                      f"{config.output_relative}. Refusing to merge a prior run's outputs."
                  )

              for flavor_name in config.flavors:
                  flavor = common.FLAVORS[flavor_name]
                  command = [
                      "docker",
                      "run",
                      "--rm",
                      "--user",
                      f"{os.getuid()}:{os.getgid()}",
                      "--volume",
                      f"{workspace}:/data",
                      "--workdir",
                      "/data",
                      "--env",
                      f"JOURNAL={config.journal_env}",
                      config.image,
                      *flavor.argv,
                      *config.extra_arguments,
                      config.source_relative,
                  ]
                  print(f"Building flavor {flavor_name}: {' '.join(command)}")
                  subprocess.run(command, check=True)
                  _collect(flavor_name, flavor, source_directory, output_directory)

              _write_outputs(config)
              return 0


          def _collect(
              flavor_name: str,
              flavor: common.Flavor,
              source_directory: Path,
              output_directory: Path,
          ) -> None:
              """Move a flavor's fixed inara outputs into <output>/<flavor>/."""
              destination_root = output_directory / flavor_name
              destination_root.mkdir(parents=True, exist_ok=True)
              for output in flavor.outputs:
                  produced = source_directory / output.name
                  if not produced.exists():
                      if output.required:
                          raise SystemExit(
                              f"flavor {flavor_name} did not produce its expected output "
                              f"{output.name!r} next to the paper source."
                          )
                      continue
                  destination = destination_root / output.name
                  shutil.move(str(produced), str(destination))
                  print(f"Collected {flavor_name}: {output.name} -> {destination}")


          def _write_outputs(config: common.Config) -> None:
              output_file = os.environ.get("GITHUB_OUTPUT")
              if not output_file:
                  return
              with open(output_file, "a", encoding="utf-8") as handle:
                  handle.write(f"paper-output-directory={config.output_relative}\n")
                  handle.write("flavors-built<<DEVFLOWS_EOF\n")
                  handle.write("\n".join(config.flavors))
                  handle.write("\nDEVFLOWS_EOF\n")


          if __name__ == "__main__":
              sys.exit(main())
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/_channels"
          cat > "$RUNNER_TEMP/devflows/_channels/collect-job-outputs.py" <<'DEVFLOWS_SCRIPT_EOF'
          # Assemble the caller-mapped job-outputs JSON object for the job-output channel.
          # Reads DEVFLOWS_JOB_OUTPUT_MAP (newline-delimited key=SOURCE) and writes one
          # job-outputs GITHUB_OUTPUT entry. Values are JSON-encoded under a random heredoc
          # delimiter, so no crafted value can inject an extra output line.
          from __future__ import annotations

          import json
          import os
          import re
          import secrets
          from pathlib import Path

          _KEY = re.compile(r"^[A-Za-z_][A-Za-z0-9_-]*$")


          def _resolve(key: str, source: str) -> str:
              kind, sep, rest = source.partition(":")
              if not sep or kind not in {"env", "file"}:
                  raise SystemExit(f"job-output-map key {key!r}: source must be 'env:VAR' or 'file:path'.")
              if kind == "env":
                  return os.environ.get(rest, "")
              path = Path(rest)
              if not rest or rest == "." or path.is_absolute() or ".." in path.parts:
                  raise SystemExit(f"job-output-map key {key!r}: file path must be workspace-relative.")
              return path.read_text(encoding="utf-8") if path.is_file() else ""


          def main() -> int:
              outputs: dict[str, str] = {}
              for raw in os.environ.get("DEVFLOWS_JOB_OUTPUT_MAP", "").splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  key, sep, source = line.partition("=")
                  key = key.strip()
                  if not sep or not _KEY.match(key):
                      raise SystemExit(f"job-output-map entry for key {key!r}: expected 'key=SOURCE'.")
                  outputs[key] = _resolve(key, source.strip())

              github_output = os.environ.get("GITHUB_OUTPUT")
              if not github_output:
                  raise SystemExit("GITHUB_OUTPUT is not set.")
              payload = json.dumps(outputs, separators=(",", ":"), sort_keys=True)
              delimiter = f"ghadelim_{secrets.token_hex(16)}"
              if delimiter in payload:  # pragma: no cover - astronomically unlikely
                  raise SystemExit("output delimiter collision; retry.")
              with Path(github_output).open("a", encoding="utf-8") as handle:
                  handle.write(f"job-outputs<<{delimiter}\n{payload}\n{delimiter}\n")
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Run inara
        id: run-inara
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PAPER_JOURNAL: ${{ inputs.paper-journal }}
          PAPER_SOURCE_PATH: ${{ inputs.paper-source-path }}
          PAPER_FLAVORS: ${{ inputs.paper-flavors }}
          PAPER_IMAGE: ${{ inputs.paper-image }}
          PAPER_OUTPUT_DIRECTORY: ${{ inputs.paper-output-directory }}
          PAPER_ARGUMENTS: ${{ inputs.paper-arguments }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/paper-openjournals/common.py
          python "${DEVFLOWS_SCRIPT_ROOT}/paper-openjournals/run-inara.py"
      - name: Upload artifact
        if: inputs.artifact-upload-enabled && inputs.artifact-upload-path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.artifact-upload-name }}
          path: ${{ inputs.artifact-upload-path }}
          if-no-files-found: ${{ inputs.artifact-upload-if-no-files-found }}
          retention-days: ${{ inputs.artifact-upload-retention-days }}
          compression-level: ${{ inputs.artifact-upload-compression-level }}
          overwrite: ${{ inputs.artifact-upload-overwrite }}
          include-hidden-files: ${{ inputs.artifact-upload-include-hidden-files }}
          archive: ${{ inputs.artifact-upload-archive }}
      - name: Collect job outputs
        id: devflows-job-output
        if: inputs.job-output-map != ''
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DEVFLOWS_JOB_OUTPUT_MAP: ${{ inputs.job-output-map }}
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/_channels/collect-job-outputs.py"

              names: set[str] = set()
              versions: set[str] = set()
              for entry in expected.values():
                  name, version = _parse_dist_filename(entry.name, entry.kind)
                  names.add(_normalize_name(name))
                  versions.add(version)
              if len(versions) != 1:

                      f"distributions disagree on version ({sorted(versions)}); refusing to publish "
                      "a mixed-version set."
                  )
              if len(names) != 1:
                  raise SystemExit(
                      f"distributions disagree on package name ({sorted(names)}); refusing to publish."
                  )

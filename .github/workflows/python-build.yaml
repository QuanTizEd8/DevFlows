          ssh-key: ${{ secrets.checkout-ssh-key }}
          ssh-known-hosts: ${{ inputs.checkout-ssh-known-hosts }}
          ssh-strict: ${{ inputs.checkout-ssh-strict }}
          ssh-user: ${{ inputs.checkout-ssh-user }}
          persist-credentials: ${{ inputs.checkout-persist-credentials }}
          path: ${{ inputs.checkout-path }}
          clean: ${{ inputs.checkout-clean }}
          filter: ${{ inputs.checkout-filter }}
          sparse-checkout: ${{ inputs.checkout-sparse-checkout }}
          sparse-checkout-cone-mode: ${{ inputs.checkout-sparse-checkout-cone-mode }}
          fetch-depth: ${{ inputs.checkout-fetch-depth }}
          fetch-tags: ${{ inputs.checkout-fetch-tags }}
          show-progress: ${{ inputs.checkout-show-progress }}
          lfs: ${{ inputs.checkout-lfs }}
          submodules: ${{ inputs.checkout-submodules }}
          set-safe-directory: ${{ inputs.checkout-set-safe-directory }}
          github-server-url: ${{ inputs.checkout-github-server-url }}
          allow-unsafe-pr-checkout: ${{ inputs.checkout-allow-unsafe-pr-checkout }}
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/python-build"
          cat > "$RUNNER_TEMP/devflows/python-build/build-conda.py" <<'DEVFLOWS_SCRIPT_EOF'
          from __future__ import annotations

          import os
          import shlex
          import subprocess
          from pathlib import Path


          def main() -> int:
              recipe = _resolve_recipe_path()
              out_dir = Path(os.environ["OUT_DIR"]).resolve()
              target_platform = os.environ.get("MATRIX_TARGET_PLATFORM", "").strip()

              channels: list[str] = []
              for line in os.environ.get("CONDA_CHANNELS", "").splitlines():
                  channel = line.strip()
                  if channel:
                      channels.append(channel)

              try:
                  extra_args = shlex.split(os.environ.get("CONDA_BUILD_ARGUMENTS", ""))
              except ValueError as error:
                  raise SystemExit(f"Unable to parse conda-build-arguments: {error}") from error

              out_dir.mkdir(parents=True, exist_ok=True)
              command = ["rattler-build", "build", "--recipe", str(recipe), "--output-dir", str(out_dir)]
              for channel in channels:
                  command += ["-c", channel]
              if target_platform:
                  command += ["--target-platform", target_platform]
              command += extra_args

              subprocess.run(command, check=True)
              _assert_built_packages(out_dir)
              return 0


          def _resolve_recipe_path() -> Path:
              workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
              relative = os.environ.get("CONDA_RECIPE_PATH", "").strip()
              if not relative:
                  raise SystemExit("conda-recipe-path is required.")
              recipe = (workspace / relative).resolve()
              if workspace != recipe and workspace not in recipe.parents:
                  raise SystemExit("conda-recipe-path must stay inside GITHUB_WORKSPACE.")
              if not recipe.is_file():
                  raise SystemExit(f"conda-recipe-path does not exist: {relative}")
              return recipe


          def _assert_built_packages(out_dir: Path) -> None:
              packages = list(out_dir.rglob("*.conda")) + list(out_dir.rglob("*.tar.bz2"))
              if not packages:
                  raise SystemExit(
                      f"rattler-build produced no conda packages (*.conda / *.tar.bz2) in {out_dir}."
                  )


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Set up rattler-build
        uses: prefix-dev/rattler-build-action@1ca5f45832f419a46d1326ccc5861d7e14d67c44  # v0.2.39
        with:
          setup-only: 'true'
          rattler-build-version: v0.68.0
      - name: Build conda packages
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          CONDA_RECIPE_PATH: ${{ inputs.conda-recipe-path }}
          CONDA_CHANNELS: ${{ inputs.conda-channels }}
          CONDA_BUILD_ARGUMENTS: ${{ inputs.conda-build-arguments }}
          MATRIX_TARGET_PLATFORM: ${{ matrix['target-platform'] }}
          OUT_DIR: ${{ runner.temp }}/devflows-conda
        run: python "${DEVFLOWS_SCRIPT_ROOT}/python-build/build-conda.py"
      - name: Upload internal conda artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.dist-artifact-prefix }}-internal-conda-${{ strategy.job-index }}
          path: ${{ runner.temp }}/devflows-conda
          if-no-files-found: error
          retention-days: 1
          include-hidden-files: true
          overwrite: true
  collect:
    name: Collect distributions
    needs:
      - dist
      - cibw
      - conda
    if: '!cancelled() && (needs.dist.result == ''success'' || needs.dist.result == ''skipped'') && (needs.cibw.result
      == ''success'' || needs.cibw.result == ''skipped'') && (needs.conda.result == ''success'' || needs.conda.result
      == ''skipped'') && (needs.dist.result == ''success'' || needs.cibw.result == ''success'' || needs.conda.result
      == ''success'')'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      sdist-artifact-name: ${{ steps.collect.outputs.sdist-artifact-name }}
      wheels-artifact-name: ${{ steps.collect.outputs.wheels-artifact-name }}
      conda-artifact-name: ${{ steps.collect.outputs.conda-artifact-name }}
      dist-sha256sums: ${{ steps.collect.outputs.dist-sha256sums }}
      dist-manifest: ${{ steps.collect.outputs.dist-manifest }}
      package-version: ${{ steps.collect.outputs.package-version }}
    steps:
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/python-build"
          cat > "$RUNNER_TEMP/devflows/python-build/reindex-conda-channel.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Generate authoritative repodata.json for every subdir of a conda channel.

          The python-build ``collect`` job merges each matrix leg's conda packages into a
          single channel. Per-leg repodata only covers that leg's packages, so the merged
          channel needs a fresh, authoritative index across every subdir.

          Historically this shelled out to the conda organization's ``conda-index``, but
          that package imports ``conda.models.version`` at import time -- a hard runtime
          dependency on the full ``conda`` package, which is *yanked* on PyPI (its newest
          release, 4.3.16, predates Python 3.10 and no longer installs) and is not
          distributed there at all in its modern form. Rather than drag conda into an
          ephemeral environment, this script builds repodata.json directly: it is
          deterministic, has no conda dependency, and needs only ``zstandard`` to
          decompress the ``.conda`` inner tarball (delivered by the caller's
          ``uv run --with zstandard``).

          A conda package record in repodata.json is exactly the package's
          ``info/index.json`` (name, version, build, build_number, depends, subdir,
          license, timestamp, noarch, ...) augmented with the file's ``md5``, ``sha256``,
          and ``size``. Legacy ``.tar.bz2`` packages hold ``info/index.json`` directly in a
          bzip2 tarball (stdlib only); modern ``.conda`` packages are a zip whose
          ``info-*.tar.zst`` member is a zstd-compressed tarball carrying it.
          """

          from __future__ import annotations

          import hashlib
          import io
          import json
          import sys
          import tarfile
          import zipfile
          from pathlib import Path
          from typing import Any

          # conda-index emits repodata_version 1 with split packages/packages.conda maps;
          # match that so existing conda clients read the merged channel unchanged.
          REPODATA_VERSION = 1
          INDEX_MEMBER = "info/index.json"


          def main(argv: list[str]) -> int:
              if len(argv) != 1:
                  raise SystemExit("usage: reindex-conda-channel.py <channel-dir>")
              channel = Path(argv[0]).resolve()
              if not channel.is_dir():
                  raise SystemExit(f"channel directory does not exist: {channel}")
              for subdir in sorted(p for p in channel.iterdir() if p.is_dir()):
                  _write_subdir_repodata(subdir)
              return 0


          def _write_subdir_repodata(subdir: Path) -> None:
              """Write ``<subdir>/repodata.json`` describing every package in ``subdir``."""
              packages: dict[str, dict[str, Any]] = {}
              packages_conda: dict[str, dict[str, Any]] = {}
              for path in sorted(subdir.iterdir()):
                  if not path.is_file():
                      continue
                  if path.name.endswith(".tar.bz2"):
                      packages[path.name] = _record(path)
                  elif path.name.endswith(".conda"):
                      packages_conda[path.name] = _record(path)
              repodata = {
                  "info": {"subdir": subdir.name},
                  "packages": packages,
                  "packages.conda": packages_conda,
                  "removed": [],
                  "repodata_version": REPODATA_VERSION,
              }
              # sort_keys makes the output byte-for-byte deterministic regardless of the
              # order the filesystem yields packages.
              (subdir / "repodata.json").write_text(
                  json.dumps(repodata, indent=2, sort_keys=True) + "\n", encoding="utf-8"
              )


          def _record(path: Path) -> dict[str, Any]:
              """A repodata record: the package's index.json plus md5/sha256/size."""
              data = path.read_bytes()
              record = dict(_read_index_json(path))
              record["md5"] = hashlib.md5(data).hexdigest()  # noqa: S324 - repodata contract, not security
              record["sha256"] = hashlib.sha256(data).hexdigest()
              record["size"] = len(data)
              return record


          def _read_index_json(path: Path) -> dict[str, Any]:
              raw = _extract_index_bytes(path)
              try:
                  index = json.loads(raw)
              except json.JSONDecodeError as error:
                  raise SystemExit(f"{path.name}: {INDEX_MEMBER} is not valid JSON: {error}") from error
              if not isinstance(index, dict) or "name" not in index or "version" not in index:
                  raise SystemExit(
                      f"{path.name}: {INDEX_MEMBER} is missing the required name/version fields."
                  )
              return index


          def _extract_index_bytes(path: Path) -> bytes:
              if path.name.endswith(".tar.bz2"):
                  return _extract_from_tar_bz2(path)
              return _extract_from_conda(path)


          def _extract_from_tar_bz2(path: Path) -> bytes:
              """Read ``info/index.json`` from a legacy bzip2 conda package (stdlib only)."""
              try:
                  with tarfile.open(path, "r:bz2") as archive:
                      return _read_index_member(archive, path)
              except tarfile.TarError as error:
                  raise SystemExit(
                      f"{path.name}: cannot read package as a tar.bz2 archive: {error}"
                  ) from error


          def _extract_from_conda(path: Path) -> bytes:
              """Read ``info/index.json`` from a modern ``.conda`` (zip of zstd tarballs)."""
              # Imported lazily: the tar.bz2 path and the pure record logic need no zstd, so
              # the module stays importable (and unit-testable) without zstandard present.
              import zstandard

              try:
                  with zipfile.ZipFile(path) as bundle:
                      info_names = [
                          name
                          for name in bundle.namelist()
                          if name.startswith("info-") and name.endswith(".tar.zst")
                      ]
                      if not info_names:
                          raise SystemExit(f"{path.name}: no info-*.tar.zst entry in .conda package.")
                      compressed = bundle.read(sorted(info_names)[0])
              except zipfile.BadZipFile as error:
                  raise SystemExit(f"{path.name}: cannot read package as a .conda zip: {error}") from error

              decompressor = zstandard.ZstdDecompressor()
              buffer = io.BytesIO()
              with decompressor.stream_reader(io.BytesIO(compressed)) as reader:
                  buffer.write(reader.read())
              buffer.seek(0)
              try:
                  with tarfile.open(fileobj=buffer) as archive:
                      return _read_index_member(archive, path)
              except tarfile.TarError as error:
                  raise SystemExit(f"{path.name}: cannot read the .conda info tarball: {error}") from error


          def _read_index_member(archive: tarfile.TarFile, path: Path) -> bytes:
              # extractfile raises KeyError when the member is absent and returns None when
              # it exists but is not a regular file; both mean the package has no usable
              # index.json, so fail loudly rather than index an incomplete channel.
              try:
                  member = archive.extractfile(INDEX_MEMBER)
              except KeyError:
                  member = None
              if member is None:
                  raise SystemExit(f"{path.name}: {INDEX_MEMBER} not found in package.")
              return member.read()


          if __name__ == "__main__":
              raise SystemExit(main(sys.argv[1:]))
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/python-build"
          cat > "$RUNNER_TEMP/devflows/python-build/collect.py" <<'DEVFLOWS_SCRIPT_EOF'
          from __future__ import annotations

          import base64
          import hashlib
          import json
          import os
          import secrets
          import shutil
          import subprocess
          from dataclasses import dataclass
          from pathlib import Path

          MANIFEST_SCHEMA = 1
          # Re-indexing the merged conda channel is done by the sibling
          # reindex-conda-channel.py, a self-contained repodata.json generator with no
          # conda dependency (see that file for why conda-index was dropped). Its only
          # third-party need is zstandard, to decompress the ``.conda`` inner tarball; it is
          # delivered through an ephemeral, pinned ``uv run --with`` environment so nothing
          # is installed on the collect runner's interpreter. Pinned here, version-locked
          # with the aggregation logic, rather than exposed as an input: re-indexing is an
          # internal implementation detail.
          ZSTANDARD_VERSION = "0.25.0"
          REINDEX_SCRIPT = Path(__file__).with_name("reindex-conda-channel.py")


          @dataclass(frozen=True)
          class DistFile:
              """A single published distribution file and its computed metadata."""

              name: str
              path: Path
              sha256: str
              size: int
              kind: str  # "sdist" | "wheel" | "conda"
              version: str


          def main() -> int:
              prefix = _required("DIST_ARTIFACT_PREFIX")
              dist_staging = _staging("DIST_STAGING")
              cibw_staging = _staging("CIBW_STAGING")
              conda_staging = _staging("CONDA_STAGING")
              wheels_out = Path(os.environ["WHEELS_OUT"]).resolve()
              sdist_out = Path(os.environ["SDIST_OUT"]).resolve()
              conda_out = Path(os.environ["CONDA_OUT"]).resolve()

              sdists = _assemble_flat(sources=[dist_staging], pattern="*.tar.gz", destination=sdist_out)
              wheels = _assemble_flat(
                  sources=[dist_staging, cibw_staging], pattern="*.whl", destination=wheels_out
              )
              conda_packages = _assemble_conda_channel(conda_staging, conda_out)
              if conda_packages:
                  _reindex_conda_channel(conda_out)

              files: list[DistFile] = []
              files += [_describe(path, "sdist") for path in sdists]
              files += [_describe(path, "wheel") for path in wheels]
              files += [_describe(path, "conda") for path in conda_packages]
              files.sort(key=lambda item: (item.kind, item.name))

              if not files:
                  # validate rejects nothing-to-build calls and collect only runs when a
                  # producer succeeded, so an empty aggregate means an upstream job produced
                  # no files despite succeeding; fail rather than publish nothing.
                  raise SystemExit("collect found no distribution files to aggregate.")

              version = _resolve_version(files)

              sdist_name = f"{prefix}-sdist" if sdists else ""
              wheels_name = f"{prefix}-wheels" if wheels else ""
              conda_name = f"{prefix}-conda-channel" if conda_packages else ""

              manifest = {
                  "schema": MANIFEST_SCHEMA,
                  "files": [
                      {"name": item.name, "sha256": item.sha256, "size": item.size, "kind": item.kind}
                      for item in files
                  ],
                  "artifacts": {"sdist": sdist_name, "wheels": wheels_name, "conda-channel": conda_name},
              }
              sha256sums = "".join(f"{item.sha256}  {item.name}\n" for item in files)
              sha256sums_b64 = base64.b64encode(sha256sums.encode("utf-8")).decode("ascii")

              _write_outputs(
                  {
                      "sdist-artifact-name": sdist_name,
                      "wheels-artifact-name": wheels_name,
                      "conda-artifact-name": conda_name,
                      "dist-sha256sums": sha256sums_b64,
                      "dist-manifest": json.dumps(manifest, separators=(",", ":"), sort_keys=True),
                      "package-version": version,
                  }
              )
              _write_summary(manifest, version)
              return 0


          def _assemble_flat(*, sources: list[Path], pattern: str, destination: Path) -> list[Path]:
              """Copy every file matching ``pattern`` from ``sources`` flat into ``destination``."""
              collected: list[Path] = []
              seen: set[str] = set()
              for source in sources:
                  if not source.is_dir():
                      continue
                  for path in sorted(source.rglob(pattern)):
                      if path.name in seen:
                          raise SystemExit(
                              f"duplicate distribution file {path.name!r} across build jobs; "
                              "ensure matrix legs do not produce colliding wheels."
                          )
                      seen.add(path.name)
                      destination.mkdir(parents=True, exist_ok=True)
                      target = destination / path.name
                      shutil.copy2(path, target)
                      collected.append(target)
              return collected


          def _assemble_conda_channel(staging: Path, destination: Path) -> list[Path]:
              """Copy conda packages into ``destination/<subdir>/`` preserving their subdir.

              rattler-build writes each package to ``<output-dir>/<subdir>/<pkg>``; the
              immediate parent directory name is the conda subdir (noarch, linux-64, ...).
              """
              collected: list[Path] = []
              if not staging.is_dir():
                  return collected
              seen: set[str] = set()
              for pattern in ("*.conda", "*.tar.bz2"):
                  for path in sorted(staging.rglob(pattern)):
                      subdir = path.parent.name
                      key = f"{subdir}/{path.name}"
                      if key in seen:
                          continue
                      seen.add(key)
                      target_dir = destination / subdir
                      target_dir.mkdir(parents=True, exist_ok=True)
                      target = target_dir / path.name
                      shutil.copy2(path, target)
                      collected.append(target)
              return collected


          def _reindex_conda_channel(channel: Path) -> None:
              """Regenerate authoritative repodata.json across every subdir of the channel.

              Per-leg repodata only covers that leg's packages, so the merged channel needs
              a fresh index. The generation is done by reindex-conda-channel.py (no conda
              dependency), run through an ephemeral uv environment that supplies only a
              pinned zstandard for ``.conda`` decompression -- nothing lands on the runner's
              interpreter.
              """
              subprocess.run(
                  [
                      "uv",
                      "run",
                      "--no-project",
                      "--with",
                      f"zstandard=={ZSTANDARD_VERSION}",
                      "python",
                      str(REINDEX_SCRIPT),
                      str(channel),
                  ],
                  check=True,
              )


          def _describe(path: Path, kind: str) -> DistFile:
              data = path.read_bytes()
              return DistFile(
                  name=path.name,
                  path=path,
                  sha256=hashlib.sha256(data).hexdigest(),
                  size=len(data),
                  kind=kind,
                  version=_parse_version(path.name, kind),
              )


          def _parse_version(filename: str, kind: str) -> str:
              if kind == "wheel":
                  stem = filename[: -len(".whl")]
                  parts = stem.split("-")
                  if len(parts) < 5:
                      raise SystemExit(f"cannot parse version from wheel filename {filename!r}.")
                  return parts[1]
              if kind == "sdist":
                  stem = filename[: -len(".tar.gz")]
                  name, _, version = stem.rpartition("-")
                  if not name or not version:
                      raise SystemExit(f"cannot parse version from sdist filename {filename!r}.")
                  return version
              # conda: <name>-<version>-<build>.<ext>; name may itself contain hyphens.
              ext = ".conda" if filename.endswith(".conda") else ".tar.bz2"
              stem = filename[: -len(ext)]
              segments = stem.rsplit("-", 2)
              if len(segments) != 3:
                  raise SystemExit(f"cannot parse version from conda filename {filename!r}.")
              return segments[1]


          def _resolve_version(files: list[DistFile]) -> str:
              versions = sorted({item.version for item in files})
              if len(versions) != 1:
                  detail = ", ".join(f"{item.name}={item.version}" for item in files)
                  raise SystemExit(
                      f"produced distributions disagree on version ({detail}); refusing to "
                      "publish a mixed-version build."
                  )
              return versions[0]


          def _staging(name: str) -> Path:
              value = os.environ.get(name, "")
              return Path(value).resolve() if value else Path("/nonexistent")


          def _write_outputs(outputs: dict[str, str]) -> None:
              github_output = os.environ.get("GITHUB_OUTPUT")
              if not github_output:
                  raise SystemExit("GITHUB_OUTPUT is not set.")
              with Path(github_output).open("a", encoding="utf-8") as handle:
                  for name, value in outputs.items():
                      handle.write(_render_output(name, value))


          def _render_output(name: str, value: str) -> str:
              """Render one GITHUB_OUTPUT entry using a collision-proof heredoc delimiter."""
              delimiter = f"ghadelim_{secrets.token_hex(16)}"
              if delimiter in value:  # pragma: no cover - astronomically unlikely
                  raise SystemExit("output delimiter collision; retry.")
              return f"{name}<<{delimiter}\n{value}\n{delimiter}\n"


          def _write_summary(manifest: dict[str, object], version: str) -> None:
              summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
              if not summary_path:
                  return
              lines = [
                  "## python-build distribution manifest",
                  "",
                  f"Package version: `{version}`",
                  "",
                  "| kind | file | sha256 | size |",
                  "| --- | --- | --- | --- |",
              ]
              for entry in manifest["files"]:  # type: ignore[index]
                  assert isinstance(entry, dict)
                  lines.append(
                      f"| {entry['kind']} | `{entry['name']}` | `{entry['sha256']}` | {entry['size']} |"
                  )
              lines.append("")
              with Path(summary_path).open("a", encoding="utf-8") as handle:
                  handle.write("\n".join(lines) + "\n")


          def _required(name: str) -> str:
              value = os.environ.get(name, "").strip()
              if not value:
                  raise SystemExit(f"{name} is required.")
              return value


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Set up uv
        if: inputs.conda-enabled
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: ${{ inputs.uv-cache-mode }}
      - name: Download internal dist artifact
        if: needs.dist.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: ${{ inputs.dist-artifact-prefix }}-internal-dist
          path: ${{ runner.temp }}/collect/dist
          merge-multiple: true
      - name: Download internal cibw artifacts
        if: needs.cibw.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: ${{ inputs.dist-artifact-prefix }}-internal-cibw-*
          path: ${{ runner.temp }}/collect/cibw
          merge-multiple: true
      - name: Download internal conda artifacts
        if: needs.conda.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: ${{ inputs.dist-artifact-prefix }}-internal-conda-*
          path: ${{ runner.temp }}/collect/conda
          merge-multiple: true
      - name: Aggregate distributions
        id: collect
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DIST_ARTIFACT_PREFIX: ${{ inputs.dist-artifact-prefix }}
          DIST_STAGING: ${{ runner.temp }}/collect/dist
          CIBW_STAGING: ${{ runner.temp }}/collect/cibw
          CONDA_STAGING: ${{ runner.temp }}/collect/conda
          SDIST_OUT: ${{ runner.temp }}/collect/out/sdist
          WHEELS_OUT: ${{ runner.temp }}/collect/out/wheels
          CONDA_OUT: ${{ runner.temp }}/collect/out/conda-channel
        run: |
          # collect.py invokes the sibling reindexer as a subprocess when the build
          # produced conda packages. This comment references it so the materialize
          # step inlines reindex-conda-channel.py into the script-root next to
          # collect.py, which locates it via Path(__file__).with_name:
          #   ${DEVFLOWS_SCRIPT_ROOT}/python-build/reindex-conda-channel.py
          python "${DEVFLOWS_SCRIPT_ROOT}/python-build/collect.py"
      - name: Upload sdist artifact
        if: steps.collect.outputs.sdist-artifact-name != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ steps.collect.outputs.sdist-artifact-name }}
          path: ${{ runner.temp }}/collect/out/sdist
          if-no-files-found: error
          retention-days: ${{ inputs.dist-artifact-retention-days }}
          overwrite: true
      - name: Upload wheels artifact
        if: steps.collect.outputs.wheels-artifact-name != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ steps.collect.outputs.wheels-artifact-name }}
          path: ${{ runner.temp }}/collect/out/wheels
          if-no-files-found: error
          retention-days: ${{ inputs.dist-artifact-retention-days }}
          overwrite: true
      - name: Upload conda channel artifact
        if: steps.collect.outputs.conda-artifact-name != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ steps.collect.outputs.conda-artifact-name }}
          path: ${{ runner.temp }}/collect/out/conda-channel
          if-no-files-found: error
          retention-days: ${{ inputs.dist-artifact-retention-days }}
          overwrite: true

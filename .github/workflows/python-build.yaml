                  extra_args = shlex.split(os.environ.get("BUILD_TOOL_ARGUMENTS", ""))
              except ValueError as error:
                  raise SystemExit(f"Unable to parse build-tool-arguments: {error}") from error

              out_dir.mkdir(parents=True, exist_ok=True)
              flags: list[str] = []
              if build_sdist:
                  flags.append("--sdist")
              if build_wheel:
                  flags.append("--wheel")

              if build_tool == "uv":
                  command = ["uv", "build", "--out-dir", str(out_dir), *flags, *extra_args, str(package_dir)]
              elif build_tool == "python-build":
                  _install_build_frontend(tool_version)
                  command = [
                      sys.executable,
                      "-m",
                      "build",
                      "--outdir",
                      str(out_dir),
                      *flags,
                      *extra_args,
                      str(package_dir),
                  ]
              else:
                  raise SystemExit(f"Unsupported build-tool {build_tool!r}.")

              subprocess.run(command, check=True)
              _assert_expected_outputs(out_dir, build_sdist=build_sdist, build_wheel=build_wheel)
              return 0


          def _install_build_frontend(tool_version: str) -> None:
              """Install the PyPA ``build`` frontend into the setup-python environment."""
              spec = f"build=={tool_version}" if tool_version else "build"
              subprocess.run(
                  [sys.executable, "-m", "pip", "install", "--disable-pip-version-check", spec],
                  check=True,
              )


          def _resolve_package_dir() -> Path:
              workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
              relative = os.environ.get("BUILD_PACKAGE_PATH", ".").strip() or "."
              package_dir = (workspace / relative).resolve()
              if workspace != package_dir and workspace not in package_dir.parents:
                  raise SystemExit("build-package-path must stay inside GITHUB_WORKSPACE.")
              if not package_dir.is_dir():
                  raise SystemExit(f"build-package-path does not exist: {relative}")
              if not (package_dir / "pyproject.toml").is_file():
                  raise SystemExit(f"build-package-path has no pyproject.toml: {relative}")
              return package_dir


          def _assert_expected_outputs(out_dir: Path, *, build_sdist: bool, build_wheel: bool) -> None:
              """A build tool can exit 0 yet produce nothing the caller expected.

              Verify the requested distribution kinds actually landed so a misconfigured
              call fails here instead of silently uploading an empty intermediate.
              """
              if build_sdist and not list(out_dir.glob("*.tar.gz")):
                  raise SystemExit(
                      f"build-sdist-enabled is true but no sdist (*.tar.gz) was produced in {out_dir}."
                  )
              if build_wheel and not list(out_dir.glob("*.whl")):
                  raise SystemExit(
                      f"build-wheel-enabled is true but no wheel (*.whl) was produced in {out_dir}."
                  )


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/_channels"
          cat > "$RUNNER_TEMP/devflows/_channels/collect-job-outputs.py" <<'DEVFLOWS_SCRIPT_EOF'
          # Assemble the caller-mapped job-outputs JSON object for the job-output channel.
          # Reads DEVFLOWS_JOB_OUTPUT_MAP (newline-delimited key=SOURCE) and writes one
          # job-outputs GITHUB_OUTPUT entry. Values are JSON-encoded under a random heredoc
          # delimiter, so no crafted value can inject an extra output line.
          from __future__ import annotations

          import json
          import os
          import re
          import secrets
          from pathlib import Path

          _KEY = re.compile(r"^[A-Za-z_][A-Za-z0-9_-]*$")


          def _resolve(key: str, source: str) -> str:
              kind, sep, rest = source.partition(":")
              if not sep or kind not in {"env", "file"}:
                  raise SystemExit(f"job-output-map key {key!r}: source must be 'env:VAR' or 'file:path'.")
              if kind == "env":
                  return os.environ.get(rest, "")
              path = Path(rest)
              if not rest or rest == "." or path.is_absolute() or ".." in path.parts:
                  raise SystemExit(f"job-output-map key {key!r}: file path must be workspace-relative.")
              return path.read_text(encoding="utf-8") if path.is_file() else ""


          def main() -> int:
              outputs: dict[str, str] = {}
              for raw in os.environ.get("DEVFLOWS_JOB_OUTPUT_MAP", "").splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  key, sep, source = line.partition("=")
                  key = key.strip()
                  if not sep or not _KEY.match(key):
                      raise SystemExit(f"job-output-map entry for key {key!r}: expected 'key=SOURCE'.")
                  outputs[key] = _resolve(key, source.strip())

              github_output = os.environ.get("GITHUB_OUTPUT")
              if not github_output:
                  raise SystemExit("GITHUB_OUTPUT is not set.")
              payload = json.dumps(outputs, separators=(",", ":"), sort_keys=True)
              delimiter = f"ghadelim_{secrets.token_hex(16)}"
              if delimiter in payload:  # pragma: no cover - astronomically unlikely
                  raise SystemExit("output delimiter collision; retry.")
              with Path(github_output).open("a", encoding="utf-8") as handle:
                  handle.write(f"job-outputs<<{delimiter}\n{payload}\n{delimiter}\n")
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Set up uv
        if: inputs.build-tool == 'uv'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: ${{ inputs.build-tool-version }}
          python-version: ${{ inputs.build-python-version }}
          enable-cache: ${{ inputs.uv-cache-mode }}
      - name: Set up Python
        if: inputs.build-tool == 'python-build' && inputs.build-python-version != ''
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.build-python-version }}
      - name: Build distributions
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          BUILD_TOOL: ${{ inputs.build-tool }}
          BUILD_SDIST_ENABLED: ${{ inputs.build-sdist-enabled }}
          BUILD_WHEEL_ENABLED: ${{ inputs.build-wheel-enabled }}
          BUILD_PACKAGE_PATH: ${{ inputs.build-package-path }}
          BUILD_TOOL_ARGUMENTS: ${{ inputs.build-tool-arguments }}
          BUILD_TOOL_VERSION: ${{ inputs.build-tool-version }}
          OUT_DIR: ${{ runner.temp }}/devflows-dist
        run: python "${DEVFLOWS_SCRIPT_ROOT}/python-build/build-dist.py"
      - name: Upload internal dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.dist-artifact-prefix }}-internal-dist
          path: ${{ runner.temp }}/devflows-dist
          if-no-files-found: error
          retention-days: 1
          overwrite: true
      - name: Collect job outputs
        id: devflows-job-output
        if: inputs.job-output-map != ''
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DEVFLOWS_JOB_OUTPUT_MAP: ${{ inputs.job-output-map }}
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/_channels/collect-job-outputs.py"
    outputs:
      job-outputs: ${{ steps.devflows-job-output.outputs.job-outputs }}
    permissions:
      contents: read
      actions: read
  cibw:
    name: Build native wheels (leg ${{ strategy.job-index }})
    needs: validate
    if: inputs.cibw-enabled
    strategy:
      fail-fast: ${{ inputs.cibw-fail-fast }}
      matrix:
        include: ${{ fromJSON(inputs.cibw-matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ inputs.cibw-timeout-minutes }}
    steps:
      - name: Checkout repository
        if: inputs.checkout-enabled
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.checkout-repository }}
          ref: ${{ inputs.checkout-ref }}
          token: ${{ secrets.checkout-token || github.token }}
          ssh-key: ${{ secrets.checkout-ssh-key }}
          ssh-known-hosts: ${{ inputs.checkout-ssh-known-hosts }}
          ssh-strict: ${{ inputs.checkout-ssh-strict }}
          ssh-user: ${{ inputs.checkout-ssh-user }}
          persist-credentials: ${{ inputs.checkout-persist-credentials }}
          path: ${{ inputs.checkout-path }}
          clean: ${{ inputs.checkout-clean }}
          filter: ${{ inputs.checkout-filter }}
          sparse-checkout: ${{ inputs.checkout-sparse-checkout }}
          sparse-checkout-cone-mode: ${{ inputs.checkout-sparse-checkout-cone-mode }}
          fetch-depth: ${{ inputs.checkout-fetch-depth }}
          fetch-tags: ${{ inputs.checkout-fetch-tags }}
          show-progress: ${{ inputs.checkout-show-progress }}
          lfs: ${{ inputs.checkout-lfs }}
          submodules: ${{ inputs.checkout-submodules }}
          set-safe-directory: ${{ inputs.checkout-set-safe-directory }}
          github-server-url: ${{ inputs.checkout-github-server-url }}
          allow-unsafe-pr-checkout: ${{ inputs.checkout-allow-unsafe-pr-checkout }}
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/python-build"
          cat > "$RUNNER_TEMP/devflows/python-build/prepare-cibw-env.py" <<'DEVFLOWS_SCRIPT_EOF'
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          # Same narrow grammar validate-inputs.py enforces on the matrix. Re-checked here
          # because the values arrive at runtime via fromJSON(matrix) and are about to be
          # written to $GITHUB_ENV, where a newline or stray control character could forge
          # additional environment variables. Belt-and-braces with the validate gate.
          _CIBW_SELECTOR = re.compile(r"^[A-Za-z0-9_.*?\- ]+$")


          def main() -> int:
              """Export CIBW_BUILD / CIBW_ARCHS from the matrix leg, only when present.

              cibuildwheel treats an *empty* CIBW_BUILD as "match nothing", so passing the
              matrix values through step-level env unconditionally would turn a leg that
              omits them into a silent no-op build. Writing them to $GITHUB_ENV only when
              non-empty keeps cibuildwheel on its documented defaults (or the leg's `only`
              selector) otherwise.
              """
              github_env = os.environ.get("GITHUB_ENV")
              if not github_env:
                  raise SystemExit("GITHUB_ENV is not set; cannot export cibuildwheel selectors.")

              exports: list[tuple[str, str]] = []
              for env_name, matrix_field in (("CIBW_BUILD", "MATRIX_BUILD"), ("CIBW_ARCHS", "MATRIX_ARCHS")):
                  value = os.environ.get(matrix_field, "").strip()
                  if not value:
                      continue
                  if not _CIBW_SELECTOR.match(value):
                      raise SystemExit(
                          f"{matrix_field} contains unsupported characters: {value!r}. "
                          "Allowed: letters, digits, '_', '.', '-', '*', '?', and spaces."
                      )
                  exports.append((env_name, value))

              with Path(github_env).open("a", encoding="utf-8") as handle:
                  for env_name, value in exports:
                      handle.write(f"{env_name}={value}\n")
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Prepare cibuildwheel environment
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          MATRIX_BUILD: ${{ matrix.build }}
          MATRIX_ARCHS: ${{ matrix.archs }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/python-build/prepare-cibw-env.py"
      - name: Build native wheels
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55  # v4.1.0
        with:
          package-dir: ${{ inputs.build-package-path }}
          output-dir: ${{ runner.temp }}/devflows-cibw
          config-file: ${{ inputs.cibw-config-file }}
          only: ${{ matrix.only }}
      - name: Upload internal cibw artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.dist-artifact-prefix }}-internal-cibw-${{ strategy.job-index }}
          path: ${{ runner.temp }}/devflows-cibw
          if-no-files-found: error
          retention-days: 1
          overwrite: true
  conda:

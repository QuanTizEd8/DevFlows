                      )
                  for field, value in (("only", only), ("build", build), ("archs", archs)):
                      if value and not _CIBW_SELECTOR.match(value):
                          raise SystemExit(
                              f"{where}.{field} contains unsupported characters: {value!r}. "
                              "Allowed: letters, digits, '_', '.', '-', '*', '?', and spaces."

        with:
          name: ${{ inputs.artifact-download-name }}
          artifact-ids: ${{ inputs.artifact-download-ids }}
          path: ${{ inputs.artifact-download-path }}
          pattern: ${{ inputs.artifact-download-pattern }}
          merge-multiple: ${{ inputs.artifact-download-merge-multiple }}
          github-token: ${{ secrets.artifact-download-token }}
          repository: ${{ inputs.artifact-download-repository }}
          run-id: ${{ inputs.artifact-download-run-id }}
          skip-decompress: ${{ inputs.artifact-download-skip-decompress }}
          digest-mismatch: ${{ inputs.artifact-download-digest-mismatch }}
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/python-test"
          cat > "$RUNNER_TEMP/devflows/python-test/install-package.py" <<'DEVFLOWS_SCRIPT_EOF'
          from __future__ import annotations

          import os
          import re
          import shlex
          import subprocess
          import sys
          from pathlib import Path
          from typing import NoReturn

          # Installs the package under test into the leg's prepared environment. Everything
          # is driven by environment variables and executed with argv lists (shell=False),
          # so no caller string is ever interpolated into a shell body.
          #
          #   source   mode: install test-source-directory (with extras) from the checkout.
          #   artifact mode: resolve the project name from the distributions in
          #                  test-dist-path and install it with `--no-index --find-links`,
          #                  so the resolver picks the compatible wheel from a multi-wheel
          #                  wheelhouse (python-build's flat wheelhouse artifact). Zero
          #                  distributions is a hard error - a broken chain never silently
          #                  tests nothing.
          #
          # uv legs run `uv pip install` against the activated venv; micromamba legs run
          # `python -m pip install` inside the activated conda environment. PEP 735
          # dependency groups are uv-only (rejected for micromamba in validate).

          _SDIST_SUFFIX = ".tar.gz"
          _SDIST_NAME = re.compile(r"^(?P<name>.+?)-[0-9].*$")


          def _fail(message: str) -> NoReturn:
              raise SystemExit(f"python-test: {message}")


          def _split_lines(value: str) -> list[str]:
              return [line.strip() for line in value.splitlines() if line.strip()]


          def _run(argv: list[str], *, cwd: str | None = None) -> None:
              printable = " ".join(shlex.quote(part) for part in argv)
              print(f"+ {printable}" + (f"  (cwd={cwd})" if cwd else ""), flush=True)
              completed = subprocess.run(argv, cwd=cwd)  # noqa: PLW1510 - explicit returncode handling
              if completed.returncode != 0:
                  raise SystemExit(completed.returncode)


          def _normalize_name(raw: str) -> str:
              return re.sub(r"[-_.]+", "-", raw).lower()


          def _project_name(path: Path) -> str:
              filename = path.name
              if filename.endswith(".whl"):
                  return _normalize_name(filename.split("-")[0])
              stem = filename[: -len(_SDIST_SUFFIX)]
              match = _SDIST_NAME.match(stem)
              return _normalize_name(match.group("name") if match else stem)


          def _with_extras(base: str, extras: list[str]) -> str:
              return f"{base}[{','.join(extras)}]" if extras else base


          def _installer(env_manager: str) -> list[str]:
              if env_manager == "uv":
                  return ["uv", "pip", "install"]
              return ["python", "-m", "pip", "install"]


          def _install_source(installer: list[str], source_directory: str, extras: list[str]) -> None:
              directory = Path(source_directory)
              if not directory.is_dir():
                  _fail(f"test-source-directory does not exist: {source_directory}")
              target = _with_extras(str(directory.resolve()), extras)
              _run([*installer, target])


          def _install_artifact(
              installer: list[str],
              dist_path: str,
              prefer: str,
              extras: list[str],
          ) -> None:
              directory = Path(dist_path)
              if not directory.is_dir():
                  _fail(
                      f"test-dist-path {dist_path!r} is not a directory; artifact install found no "
                      "distributions (is the artifact-download chain configured to this path?)."
                  )
              dist_files = sorted(
                  path
                  for path in directory.rglob("*")
                  if path.is_file() and (path.name.endswith(".whl") or path.name.endswith(_SDIST_SUFFIX))
              )
              if not dist_files:
                  _fail(
                      f"test-dist-path {dist_path!r} contains no wheels or sdists; artifact install "
                      "found nothing to test."
                  )
              names = sorted({_project_name(path) for path in dist_files})
              if len(names) > 1:
                  _fail(
                      f"test-dist-path {dist_path!r} contains multiple package names {names}; expected "
                      "exactly one project's distributions."
                  )
              find_links: list[str] = []
              for parent in sorted({str(path.parent) for path in dist_files}):
                  find_links += ["--find-links", parent]
              only_flags = ["--no-binary", names[0]] if prefer == "sdist" else []
              spec = _with_extras(names[0], extras)
              _run([*installer, "--no-index", *find_links, *only_flags, spec])


          def _install_dependency_groups(source_directory: str, groups: list[str]) -> None:
              directory = Path(source_directory)
              if not directory.is_dir():
                  _fail(
                      "test-dependency-groups needs the source tree's pyproject.toml, but "
                      f"test-source-directory does not exist: {source_directory}"
                  )
              group_flags: list[str] = []
              for group in groups:
                  group_flags += ["--group", group]
              _run(["uv", "pip", "install", *group_flags], cwd=str(directory))


          def main() -> int:
              env_manager = os.environ.get("TEST_ENV_MANAGER", "uv")
              install_source = os.environ.get("TEST_INSTALL_SOURCE", "source")
              source_directory = os.environ.get("TEST_SOURCE_DIRECTORY", ".") or "."
              dist_path = os.environ.get("TEST_DIST_PATH", "dist") or "dist"
              prefer = os.environ.get("TEST_INSTALL_PREFER", "wheel")
              extras = _split_lines(os.environ.get("TEST_INSTALL_EXTRAS", ""))
              groups = _split_lines(os.environ.get("TEST_DEPENDENCY_GROUPS", ""))
              dependencies = _split_lines(os.environ.get("TEST_DEPENDENCIES", ""))

              installer = _installer(env_manager)

              if install_source == "source":
                  _install_source(installer, source_directory, extras)
              else:
                  _install_artifact(installer, dist_path, prefer, extras)

              if groups:
                  # Dependency groups are uv-only (validate rejects them for micromamba).
                  _install_dependency_groups(source_directory, groups)

              if dependencies:
                  _run([*installer, *dependencies])

              return 0


          if __name__ == "__main__":
              sys.exit(main())
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/python-test"
          cat > "$RUNNER_TEMP/devflows/python-test/run-tests.py" <<'DEVFLOWS_SCRIPT_EOF'
          from __future__ import annotations

          import os
          import shlex
          import subprocess
          import sys
          from pathlib import Path

          # Runs the caller's test command inside the prepared environment. The command and
          # the per-leg test-arguments arrive as environment variables and are shlex-split
          # into an argv list (shell=False), so nothing is interpolated into a shell body.
          # The command's exit code is propagated verbatim: a nonzero exit fails the leg,
          # and pytest's exit 5 (no tests collected) therefore fails too - no silent no-op.


          def main() -> int:
              command = os.environ.get("TEST_COMMAND", "")
              arguments = os.environ.get("TEST_ARGUMENTS", "")
              working_directory = os.environ.get("TEST_WORKING_DIRECTORY", ".") or "."

              try:
                  argv = shlex.split(command) + shlex.split(arguments)
              except ValueError as error:
                  raise SystemExit(
                      f"python-test: unable to parse test-command/test-arguments: {error}"
                  ) from error
              if not argv:
                  raise SystemExit("python-test: test-command must not be empty.")
              if not Path(working_directory).is_dir():
                  raise SystemExit(f"python-test: test-working-directory does not exist: {working_directory}")

              printable = " ".join(shlex.quote(part) for part in argv)
              print(f"+ {printable}  (cwd={working_directory})", flush=True)
              completed = subprocess.run(argv, cwd=working_directory)  # noqa: PLW1510
              return completed.returncode


          if __name__ == "__main__":
              sys.exit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Set up uv
        if: inputs.test-env-manager == 'uv'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: ${{ inputs.uv-version }}
          python-version: ${{ matrix.python-version }}
          enable-cache: ${{ inputs.uv-cache-mode }}
          activate-environment: true
      - name: Set up micromamba
        if: inputs.test-env-manager == 'micromamba'
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476  # v3.0.0
        with:
          environment-file: ${{ matrix.environment-file }}
          create-args: ${{ matrix.create-args }}
          cache-environment: ${{ inputs.micromamba-cache-enabled }}
          init-shell: bash
          micromamba-version: ${{ inputs.micromamba-version }}
      - name: Install package under test
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          TEST_ENV_MANAGER: ${{ inputs.test-env-manager }}
          TEST_INSTALL_SOURCE: ${{ inputs.test-install-source }}
          TEST_SOURCE_DIRECTORY: ${{ inputs.test-source-directory }}
          TEST_DIST_PATH: ${{ inputs.test-dist-path }}
          TEST_INSTALL_PREFER: ${{ inputs.test-install-prefer }}
          TEST_INSTALL_EXTRAS: ${{ inputs.test-install-extras }}
          TEST_DEPENDENCY_GROUPS: ${{ inputs.test-dependency-groups }}
          TEST_DEPENDENCIES: ${{ inputs.test-dependencies }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/python-test/install-package.py"
      - name: Run tests
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          TEST_COMMAND: ${{ inputs.test-command }}
          TEST_ARGUMENTS: ${{ matrix.test-arguments }}
          TEST_WORKING_DIRECTORY: ${{ inputs.test-working-directory }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/python-test/run-tests.py"
      - name: Upload test report
        if: ${{ !cancelled() && inputs.report-artifact-enabled }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.report-artifact-name }}--leg-${{ matrix.name }}
          path: ${{ inputs.report-path }}
          if-no-files-found: error
          retention-days: ${{ inputs.report-artifact-retention-days }}
          include-hidden-files: ${{ inputs.report-artifact-include-hidden-files }}
  merge-reports:
    name: Merge test reports
    needs: test
    if: ${{ !cancelled() && needs.test.result != 'skipped' && inputs.report-artifact-enabled && inputs.report-merge-enabled }}
    runs-on: ubuntu-latest
    outputs:
      report-artifact-name: ${{ inputs.report-artifact-name }}
    steps:
      - name: Merge per-leg report artifacts
        uses: actions/upload-artifact/merge@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ inputs.report-artifact-name }}
          pattern: ${{ inputs.report-artifact-name }}--leg-*
          separate-directories: true
          delete-merged: true
          include-hidden-files: ${{ inputs.report-artifact-include-hidden-files }}
          retention-days: ${{ inputs.report-artifact-retention-days }}

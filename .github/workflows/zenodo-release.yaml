jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    steps:
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/metadata.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Metadata guards shared by validate-inputs.py and prepare.py.

          Owned-key rejection for the zenodo-metadata-extra escape hatch, its JSON-object
          validation, and the required-field completeness check. CITATION.cff parsing and the
          full build live in cff.py (prepare only).
          """

          from __future__ import annotations

          import json

          # Keys DevFlows owns or derives; a caller must not smuggle them through
          # zenodo-metadata-extra (mirrors the owned-flag rejection on -arguments inputs).
          OWNED_METADATA_KEYS = frozenset(
              {
                  "doi",
                  "prereserve_doi",
                  "conceptdoi",
                  "conceptrecid",
                  "title",
                  "creators",
                  "description",
                  "upload_type",
                  "version",
                  "license",
                  "keywords",
              }
          )


          class MetadataError(ValueError):
              """A metadata input failed validation."""


          def validate_metadata_extra(raw: str) -> dict[str, object]:
              """Parse zenodo-metadata-extra as a JSON object and reject owned keys."""
              raw = raw.strip()
              if not raw:
                  return {}
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as error:
                  raise MetadataError(f"zenodo-metadata-extra is not valid JSON: {error}.") from error
              if not isinstance(data, dict):
                  raise MetadataError("zenodo-metadata-extra must be a JSON object.")
              owned = sorted(key for key in data if key in OWNED_METADATA_KEYS)
              if owned:
                  raise MetadataError(
                      "zenodo-metadata-extra may not carry DevFlows-owned/derived keys "
                      f"({', '.join(owned)}); set them through the typed zenodo-* inputs."
                  )
              return data


          def require_metadata_complete(*, title: str, creators: str, description: str) -> None:
              """Fail when required metadata is absent and no CITATION.cff supplies it."""
              missing = [
                  field
                  for field, value in (
                      ("zenodo-title", title),
                      ("zenodo-creators", creators),
                      ("zenodo-description", description),
                  )
                  if not value.strip()
              ]
              if missing:
                  raise MetadataError(
                      "zenodo-enabled needs deposition metadata: provide "
                      "zenodo-metadata-cff-path, or set " + ", ".join(missing) + "."
                  )
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/validate-inputs.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Fail-fast input validation for zenodo-release (validate job).

          Env maps ONLY inputs.* (secret-presence checks live in the per-job tokenless
          preflight), so the validation-failure harness can reconstruct this step's env from
          the scenario inputs. Checks are ordered cheapest-first and every credentialed side
          effect is refused here before any environment is bound. Imports the light sibling
          modules manifest and metadata.
          """

          from __future__ import annotations

          import json
          import os
          import re

          import metadata

          _REF_FORBIDDEN = re.compile(r"[\x00-\x20~^:?*\[\\]")
          _NAME_RE = re.compile(r"^[A-Za-z0-9][A-Za-z0-9 ._/-]*$")
          _CATEGORY_RE = re.compile(r"^[A-Za-z0-9][A-Za-z0-9 ._-]*$")

          _EXISTING_MODES = ("fail", "update", "skip")
          _IF_NO_FILES_FOUND = ("error", "warn", "ignore")
          _FILE_MODES = ("replace", "keep")
          _UPLOAD_TYPES = (
              "software",
              "publication",
              "dataset",
              "poster",
              "presentation",
              "image",
              "video",
              "lesson",
              "physicalobject",
              "other",
          )


          def main() -> int:
              release_enabled = _bool("RELEASE_ENABLED")
              zenodo_enabled = _bool("ZENODO_ENABLED")
              if not (release_enabled or zenodo_enabled):
                  raise SystemExit("Nothing to do: enable at least one of release-enabled or zenodo-enabled.")

              _validate_timeout()
              tag = _validate_tag()
              _validate_notes_exclusivity()

              if release_enabled:
                  _validate_release()
              if zenodo_enabled:
                  _validate_zenodo(tag)
              return 0


          def _validate_timeout() -> None:
              raw = os.environ.get("PUBLISH_TIMEOUT_MINUTES", "").strip()
              if not raw:
                  return
              try:
                  value = int(raw)
              except ValueError as error:
                  raise SystemExit(f"publish-timeout-minutes must be an integer; got {raw!r}.") from error
              if value <= 0:
                  raise SystemExit(f"publish-timeout-minutes must be a positive integer; got {value}.")


          def _validate_tag() -> str:
              tag = os.environ.get("RELEASE_TAG", "").strip()
              if not tag:
                  raise SystemExit("release-tag is required and must be non-empty.")
              if tag.startswith("-") or ".." in tag or tag.endswith(".lock") or _REF_FORBIDDEN.search(tag):
                  raise SystemExit(
                      f"release-tag must be a valid git ref (no spaces, '..', leading '-', or "
                      f"control/glob characters); got {tag!r}."
                  )
              return tag


          def _validate_notes_exclusivity() -> None:
              notes = os.environ.get("RELEASE_NOTES", "").strip()
              notes_file = os.environ.get("RELEASE_NOTES_FILE", "").strip()
              if notes and notes_file:
                  raise SystemExit(
                      "release-notes and release-notes-file are mutually exclusive; set at most one."
                  )


          def _validate_release() -> None:
              _enum("RELEASE_EXISTING_MODE", _EXISTING_MODES, "release-existing-mode")
              _enum(
                  "RELEASE_ASSET_IF_NO_FILES_FOUND",
                  _IF_NO_FILES_FOUND,
                  "release-asset-if-no-files-found",
              )
              _contained_path("RELEASE_NOTES_FILE", "release-notes-file")
              _contained_path("RELEASE_ASSET_SOURCE_PATH", "release-asset-source-path")
              _charset("RELEASE_ENVIRONMENT_NAME", _NAME_RE, "release-environment-name")

              category = os.environ.get("RELEASE_DISCUSSION_CATEGORY", "").strip()
              if category:
                  _charset("RELEASE_DISCUSSION_CATEGORY", _CATEGORY_RE, "release-discussion-category")
                  if _bool("RELEASE_DRAFT_ENABLED"):
                      raise SystemExit(
                          "release-discussion-category cannot be combined with release-draft-enabled "
                          "(GitHub cannot link a discussion to a draft release)."
                      )
              _require_download_for_globs("RELEASE_ASSET_GLOBS", "release-asset-globs")


          def _validate_zenodo(tag: str) -> None:
              if not os.environ.get("ZENODO_ENVIRONMENT_NAME", "").strip():
                  raise SystemExit(
                      "zenodo-environment-name is required when zenodo-enabled (bind the token "
                      "secret and protection rules to a GitHub environment)."
                  )
              _charset("ZENODO_ENVIRONMENT_NAME", _NAME_RE, "zenodo-environment-name")
              _enum("ZENODO_UPLOAD_TYPE", _UPLOAD_TYPES, "zenodo-upload-type")
              _enum("ZENODO_NEW_VERSION_FILE_MODE", _FILE_MODES, "zenodo-new-version-file-mode")
              _enum(
                  "ZENODO_ASSET_IF_NO_FILES_FOUND",
                  _IF_NO_FILES_FOUND,
                  "zenodo-asset-if-no-files-found",
              )
              _contained_path("ZENODO_ASSET_SOURCE_PATH", "zenodo-asset-source-path")
              _contained_path("ZENODO_METADATA_CFF_PATH", "zenodo-metadata-cff-path")

              if not os.environ.get("ZENODO_ASSET_GLOBS", "").strip():
                  raise SystemExit(
                      "zenodo-asset-globs is required when zenodo-enabled (a deposition with no "
                      "files is nothing to upload)."
                  )
              _require_download_for_globs("ZENODO_ASSET_GLOBS", "zenodo-asset-globs")

              try:
                  metadata.validate_metadata_extra(os.environ.get("ZENODO_METADATA_EXTRA", ""))
              except metadata.MetadataError as error:
                  raise SystemExit(str(error)) from error

              if not os.environ.get("ZENODO_METADATA_CFF_PATH", "").strip():
                  try:
                      metadata.require_metadata_complete(
                          title=os.environ.get("ZENODO_TITLE", ""),
                          creators=os.environ.get("ZENODO_CREATORS", ""),
                          description=os.environ.get("ZENODO_DESCRIPTION", ""),
                      )
                  except metadata.MetadataError as error:
                      raise SystemExit(str(error)) from error

              _validate_manifest_shape(os.environ.get("PUBLISH_DIST_MANIFEST", ""))
              _validate_publish_confirm(tag)


          def _validate_manifest_shape(raw: str) -> None:
              # Cheap shape gate only; prepare and reverify do the full entry + digest check.
              raw = raw.strip()
              if not raw:
                  return
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as error:
                  raise SystemExit(f"publish-dist-manifest is not valid JSON: {error}.") from error
              if not isinstance(data, dict) or data.get("schema") != 1:
                  raise SystemExit('publish-dist-manifest must be a schema-1 object ({"schema": 1, ...}).')
              if not isinstance(data.get("files"), list) or not data["files"]:
                  raise SystemExit("publish-dist-manifest 'files' must be a non-empty list.")


          def _validate_publish_confirm(tag: str) -> None:
              if not _bool("ZENODO_PUBLISH_ENABLED"):
                  return
              if _bool("ZENODO_SANDBOX_ENABLED") or _bool("PUBLISH_DRY_RUN_ENABLED"):
                  return
              confirm = os.environ.get("ZENODO_PUBLISH_CONFIRM", "")
              if confirm != tag:
                  raise SystemExit(
                      "zenodo-publish-confirm must equal release-tag exactly to arm an "
                      "irreversible real-Zenodo publish (type-the-name guard). Set it to "
                      f"{tag!r}, or use zenodo-sandbox-enabled / a draft / dry-run."
                  )


          def _require_download_for_globs(env_name: str, field: str) -> None:
              if os.environ.get(env_name, "").strip() and not _bool("ARTIFACT_DOWNLOAD_ENABLED"):
                  raise SystemExit(
                      f"{field} is set but artifact-download-enabled is false; assets can only "
                      "arrive through the artifact-download channel."
                  )


          def _enum(env_name: str, allowed: tuple[str, ...], field: str) -> None:
              value = os.environ.get(env_name, "").strip()
              if value not in allowed:
                  raise SystemExit(f"{field} must be one of {', '.join(allowed)}; got {value!r}.")


          def _contained_path(env_name: str, field: str) -> None:
              raw = os.environ.get(env_name, "").strip()
              if not raw:
                  return
              if os.path.isabs(raw) or ".." in raw.replace("\\", "/").split("/"):
                  raise SystemExit(f"{field} must be a workspace-relative path without '..': got {raw!r}.")


          def _charset(env_name: str, pattern: re.Pattern[str], field: str) -> None:
              value = os.environ.get(env_name, "").strip()
              if value and not pattern.match(value):
                  raise SystemExit(f"{field} contains unsupported characters: got {value!r}.")


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Validate inputs
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
          PUBLISH_TIMEOUT_MINUTES: ${{ inputs.publish-timeout-minutes }}
          RELEASE_ENABLED: ${{ inputs.release-enabled }}
          RELEASE_TAG: ${{ inputs.release-tag }}
          RELEASE_NOTES: ${{ inputs.release-notes }}
          RELEASE_NOTES_FILE: ${{ inputs.release-notes-file }}
          RELEASE_DRAFT_ENABLED: ${{ inputs.release-draft-enabled }}
          RELEASE_DISCUSSION_CATEGORY: ${{ inputs.release-discussion-category }}
          RELEASE_EXISTING_MODE: ${{ inputs.release-existing-mode }}
          RELEASE_ASSET_GLOBS: ${{ inputs.release-asset-globs }}
          RELEASE_ASSET_SOURCE_PATH: ${{ inputs.release-asset-source-path }}
          RELEASE_ASSET_IF_NO_FILES_FOUND: ${{ inputs.release-asset-if-no-files-found }}
          RELEASE_ENVIRONMENT_NAME: ${{ inputs.release-environment-name }}
          ZENODO_ENABLED: ${{ inputs.zenodo-enabled }}
          ZENODO_SANDBOX_ENABLED: ${{ inputs.zenodo-sandbox-enabled }}
          ZENODO_PUBLISH_ENABLED: ${{ inputs.zenodo-publish-enabled }}
          ZENODO_PUBLISH_CONFIRM: ${{ inputs.zenodo-publish-confirm }}
          ZENODO_NEW_VERSION_FILE_MODE: ${{ inputs.zenodo-new-version-file-mode }}
          ZENODO_ENVIRONMENT_NAME: ${{ inputs.zenodo-environment-name }}
          ZENODO_UPLOAD_TYPE: ${{ inputs.zenodo-upload-type }}
          ZENODO_TITLE: ${{ inputs.zenodo-title }}
          ZENODO_CREATORS: ${{ inputs.zenodo-creators }}
          ZENODO_DESCRIPTION: ${{ inputs.zenodo-description }}
          ZENODO_METADATA_CFF_PATH: ${{ inputs.zenodo-metadata-cff-path }}
          ZENODO_METADATA_EXTRA: ${{ inputs.zenodo-metadata-extra }}
          ZENODO_ASSET_GLOBS: ${{ inputs.zenodo-asset-globs }}
          ZENODO_ASSET_SOURCE_PATH: ${{ inputs.zenodo-asset-source-path }}
          ZENODO_ASSET_IF_NO_FILES_FOUND: ${{ inputs.zenodo-asset-if-no-files-found }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          ARTIFACT_DOWNLOAD_ENABLED: ${{ inputs.artifact-download-enabled }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/metadata.py
          python "${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/validate-inputs.py"
  prepare:
    name: Resolve release plan
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    outputs:
      package-version: ${{ steps.prepare.outputs.package-version }}
      release-tag: ${{ steps.prepare.outputs.release-tag }}
      release-title: ${{ steps.prepare.outputs.release-title }}
      release-body: ${{ steps.prepare.outputs.release-body }}
      deposition-metadata: ${{ steps.prepare.outputs.deposition-metadata }}
      release-asset-list: ${{ steps.prepare.outputs.release-asset-list }}
      zenodo-asset-list: ${{ steps.prepare.outputs.zenodo-asset-list }}
    steps:
      - name: Checkout repository
        if: inputs.checkout-enabled
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.checkout-repository }}
          ref: ${{ inputs.checkout-ref }}
          token: ${{ secrets.checkout-token || github.token }}
          ssh-key: ${{ secrets.checkout-ssh-key }}
          ssh-known-hosts: ${{ inputs.checkout-ssh-known-hosts }}
          ssh-strict: ${{ inputs.checkout-ssh-strict }}
          ssh-user: ${{ inputs.checkout-ssh-user }}
          persist-credentials: ${{ inputs.checkout-persist-credentials }}
          path: ${{ inputs.checkout-path }}
          clean: ${{ inputs.checkout-clean }}
          filter: ${{ inputs.checkout-filter }}
          sparse-checkout: ${{ inputs.checkout-sparse-checkout }}
          sparse-checkout-cone-mode: ${{ inputs.checkout-sparse-checkout-cone-mode }}
          fetch-depth: ${{ inputs.checkout-fetch-depth }}
          fetch-tags: ${{ inputs.checkout-fetch-tags }}
          show-progress: ${{ inputs.checkout-show-progress }}
          lfs: ${{ inputs.checkout-lfs }}
          submodules: ${{ inputs.checkout-submodules }}
          set-safe-directory: ${{ inputs.checkout-set-safe-directory }}
          github-server-url: ${{ inputs.checkout-github-server-url }}
          allow-unsafe-pr-checkout: ${{ inputs.checkout-allow-unsafe-pr-checkout }}
      - name: Download artifacts
        if: inputs.artifact-download-enabled
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.artifact-download-name }}
          artifact-ids: ${{ inputs.artifact-download-ids }}
          path: ${{ inputs.artifact-download-path }}
          pattern: ${{ inputs.artifact-download-pattern }}
          merge-multiple: ${{ inputs.artifact-download-merge-multiple }}
          github-token: ${{ secrets.artifact-download-token }}
          repository: ${{ inputs.artifact-download-repository }}
          run-id: ${{ inputs.artifact-download-run-id }}
          skip-decompress: ${{ inputs.artifact-download-skip-decompress }}
          digest-mismatch: ${{ inputs.artifact-download-digest-mismatch }}
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/assets.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Asset glob resolution for zenodo-release (prepare job only).

          Resolves newline-separated shell globs relative to a workspace-contained source
          directory, applying the -if-no-files-found policy (error/warn/ignore). Never used
          by the credentialed jobs, so it is inlined into prepare alone.
          """

          from __future__ import annotations

          import os
          from pathlib import Path


          class AssetError(ValueError):
              """An asset path, glob, or if-no-files-found policy failed."""


          IF_NO_FILES_FOUND = ("error", "warn", "ignore")


          def parse_lines(raw: str) -> list[str]:
              """Split a newline-separated input into stripped, non-empty lines."""
              return [line.strip() for line in raw.splitlines() if line.strip()]


          def workspace_root() -> Path:
              return Path(os.environ.get("GITHUB_WORKSPACE") or Path.cwd()).resolve()


          def contained_dir(rel: str, *, field: str) -> Path:
              """Resolve a workspace-relative directory and refuse any escape."""
              rel = rel.strip()
              if os.path.isabs(rel) or ".." in rel.replace("\\", "/").split("/"):
                  raise AssetError(f"{field} must be a workspace-relative path without '..': got {rel!r}.")
              root = workspace_root()
              target = (root / rel).resolve() if rel else root
              if target != root and root not in target.parents:
                  raise AssetError(f"{field} must stay inside the workspace: {rel!r}.")
              return target


          def resolve_globs(base_dir: Path, globs: list[str], *, policy: str, field: str) -> list[Path]:
              """Resolve globs under ``base_dir`` and apply the no-match policy.

              Returns a de-duplicated, sorted list of matched regular files. Each glob is
              resolved with ``Path.glob`` (no absolute patterns, no '..'). A glob that
              matches nothing is an error/warning/ignored per ``policy``.
              """
              if policy not in IF_NO_FILES_FOUND:
                  raise AssetError(
                      f"{field}-if-no-files-found must be one of {', '.join(IF_NO_FILES_FOUND)}; "
                      f"got {policy!r}."
                  )
              if not base_dir.is_dir():
                  raise AssetError(f"{field} source directory does not exist: {base_dir}.")
              matched: dict[str, Path] = {}
              for pattern in globs:
                  if os.path.isabs(pattern) or ".." in pattern.replace("\\", "/").split("/"):
                      raise AssetError(
                          f"{field} entry must be a relative glob without '..': got {pattern!r}."
                      )
                  hits = [path for path in sorted(base_dir.glob(pattern)) if path.is_file()]
                  if not hits:
                      message = f"{field} glob {pattern!r} matched no files under {base_dir}."
                      if policy == "error":
                          raise AssetError(message)
                      if policy == "warn":
                          print(f"::warning::{message}")
                      continue
                  for path in hits:
                      matched[str(path.resolve())] = path
              return [matched[key] for key in sorted(matched)]
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/cff.py" <<'DEVFLOWS_SCRIPT_EOF'
          """CITATION.cff parsing and Zenodo deposition-metadata assembly (prepare only).

          Runs in the credential-free prepare job (which alone has checkout). Explicit
          zenodo-* inputs always override CFF-derived values. Imported by prepare.py; never
          inlined into the credentialed jobs, which consume the resolved metadata JSON.
          Requires PyYAML at run time (prepare installs it ephemerally via uv).
          """

          from __future__ import annotations

          from pathlib import Path

          import yaml


          class CffError(ValueError):
              """A CITATION.cff or metadata input could not be parsed."""


          def load_cff(path: Path) -> dict[str, object]:
              """Parse a CITATION.cff file into a mapping (empty mapping when absent)."""
              try:
                  text = path.read_text(encoding="utf-8")
              except OSError as error:
                  raise CffError(f"could not read zenodo-metadata-cff-path {path}: {error}.") from error
              try:
                  data = yaml.safe_load(text)
              except yaml.YAMLError as error:
                  raise CffError(f"CITATION.cff is not valid YAML: {error}.") from error
              if data is None:
                  return {}
              if not isinstance(data, dict):
                  raise CffError("CITATION.cff must be a YAML mapping.")
              return data


          def _strip_orcid(value: str) -> str:
              value = value.strip()
              for prefix in ("https://orcid.org/", "http://orcid.org/", "orcid.org/"):
                  if value.startswith(prefix):
                      return value[len(prefix) :]
              return value


          def cff_creators(cff: dict[str, object]) -> list[dict[str, str]]:
              """Convert CITATION.cff authors into Zenodo creator objects."""
              authors = cff.get("authors")
              creators: list[dict[str, str]] = []
              if not isinstance(authors, list):
                  return creators
              for author in authors:
                  if not isinstance(author, dict):
                      continue
                  family = str(author.get("family-names") or "").strip()
                  given = str(author.get("given-names") or "").strip()
                  entity = str(author.get("name") or "").strip()
                  if family and given:
                      name = f"{family}, {given}"
                  elif family:
                      name = family
                  elif entity:
                      name = entity
                  else:
                      continue
                  creator: dict[str, str] = {"name": name}
                  affiliation = str(author.get("affiliation") or "").strip()
                  if affiliation:
                      creator["affiliation"] = affiliation
                  orcid = _strip_orcid(str(author.get("orcid") or ""))
                  if orcid:
                      creator["orcid"] = orcid
                  creators.append(creator)
              return creators


          def parse_creators(raw: str) -> list[dict[str, str]]:
              """Parse newline creators 'Family, Given | Affiliation | ORCID' into objects."""
              creators: list[dict[str, str]] = []
              for line in raw.splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  parts = [segment.strip() for segment in line.split("|")]
                  name = parts[0]
                  if not name:
                      raise CffError(f"zenodo-creators line has an empty name: {line!r}.")
                  creator: dict[str, str] = {"name": name}
                  if len(parts) >= 2 and parts[1]:
                      creator["affiliation"] = parts[1]
                  if len(parts) >= 3 and parts[2]:
                      creator["orcid"] = _strip_orcid(parts[2])
                  creators.append(creator)
              return creators


          def parse_keywords(raw: str) -> list[str]:
              return [line.strip() for line in raw.splitlines() if line.strip()]


          def _cff_keywords(cff: dict[str, object]) -> list[str]:
              keywords = cff.get("keywords")
              if isinstance(keywords, list):
                  return [str(item).strip() for item in keywords if str(item).strip()]
              return []


          def _cff_license(cff: dict[str, object]) -> str:
              license_value = cff.get("license")
              if isinstance(license_value, list):
                  return str(license_value[0]).strip() if license_value else ""
              return str(license_value or "").strip()


          def build_metadata(
              *,
              cff: dict[str, object],
              title: str,
              creators_raw: str,
              description: str,
              upload_type: str,
              version: str,
              license_id: str,
              keywords_raw: str,
              extra: dict[str, object],
          ) -> dict[str, object]:
              """Merge CFF-derived fields with explicit inputs (explicit wins) and extra."""
              resolved_title = title.strip() or str(cff.get("title") or "").strip()
              if not resolved_title:
                  raise CffError("no deposition title resolved from zenodo-title or CITATION.cff.")

              creators = parse_creators(creators_raw) if creators_raw.strip() else cff_creators(cff)
              if not creators:
                  raise CffError("no deposition creators resolved from zenodo-creators or CITATION.cff.")

              resolved_description = description.strip() or str(cff.get("abstract") or "").strip()
              if not resolved_description:
                  raise CffError(
                      "no deposition description resolved from zenodo-description or CITATION.cff."
                  )

              keywords = parse_keywords(keywords_raw)
              for keyword in _cff_keywords(cff):
                  if keyword not in keywords:
                      keywords.append(keyword)

              metadata: dict[str, object] = {
                  "upload_type": upload_type,
                  "title": resolved_title,
                  "creators": creators,
                  "description": resolved_description,
                  "version": version,
              }
              resolved_license = license_id.strip() or _cff_license(cff)
              if resolved_license:
                  metadata["license"] = resolved_license
              if keywords:
                  metadata["keywords"] = keywords
              # The escape hatch fills advanced fields only; owned keys were already rejected.
              for key, value in extra.items():
                  metadata[key] = value
              return metadata
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/dist_manifest.py" <<'DEVFLOWS_SCRIPT_EOF'
          """schema-1 dist-manifest parsing (no file I/O, no hashing).

          Shared by prepare.py and the credentialed reverify.py; validate does its own cheap
          shape gate inline so this heavier parser is inlined into two jobs, not three.
          """

          from __future__ import annotations

          import json
          import re

          _SHA256_RE = re.compile(r"^[0-9a-f]{64}$")


          class ManifestError(ValueError):
              """A publish-dist-manifest value failed structural validation."""


          def parse_manifest(raw: str) -> dict[str, object]:
              raw = raw.strip()
              if not raw:
                  raise ManifestError("publish-dist-manifest is empty.")
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as error:
                  raise ManifestError(f"publish-dist-manifest is not valid JSON: {error}.") from error
              if not isinstance(data, dict) or data.get("schema") != 1:
                  raise ManifestError('publish-dist-manifest must be a schema-1 object ({"schema": 1, ...}).')
              files = data.get("files")
              if not isinstance(files, list) or not files:
                  raise ManifestError("publish-dist-manifest 'files' must be a non-empty list.")
              for item in files:
                  _validate_entry(item)
              return data


          def _validate_entry(item: object) -> None:
              if not isinstance(item, dict):
                  raise ManifestError("each publish-dist-manifest file entry must be an object.")
              name = item.get("name")
              sha256 = item.get("sha256")
              size = item.get("size")
              if not isinstance(name, str) or not name:
                  raise ManifestError(f"publish-dist-manifest entry has an invalid name: {item!r}.")
              if not isinstance(sha256, str) or not _SHA256_RE.match(sha256):
                  raise ManifestError(f"publish-dist-manifest entry {name!r} has an invalid sha256.")
              if not isinstance(size, int) or isinstance(size, bool) or size < 0:
                  raise ManifestError(f"publish-dist-manifest entry {name!r} has an invalid size.")


          def manifest_entries(manifest: dict[str, object]) -> dict[str, tuple[str, int]]:
              """Return ``{name: (sha256, size)}`` for every manifest file entry."""
              entries: dict[str, tuple[str, int]] = {}
              files = manifest.get("files")
              if isinstance(files, list):
                  for item in files:
                      if isinstance(item, dict):
                          name = str(item.get("name") or "")
                          sha256 = str(item.get("sha256") or "")
                          size = item.get("size")
                          if name and sha256 and isinstance(size, int):
                              entries[name] = (sha256, int(size))
              return entries


          def manifest_versions(manifest: dict[str, object]) -> set[str]:
              """Distinct non-empty per-entry ``version`` values (for skew detection)."""
              versions: set[str] = set()
              files = manifest.get("files")
              if isinstance(files, list):
                  for item in files:
                      if isinstance(item, dict):
                          version = str(item.get("version") or "").strip()
                          if version:
                              versions.add(version)
              return versions
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/hashing.py" <<'DEVFLOWS_SCRIPT_EOF'
          """File hashing and manifest digest comparison (prepare.py and reverify.py)."""

          from __future__ import annotations

          import hashlib
          from pathlib import Path


          class DigestError(ValueError):
              """A file failed sha256/size verification against the manifest."""


          def hash_file(path: Path) -> tuple[str, int]:
              """Return ``(sha256_hex, size_bytes)`` for ``path``."""
              data = path.read_bytes()
              return hashlib.sha256(data).hexdigest(), len(data)


          def locate_by_name(base_dir: Path, name: str) -> Path:
              """Find exactly one regular file named ``name`` anywhere under ``base_dir``."""
              matches = [path for path in sorted(base_dir.rglob(name)) if path.is_file()]
              if not matches:
                  raise DigestError(f"manifest lists {name!r} but it is missing from {base_dir}.")
              if len(matches) > 1:
                  raise DigestError(
                      f"manifest file {name!r} matches more than one file under {base_dir} (ambiguous)."
                  )
              return matches[0]


          def compare_entry(path: Path, name: str, expected_sha: str, expected_size: int) -> None:
              """Recompute ``path`` and fail loudly on a sha256 or size mismatch."""
              actual_sha, actual_size = hash_file(path)
              if actual_size != expected_size:
                  raise DigestError(
                      f"size mismatch for {name!r}: manifest {expected_size}, on disk {actual_size}."
                  )
              if actual_sha != expected_sha:
                  raise DigestError(
                      f"sha256 mismatch for {name!r}: manifest {expected_sha}, on disk {actual_sha}."
                  )


          def verify_entries(base_dir: Path, entries: dict[str, tuple[str, int]]) -> list[str]:
              """Locate and byte-verify every manifest entry under ``base_dir`` (lean reverify)."""
              verified: list[str] = []
              for name in sorted(entries):
                  expected_sha, expected_size = entries[name]
                  path = locate_by_name(base_dir, name)
                  compare_entry(path, name, expected_sha, expected_size)
                  verified.append(name)
              return verified
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/metadata.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Metadata guards shared by validate-inputs.py and prepare.py.

          Owned-key rejection for the zenodo-metadata-extra escape hatch, its JSON-object
          validation, and the required-field completeness check. CITATION.cff parsing and the
          full build live in cff.py (prepare only).
          """

          from __future__ import annotations

          import json

          # Keys DevFlows owns or derives; a caller must not smuggle them through
          # zenodo-metadata-extra (mirrors the owned-flag rejection on -arguments inputs).
          OWNED_METADATA_KEYS = frozenset(
              {
                  "doi",
                  "prereserve_doi",
                  "conceptdoi",
                  "conceptrecid",
                  "title",
                  "creators",
                  "description",
                  "upload_type",
                  "version",
                  "license",
                  "keywords",
              }
          )


          class MetadataError(ValueError):
              """A metadata input failed validation."""


          def validate_metadata_extra(raw: str) -> dict[str, object]:
              """Parse zenodo-metadata-extra as a JSON object and reject owned keys."""
              raw = raw.strip()
              if not raw:
                  return {}
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as error:
                  raise MetadataError(f"zenodo-metadata-extra is not valid JSON: {error}.") from error
              if not isinstance(data, dict):
                  raise MetadataError("zenodo-metadata-extra must be a JSON object.")
              owned = sorted(key for key in data if key in OWNED_METADATA_KEYS)
              if owned:
                  raise MetadataError(
                      "zenodo-metadata-extra may not carry DevFlows-owned/derived keys "
                      f"({', '.join(owned)}); set them through the typed zenodo-* inputs."
                  )
              return data


          def require_metadata_complete(*, title: str, creators: str, description: str) -> None:
              """Fail when required metadata is absent and no CITATION.cff supplies it."""
              missing = [
                  field
                  for field, value in (
                      ("zenodo-title", title),
                      ("zenodo-creators", creators),
                      ("zenodo-description", description),
                  )
                  if not value.strip()
              ]
              if missing:
                  raise MetadataError(
                      "zenodo-enabled needs deposition metadata: provide "
                      "zenodo-metadata-cff-path, or set " + ", ".join(missing) + "."
                  )
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/prepare.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Credential-free resolution and dry-run preview for zenodo-release (prepare job).

          Hosts the checkout channel (CITATION.cff, release-notes-file) and the
          artifact-download channel (staged assets). Resolves the version, release title and
          body, asset globs, and the Zenodo deposition metadata, digest-verifies assets when
          a publish-dist-manifest is supplied, and emits every plan output. Runs fully in PR
          CI with zero credentials; in dry-run it is the terminal job. Installs PyYAML
          ephemerally (uv) for CITATION.cff parsing.
          """

          from __future__ import annotations

          import json
          import os
          import secrets as _secrets
          from pathlib import Path

          import assets
          import cff
          import dist_manifest
          import hashing
          import metadata


          def main() -> int:
              release_enabled = _bool("RELEASE_ENABLED")
              zenodo_enabled = _bool("ZENODO_ENABLED")
              tag = os.environ.get("RELEASE_TAG", "").strip()
              version = os.environ.get("ZENODO_VERSION", "").strip() or _strip_v(tag)

              outputs = {
                  "package-version": version,
                  "release-tag": tag,
                  "release-title": "",
                  "release-body": "",
                  "deposition-metadata": "",
                  "release-asset-list": "",
                  "zenodo-asset-list": "",
              }
              summary = ["## zenodo-release plan", "", f"Resolved version: `{version}`", ""]

              if release_enabled:
                  title, body, rel_assets = _resolve_release(tag)
                  outputs["release-title"] = title
                  outputs["release-body"] = body
                  outputs["release-asset-list"] = "\n".join(rel_assets)
                  summary += [f"GitHub release title: `{title}`", ""]
                  summary += _asset_summary("Release assets", rel_assets)

              if zenodo_enabled:
                  meta, zen_assets = _resolve_zenodo(version)
                  outputs["deposition-metadata"] = json.dumps(meta, sort_keys=True)
                  outputs["zenodo-asset-list"] = "\n".join(zen_assets)
                  summary += [
                      f"Zenodo deposition title: `{meta['title']}`",
                      f"Zenodo upload_type: `{meta['upload_type']}`",
                      f"Zenodo creators: {len(meta['creators'])}",
                      "",
                  ]
                  summary += _asset_summary("Zenodo assets", zen_assets)

              _emit_outputs(outputs)
              _write_summary(summary)
              return 0


          def _resolve_release(tag: str) -> tuple[str, str, list[str]]:
              title = os.environ.get("RELEASE_NAME", "").strip() or tag
              body = _resolve_body()
              source = _source_dir("RELEASE_ASSET_SOURCE_PATH", "release-asset-source-path")
              globs = assets.parse_lines(os.environ.get("RELEASE_ASSET_GLOBS", ""))
              resolved: list[str] = []
              if globs:
                  paths = assets.resolve_globs(
                      source,
                      globs,
                      policy=os.environ.get("RELEASE_ASSET_IF_NO_FILES_FOUND", "error").strip(),
                      field="release-asset",
                  )
                  resolved = _relative(paths)
              return title, body, resolved


          def _resolve_body() -> str:
              notes = os.environ.get("RELEASE_NOTES", "")
              if notes.strip():
                  return notes
              notes_file = os.environ.get("RELEASE_NOTES_FILE", "").strip()
              if not notes_file:
                  return ""
              path = assets.contained_dir(notes_file, field="release-notes-file")
              if not path.is_file():
                  raise SystemExit(f"release-notes-file does not exist: {notes_file}.")
              return path.read_text(encoding="utf-8")


          def _resolve_zenodo(version: str) -> tuple[dict[str, object], list[str]]:
              source = _source_dir("ZENODO_ASSET_SOURCE_PATH", "zenodo-asset-source-path")
              globs = assets.parse_lines(os.environ.get("ZENODO_ASSET_GLOBS", ""))
              paths = assets.resolve_globs(
                  source,
                  globs,
                  policy=os.environ.get("ZENODO_ASSET_IF_NO_FILES_FOUND", "error").strip(),
                  field="zenodo-asset",
              )
              _verify_assets(paths, version)

              extra = metadata.validate_metadata_extra(os.environ.get("ZENODO_METADATA_EXTRA", ""))
              cff_path = os.environ.get("ZENODO_METADATA_CFF_PATH", "").strip()
              cff_data: dict[str, object] = {}
              if cff_path:
                  cff_data = cff.load_cff(assets.contained_dir(cff_path, field="zenodo-metadata-cff-path"))

              meta = cff.build_metadata(
                  cff=cff_data,
                  title=os.environ.get("ZENODO_TITLE", ""),
                  creators_raw=os.environ.get("ZENODO_CREATORS", ""),
                  description=os.environ.get("ZENODO_DESCRIPTION", ""),
                  upload_type=os.environ.get("ZENODO_UPLOAD_TYPE", "software").strip() or "software",
                  version=version,
                  license_id=os.environ.get("ZENODO_LICENSE", ""),
                  keywords_raw=os.environ.get("ZENODO_KEYWORDS", ""),
                  extra=extra,
              )
              return meta, _relative(paths)


          def _verify_assets(paths: list[Path], version: str) -> None:
              raw = os.environ.get("PUBLISH_DIST_MANIFEST", "").strip()
              if not raw:
                  return
              try:
                  manifest_data = dist_manifest.parse_manifest(raw)
              except dist_manifest.ManifestError as error:
                  raise SystemExit(str(error)) from error
              entries = dist_manifest.manifest_entries(manifest_data)
              on_disk = {path.name: path for path in paths}
              if len(on_disk) != len(paths):
                  raise SystemExit("resolved Zenodo assets have duplicate filenames; refusing to upload.")
              unlisted = sorted(set(on_disk) - set(entries))
              if unlisted:
                  raise SystemExit(
                      f"Zenodo assets not covered by publish-dist-manifest: {', '.join(unlisted)}."
                  )
              missing = sorted(set(entries) - set(on_disk))
              if missing:
                  raise SystemExit(
                      f"publish-dist-manifest lists files absent from the Zenodo assets: "
                      f"{', '.join(missing)}."
                  )
              for name, (sha256, size) in entries.items():
                  try:
                      hashing.compare_entry(on_disk[name], name, sha256, size)
                  except hashing.DigestError as error:
                      raise SystemExit(str(error)) from error
              versions = dist_manifest.manifest_versions(manifest_data)
              skew = sorted(item for item in versions if item != version)
              if skew:
                  raise SystemExit(
                      f"publish-dist-manifest version(s) {', '.join(skew)} do not match the "
                      f"resolved version {version!r}."
                  )


          def _source_dir(env_name: str, field: str) -> Path:
              rel = (
                  os.environ.get(env_name, "").strip() or os.environ.get("ARTIFACT_DOWNLOAD_PATH", "").strip()
              )
              return assets.contained_dir(rel, field=field)


          def _relative(paths: list[Path]) -> list[str]:
              root = assets.workspace_root()
              relatives: list[str] = []
              for path in paths:
                  try:
                      relatives.append(path.resolve().relative_to(root).as_posix())
                  except ValueError as error:
                      raise SystemExit(f"resolved asset {path} escaped the workspace.") from error
              return relatives


          def _asset_summary(heading: str, relatives: list[str]) -> list[str]:
              if not relatives:
                  return [f"{heading}: none", ""]
              lines = [f"{heading}:", ""]
              lines += [f"- `{item}`" for item in relatives]
              lines.append("")
              return lines


          def _strip_v(tag: str) -> str:
              return tag[1:] if tag[:1] in {"v", "V"} and tag[1:2].isdigit() else tag


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}


          def _emit_outputs(outputs: dict[str, str]) -> None:
              github_output = os.environ.get("GITHUB_OUTPUT")
              if not github_output:
                  return
              with open(github_output, "a", encoding="utf-8") as handle:
                  for name, value in outputs.items():
                      delimiter = f"ghadelim_{_secrets.token_hex(16)}"
                      handle.write(f"{name}<<{delimiter}\n{value}\n{delimiter}\n")


          def _write_summary(lines: list[str]) -> None:
              summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
              if not summary_path:
                  return
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("\n".join(lines) + "\n")


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false
      - name: Resolve release plan
        id: prepare
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          RELEASE_ENABLED: ${{ inputs.release-enabled }}
          RELEASE_TAG: ${{ inputs.release-tag }}
          RELEASE_NAME: ${{ inputs.release-name }}
          RELEASE_NOTES: ${{ inputs.release-notes }}
          RELEASE_NOTES_FILE: ${{ inputs.release-notes-file }}
          RELEASE_ASSET_GLOBS: ${{ inputs.release-asset-globs }}
          RELEASE_ASSET_SOURCE_PATH: ${{ inputs.release-asset-source-path }}
          RELEASE_ASSET_IF_NO_FILES_FOUND: ${{ inputs.release-asset-if-no-files-found }}
          ZENODO_ENABLED: ${{ inputs.zenodo-enabled }}
          ZENODO_VERSION: ${{ inputs.zenodo-version }}
          ZENODO_UPLOAD_TYPE: ${{ inputs.zenodo-upload-type }}
          ZENODO_TITLE: ${{ inputs.zenodo-title }}
          ZENODO_CREATORS: ${{ inputs.zenodo-creators }}
          ZENODO_DESCRIPTION: ${{ inputs.zenodo-description }}
          ZENODO_LICENSE: ${{ inputs.zenodo-license }}
          ZENODO_KEYWORDS: ${{ inputs.zenodo-keywords }}
          ZENODO_METADATA_CFF_PATH: ${{ inputs.zenodo-metadata-cff-path }}
          ZENODO_METADATA_EXTRA: ${{ inputs.zenodo-metadata-extra }}
          ZENODO_ASSET_GLOBS: ${{ inputs.zenodo-asset-globs }}
          ZENODO_ASSET_SOURCE_PATH: ${{ inputs.zenodo-asset-source-path }}
          ZENODO_ASSET_IF_NO_FILES_FOUND: ${{ inputs.zenodo-asset-if-no-files-found }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          ARTIFACT_DOWNLOAD_PATH: ${{ inputs.artifact-download-path }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/assets.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/cff.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/dist_manifest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/hashing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/metadata.py
          uv run --no-project --with "pyyaml==6.0.3" python "${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/prepare.py"
  zenodo-deposit:
    name: Deposit to Zenodo
    needs:
      - validate
      - prepare
    if: ${{ !inputs.publish-dry-run-enabled && inputs.zenodo-enabled }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    environment:
      name: ${{ inputs.zenodo-environment-name }}
      url: ${{ steps.deposit.outputs.zenodo-record-url }}
    concurrency:
      group: zenodo-release-${{ inputs.zenodo-environment-name }}
      cancel-in-progress: false
    outputs:
      zenodo-doi: ${{ steps.deposit.outputs.zenodo-doi }}
      zenodo-concept-doi: ${{ steps.deposit.outputs.zenodo-concept-doi }}
      zenodo-record-url: ${{ steps.deposit.outputs.zenodo-record-url }}
      zenodo-deposition-id: ${{ steps.deposit.outputs.zenodo-deposition-id }}
      zenodo-state: ${{ steps.deposit.outputs.zenodo-state }}
    steps:
      - name: Download artifacts
        if: inputs.artifact-download-enabled
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.artifact-download-name }}
          artifact-ids: ${{ inputs.artifact-download-ids }}
          path: ${{ inputs.artifact-download-path }}
          pattern: ${{ inputs.artifact-download-pattern }}
          merge-multiple: ${{ inputs.artifact-download-merge-multiple }}
          github-token: ${{ secrets.artifact-download-token }}
          repository: ${{ inputs.artifact-download-repository }}
          run-id: ${{ inputs.artifact-download-run-id }}
          skip-decompress: ${{ inputs.artifact-download-skip-decompress }}
          digest-mismatch: ${{ inputs.artifact-download-digest-mismatch }}
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/dist_manifest.py" <<'DEVFLOWS_SCRIPT_EOF'
          """schema-1 dist-manifest parsing (no file I/O, no hashing).

          Shared by prepare.py and the credentialed reverify.py; validate does its own cheap
          shape gate inline so this heavier parser is inlined into two jobs, not three.
          """

          from __future__ import annotations

          import json
          import re

          _SHA256_RE = re.compile(r"^[0-9a-f]{64}$")


          class ManifestError(ValueError):
              """A publish-dist-manifest value failed structural validation."""


          def parse_manifest(raw: str) -> dict[str, object]:
              raw = raw.strip()
              if not raw:
                  raise ManifestError("publish-dist-manifest is empty.")
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as error:
                  raise ManifestError(f"publish-dist-manifest is not valid JSON: {error}.") from error
              if not isinstance(data, dict) or data.get("schema") != 1:
                  raise ManifestError('publish-dist-manifest must be a schema-1 object ({"schema": 1, ...}).')
              files = data.get("files")
              if not isinstance(files, list) or not files:
                  raise ManifestError("publish-dist-manifest 'files' must be a non-empty list.")
              for item in files:
                  _validate_entry(item)
              return data


          def _validate_entry(item: object) -> None:
              if not isinstance(item, dict):
                  raise ManifestError("each publish-dist-manifest file entry must be an object.")
              name = item.get("name")
              sha256 = item.get("sha256")
              size = item.get("size")
              if not isinstance(name, str) or not name:
                  raise ManifestError(f"publish-dist-manifest entry has an invalid name: {item!r}.")
              if not isinstance(sha256, str) or not _SHA256_RE.match(sha256):
                  raise ManifestError(f"publish-dist-manifest entry {name!r} has an invalid sha256.")
              if not isinstance(size, int) or isinstance(size, bool) or size < 0:
                  raise ManifestError(f"publish-dist-manifest entry {name!r} has an invalid size.")


          def manifest_entries(manifest: dict[str, object]) -> dict[str, tuple[str, int]]:
              """Return ``{name: (sha256, size)}`` for every manifest file entry."""
              entries: dict[str, tuple[str, int]] = {}
              files = manifest.get("files")
              if isinstance(files, list):
                  for item in files:
                      if isinstance(item, dict):
                          name = str(item.get("name") or "")
                          sha256 = str(item.get("sha256") or "")
                          size = item.get("size")
                          if name and sha256 and isinstance(size, int):
                              entries[name] = (sha256, int(size))
              return entries


          def manifest_versions(manifest: dict[str, object]) -> set[str]:
              """Distinct non-empty per-entry ``version`` values (for skew detection)."""
              versions: set[str] = set()
              files = manifest.get("files")
              if isinstance(files, list):
                  for item in files:
                      if isinstance(item, dict):
                          version = str(item.get("version") or "").strip()
                          if version:
                              versions.add(version)
              return versions
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/hashing.py" <<'DEVFLOWS_SCRIPT_EOF'
          """File hashing and manifest digest comparison (prepare.py and reverify.py)."""

          from __future__ import annotations

          import hashlib
          from pathlib import Path


          class DigestError(ValueError):
              """A file failed sha256/size verification against the manifest."""


          def hash_file(path: Path) -> tuple[str, int]:
              """Return ``(sha256_hex, size_bytes)`` for ``path``."""
              data = path.read_bytes()
              return hashlib.sha256(data).hexdigest(), len(data)


          def locate_by_name(base_dir: Path, name: str) -> Path:
              """Find exactly one regular file named ``name`` anywhere under ``base_dir``."""
              matches = [path for path in sorted(base_dir.rglob(name)) if path.is_file()]
              if not matches:
                  raise DigestError(f"manifest lists {name!r} but it is missing from {base_dir}.")
              if len(matches) > 1:
                  raise DigestError(
                      f"manifest file {name!r} matches more than one file under {base_dir} (ambiguous)."
                  )
              return matches[0]


          def compare_entry(path: Path, name: str, expected_sha: str, expected_size: int) -> None:
              """Recompute ``path`` and fail loudly on a sha256 or size mismatch."""
              actual_sha, actual_size = hash_file(path)
              if actual_size != expected_size:
                  raise DigestError(
                      f"size mismatch for {name!r}: manifest {expected_size}, on disk {actual_size}."
                  )
              if actual_sha != expected_sha:
                  raise DigestError(
                      f"sha256 mismatch for {name!r}: manifest {expected_sha}, on disk {actual_sha}."
                  )


          def verify_entries(base_dir: Path, entries: dict[str, tuple[str, int]]) -> list[str]:
              """Locate and byte-verify every manifest entry under ``base_dir`` (lean reverify)."""
              verified: list[str] = []
              for name in sorted(entries):
                  expected_sha, expected_size = entries[name]
                  path = locate_by_name(base_dir, name)
                  compare_entry(path, name, expected_sha, expected_size)
                  verified.append(name)
              return verified
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/reverify.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Lean TOCTOU re-verify inside the credentialed zenodo-deposit job.

          Recomputes sha256+size for every caller-manifest entry and atomically compares
          them against the manifest immediately before the token-bearing deposit step, so an
          artifact swapped between the prepare download and the deposit download cannot ride
          the credentialed upload. It does NOT re-inline prepare's glob/metadata logic: when
          no publish-dist-manifest is supplied there is nothing to re-verify and it is a
          no-op (assets upload as-is, matching the optional-manifest contract). Imports only
          dist_manifest and hashing.
          """

          from __future__ import annotations

          import os
          from pathlib import Path

          import dist_manifest
          import hashing


          def main() -> int:
              raw = os.environ.get("PUBLISH_DIST_MANIFEST", "").strip()
              if not raw:
                  print("no publish-dist-manifest supplied; nothing to re-verify before upload.")
                  return 0
              source = Path(
                  os.environ.get("ZENODO_ASSET_SOURCE_PATH", "").strip()
                  or os.environ.get("ARTIFACT_DOWNLOAD_PATH", "").strip()
                  or "."
              ).resolve()
              try:
                  entries = dist_manifest.manifest_entries(dist_manifest.parse_manifest(raw))
                  verified = hashing.verify_entries(source, entries)
              except (dist_manifest.ManifestError, hashing.DigestError) as error:
                  raise SystemExit(f"re-verification failed before Zenodo upload: {error}") from error
              print(f"re-verified {len(verified)} file(s) against publish-dist-manifest before upload.")
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/preflight-token.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Tokenless credential preflight for the zenodo-deposit job.

          validate maps only inputs.* and cannot inspect secrets, so the credentialed job
          asserts the correct Zenodo token is present before the deposit step. Tokenless by
          design: it receives only the boolean presence of each token, never the value, and
          requires the sandbox token for a sandbox run and the production token otherwise.
          """

          from __future__ import annotations

          import os


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}


          def main() -> int:
              if _bool("PUBLISH_DRY_RUN_ENABLED"):
                  return 0
              sandbox = _bool("ZENODO_SANDBOX_ENABLED")
              present = _bool("ZENODO_SANDBOX_TOKEN_PRESENT" if sandbox else "ZENODO_TOKEN_PRESENT")
              if present:
                  return 0
              which = "zenodo-sandbox-token" if sandbox else "zenodo-token"
              target = "sandbox.zenodo.org" if sandbox else "zenodo.org"
              raise SystemExit(
                  f"The {which} secret is empty, but a real deposit to {target} needs it. "
                  "Store it as an environment secret on the bound zenodo-environment-name and "
                  "pass it with `secrets: inherit`, or run with publish-dry-run-enabled to "
                  "rehearse without a credential."
              )


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/zenodo_api.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Minimal DevFlows-owned client for the Zenodo REST deposition API.

          Drives the Zenodo REST API directly (developers.zenodo.org): create a deposition
          or a new version of a concept record, PUT metadata, read the reserved DOI, upload
          files to the deposition bucket, and POST the publish action. NO third-party action
          holds the token; the client is imported only by deposit.py in the credentialed
          zenodo-deposit job.

          The HTTP session is dependency-injected (any object exposing get/post/put/delete
          returning objects with status_code/json()/text), so unit tests exercise the full
          request logic against a fake session without a network or a real requests install.
          Only deposit.py's main() constructs a real requests.Session at run time.
          """

          from __future__ import annotations

          from pathlib import Path
          from typing import Any

          PRODUCTION_BASE = "https://zenodo.org/api"
          SANDBOX_BASE = "https://sandbox.zenodo.org/api"


          def base_url(*, sandbox: bool) -> str:
              return SANDBOX_BASE if sandbox else PRODUCTION_BASE


          def record_html_base(*, sandbox: bool) -> str:
              return "https://sandbox.zenodo.org" if sandbox else "https://zenodo.org"


          class ZenodoApiError(RuntimeError):
              """A Zenodo API request returned an error status."""


          def concept_recid(concept_doi: str) -> str:
              """Extract the numeric record id from a Zenodo concept DOI or bare recid."""
              value = concept_doi.strip()
              if not value:
                  raise ZenodoApiError("zenodo-concept-doi is empty.")
              tail = value.rsplit("zenodo.", 1)[-1] if "zenodo." in value else value
              tail = tail.strip().strip("/")
              if not tail.isdigit():
                  raise ZenodoApiError(
                      f"could not parse a Zenodo record id from zenodo-concept-doi {concept_doi!r}."
                  )
              return tail


          class ZenodoClient:
              """A thin wrapper over the Zenodo deposition REST endpoints."""

              def __init__(self, session: Any, *, base: str, token: str) -> None:
                  self._session = session
                  self._base = base.rstrip("/")
                  self._headers = {"Authorization": f"Bearer {token}"}

              # -- low-level ---------------------------------------------------------
              def _url(self, path: str) -> str:
                  return path if path.startswith("http") else f"{self._base}{path}"

              def _json(self, response: Any, *, ok: tuple[int, ...]) -> dict[str, Any]:
                  if response.status_code not in ok:
                      raise ZenodoApiError(
                          f"Zenodo API returned HTTP {response.status_code}: {_body(response)}"
                      )
                  try:
                      return dict(response.json())
                  except ValueError as error:
                      raise ZenodoApiError(f"Zenodo API response was not JSON: {error}.") from error

              def get(self, path: str) -> dict[str, Any]:
                  response = self._session.get(self._url(path), headers=self._headers)
                  return self._json(response, ok=(200,))

              # -- deposition lifecycle ---------------------------------------------
              def create_deposition(self, metadata: dict[str, Any]) -> dict[str, Any]:
                  response = self._session.post(
                      self._url("/deposit/depositions"),
                      headers=self._headers,
                      json={"metadata": metadata},
                  )
                  return self._json(response, ok=(200, 201))

              def new_version_draft(self, recid: str) -> dict[str, Any]:
                  """Open a new-version draft of a concept's latest record; return the draft."""
                  response = self._session.post(
                      self._url(f"/deposit/depositions/{recid}/actions/newversion"),
                      headers=self._headers,
                  )
                  parent = self._json(response, ok=(201, 200))
                  draft_url = ((parent.get("links") or {}).get("latest_draft")) or ""
                  if not draft_url:
                      raise ZenodoApiError(f"newversion on record {recid} returned no links.latest_draft.")
                  return self.get(draft_url)

              def update_metadata(self, dep_id: Any, metadata: dict[str, Any]) -> dict[str, Any]:
                  response = self._session.put(
                      self._url(f"/deposit/depositions/{dep_id}"),
                      headers=self._headers,
                      json={"metadata": metadata},
                  )
                  return self._json(response, ok=(200,))

              def list_files(self, dep_id: Any) -> list[dict[str, Any]]:
                  response = self._session.get(
                      self._url(f"/deposit/depositions/{dep_id}/files"), headers=self._headers
                  )
                  if response.status_code not in (200,):
                      raise ZenodoApiError(f"listing files for deposition {dep_id} failed: {_body(response)}")
                  return list(response.json())

              def delete_file(self, dep_id: Any, file_id: Any) -> None:
                  response = self._session.delete(
                      self._url(f"/deposit/depositions/{dep_id}/files/{file_id}"),
                      headers=self._headers,
                  )
                  if response.status_code not in (204, 200):
                      raise ZenodoApiError(
                          f"deleting file {file_id} on deposition {dep_id} failed: {_body(response)}"
                      )

              def upload_file(self, bucket_url: str, name: str, path: Path) -> None:
                  with path.open("rb") as handle:
                      response = self._session.put(
                          f"{bucket_url.rstrip('/')}/{name}", headers=self._headers, data=handle
                      )
                  if response.status_code not in (200, 201):
                      raise ZenodoApiError(f"uploading {name} failed: {_body(response)}")

              def publish(self, dep_id: Any) -> dict[str, Any]:
                  response = self._session.post(
                      self._url(f"/deposit/depositions/{dep_id}/actions/publish"),
                      headers=self._headers,
                  )
                  return self._json(response, ok=(200, 202))


          def _body(response: Any) -> str:
              try:
                  return str(response.text)[:500]
              except Exception:  # pragma: no cover - defensive
                  return "<no body>"
          DEVFLOWS_SCRIPT_EOF
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/deposit.py" <<'DEVFLOWS_SCRIPT_EOF'
          """Zenodo deposition driver for the credentialed zenodo-deposit job.

          Consumes the resolved deposition-metadata JSON and asset list from prepare (this
          job never checks out), then drives the Zenodo REST API via the DevFlows-owned
          zenodo_api client: create a new deposition or a new version of a concept record,
          PUT metadata, reserve the DOI, replace or keep inherited files, upload the assets
          to the bucket, and POST publish ONLY when zenodo-publish-enabled. ZENODO_TOKEN is
          read from the environment on this single step; the real requests.Session is built
          only in main(), so the request logic is unit-tested against a fake session.
          """

          from __future__ import annotations

          import json
          import os
          import secrets as _secrets
          from pathlib import Path
          from typing import Any

          import zenodo_api


          def run_deposit(
              client: zenodo_api.ZenodoClient,
              metadata: dict[str, Any],
              asset_paths: list[Path],
              *,
              concept_doi: str,
              file_mode: str,
              publish: bool,
              sandbox: bool,
          ) -> dict[str, str]:
              """Create/update a deposition, upload assets, optionally publish; return outputs."""
              if concept_doi.strip():
                  recid = zenodo_api.concept_recid(concept_doi)
                  deposition = client.new_version_draft(recid)
                  deposition = client.update_metadata(deposition["id"], metadata)
              else:
                  deposition = client.create_deposition(metadata)

              dep_id = deposition["id"]
              links = deposition.get("links") or {}
              bucket = str(links.get("bucket") or "")
              if not bucket:
                  raise zenodo_api.ZenodoApiError(f"deposition {dep_id} exposed no upload bucket.")

              if concept_doi.strip() and file_mode == "replace":
                  for existing in client.list_files(dep_id):
                      client.delete_file(dep_id, existing.get("id"))

              for path in asset_paths:
                  client.upload_file(bucket, path.name, path)

              state = "draft"
              if publish:
                  client.publish(dep_id)
                  deposition = client.get(f"/deposit/depositions/{dep_id}")
                  state = "published"

              return _outputs(deposition, dep_id=dep_id, state=state, sandbox=sandbox)


          def _outputs(
              deposition: dict[str, Any], *, dep_id: Any, state: str, sandbox: bool
          ) -> dict[str, str]:
              meta = deposition.get("metadata") or {}
              reserved = meta.get("prereserve_doi") or {}
              doi = str(deposition.get("doi") or reserved.get("doi") or "")
              concept = str(deposition.get("conceptdoi") or "")
              links = deposition.get("links") or {}
              record_url = str(links.get("html") or links.get("record_html") or "")
              if not record_url:
                  record_url = f"{zenodo_api.record_html_base(sandbox=sandbox)}/records/{dep_id}"
              return {
                  "zenodo-doi": doi,
                  "zenodo-concept-doi": concept,
                  "zenodo-record-url": record_url,
                  "zenodo-deposition-id": str(dep_id),
                  "zenodo-state": state,
              }


          def main() -> int:
              if _bool("PUBLISH_DRY_RUN_ENABLED"):
                  print("publish-dry-run-enabled: zenodo-deposit makes no API calls.")
                  return 0

              token = os.environ.get("ZENODO_TOKEN", "")
              if not token:
                  raise SystemExit("ZENODO_TOKEN is empty; the credential preflight should have caught this.")
              metadata = json.loads(os.environ["DEPOSITION_METADATA"])
              asset_paths = [
                  Path(line.strip())
                  for line in os.environ.get("ZENODO_ASSET_LIST", "").splitlines()
                  if line.strip()
              ]
              sandbox = _bool("ZENODO_SANDBOX_ENABLED")

              import requests  # local import: real session only at run time.

              client = zenodo_api.ZenodoClient(
                  requests.Session(), base=zenodo_api.base_url(sandbox=sandbox), token=token
              )
              outputs = run_deposit(
                  client,
                  metadata,
                  asset_paths,
                  concept_doi=os.environ.get("ZENODO_CONCEPT_DOI", ""),
                  file_mode=os.environ.get("ZENODO_NEW_VERSION_FILE_MODE", "replace").strip() or "replace",
                  publish=_bool("ZENODO_PUBLISH_ENABLED"),
                  sandbox=sandbox,
              )
              _emit_outputs(outputs)
              print(
                  f"zenodo-release: deposition {outputs['zenodo-deposition-id']} ({outputs['zenodo-state']})."
              )
              return 0


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}


          def _emit_outputs(outputs: dict[str, str]) -> None:
              github_output = os.environ.get("GITHUB_OUTPUT")
              if not github_output:
                  return
              with open(github_output, "a", encoding="utf-8") as handle:
                  for name, value in outputs.items():
                      delimiter = f"ghadelim_{_secrets.token_hex(16)}"
                      handle.write(f"{name}<<{delimiter}\n{value}\n{delimiter}\n")


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Re-verify assets before upload
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          ZENODO_ASSET_SOURCE_PATH: ${{ inputs.zenodo-asset-source-path }}
          ARTIFACT_DOWNLOAD_PATH: ${{ inputs.artifact-download-path }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/dist_manifest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/hashing.py
          python "${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/reverify.py"
      - name: Assert Zenodo credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
          ZENODO_SANDBOX_ENABLED: ${{ inputs.zenodo-sandbox-enabled }}
          ZENODO_TOKEN_PRESENT: ${{ secrets.zenodo-token != '' }}
          ZENODO_SANDBOX_TOKEN_PRESENT: ${{ secrets.zenodo-sandbox-token != '' }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/preflight-token.py"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: false
      - name: Deposit to Zenodo
        id: deposit
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ZENODO_TOKEN: ${{ inputs.zenodo-sandbox-enabled && secrets.zenodo-sandbox-token || secrets.zenodo-token }}
          DEPOSITION_METADATA: ${{ needs.prepare.outputs.deposition-metadata }}
          ZENODO_ASSET_LIST: ${{ needs.prepare.outputs.zenodo-asset-list }}
          ZENODO_CONCEPT_DOI: ${{ inputs.zenodo-concept-doi }}
          ZENODO_NEW_VERSION_FILE_MODE: ${{ inputs.zenodo-new-version-file-mode }}
          ZENODO_PUBLISH_ENABLED: ${{ inputs.zenodo-publish-enabled }}
          ZENODO_SANDBOX_ENABLED: ${{ inputs.zenodo-sandbox-enabled }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/zenodo_api.py
          uv run --no-project --with "requests==2.32.5" python "${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/deposit.py"
  release:
    name: Create GitHub Release
    needs:
      - validate
      - prepare
      - zenodo-deposit
    if: ${{ !cancelled() && inputs.release-enabled && !inputs.publish-dry-run-enabled && needs.prepare.result == 'success' && (needs.zenodo-deposit.result == 'success' || needs.zenodo-deposit.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
      actions: read
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    environment:
      name: ${{ inputs.release-environment-name }}
      url: ${{ steps.release.outputs.release-url }}
    outputs:
      release-url: ${{ steps.release.outputs.release-url }}
    steps:
      - name: Download artifacts
        if: inputs.artifact-download-enabled
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.artifact-download-name }}
          artifact-ids: ${{ inputs.artifact-download-ids }}
          path: ${{ inputs.artifact-download-path }}
          pattern: ${{ inputs.artifact-download-pattern }}
          merge-multiple: ${{ inputs.artifact-download-merge-multiple }}
          github-token: ${{ secrets.artifact-download-token }}
          repository: ${{ inputs.artifact-download-repository }}
          run-id: ${{ inputs.artifact-download-run-id }}
          skip-decompress: ${{ inputs.artifact-download-skip-decompress }}
          digest-mismatch: ${{ inputs.artifact-download-digest-mismatch }}
      - name: Materialize DevFlows runtime scripts
        id: devflows-runtime
        shell: bash
        run: |-
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/devflows/zenodo-release"
          cat > "$RUNNER_TEMP/devflows/zenodo-release/release.py" <<'DEVFLOWS_SCRIPT_EOF'
          """GitHub Release driver for the release job (gh CLI, built-in GITHUB_TOKEN).

          Creates or updates a GitHub Release from release-tag per release-existing-mode
          (fail/update/skip), attaching the assets prepare resolved and wiring the draft /
          prerelease / latest / generate-notes / discussion-category flags. Ordered after
          zenodo-deposit so the minted or reserved DOI can be appended to the notes. NO
          checkout (prepare already read any notes file into the release-body output) and NO
          secret: gh authenticates with the workflow's GITHUB_TOKEN, never a token secret.
          The gh runner is injected so the flow is unit-tested against a fake gh.
          """

          from __future__ import annotations

          import os
          import secrets as _secrets
          import subprocess
          import tempfile
          from collections.abc import Callable
          from pathlib import Path

          GhResult = subprocess.CompletedProcess
          GhRunner = Callable[[list[str]], GhResult]


          def _real_gh(args: list[str]) -> GhResult:
              return subprocess.run(["gh", *args], capture_output=True, text=True, check=False)


          def _checked(gh: GhRunner, args: list[str]) -> str:
              result = gh(args)
              if result.returncode != 0:
                  raise SystemExit(f"gh {' '.join(args)} failed: {result.stderr or result.stdout}")
              return result.stdout or ""


          def release_exists(gh: GhRunner, tag: str) -> bool:
              return gh(["release", "view", tag, "--json", "url"]).returncode == 0


          def compose_body(base_body: str, *, append_doi: bool, doi: str, concept: str, state: str) -> str:
              if not append_doi or not doi:
                  return base_body
              label = "reserved" if state == "draft" else "registered"
              footer = ["", "---", f"Zenodo DOI ({label}): {doi}"]
              if concept:
                  footer.append(f"Concept DOI: {concept}")
              prefix = base_body.rstrip("\n")
              return (prefix + "\n" if prefix else "") + "\n".join(footer) + "\n"


          def _create_args(tag: str, notes_file: str, assets: list[str]) -> list[str]:
              args = ["release", "create", tag]
              args += assets
              args += ["--notes-file", notes_file]
              title = os.environ.get("RELEASE_TITLE", "").strip() or tag
              args += ["--title", title]
              target = os.environ.get("RELEASE_TARGET", "").strip()
              if target:
                  args += ["--target", target]
              if _bool("RELEASE_DRAFT_ENABLED"):
                  args.append("--draft")
              if _bool("RELEASE_PRERELEASE_ENABLED"):
                  args.append("--prerelease")
              args += ["--latest" if _bool("RELEASE_LATEST_ENABLED") else "--latest=false"]
              if _bool("RELEASE_GENERATE_NOTES_ENABLED"):
                  args.append("--generate-notes")
              category = os.environ.get("RELEASE_DISCUSSION_CATEGORY", "").strip()
              if category:
                  args += ["--discussion-category", category]
              return args


          def _edit_args(tag: str, notes_file: str) -> list[str]:
              args = ["release", "edit", tag, "--notes-file", notes_file]
              title = os.environ.get("RELEASE_TITLE", "").strip() or tag
              args += ["--title", title]
              args += ["--draft" if _bool("RELEASE_DRAFT_ENABLED") else "--draft=false"]
              args += ["--prerelease" if _bool("RELEASE_PRERELEASE_ENABLED") else "--prerelease=false"]
              args += ["--latest" if _bool("RELEASE_LATEST_ENABLED") else "--latest=false"]
              return args


          def perform_release(gh: GhRunner, *, base_body: str) -> str:
              tag = os.environ.get("RELEASE_TAG", "").strip()
              mode = os.environ.get("RELEASE_EXISTING_MODE", "fail").strip() or "fail"
              exists = release_exists(gh, tag)
              if exists and mode == "fail":
                  raise SystemExit(
                      f"a GitHub release already exists for {tag!r} and release-existing-mode is "
                      "'fail'; set 'update' or 'skip' to proceed."
                  )
              if exists and mode == "skip":
                  return _release_url(gh, tag)

              body = compose_body(
                  base_body,
                  append_doi=_bool("RELEASE_APPEND_DOI_ENABLED"),
                  doi=os.environ.get("ZENODO_DOI", "").strip(),
                  concept=os.environ.get("ZENODO_CONCEPT_DOI", "").strip(),
                  state=os.environ.get("ZENODO_STATE", "").strip(),
              )
              assets = [
                  line.strip()
                  for line in os.environ.get("RELEASE_ASSET_LIST", "").splitlines()
                  if line.strip()
              ]

              with tempfile.TemporaryDirectory() as tmp:
                  notes_file = str(Path(tmp) / "notes.md")
                  Path(notes_file).write_text(body, encoding="utf-8")
                  if exists:
                      _checked(gh, _edit_args(tag, notes_file))
                      if assets:
                          _checked(gh, ["release", "upload", tag, *assets, "--clobber"])
                  else:
                      _checked(gh, _create_args(tag, notes_file, assets))
              return _release_url(gh, tag)


          def _release_url(gh: GhRunner, tag: str) -> str:
              return _checked(gh, ["release", "view", tag, "--json", "url", "-q", ".url"]).strip()


          def main() -> int:
              if _bool("PUBLISH_DRY_RUN_ENABLED"):
                  print("publish-dry-run-enabled: the release job creates no GitHub release.")
                  return 0
              url = perform_release(_real_gh, base_body=os.environ.get("RELEASE_BODY", ""))
              _emit_outputs({"release-url": url})
              print(f"zenodo-release: GitHub release available at {url}")
              return 0


          def _bool(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}


          def _emit_outputs(outputs: dict[str, str]) -> None:
              github_output = os.environ.get("GITHUB_OUTPUT")
              if not github_output:
                  return
              with open(github_output, "a", encoding="utf-8") as handle:
                  for name, value in outputs.items():
                      delimiter = f"ghadelim_{_secrets.token_hex(16)}"
                      handle.write(f"{name}<<{delimiter}\n{value}\n{delimiter}\n")


          if __name__ == "__main__":
              raise SystemExit(main())
          DEVFLOWS_SCRIPT_EOF
          echo "script-root=$RUNNER_TEMP/devflows" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        id: release
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          GH_TOKEN: ${{ github.token }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
          RELEASE_TAG: ${{ inputs.release-tag }}
          RELEASE_TITLE: ${{ needs.prepare.outputs.release-title }}
          RELEASE_BODY: ${{ needs.prepare.outputs.release-body }}
          RELEASE_TARGET: ${{ inputs.release-target }}
          RELEASE_EXISTING_MODE: ${{ inputs.release-existing-mode }}
          RELEASE_DRAFT_ENABLED: ${{ inputs.release-draft-enabled }}
          RELEASE_PRERELEASE_ENABLED: ${{ inputs.release-prerelease-enabled }}
          RELEASE_LATEST_ENABLED: ${{ inputs.release-latest-enabled }}
          RELEASE_GENERATE_NOTES_ENABLED: ${{ inputs.release-generate-notes-enabled }}
          RELEASE_DISCUSSION_CATEGORY: ${{ inputs.release-discussion-category }}
          RELEASE_ASSET_LIST: ${{ needs.prepare.outputs.release-asset-list }}
          RELEASE_APPEND_DOI_ENABLED: ${{ inputs.release-append-doi-enabled }}
          ZENODO_DOI: ${{ needs.zenodo-deposit.outputs.zenodo-doi }}
          ZENODO_CONCEPT_DOI: ${{ needs.zenodo-deposit.outputs.zenodo-concept-doi }}
          ZENODO_STATE: ${{ needs.zenodo-deposit.outputs.zenodo-state }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/zenodo-release/release.py"

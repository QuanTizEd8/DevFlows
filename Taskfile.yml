version: "3"

# Taskfile is the single task registry for DevFlows. Every task body delegates to
# a pixi-provided tool via `pixi run -- <tool>` (pixi owns the toolchain; see
# pixi.toml). The only exceptions are gitleaks, which pixi cannot package and is
# resolved from PATH (devcontainer / `brew install gitleaks`), and the shell-lint
# helper scripts, which invoke pixi themselves.
#
# Requirements: `pixi` and `task` (this runner) must be installed. `task` is NOT a
# pixi dependency — install it from the devcontainer or `brew install go-task`.
# The `scenarios-local` task additionally needs docker + act.

tasks:
  # ---------------------------------------------------------------- formatting
  fmt:
    desc: Auto-format Python, shell, docs, and config files.
    cmds:
      - pixi run -- ruff format --config .config/ruff.toml .
      - bash .dev/scripts/fmt-shell.sh
      - pixi run -- prettier --config .config/prettierrc.yaml --ignore-path
        .config/.prettierignore --write .
      - pixi run -- taplo format pixi.toml .dev/pyproject.toml

  # ------------------------------------------------------------ generator tasks
  validate:
    desc: Validate workflow catalog metadata (devflow.yaml).
    cmds:
      - pixi run -- devflows validate

  sync:
    desc: Regenerate published .github/workflows from catalog sources.
    cmds:
      - pixi run -- devflows sync

  test-generate:
    desc: Regenerate hosted and local scenario test workflows.
    cmds:
      - pixi run -- devflows test-generate

  # ------------------------------------------------------------------ linting
  lint:
    desc: Run the full CI-parity lint suite.
    deps:
      - lint:generator
      - lint:python
      - lint:workflows
      - lint:yaml
      - lint:toml
      - lint:shell
      - lint:format
      - lint:secrets

  lint:generator:
    desc: Validate metadata and check generated-file drift.
    cmds:
      - pixi run -- devflows validate
      - pixi run -- devflows sync --check
      - pixi run -- devflows docs --check
      - pixi run -- devflows test-generate --check

  lint:python:
    desc: Lint and format-check Python sources with ruff.
    cmds:
      - pixi run -- ruff check --config .config/ruff.toml .
      - pixi run -- ruff format --config .config/ruff.toml --check .

  lint:workflows:
    desc: Lint GitHub Actions workflows with actionlint and zizmor.
    cmds:
      # actionlint scans the generated, runnable workflows. Source workflows
      # reference the generator-injected `devflows-runtime` step, so actionlint
      # cannot type-check them standalone; the sync drift check guarantees the
      # generated output faithfully reflects the sources it does scan.
      - pixi run -- actionlint .github/workflows/*.yaml
      # zizmor's security audits do not depend on injected steps, so it scans
      # BOTH the generated workflows and the source workflows, catching template
      # injection or unpinned-uses in sources before they are ever generated.
      - pixi run -- zizmor -c .config/zizmor.yml . workflows/*/workflow.yaml

  lint:yaml:
    desc: Lint YAML files with yamllint.
    cmds:
      - pixi run -- yamllint -c .config/yamllint.yaml .

  lint:toml:
    desc: Check TOML formatting with taplo.
    cmds:
      - pixi run -- taplo format --check pixi.toml .dev/pyproject.toml

  lint:shell:
    desc: Lint and format-check shell scripts (shellcheck + shfmt).
    cmds:
      - bash .dev/scripts/lint-shell.sh

  lint:format:
    desc: Check Prettier formatting of docs and config files.
    cmds:
      - pixi run -- prettier --config .config/prettierrc.yaml --ignore-path
        .config/.prettierignore --check .

  lint:secrets:
    desc: Scan the repository for committed secrets with gitleaks.
    cmds:
      - |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks detect --config .config/gitleaks.toml --no-banner --redact
        else
          echo "warning: gitleaks not found on PATH; skipping secret scan."
          echo "         Provided by the devcontainer, or 'brew install gitleaks' locally."
        fi

  # -------------------------------------------------------------------- testing
  test:
    desc: Run the Python unit test suite.
    cmds:
      # The pytest config lives in .config/ (passed with -c); --rootdir pins the
      # repo root so testpaths, nodeids, and the 'network' marker resolve there
      # rather than under .config/ (pytest would otherwise treat the config dir as
      # rootdir and lose testpaths).
      - pixi run -- pytest -c .config/pytest.ini --rootdir .

  test-contract:
    desc: >-
      Run the adapter contract test (network): fetch each pinned action's
      action.yml and assert the generator's emitted inputs still exist. CI runs
      this on pull requests that change an action pin or a consuming workflow.
    cmds:
      - pixi run -- pytest -c .config/pytest.ini --rootdir . -m network
        tests/package/test_contract.py

  scenarios-local:
    desc: Run local GitHub Actions scenarios with act (requires docker + act).
    aliases:
      - test-local
      - test:local
    cmds:
      - pixi run -- devflows test-local

  # ----------------------------------------------------------------------- docs
  docs:
    desc: Generate reference pages and build the Sphinx site.
    cmds:
      - pixi run -- devflows docs
      - pixi run -- sphinx-build -b html docs docs/_build/html

  docs-serve:
    desc: Serve the docs site locally with live rebuilds.
    aliases:
      - docs:serve
    cmds:
      - pixi run -- sphinx-autobuild docs docs/_build/html

  # -------------------------------------------------------------------- release
  release-check:
    desc: Validate release-please configuration against the catalog.
    aliases:
      - release:dry-run
      - release-dry-run
    cmds:
      - pixi run -- devflows release-check

  propagation-check:
    desc: >-
      Fail when a shared-generator change alters a published workflow without a
      change release-please can attribute to it. Diffs against DEVFLOWS_BASE_SHA
      (set in CI); a no-op when it is unset.
    cmds:
      - pixi run -- devflows propagation-check

  # ---------------------------------------------------------------- maintenance
  pixi-lock:
    desc: >-
      Refresh pixi.lock from pixi.toml (the reliable path when Renovate's
      experimental pixi manager lags). Review the diff before committing.
    cmds:
      - pixi lock

  env-lock:
    desc: >-
      Refresh the reproducible-environment locks (pixi.lock now; see
      docs/dev-guide/environment.md for the devcontainer feature and base-image
      digest refresh, which need docker / the devcontainer CLI).
    deps:
      - pixi-lock

  clean:
    desc: Remove generated docs, build artifacts, and tool caches.
    cmds:
      - rm -rf docs/_build docs/reference
      - rm -rf .pytest_cache .ruff_cache .coverage
      - rm -rf .devflows-test .devflows-test-artifacts .act/artifacts

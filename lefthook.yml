# Pre-commit hooks mirror the fast half of `task lint` (CI parity) against the
# files being committed. Every command runs through `pixi run --` so the pinned
# pixi toolchain is used wherever pixi is installed. Install the hooks with
# `pixi run -- lefthook install` (the devcontainer does this via postCreateCommand).
#
# Glob note: lefthook globs are separator-aware, so `*` does NOT cross `/` and a
# plain `*.py` matches only repo-root files (the previous globs silently skipped
# src/**, tests/**, and workflows/**). `{workflows,src}/**` matches everything
# under those trees, and the `{,**/}*.ext` idiom matches a type at the root AND
# at any depth. Verified empirically against staged src/tests/workflows files.
pre-commit:
  parallel: true
  commands:
    # -- Catalog metadata + generated-file drift (whole-catalog operations,
    #    gated to run only when catalog sources or generator code change) --
    validate:
      glob: "{workflows,src}/**"
      run: pixi run -- devflows validate
    sync-check:
      glob: "{workflows,src}/**"
      run: pixi run -- devflows sync --check
    docs-check:
      glob: "{workflows,src}/**"
      run: pixi run -- devflows docs --check
    test-generate-check:
      glob: "{workflows,src}/**"
      run: pixi run -- devflows test-generate --check

    # -- Format / lint checks on the changed files only (fast) --
    ruff-lint:
      glob: "{,**/}*.py"
      run: pixi run -- ruff check {staged_files}
    ruff-format:
      glob: "{,**/}*.py"
      run: pixi run -- ruff format --check {staged_files}
    prettier:
      glob: "{,**/}*.{md,json,yaml,yml}"
      run: pixi run -- prettier --check --ignore-unknown {staged_files}
    shell:
      glob: "{,**/}*.sh"
      run:
        pixi run -- shellcheck {staged_files} && pixi run -- shfmt -d
        {staged_files}

    # -- Secret scan of the staged diff (gitleaks is infra, not a pixi tool) --
    gitleaks:
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --no-banner --redact
        else
          echo "warning: gitleaks not found on PATH; skipping secret scan."
          echo "         Provided by the devcontainer, or 'brew install gitleaks' locally."
        fi

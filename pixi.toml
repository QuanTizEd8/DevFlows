[workspace]
name = "devflows"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]

# Pixi is the single source of every project tool (lint, format, test, docs).
# A contributor with only `pixi` and `task` installed can run everything here
# except the docker/act-dependent scenarios. The `task` binary itself is NOT a
# pixi dependency: it is installed by the devcontainer (or `brew install go-task`
# / equivalent locally) and drives this project via the Taskfile registry.
[dependencies]
actionlint = ">=1.7"
go-shfmt = ">=3.7"             # provides the `shfmt` binary
lefthook = ">=1.7"
myst-parser = ">=4"
jsonschema = ">=4"
pip = ">=24"
prettier = ">=3"
pydata-sphinx-theme = ">=0.16"
pytest = ">=8"
pytest-cov = ">=5"
python = ">=3.11,<3.14"
pyyaml = ">=6"
release-please = ">=17.10"
ruff = ">=0.6"
shellcheck = ">=0.10"
sphinx = ">=8"
sphinx-copybutton = ">=0.5"
sphinx-design = ">=0.6"
taplo = ">=0.10"
yamllint = ">=1.35"
zizmor = ">=1.0"
# Test-only: lets tests/test_python_build.py read a real .conda package (a zip of
# zstd tarballs) when exercising reindex-conda-channel.py. That script needs
# zstandard at workflow runtime too, where it is delivered by an ephemeral
# `uv run --with zstandard` (see collect.py), so it is not a runtime dependency of
# the DevFlows package itself.
zstandard = ">=0.22"

# gitleaks is intentionally NOT a pixi dependency: it has no conda-forge package
# and no real PyPI distribution (the `gitleaks` binary is a standalone Go release).
# It is provided as devcontainer infrastructure (see .devcontainer/Dockerfile) and,
# for local non-container use, via `brew install gitleaks` / the official release.
# The lint:secrets task and the pre-commit hook find it on PATH and skip with a
# warning when it is absent, so the pixi-only lint path still succeeds.
[pypi-dependencies]
devflows = { path = ".", editable = true }
sphinx-autobuild = ">=2024.10"

[workspace]
name = "devflows"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[dependencies]
python = ">=3.11,<3.14"
pip = ">=24"
pyyaml = ">=6"
pytest = ">=8"
pytest-cov = ">=5"
yamllint = ">=1.35"
prettier = ">=3"
actionlint = ">=1.7"
taplo = ">=0.10"
release-please = ">=17.10"
sphinx = ">=8"
myst-parser = ">=4"
pydata-sphinx-theme = ">=0.16"
sphinx-copybutton = ">=0.5"
sphinx-design = ">=0.6"

[pypi-dependencies]
devflows = { path = ".", editable = true }
zizmor = ">=1.0"
sphinx-autobuild = ">=2024.10"

[tasks]
fmt = "ruff format . && bash scripts/fmt-shell.sh && prettier --write '**/*.{json,md,yml,yaml}' && taplo format pixi.toml pyproject.toml"
lint = "devflows validate && devflows sync --check && devflows docs --check && devflows test-generate --check && actionlint .github/workflows/*.yaml && ruff check . && ruff format --check . && yamllint . && taplo format --check pixi.toml pyproject.toml && bash scripts/lint-shell.sh && zizmor ."
test = "pytest"
test-local = "devflows test-local"
docs = "devflows docs && sphinx-build -b html docs docs/_build/html"
docs-serve = "sphinx-autobuild docs docs/_build/html"
release-dry-run = "devflows release-check"

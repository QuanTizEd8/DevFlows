name: Build Devcontainer

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-devcontainer:
    uses: owner/devflows/.github/workflows/build-devcontainer.yaml@build-devcontainer/v1
    with:
      image-name: ghcr.io/owner/project-devcontainer
      image-tag: latest
      image-sha-tag-enabled: true
      build-matrix: |
        [
          {
            "runner": "ubuntu-latest",
            "platform": "linux/amd64",
            "platform_tag": "linux-amd64"
          },
          {
            "runner": "ubuntu-24.04-arm",
            "platform": "linux/arm64",
            "platform_tag": "linux-arm64"
          }
        ]
      devcontainer-config-file: .devcontainer/devcontainer.json
      prepare-command: |
        ./scripts/prepare-devcontainer-build.sh
    secrets:
      docker-password: ${{ secrets.GITHUB_TOKEN }}

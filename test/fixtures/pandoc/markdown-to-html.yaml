name: Pandoc Markdown to HTML caller

on:
  workflow_dispatch:

jobs:
  convert:
    uses: owner/devflows/.github/workflows/pandoc.yaml@pandoc/v1
    with:
      pandoc-image: pandoc/core:3.8
      pandoc-arguments: >-
        --standalone --output=output/example.html input/example.md
      artifact-upload-enabled: true
      artifact-upload-name: pandoc-html
      artifact-upload-path: output/example.html

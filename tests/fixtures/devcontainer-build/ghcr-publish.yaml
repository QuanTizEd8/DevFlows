name: Devcontainer Build

on:
  workflow_dispatch:

# devcontainer-build declares actions: read, contents: read, and packages: write;
# GitHub validates the nested permissions before the run starts.
permissions:
  actions: read
  contents: read
  packages: write

jobs:
  devcontainer-build:
    # Replace devcontainer-build/v0.1.0 with the latest released tag.
    uses: QuanTizEd8/DevFlows/.github/workflows/devcontainer-build.yaml@devcontainer-build/v0.1.0
    with:
      image-name: ghcr.io/owner/project-devcontainer
      image-tags: |
        latest
        ${{ github.ref_name }}
      image-sha-tag-enabled: true
      build-matrix: |
        [
          {
            "runner": "ubuntu-latest",
            "platform": "linux/amd64",
            "platform_tag": "linux-amd64"
          },
          {
            "runner": "ubuntu-24.04-arm",
            "platform": "linux/arm64",
            "platform_tag": "linux-arm64"
          }
        ]
      devcontainer-config-file: .devcontainer/devcontainer.json
      prepare-command: |
        ./scripts/prepare-devcontainer-build.sh
    secrets:
      docker-password: ${{ secrets.GITHUB_TOKEN }}

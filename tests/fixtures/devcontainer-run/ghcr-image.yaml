name: Devcontainer Run pre-commit then commit fixes

on:
  workflow_dispatch:

# No top-level grant: each job asks only for what it needs. The run job is
# read-only (contents: read, actions: read from the channels, packages: read for
# a private ghcr pull); only the writeback job holds contents: write.
permissions: {}

jobs:
  # Run pre-commit inside the prebuilt image and capture any files it rewrote as a
  # patch artifact. The run job itself never needs a write scope.
  run:
    # Replace devcontainer-run/v0.1.0 with the latest released tag.
    uses: QuanTizEd8/DevFlows/.github/workflows/devcontainer-run.yaml@devcontainer-run/v0.1.0
    permissions:
      actions: read
      contents: read
      packages: read
    with:
      # A prebuilt image published by devcontainer-build (or any image carrying a
      # devcontainer.metadata label). Pulled without a rebuild; its features and
      # lifecycle hooks are applied from the label automatically.
      devcontainer-image: ghcr.io/owner/project-devcontainer:latest
      run-command: |
        pre-commit run --all-files
      container-env: |
        CI=true
      docker-login-enabled: true
      patch-emit-enabled: true
      patch-artifact-name: devcontainer-run-fixes
    secrets:
      docker-password: ${{ secrets.GITHUB_TOKEN }}

  # Apply the captured fixes to the branch and push -- the sole contents: write job.
  commit:
    needs: run
    # Replace writeback/v0.1.0 with the latest released writeback tag.
    uses: QuanTizEd8/DevFlows/.github/workflows/writeback.yaml@writeback/v0.1.0
    permissions:
      contents: write
      actions: read
    with:
      patch-artifact-name: devcontainer-run-fixes
      commit-message: "style: apply pre-commit fixes"

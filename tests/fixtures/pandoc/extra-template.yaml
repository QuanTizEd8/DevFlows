name: Pandoc Extra image caller

on:
  workflow_dispatch:

# Pandoc's published form embeds a writeback commit job; GitHub validates the
# nested permissions before the run starts, so grant the union even here.
permissions:
  contents: write
  actions: read

jobs:
  convert:
    # Replace pandoc/v0.1.0 with the latest released tag (0.x has no moving tags).
    uses: QuanTizEd8/DevFlows/.github/workflows/pandoc.yaml@pandoc/v0.1.0
    with:
      pandoc-image: pandoc/extra:3.8
      pandoc-arguments: >-
        README.md --output=output/README.pdf --standalone
        --template=/.pandoc/templates/eisvogel.latex --listings
      artifact-upload-enabled: true
      artifact-upload-name: pandoc-extra-pdf
      artifact-upload-path: output/README.pdf

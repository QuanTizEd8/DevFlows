name: Pandoc Markdown to HTML caller

on:
  workflow_dispatch:

# Pandoc is read-only: its checkout, artifact, and patch-emit channels add only
# actions: read, so a calling job grants contents: read, actions: read. No
# contents: write is forced on the caller anymore.
permissions:
  contents: read
  actions: read

jobs:
  convert:
    # Replace pandoc/v0.1.0 with the latest released tag (0.x has no moving tags).
    uses: QuanTizEd8/DevFlows/.github/workflows/pandoc.yaml@pandoc/v0.1.0
    with:
      pandoc-image: pandoc/core:3.8
      pandoc-arguments: >-
        --standalone --output=output/example.html input/example.md
      artifact-upload-enabled: true
      artifact-upload-name: pandoc-html
      artifact-upload-path: output/example.html

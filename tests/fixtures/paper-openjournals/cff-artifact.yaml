name: Open Journals CITATION.cff caller

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build-cff:
    # Replace paper-openjournals/v0.1.0 with the latest released tag (0.x has no moving tags).
    uses: QuanTizEd8/DevFlows/.github/workflows/paper-openjournals.yaml@paper-openjournals/v0.1.0
    with:
      paper-journal: jose
      paper-source-path: paper/paper.md
      paper-flavors: cff
      paper-output-directory: paper-build
      artifact-upload-enabled: true
      artifact-upload-name: paper-cff
      artifact-upload-path: paper-build
      artifact-upload-if-no-files-found: error

name: Build, stage to TestPyPI, then release to PyPI

on:
  release:
    types:
      - published

# pypi-publish's publish job statically declares id-token: write, and its verify
# job uses the artifact-download channel (actions: read); the generator also grants
# the io host job contents: read. GitHub validates these nested permissions before
# the run starts, so every calling job must grant the full union. python-build
# needs actions: read + contents: read.
permissions: {}

jobs:
  build:
    name: Build distributions
    # Replace python-build/v0.1.0 with the latest released tag (0.x has no moving tags).
    uses: QuanTizEd8/DevFlows/.github/workflows/python-build.yaml@python-build/v0.1.0
    permissions:
      actions: read
      contents: read
    with:
      build-sdist-enabled: true
      build-wheel-enabled: true
      dist-artifact-prefix: my-package

  stage-testpypi:
    name: Stage to TestPyPI
    needs: build
    # Replace pypi-publish/v0.1.0 with the latest released tag (0.x has no moving tags).
    uses: QuanTizEd8/DevFlows/.github/workflows/pypi-publish.yaml@pypi-publish/v0.1.0
    permissions:
      actions: read
      contents: read
      id-token: write
    with:
      publish-index: testpypi
      publish-environment-name: testpypi
      # Chain the integrity contract straight from python-build.
      publish-dist-manifest: ${{ needs.build.outputs.dist-manifest }}
      publish-expected-version: ${{ needs.build.outputs.package-version }}
      # Ingest both named artifacts into one directory (the canonical brace pattern).
      artifact-download-enabled: true
      artifact-download-pattern: my-package-{sdist,wheels}
      artifact-download-merge-multiple: true
      artifact-download-path: dist
      publish-dist-path: dist
      # Prove the staged release installs and imports before promoting it.
      install-check-enabled: true
      install-check-import-names: |
        my_package

  release-pypi:
    name: Release to PyPI
    needs:
      - build
      - stage-testpypi
    uses: QuanTizEd8/DevFlows/.github/workflows/pypi-publish.yaml@pypi-publish/v0.1.0
    permissions:
      actions: read
      contents: read
      id-token: write
    with:
      publish-index: pypi
      publish-environment-name: pypi
      publish-dist-manifest: ${{ needs.build.outputs.dist-manifest }}
      publish-expected-version: ${{ needs.build.outputs.package-version }}
      artifact-download-enabled: true
      artifact-download-pattern: my-package-{sdist,wheels}
      artifact-download-merge-multiple: true
      artifact-download-path: dist
      publish-dist-path: dist

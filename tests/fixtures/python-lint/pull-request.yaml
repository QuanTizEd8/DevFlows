name: Python Lint caller

on:
  pull_request:
  push:
    branches:
      - main

# The lint job runs read-only, but the generator's artifact-download/upload
# channels add actions: read to it; GitHub validates called-workflow permissions
# before the run, so grant the union on the calling job.
permissions:
  contents: read
  actions: read

jobs:
  lint:
    # Replace python-lint/v0.1.0 with the latest released tag (0.x has no moving tags).
    uses: QuanTizEd8/DevFlows/.github/workflows/python-lint.yaml@python-lint/v0.1.0
    with:
      lint-paths: |
        src
        tests
      ruff-version: 0.14.2
      typecheck-tool: mypy
      typecheck-version: 1.18.2
      typecheck-python-versions: '["3.11", "3.13"]'

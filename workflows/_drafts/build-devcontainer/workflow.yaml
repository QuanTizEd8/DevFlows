# Build and push a multi-arch devcontainer image to GHCR.

name: Build & Deploy Devcontainer

on:
  workflow_call:
    inputs:
      config:
        type: string
        required: true
        description: |-
          JSON object with the following fields:
          - `registry` (str): Container registry hostname, e.g. `ghcr.io`.
          - `image_name` (str): Full image reference, e.g. `ghcr.io/owner-name/repo-name`.
          - `image_tag` (str): Tag to apply (e.g. `latest`, `branch-<name>`);
            used as base tag, with `-<platform_tag>` appended per-platform.
          - `tag_is_latest` (bool): `true` when `image_tag` is `"latest"`.
            When `true`, an immutable `sha-<commit>` tag is also pushed.
          - `config_dir` (str): Relative path to the directory
            containing `devcontainer.json`, e.g. `.devcontainer`.
          - `userdata_dir` (str): Absolute path on the runner
            for devcontainer user data, e.g. `/tmp/devcontainer-userdata`.
          - `cache_ref_prefix` (str): Prefix for registry cache references, e.g. `cache`.
          - `build_matrix` (array): List of platform entries, each with:
            - `runner` (str): GitHub Actions runner label, e.g. `ubuntu-latest`.
            - `platform` (str): Docker platform pair, e.g. `linux/amd64`.
            - `platform_tag` (str): Slug used in image tags and cache references, e.g. `linux-amd64`.
jobs:

  build-devcontainer:
    # Build and push separate images for each platform.
    name: Build (${{ matrix.platform }})
    strategy:
      matrix:
        include: ${{ fromJSON(inputs.config).build_matrix }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Repository Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install manager
        run: pip install .dev/lib

      - name: Build Artifacts
        # Build `src/` so that local features can be resolved.
        run: proman-sync

      - name: GHCR Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ fromJSON(inputs.config).registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx Setup
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          use: true

      - name: Caching
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ fromJSON(inputs.config).userdata_dir }}
          key: ${{ fromJSON(inputs.config).cache_ref_prefix }}-${{ matrix.platform_tag }}-${{ hashFiles(format('{0}/**', fromJSON(inputs.config).config_dir)) }}
          restore-keys: ${{ fromJSON(inputs.config).cache_ref_prefix }}-${{ matrix.platform_tag }}-

      - name: Build & Push
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
        with:
          imageName: ${{ fromJSON(inputs.config).image_name }}
          imageTag: ${{ fromJSON(inputs.config).image_tag }}-${{ matrix.platform_tag }}
          configFile: ${{ fromJSON(inputs.config).config_dir }}/devcontainer.json
          userDataFolder: ${{ fromJSON(inputs.config).userdata_dir }}
          cacheFrom: ${{ fromJSON(inputs.config).image_name }}:${{ fromJSON(inputs.config).cache_ref_prefix }}-${{ matrix.platform_tag }}
          cacheTo: type=registry,ref=${{ fromJSON(inputs.config).image_name }}:${{ fromJSON(inputs.config).cache_ref_prefix }}-${{ matrix.platform_tag }},mode=max
          push: always

  merge-devcontainer:
    # Create and push a single multi-arch manifest
    # that references both platform-specific images built in the previous job.
    name: Multi-Arch Merge
    needs: [build-devcontainer]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: GHCR Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ fromJSON(inputs.config).registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx Setup
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          use: true

      - name: Manifest Creation & Push
        env:
          IMAGE: ${{ fromJSON(inputs.config).image_name }}
          TAG: ${{ fromJSON(inputs.config).image_tag }}
          TAG_IS_LATEST: ${{ fromJSON(inputs.config).tag_is_latest }}
          CONFIG: ${{ inputs.config }}
          SHA: ${{ github.sha }}
        run: |
          ARCH_IMAGES=()
          while IFS= read -r ptag; do
            ARCH_IMAGES+=("${IMAGE}:${TAG}-${ptag}")
          done < <(echo "${CONFIG}" | jq -r '.build_matrix[].platform_tag')
          docker buildx imagetools create -t "${IMAGE}:${TAG}" "${ARCH_IMAGES[@]}"
          # Push immutable sha tag only for latest (main-branch builds)
          if [[ "${TAG_IS_LATEST}" == "true" ]]; then
            docker buildx imagetools create -t "${IMAGE}:sha-${SHA}" "${ARCH_IMAGES[@]}"
          fi

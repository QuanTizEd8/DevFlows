name: Build Docs

on:
  workflow_call:
    inputs:
      config:
        type: string
        required: true

jobs:

  build-docs:
    name: Docs
    if: fromJSON(inputs.config).enabled == true
    runs-on: ubuntu-latest
    container:
      image: ${{ fromJSON(inputs.config).ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history required by sphinx-last-updated-by-git.
          fetch-depth: 0

      - name: Build
        run: just build-docs-pkg

      - name: Upload GH Pages Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ fromJSON(inputs.config).artifact.name }}
          path: ${{ fromJSON(inputs.config).artifact.path }}
          retention-days: ${{ fromJSON(inputs.config).artifact.retention_days }}

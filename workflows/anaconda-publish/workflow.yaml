name: "[Reusable]: Anaconda Publish"

on:
  workflow_call:
    inputs:
      publish-owner:
        description:
          anaconda.org user or organization every operation targets; the only source of the owner
          segment, so no spec can reach another namespace. Validated non-empty and charset-safe.
        type: string
        required: true
      publish-dry-run-enabled:
        description:
          Credential-free rehearsal mode -- verify runs fully (digest verification plus plan
          computation) while upload, promote, and maintain are skipped at the job level and no token
          is required; the plan is reported through the outputs and job summary.
        type: boolean
        required: false
        default: false
      publish-client-version:
        description:
          Exact anaconda-client version to install ephemerally; empty installs the pinned default.
          Pin for reproducible release pipelines.
        type: string
        required: false
        default: ""
      publish-server-url:
        description:
          Alternate anaconda API server URL (anaconda-client -s/--site) for on-prem repositories or an
          e2e mock index; empty uses anaconda.org. Environment-mediated, never shell-interpolated.
        type: string
        required: false
        default: ""
      publish-timeout-minutes:
        description:
          Maximum minutes applied as timeout-minutes on every job; raise for very large channels.
        type: number
        required: false
        default: 15
      publish-expected-version:
        description:
          Optional exact-match version guard -- verification fails unless every verified .conda parses
          to this version. The internal single-consistent-version check always runs regardless.
        type: string
        required: false
        default: ""
      publish-dist-manifest:
        description:
          python-build's schema-1 dist-manifest JSON; required when upload-enabled. Every kind=conda
          entry is verified byte-for-byte (sha256 and size) against the downloaded files, and
          artifacts.conda-channel must equal artifact-download-name.
        type: string
        required: false
        default: ""
      publish-dist-path:
        description:
          Workspace-relative directory the conda channel is downloaded into and verified from
          (typically equal to artifact-download-path); required when upload-enabled. Validated
          workspace-contained.
        type: string
        required: false
        default: ""
      upload-enabled:
        description:
          Whether to run the verify and upload jobs (stage packages under upload-label). Set false for
          a promote-only or maintain call.
        type: boolean
        required: false
        default: true
      upload-label:
        description:
          anaconda.org label packages are uploaded under (anaconda upload --label) -- the staging
          safety net before promote relabels them. Validated label-safe and distinct from
          promote-label.
        type: string
        required: false
        default: staging
      upload-existing-mode:
        description:
          Collision handling when a file already exists -- 'fail' (default, anaconda-client errors),
          'skip' (--skip-existing), or 'overwrite' (--force, the only route to --force). Validated.
        type: string
        required: false
        default: fail
      upload-arguments:
        description:
          Extra anaconda upload arguments, shlex-split and guarded by a strict allowlist -- only the
          cosmetic/metadata flags --no-progress, --no-register, --register, --keep-basename,
          --summary=VALUE, and --description=VALUE are accepted. Everything DevFlows owns is rejected.
        type: string
        required: false
        default: ""
      upload-environment-name:
        description:
          GitHub environment the upload job binds to; put staging protection rules and the token
          secret here.
        type: string
        required: false
        default: anaconda-staging
      promote-enabled:
        description:
          Whether to run the promote job relabeling packages from upload-label to promote-label.
          Chained mode derives specs from the verified upload set; standalone mode requires
          promote-specs.
        type: boolean
        required: false
        default: false
      promote-label:
        description:
          Final label packages are promoted to (anaconda move --to-label); must differ from
          upload-label.
        type: string
        required: false
        default: main
      promote-specs:
        description:
          Newline-separated 'package/version' or 'package/version/filename' specs to promote, without
          an owner segment (publish-owner is prepended). Empty in chained mode; required for a
          promote-only call.
        type: string
        required: false
        default: ""
      promote-environment-name:
        description:
          GitHub environment the promote job binds to; the irreversible public-release gate, so
          configure required reviewers here.
        type: string
        required: false
        default: anaconda-release
      maintain-enabled:
        description:
          Whether to run the destructive maintain job (anaconda remove --force). Mutually exclusive
          with upload-enabled and promote-enabled; requires maintain-remove-specs and (unless dry-run)
          maintain-confirm.
        type: boolean
        required: false
        default: false
      maintain-remove-specs:
        description:
          Newline-separated 'package/version' or 'package/version/filename' specs to remove, without
          an owner segment. Removal is irreversible; rehearse with publish-dry-run-enabled first.
        type: string
        required: false
        default: ""
      maintain-confirm:
        description:
          Arm switch for destructive removal -- must equal publish-owner exactly
          (type-the-name-to-delete) or validation fails. Not required in dry-run.
        type: string
        required: false
        default: ""
      maintain-environment-name:
        description:
          GitHub environment the maintain job binds to; give it the strictest protection rules.
        type: string
        required: false
        default: anaconda-maintain
    secrets:
      anaconda-token:
        description:
          anaconda.org API token (api:write on the target owner) for upload/move/remove. required
          false because dry-run needs none; exposed as ANACONDA_API_TOKEN only on each credentialed
          job's single CLI step.
        required: false
    outputs:
      package-version:
        description:
          Version parsed from the verified .conda filenames (empty for promote-only/maintain calls);
          mirrors python-build's package-version and is honest in dry-run.
        value: ${{ jobs.verify.outputs.package-version }}
      staged-specs:
        description:
          Newline-separated owner/package/version specs uploaded (or, in dry-run, planned) to
          upload-label; feed a later promote-only call's promote-specs. Empty when upload-enabled is
          false.
        value: ${{ jobs.verify.outputs.staged-specs }}
      uploaded-files:
        description:
          Newline-separated .conda file names that passed digest verification and were uploaded (or
          would be, in dry-run). Empty when upload-enabled is false.
        value: ${{ jobs.verify.outputs.uploaded-files }}
      promoted-specs:
        description:
          Newline-separated owner-qualified specs relabeled from upload-label to promote-label (or, in
          dry-run, planned). Empty when promote-enabled is false.
        value: ${{ jobs.verify.outputs.promoted-specs }}
      removed-specs:
        description:
          Newline-separated owner-qualified specs removed by maintain (or, in dry-run, planned). Empty
          when maintain-enabled is false.
        value: ${{ jobs.verify.outputs.removed-specs }}

permissions: {}

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    steps:
      - name: Validate inputs
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
          PUBLISH_TIMEOUT_MINUTES: ${{ inputs.publish-timeout-minutes }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          UPLOAD_ENABLED: ${{ inputs.upload-enabled }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          UPLOAD_EXISTING_MODE: ${{ inputs.upload-existing-mode }}
          UPLOAD_ARGUMENTS: ${{ inputs.upload-arguments }}
          PROMOTE_ENABLED: ${{ inputs.promote-enabled }}
          PROMOTE_LABEL: ${{ inputs.promote-label }}
          PROMOTE_SPECS: ${{ inputs.promote-specs }}
          MAINTAIN_ENABLED: ${{ inputs.maintain-enabled }}
          MAINTAIN_REMOVE_SPECS: ${{ inputs.maintain-remove-specs }}
          MAINTAIN_CONFIRM: ${{ inputs.maintain-confirm }}
          ARTIFACT_DOWNLOAD_ENABLED: ${{ inputs.artifact-download-enabled }}
          ARTIFACT_DOWNLOAD_NAME: ${{ inputs.artifact-download-name }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/parsing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/arguments.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/manifest.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/validate-inputs.py"

  verify:
    name: Verify distributions and compute plan
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      actions: read
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    outputs:
      package-version: ${{ steps.verify.outputs.package-version }}
      staged-specs: ${{ steps.verify.outputs.staged-specs }}
      uploaded-files: ${{ steps.verify.outputs.uploaded-files }}
      promoted-specs: ${{ steps.verify.outputs.promoted-specs }}
      removed-specs: ${{ steps.verify.outputs.removed-specs }}
    steps:
      - name: Verify distributions and compute plan
        id: verify
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          UPLOAD_ENABLED: ${{ inputs.upload-enabled }}
          PROMOTE_ENABLED: ${{ inputs.promote-enabled }}
          PROMOTE_SPECS: ${{ inputs.promote-specs }}
          MAINTAIN_ENABLED: ${{ inputs.maintain-enabled }}
          MAINTAIN_REMOVE_SPECS: ${{ inputs.maintain-remove-specs }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/parsing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/manifest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/digest.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/verify-dist.py"

  upload:
    name: Upload to anaconda.org
    needs:
      - validate
      - verify
    if: ${{ !inputs.publish-dry-run-enabled && inputs.upload-enabled }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    environment:
      name: ${{ inputs.upload-environment-name }}
    concurrency:
      group: anaconda-publish-${{ inputs.upload-environment-name }}
      cancel-in-progress: false
    steps:
      - name: Re-verify distributions before upload
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/parsing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/manifest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/digest.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/reverify.py"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Assert publishing credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_TOKEN_PRESENT: ${{ secrets.anaconda-token != '' }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/preflight-token.py"

      - name: Upload to anaconda.org
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_API_TOKEN: ${{ secrets.anaconda-token }}
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          UPLOAD_EXISTING_MODE: ${{ inputs.upload-existing-mode }}
          UPLOAD_ARGUMENTS: ${{ inputs.upload-arguments }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/parsing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/arguments.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/manifest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/digest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/upload.py"

  promote:
    name: Promote to the final label
    needs:
      - validate
      - verify
      - upload
    # Never promote a partial upload: verify must have succeeded and upload must be
    # success-or-skipped (skipped is the promote-only path). Dry-run skips this job.
    if: >-
      ${{ !cancelled()
      && !inputs.publish-dry-run-enabled
      && inputs.promote-enabled
      && needs.validate.result == 'success'
      && needs.verify.result == 'success'
      && (needs.upload.result == 'success' || needs.upload.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    environment:
      name: ${{ inputs.promote-environment-name }}
    concurrency:
      group: anaconda-publish-${{ inputs.promote-environment-name }}
      cancel-in-progress: false
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Assert publishing credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_TOKEN_PRESENT: ${{ secrets.anaconda-token != '' }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/preflight-token.py"

      - name: Promote on anaconda.org
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_API_TOKEN: ${{ secrets.anaconda-token }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          PROMOTE_LABEL: ${{ inputs.promote-label }}
          PROMOTED_SPECS: ${{ needs.verify.outputs.promoted-specs }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/promote.py"

  maintain:
    name: Remove packages (destructive)
    needs:
      - validate
      - verify
    if: ${{ !inputs.publish-dry-run-enabled && inputs.maintain-enabled }}
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    environment:
      name: ${{ inputs.maintain-environment-name }}
    concurrency:
      group: anaconda-publish-${{ inputs.maintain-environment-name }}
      cancel-in-progress: false
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Assert publishing credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_TOKEN_PRESENT: ${{ secrets.anaconda-token != '' }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/preflight-token.py"

      - name: Remove from anaconda.org
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_API_TOKEN: ${{ secrets.anaconda-token }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          REMOVED_SPECS: ${{ needs.verify.outputs.removed-specs }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/maintain.py"

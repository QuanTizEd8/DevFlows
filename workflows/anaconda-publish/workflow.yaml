name: "[Reusable]: Anaconda Publish"

on:
  workflow_call:
    inputs:
      publish-owner:
        description:
          anaconda.org user or organization every operation targets. The ONLY source of the owner
          segment - anaconda upload --user, and the <owner>/ prefix prepended to every promote and
          maintain spec - so a call can never touch another namespace via a smuggled spec. Validated
          non-empty and charset-safe.
        type: string
        required: true
      publish-dry-run-enabled:
        description:
          When true, the verify job runs fully (digest verification plus plan computation) and the
          upload, promote, and maintain jobs are SKIPPED at the job level - no environment is bound,
          no deployment record is created, no reviewer is pinged, and the anaconda-token secret is not
          required. The plan (versions, specs, exact argv) is reported through the outputs and the job
          summary. The credential-free rehearsal mode.
        type: boolean
        required: false
        default: false
      publish-client-version:
        description:
          Exact anaconda-client version to install (ephemerally, via a pinned uv). Empty installs the
          workflow's pinned default. Pin for reproducible release pipelines (mirrors
          build-tool-version).
        type: string
        required: false
        default: ""
      publish-server-url:
        description:
          Alternate anaconda API server URL (anaconda-client -s/--site) for on-prem Anaconda
          repositories or a staging/mock index in end-to-end tests. Empty uses anaconda.org.
          Environment-mediated, never shell-interpolated.
        type: string
        required: false
        default: ""
      publish-timeout-minutes:
        description:
          Maximum minutes applied as timeout-minutes on every job. Uploads are light; raise for very
          large channels.
        type: number
        required: false
        default: 15
      publish-expected-version:
        description:
          Optional exact-match version guard. When non-empty, verification fails unless every verified
          .conda package parses to this exact version, making tag/artifact skew impossible before an
          irreversible upload. The internal single-consistent-version check always runs regardless.
        type: string
        required: false
        default: ""
      publish-dist-manifest:
        description:
          The dist-manifest JSON output of python-build (schema 1, a files array of
          name/sha256/size/kind objects, and an artifacts map of sdist/wheels/conda-channel). Required
          when upload-enabled - publishing without a digest manifest is refused by design. Every
          kind=conda entry must match a downloaded file byte-for-byte (sha256 AND size) and vice versa,
          and artifacts.conda-channel must equal artifact-download-name.
        type: string
        required: false
        default: ""
      publish-dist-path:
        description:
          Workspace-relative directory the conda channel is downloaded into and verified from; callers
          typically set it equal to artifact-download-path. Validated workspace-contained. Required
          when upload-enabled.
        type: string
        required: false
        default: ""
      upload-enabled:
        description:
          Whether to run the verify and upload jobs (stage packages under upload-label). Requires
          publish-dist-manifest, publish-dist-path, and the artifact-download channel. Set false for a
          promote-only or maintain call.
        type: boolean
        required: false
        default: true
      upload-label:
        description:
          anaconda.org label packages are uploaded under (anaconda upload --label). The staged-publish
          safety net - nothing lands on the default install label until promote relabels it. Validated
          non-empty, label-safe, and distinct from promote-label when promote-enabled.
        type: string
        required: false
        default: staging
      upload-existing-mode:
        description:
          What to do when a file already exists on the channel. 'fail' (default - pass neither flag,
          anaconda-client errors loudly), 'skip' (--skip-existing, for idempotent re-runs of a
          partially-failed publish), or 'overwrite' (--force). Maps onto anaconda-client's
          mutually-exclusive mode group; 'overwrite' is the only route to --force. Validated.
        type: string
        required: false
        default: fail
      upload-arguments:
        description:
          Extra arguments appended to anaconda upload. Passed through an environment variable and
          shlex-split by a DevFlows script; never shell-interpolated. Guarded by a strict allowlist
          rather than a denylist (which argparse defeats via attached short values, long-flag
          abbreviations, and bare positionals). Only the cosmetic/metadata flags --no-progress,
          --no-register, --register, --keep-basename, --summary=VALUE, and --description=VALUE are
          accepted, each as --flag or --flag=value. Everything else - the owner, label, version,
          collision mode, token, site, and file paths - is owned by typed inputs and rejected here.
        type: string
        required: false
        default: ""
      upload-environment-name:
        description:
          GitHub environment the upload job binds to. Deployment protection rules and required
          reviewers on this environment gate staging uploads; store the token as an environment secret
          here (pass it with `secrets inherit`) for tightest scoping.
        type: string
        required: false
        default: anaconda-staging
      promote-enabled:
        description:
          Whether to run the promote job relabeling packages from upload-label to promote-label
          (anaconda move). Chained mode (with upload-enabled) derives specs from the verified upload
          set and never runs on a partial upload; standalone mode (upload-enabled false) requires
          explicit promote-specs.
        type: boolean
        required: false
        default: false
      promote-label:
        description:
          Final label packages are promoted to (anaconda move --to-label). 'main' is what plain
          'conda install -c <owner>' resolves - promotion is the real publish event. Must differ from
          upload-label.
        type: string
        required: false
        default: main
      promote-specs:
        description:
          Newline-separated package specs to promote, each 'package/version' (all files of the version)
          or 'package/version/filename' (one file), WITHOUT an owner segment - publish-owner is
          prepended. Empty in chained mode (derived from this run's verified uploads); required for a
          promote-only call, typically fed from a previous run's staged-specs output.
        type: string
        required: false
        default: ""
      promote-environment-name:
        description:
          GitHub environment the promote job binds to. This is the irreversible public-release gate -
          configure required reviewers here even if staging is unreviewed.
        type: string
        required: false
        default: anaconda-release
      maintain-enabled:
        description:
          Whether to run the destructive maintain job (anaconda remove --force per spec). Mutually
          exclusive with upload-enabled and promote-enabled - a call either publishes or destroys,
          never both. Requires maintain-remove-specs and (unless dry-run) maintain-confirm.
        type: boolean
        required: false
        default: false
      maintain-remove-specs:
        description:
          Newline-separated specs to remove, each 'package/version' or 'package/version/filename',
          without an owner segment (publish-owner is prepended). Removal on anaconda.org is
          irreversible; run with publish-dry-run-enabled first to print the exact removals.
        type: string
        required: false
        default: ""
      maintain-confirm:
        description:
          Arm switch for destructive removal - must equal publish-owner exactly (the type-the-name-to-
          delete pattern) or validation fails. Not required in dry-run. Replaces the interactive
          confirmation prompt the cm draft relied on (which hangs and dies in CI).
        type: string
        required: false
        default: ""
      maintain-environment-name:
        description:
          GitHub environment the maintain job binds to. Give it the strictest protection rules - this
          job deletes published packages.
        type: string
        required: false
        default: anaconda-maintain
    secrets:
      anaconda-token:
        description:
          anaconda.org API token (scope api:write for upload/move/remove on the target owner). Declared
          required:false because dry-run needs no credential; every credentialed job runs a tokenless
          preflight that fails loudly when it is empty and publish-dry-run-enabled is false. Exposed as
          ANACONDA_API_TOKEN only on the single CLI step of each credentialed job, never to a
          third-party action.
        required: false
    outputs:
      package-version:
        description:
          Version parsed from the verified .conda filenames, cross-checked for consistency (empty for
          promote-only/maintain calls where no upload is verified). Mirrors python-build's
          package-version for pipeline assertions; honest in dry-run (the version that would be
          published).
        value: ${{ jobs.verify.outputs.package-version }}
      staged-specs:
        description:
          Newline-separated owner/package/version specs uploaded (or, in dry-run, planned) to
          upload-label. Feed into a later promote-only call's promote-specs (strip the owner segment)
          after a staging soak - the two-phase-release path. Empty when upload-enabled is false;
          consumers guard on non-empty.
        value: ${{ jobs.verify.outputs.staged-specs }}
      uploaded-files:
        description:
          Newline-separated .conda file names that passed digest verification and were uploaded (or
          would be, in dry-run). Empty when upload-enabled is false.
        value: ${{ jobs.verify.outputs.uploaded-files }}
      promoted-specs:
        description:
          Newline-separated owner-qualified specs relabeled from upload-label to promote-label (or, in
          dry-run, planned). Empty when promote-enabled is false.
        value: ${{ jobs.verify.outputs.promoted-specs }}
      removed-specs:
        description:
          Newline-separated owner-qualified specs removed by maintain (or, in dry-run, planned). Empty
          when maintain-enabled is false.
        value: ${{ jobs.verify.outputs.removed-specs }}

permissions: {}

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    steps:
      - name: Validate inputs
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
          PUBLISH_TIMEOUT_MINUTES: ${{ inputs.publish-timeout-minutes }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          UPLOAD_ENABLED: ${{ inputs.upload-enabled }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          UPLOAD_EXISTING_MODE: ${{ inputs.upload-existing-mode }}
          UPLOAD_ARGUMENTS: ${{ inputs.upload-arguments }}
          PROMOTE_ENABLED: ${{ inputs.promote-enabled }}
          PROMOTE_LABEL: ${{ inputs.promote-label }}
          PROMOTE_SPECS: ${{ inputs.promote-specs }}
          MAINTAIN_ENABLED: ${{ inputs.maintain-enabled }}
          MAINTAIN_REMOVE_SPECS: ${{ inputs.maintain-remove-specs }}
          MAINTAIN_CONFIRM: ${{ inputs.maintain-confirm }}
          ARTIFACT_DOWNLOAD_ENABLED: ${{ inputs.artifact-download-enabled }}
          ARTIFACT_DOWNLOAD_NAME: ${{ inputs.artifact-download-name }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/parsing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/arguments.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/manifest.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/validate-inputs.py"

  verify:
    name: Verify distributions and compute plan
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      actions: read
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    outputs:
      package-version: ${{ steps.verify.outputs.package-version }}
      staged-specs: ${{ steps.verify.outputs.staged-specs }}
      uploaded-files: ${{ steps.verify.outputs.uploaded-files }}
      promoted-specs: ${{ steps.verify.outputs.promoted-specs }}
      removed-specs: ${{ steps.verify.outputs.removed-specs }}
    steps:
      - name: Verify distributions and compute plan
        id: verify
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          UPLOAD_ENABLED: ${{ inputs.upload-enabled }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          UPLOAD_EXISTING_MODE: ${{ inputs.upload-existing-mode }}
          UPLOAD_ARGUMENTS: ${{ inputs.upload-arguments }}
          PROMOTE_ENABLED: ${{ inputs.promote-enabled }}
          PROMOTE_LABEL: ${{ inputs.promote-label }}
          PROMOTE_SPECS: ${{ inputs.promote-specs }}
          MAINTAIN_ENABLED: ${{ inputs.maintain-enabled }}
          MAINTAIN_REMOVE_SPECS: ${{ inputs.maintain-remove-specs }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/parsing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/arguments.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/manifest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/digest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/verify-dist.py"

  upload:
    name: Upload to anaconda.org
    needs:
      - validate
      - verify
    if: ${{ !inputs.publish-dry-run-enabled && inputs.upload-enabled }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    environment:
      name: ${{ inputs.upload-environment-name }}
    concurrency:
      group: anaconda-publish-${{ inputs.upload-environment-name }}
      cancel-in-progress: false
    steps:
      - name: Re-verify distributions before upload
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          EMIT_PLAN: "false"
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          UPLOAD_ENABLED: ${{ inputs.upload-enabled }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/parsing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/arguments.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/manifest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/digest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/verify-dist.py"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Assert publishing credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_TOKEN_PRESENT: ${{ secrets.anaconda-token != '' }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/preflight-token.py"

      - name: Upload to anaconda.org
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_API_TOKEN: ${{ secrets.anaconda-token }}
          PUBLISH_OWNER: ${{ inputs.publish-owner }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          UPLOAD_EXISTING_MODE: ${{ inputs.upload-existing-mode }}
          UPLOAD_ARGUMENTS: ${{ inputs.upload-arguments }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/parsing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/arguments.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/manifest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/digest.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/upload.py"

  promote:
    name: Promote to the final label
    needs:
      - validate
      - verify
      - upload
    # Never promote a partial upload: verify must have succeeded and upload must be
    # success-or-skipped (skipped is the promote-only path). Dry-run skips this job.
    if: >-
      ${{ !cancelled()
      && !inputs.publish-dry-run-enabled
      && inputs.promote-enabled
      && needs.validate.result == 'success'
      && needs.verify.result == 'success'
      && (needs.upload.result == 'success' || needs.upload.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    environment:
      name: ${{ inputs.promote-environment-name }}
    concurrency:
      group: anaconda-publish-${{ inputs.promote-environment-name }}
      cancel-in-progress: false
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Assert publishing credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_TOKEN_PRESENT: ${{ secrets.anaconda-token != '' }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/preflight-token.py"

      - name: Promote on anaconda.org
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_API_TOKEN: ${{ secrets.anaconda-token }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          UPLOAD_LABEL: ${{ inputs.upload-label }}
          PROMOTE_LABEL: ${{ inputs.promote-label }}
          PROMOTED_SPECS: ${{ needs.verify.outputs.promoted-specs }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/parsing.py
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/promote.py"

  maintain:
    name: Remove packages (destructive)
    needs:
      - validate
      - verify
    if: ${{ !inputs.publish-dry-run-enabled && inputs.maintain-enabled }}
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    environment:
      name: ${{ inputs.maintain-environment-name }}
    concurrency:
      group: anaconda-publish-${{ inputs.maintain-environment-name }}
      cancel-in-progress: false
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Assert publishing credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_TOKEN_PRESENT: ${{ secrets.anaconda-token != '' }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/preflight-token.py"

      - name: Remove from anaconda.org
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          ANACONDA_API_TOKEN: ${{ secrets.anaconda-token }}
          PUBLISH_SERVER_URL: ${{ inputs.publish-server-url }}
          PUBLISH_CLIENT_VERSION: ${{ inputs.publish-client-version }}
          REMOVED_SPECS: ${{ needs.verify.outputs.removed-specs }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/commands.py
          python "${DEVFLOWS_SCRIPT_ROOT}/anaconda-publish/maintain.py"

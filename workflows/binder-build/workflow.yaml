name: "[Reusable]: Binder Build"

on:
  workflow_call:
    inputs:
      image-name:
        description: Fully-qualified image reference WITHOUT a tag, including the registry when not Docker Hub (e.g. ghcr.io/owner/repo-binder). Used verbatim as the attestation subject-name and the FROM base of the pinned Dockerfile. Required; a bare call must not silently do nothing.
        type: string
        required: true
      image-tags:
        description: Newline-separated list of tags to apply to the built image at push time. Validated non-empty; each token must be a valid Docker tag. Only used by the push-image job.
        type: string
        required: false
        default: latest
      image-sha-tag-enabled:
        description: When true, additionally tag and push image-sha-tag-prefix + github.sha for an immutable commit-addressed tag. The pinned Dockerfile always pins by @sha256 digest regardless.
        type: boolean
        required: false
        default: false
      image-sha-tag-prefix:
        description: Prefix for the optional commit-SHA tag. Validated as a safe tag prefix when image-sha-tag-enabled.
        type: string
        required: false
        default: sha-
      repo2docker-source-path:
        description: Directory under the checked-out (or artifact-downloaded) workspace that repo2docker builds. Validated to stay inside the workspace (no absolute path, no '..'). Appended by DevFlows as repo2docker's positional source, never taken from repo2docker-arguments.
        type: string
        required: false
        default: "."
      repo2docker-version:
        description: Pinned jupyter-repo2docker version installed via uvx in the build job. Renovate-managed and asserted by a unit test to equal the registered pin. Validated to match the date-based version format so a caller cannot smuggle a specifier or extras.
        type: string
        required: false
        # renovate: datasource=pypi depName=jupyter-repo2docker
        default: "2026.4.0"
      repo2docker-arguments:
        description: Extra arguments passed to jupyter-repo2docker, mediated through env + shlex.split (never shell-interpolated) and guarded by a strict allowlist. Flags owned by typed inputs (--image-name, --push/--no-push, --no-run, --no-build, --ref) and bare positionals are rejected in every form.
        type: string
        required: false
        default: ""
      repo2docker-timeout-minutes:
        description: Maximum minutes the build-binder job may run before cancellation. Image builds are slow; the default is generous.
        type: number
        required: false
        default: 30
      docker-login-enabled:
        description: Whether the push-image job logs in to the registry before pushing. Mirrors build-devcontainer's docker-login-enabled.
        type: boolean
        required: false
        default: true
      docker-registry:
        description: Registry hostname for login and push. The github.token password fallback is restricted to ghcr.io; any other registry must supply docker-password or the push job fails loudly in its tokenless preflight.
        type: string
        required: false
        default: ghcr.io
      docker-username:
        description: Registry username for docker/login-action.
        type: string
        required: false
        default: ${{ github.repository_owner }}
      publish-dry-run-enabled:
        description: DRY-RUN SWITCH (shared name with the publishing tier). When true, only validate and build-binder run, so the image is built and proven credential-free (PR-CI-safe) while the environment-bound push-image job and the mybinder warm job are skipped at the job level (no deployment record, no reviewer ping, no credential, no id-token). When false, push-environment-name is required.
        type: boolean
        required: false
        default: false
      push-environment-name:
        description: GitHub Environment the push-image job binds to (protection rules, required reviewers, environment secrets). Validated non-empty whenever publish-dry-run-enabled is false; the concurrency group is binder-build-<push-environment-name> with cancel-in-progress false so a release push is never cancelled mid-flight.
        type: string
        required: false
        default: ""
      push-timeout-minutes:
        description: Maximum minutes the push-image job may run before cancellation.
        type: number
        required: false
        default: 30
      attestation-enabled:
        description: Whether the push-image job attaches an actions/attest-build-provenance SLSA attestation for the pushed manifest digest (push-to-registry true). Requires the id-token write and attestations write grants the push job already holds.
        type: boolean
        required: false
        default: true
      dockerfile-artifact-enabled:
        description: Whether the push-image job emits and uploads a one-line reproducibility Dockerfile pinning the exact pushed image by digest (FROM image-name@sha256:...). Only meaningful once a real registry digest exists, so it is a push-job artifact, absent in dry-run.
        type: boolean
        required: false
        default: true
      dockerfile-artifact-name:
        description: Artifact name for the pinned Dockerfile. Validated as an artifact-safe token when dockerfile-artifact-enabled.
        type: string
        required: false
        default: binder-dockerfile
      binder-cache-warm-enabled:
        description: Whether to best-effort trigger a mybinder.org build of the repository after a successful build-binder job. Non-asserted; the warm-binder-cache job is continue-on-error so mybinder downtime never fails the caller. Skipped in dry-run.
        type: boolean
        required: false
        default: false
      binder-cache-provider:
        description: mybinder provider slug in the build URL (gh, gl, ...). Validated against a small allowlist when binder-cache-warm-enabled.
        type: string
        required: false
        default: gh
      binder-cache-repository:
        description: owner/repo (or provider-appropriate slug) mybinder builds. Defaults to the calling repository.
        type: string
        required: false
        default: ${{ github.repository }}
      binder-cache-ref:
        description: Git ref/commit mybinder builds. Defaults to the triggering commit so the warmed image matches the one just built.
        type: string
        required: false
        default: ${{ github.sha }}
      binder-cache-endpoint:
        description: BinderHub base URL. Validated as an https URL when binder-cache-warm-enabled so a self-hosted BinderHub can be targeted.
        type: string
        required: false
        default: https://mybinder.org
    secrets:
      docker-password:
        description: Registry password or token, exposed only on the single docker/login-action step of the push-image job and never to a third-party action. Optional because ghcr.io falls back to github.token; a non-ghcr registry without this secret fails loudly in the push job's tokenless preflight. Absent entirely in dry-run (push job skipped).
        required: false
    outputs:
      image-ref:
        description: The primary pushed image reference (image-name:<first image-tags entry>). Empty string when the push-image job was skipped (dry-run) or did not succeed; consumers guard on non-empty per the empty-output-guard convention.
        value: ${{ jobs.push-image.outputs.image-ref }}
      image-digest:
        description: The immutable registry manifest digest of the pushed image, sha256:<hex> (also the digest the provenance attestation and the pinned Dockerfile reference). Empty string in dry-run or when the push job did not run.
        value: ${{ jobs.push-image.outputs.image-digest }}

permissions: {}

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Validate inputs
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_TAGS: ${{ inputs.image-tags }}
          IMAGE_SHA_TAG_ENABLED: ${{ inputs.image-sha-tag-enabled }}
          IMAGE_SHA_TAG_PREFIX: ${{ inputs.image-sha-tag-prefix }}
          REPO2DOCKER_SOURCE_PATH: ${{ inputs.repo2docker-source-path }}
          REPO2DOCKER_VERSION: ${{ inputs.repo2docker-version }}
          REPO2DOCKER_ARGUMENTS: ${{ inputs.repo2docker-arguments }}
          REPO2DOCKER_TIMEOUT_MINUTES: ${{ inputs.repo2docker-timeout-minutes }}
          PUSH_TIMEOUT_MINUTES: ${{ inputs.push-timeout-minutes }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
          PUSH_ENVIRONMENT_NAME: ${{ inputs.push-environment-name }}
          DOCKERFILE_ARTIFACT_ENABLED: ${{ inputs.dockerfile-artifact-enabled }}
          DOCKERFILE_ARTIFACT_NAME: ${{ inputs.dockerfile-artifact-name }}
          BINDER_CACHE_WARM_ENABLED: ${{ inputs.binder-cache-warm-enabled }}
          BINDER_CACHE_PROVIDER: ${{ inputs.binder-cache-provider }}
          BINDER_CACHE_REPOSITORY: ${{ inputs.binder-cache-repository }}
          BINDER_CACHE_REF: ${{ inputs.binder-cache-ref }}
          BINDER_CACHE_ENDPOINT: ${{ inputs.binder-cache-endpoint }}
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/binder-build/parsing.py
          python "${DEVFLOWS_SCRIPT_ROOT}/binder-build/validate-inputs.py"

  build-binder:
    name: Build Binder image
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.repo2docker-timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Build Binder image
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          IMAGE_NAME: ${{ inputs.image-name }}
          REPO2DOCKER_VERSION: ${{ inputs.repo2docker-version }}
          REPO2DOCKER_SOURCE_PATH: ${{ inputs.repo2docker-source-path }}
          REPO2DOCKER_ARGUMENTS: ${{ inputs.repo2docker-arguments }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
          PROOF_DIR: ${{ runner.temp }}/devflows-binder/proof
          ARCHIVE_DIR: ${{ runner.temp }}/devflows-binder/image
        run: |
          # imports ${DEVFLOWS_SCRIPT_ROOT}/binder-build/parsing.py
          python "${DEVFLOWS_SCRIPT_ROOT}/binder-build/build-binder.py"

      - name: Upload build proof
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binder-build-proof
          path: ${{ runner.temp }}/devflows-binder/proof
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true

      - name: Upload image archive
        if: ${{ !inputs.publish-dry-run-enabled }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binder-build-image
          path: ${{ runner.temp }}/devflows-binder/image/image.tar
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true

  push-image:
    name: Push image and attest
    needs: build-binder
    if: ${{ !inputs.publish-dry-run-enabled }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.push-timeout-minutes }}
    permissions:
      contents: read
      actions: read
      packages: write
      id-token: write
      attestations: write
    environment:
      name: ${{ inputs.push-environment-name }}
    concurrency:
      group: binder-build-${{ inputs.push-environment-name }}
      cancel-in-progress: false
    outputs:
      image-ref: ${{ steps.push.outputs.image-ref }}
      image-digest: ${{ steps.push.outputs.image-digest }}
    steps:
      - name: Assert registry credential present
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DOCKER_LOGIN_ENABLED: ${{ inputs.docker-login-enabled }}
          DOCKER_REGISTRY: ${{ inputs.docker-registry }}
          DOCKER_PASSWORD_SET: ${{ secrets.docker-password != '' }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/binder-build/preflight-push.py"

      - name: Download image archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binder-build-image
          path: ${{ runner.temp }}/devflows-binder/incoming

      - name: Docker login
        if: inputs.docker-login-enabled
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ inputs.docker-username }}
          password: ${{ secrets.docker-password || (inputs.docker-registry == 'ghcr.io' && github.token) || '' }}

      - name: Push image and capture digest
        id: push
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_BUILD_TAG: devflows-binder-build
          IMAGE_TAGS: ${{ inputs.image-tags }}
          IMAGE_SHA_TAG_ENABLED: ${{ inputs.image-sha-tag-enabled }}
          IMAGE_SHA_TAG_PREFIX: ${{ inputs.image-sha-tag-prefix }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_ARCHIVE: ${{ runner.temp }}/devflows-binder/incoming/image.tar
          DOCKERFILE_ARTIFACT_ENABLED: ${{ inputs.dockerfile-artifact-enabled }}
          DOCKERFILE_PATH: ${{ runner.temp }}/devflows-binder/dockerfile/Dockerfile
        run: python "${DEVFLOWS_SCRIPT_ROOT}/binder-build/push-image.py"

      - name: Attest build provenance
        if: inputs.attestation-enabled
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ inputs.image-name }}
          subject-digest: ${{ steps.push.outputs.image-digest }}
          push-to-registry: true
          show-summary: true

      - name: Upload reproducibility Dockerfile
        if: inputs.dockerfile-artifact-enabled
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.dockerfile-artifact-name }}
          path: ${{ runner.temp }}/devflows-binder/dockerfile/Dockerfile
          if-no-files-found: error
          retention-days: 1
          overwrite: true

  warm-binder-cache:
    name: Warm mybinder cache
    needs: build-binder
    if: ${{ !inputs.publish-dry-run-enabled && inputs.binder-cache-warm-enabled }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    permissions: {}
    steps:
      - name: Warm mybinder cache
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          BINDER_CACHE_ENDPOINT: ${{ inputs.binder-cache-endpoint }}
          BINDER_CACHE_PROVIDER: ${{ inputs.binder-cache-provider }}
          BINDER_CACHE_REPOSITORY: ${{ inputs.binder-cache-repository }}
          BINDER_CACHE_REF: ${{ inputs.binder-cache-ref }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/binder-build/warm-cache.py"

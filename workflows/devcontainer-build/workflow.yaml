name: "[Reusable]: Devcontainer Build"

on:
  workflow_call:
    inputs:
      image-name:
        description: Full image reference without tag, including registry when needed.
        type: string
        required: true
      image-tags:
        description:
          Newline-separated list of tags applied to the built multi-arch image. Each line
          is one tag and the merge job tags the resulting manifest with every entry. The
          first (primary) tag also names the per-platform staging images
          (first-tag-platform_tag) and the image-ref output (image-name at the primary
          tag). Validated non-empty; each token must be a valid Docker tag.
        type: string
        required: false
        default: latest
      image-sha-tag-enabled:
        description: Whether to publish an additional multi-arch sha tag.
        type: boolean
        required: false
        default: false
      image-sha-tag-prefix:
        description: Prefix for the optional commit SHA tag.
        type: string
        required: false
        default: sha-
      build-digest-artifact-name:
        description:
          When set and devcontainer-push is never, each build job records the locally-built
          image digest (docker image inspect) and uploads it as
          build-digest-artifact-name-platform_tag. This gives a build-only validation run
          proof that an image was actually produced (the inspect fails, and so does the job,
          when the build silently did nothing). Empty (default) disables it and needs no push.
        type: string
        required: false
        default: ""
      build-matrix:
        description:
          JSON array of platform builds with runner, platform, and platform_tag fields.
        type: string
        required: false
        default: |
          [
            {
              "runner": "ubuntu-latest",
              "platform": "linux/amd64",
              "platform_tag": "linux-amd64"
            }
          ]
      prepare-command:
        description: Optional trusted command to run after checkout and artifact download.
        type: string
        required: false
        default: ""
      prepare-working-directory:
        description: Working directory for prepare-command.
        type: string
        required: false
        default: "."
      docker-login-enabled:
        description: Whether to log in to a Docker registry before building and merging.
        type: boolean
        required: false
        default: true
      docker-registry:
        description: Docker registry hostname. Leave empty for Docker Hub.
        type: string
        required: false
        default: ghcr.io
      docker-username:
        description: Docker registry username.
        type: string
        required: false
        default: ${{ github.repository_owner }}
      docker-ecr:
        description: Whether the registry is ECR; use auto, true, or false.
        type: string
        required: false
        default: auto
      docker-scope:
        description: Scope for the Docker authentication token.
        type: string
        required: false
        default: ""
      docker-logout:
        description: Whether docker/login-action logs out at the end of each job.
        type: boolean
        required: false
        default: true
      buildx-enabled:
        description: Whether to set up Docker Buildx before building and merging.
        type: boolean
        required: false
        default: true
      buildx-version:
        description: Buildx version to install.
        type: string
        required: false
        default: ""
      buildx-driver:
        description: Buildx builder driver.
        type: string
        required: false
        default: docker-container
      buildx-driver-opts:
        description: Additional Buildx driver-specific options.
        type: string
        required: false
        default: ""
      buildx-buildkitd-flags:
        description: BuildKit daemon flags.
        type: string
        required: false
        default: ""
      buildx-buildkitd-config:
        description: Path to a BuildKit daemon config file.
        type: string
        required: false
        default: ""
      buildx-buildkitd-config-inline:
        description: Inline BuildKit daemon config.
        type: string
        required: false
        default: ""
      buildx-use:
        description: Whether to switch to the created builder instance.
        type: boolean
        required: false
        default: true
      buildx-name:
        description: Buildx builder name.
        type: string
        required: false
        default: ""
      buildx-endpoint:
        description: Docker socket or context endpoint for Buildx.
        type: string
        required: false
        default: ""
      buildx-platforms:
        description: Fixed platforms for the current Buildx node.
        type: string
        required: false
        default: ""
      buildx-append:
        description: Additional Buildx builder nodes.
        type: string
        required: false
        default: ""
      buildx-keep-state:
        description: Whether to keep BuildKit state on cleanup.
        type: boolean
        required: false
        default: false
      buildx-cache-binary:
        description: Whether to cache the Buildx binary.
        type: boolean
        required: false
        default: true
      buildx-cleanup:
        description: Whether to remove the builder at the end of each job.
        type: boolean
        required: false
        default: true
      cache-enabled:
        description: Whether to cache the devcontainer user data folder.
        type: boolean
        required: false
        default: true
      cache-path:
        description: Cache path. Defaults to devcontainer-user-data-folder when empty.
        type: string
        required: false
        default: ""
      cache-key:
        description: Explicit cache key. Leave empty to derive one from cache-key-prefix.
        type: string
        required: false
        default: ""
      cache-key-prefix:
        description: Prefix used for generated per-platform cache keys.
        type: string
        required: false
        default: devcontainer
      cache-dependency-path:
        description: Glob used to hash devcontainer files for generated cache keys.
        type: string
        required: false
        default: .devcontainer/**
      cache-restore-keys:
        description: Ordered restore keys. Leave empty to derive a per-platform prefix.
        type: string
        required: false
        default: ""
      cache-upload-chunk-size:
        description: Cache upload chunk size in bytes.
        type: string
        required: false
        default: ""
      cache-enable-cross-os-archive:
        description: Whether cache archives can be restored across operating systems.
        type: boolean
        required: false
        default: false
      cache-fail-on-cache-miss:
        description: Whether to fail when the cache entry is not found.
        type: boolean
        required: false
        default: false
      cache-lookup-only:
        description: Whether to check for a cache entry without downloading it.
        type: boolean
        required: false
        default: false
      devcontainer-config-file:
        description: Path to the devcontainer.json file.
        type: string
        required: false
        default: .devcontainer/devcontainer.json
      devcontainer-checkout-path:
        description: Path to the checked out repository for devcontainers/ci.
        type: string
        required: false
        default: "."
      devcontainer-user-data-folder:
        description: Folder for generated devcontainer build user data.
        type: string
        required: false
        default: /tmp/devcontainer-userdata
      devcontainer-cache-registry-enabled:
        description:
          Whether to use the default registry build cache. When true (default) and no explicit
          cache-from/cache-to is given, the build reads and writes a registry cache tagged
          image-name:cache-key-prefix-platform_tag (for example image:devcontainer-linux-amd64),
          which needs packages write permission on the registry. Set to false, or set the
          cache-from/cache-to inputs to none, to opt out.
        type: boolean
        required: false
        default: true
      devcontainer-cache-from:
        description:
          Additional images to use for build caching. Empty derives the default registry cache
          tag when devcontainer-cache-registry-enabled is true and devcontainer-push is not
          never; set to none to disable cache-from. An explicit value is always honored. The
          default is dropped automatically when devcontainer-push is never so build-only
          validation runs need no registry pull rights.
        type: string
        required: false
        default: ""
      devcontainer-cache-to:
        description:
          Build cache destination. Empty derives the default registry cache tag; set to none to
          disable it. Cache-to is disabled automatically when devcontainer-push is never so
          build-only validation runs need no push rights.
        type: string
        required: false
        default: ""
      devcontainer-no-cache:
        description: Whether to build the image with --no-cache.
        type: boolean
        required: false
        default: false
      devcontainer-push:
        description: "When devcontainers/ci should push images: never, filter, or always."
        type: string
        required: false
        default: always
      devcontainer-ref-filter-for-push:
        description: Source refs allowed to push images when devcontainer-push is filter.
        type: string
        required: false
        default: ""
      devcontainer-event-filter-for-push:
        description: Event names allowed to push images when devcontainer-push is filter.
        type: string
        required: false
        default: push
      merge-enabled:
        description: Whether to create a multi-arch manifest from platform images.
        type: boolean
        required: false
        default: true
      merge-runner:
        description: Runner used for the multi-arch manifest merge job.
        type: string
        required: false
        default: ubuntu-latest
    secrets:
      docker-password:
        description:
          Docker registry password or token. Defaults to github.token when unset.
        required: false
    outputs:
      image-ref:
        description: Multi-arch image reference published by the merge job.
        value: ${{ jobs.merge-devcontainer.outputs.image-ref }}
      sha-image-ref:
        description: Optional SHA image reference published by the merge job.
        value: ${{ jobs.merge-devcontainer.outputs.sha-image-ref }}

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    outputs:
      primary-tag: ${{ steps.validate.outputs.primary-tag }}
    steps:
      - name: Validate inputs
        id: validate
        shell: bash
        env:
          BUILD_MATRIX: ${{ inputs.build-matrix }}
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DOCKER_LOGIN_ENABLED: ${{ inputs.docker-login-enabled }}
          DOCKER_PASSWORD_SET: ${{ secrets.docker-password != '' }}
          DOCKER_REGISTRY: ${{ inputs.docker-registry }}
          IMAGE_TAGS: ${{ inputs.image-tags }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/devcontainer-build/validate-inputs.py"

  build-devcontainer:
    name: Build (${{ matrix.platform }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.build-matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Prepare workspace
        if: inputs.prepare-command != ''
        working-directory: ${{ inputs.prepare-working-directory }}
        shell: bash
        env:
          PREPARE_COMMAND: ${{ inputs.prepare-command }}
        run: bash -euo pipefail -c "$PREPARE_COMMAND"

      - name: Resolve build settings
        id: build-settings
        shell: bash
        env:
          CACHE_DEPENDENCY_HASH: ${{ hashFiles(inputs.cache-dependency-path) }}
          CACHE_KEY: ${{ inputs.cache-key }}
          CACHE_KEY_PREFIX: ${{ inputs.cache-key-prefix }}
          CACHE_PATH: ${{ inputs.cache-path }}
          CACHE_RESTORE_KEYS: ${{ inputs.cache-restore-keys }}
          DEVCONTAINER_CACHE_FROM: ${{ inputs.devcontainer-cache-from }}
          DEVCONTAINER_CACHE_REGISTRY_ENABLED: ${{ inputs.devcontainer-cache-registry-enabled }}
          DEVCONTAINER_CACHE_TO: ${{ inputs.devcontainer-cache-to }}
          DEVCONTAINER_PUSH: ${{ inputs.devcontainer-push }}
          DEVCONTAINER_USER_DATA_FOLDER: ${{ inputs.devcontainer-user-data-folder }}
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          IMAGE_NAME: ${{ inputs.image-name }}
          MATRIX_PLATFORM_TAG: ${{ matrix.platform_tag }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/devcontainer-build/resolve-build-settings.py"

      - name: Docker login
        if: inputs.docker-login-enabled
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ inputs.docker-username }}
          password: ${{ secrets.docker-password || (inputs.docker-registry == 'ghcr.io' && github.token) || '' }}
          ecr: ${{ inputs.docker-ecr }}
          scope: ${{ inputs.docker-scope }}
          logout: ${{ inputs.docker-logout }}

      - name: Set up Docker Buildx
        if: inputs.buildx-enabled
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: ${{ inputs.buildx-version }}
          driver: ${{ inputs.buildx-driver }}
          driver-opts: ${{ inputs.buildx-driver-opts }}
          buildkitd-flags: ${{ inputs.buildx-buildkitd-flags }}
          buildkitd-config: ${{ inputs.buildx-buildkitd-config }}
          buildkitd-config-inline: ${{ inputs.buildx-buildkitd-config-inline }}
          use: ${{ inputs.buildx-use }}
          name: ${{ inputs.buildx-name }}
          endpoint: ${{ inputs.buildx-endpoint }}
          platforms: ${{ inputs.buildx-platforms }}
          append: ${{ inputs.buildx-append }}
          keep-state: ${{ inputs.buildx-keep-state }}
          cache-binary: ${{ inputs.buildx-cache-binary }}
          cleanup: ${{ inputs.buildx-cleanup }}

      - name: Cache devcontainer user data
        if: inputs.cache-enabled
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.build-settings.outputs.cache-path }}
          key: ${{ steps.build-settings.outputs.cache-key }}
          restore-keys: ${{ steps.build-settings.outputs.cache-restore-keys }}
          upload-chunk-size: ${{ inputs.cache-upload-chunk-size }}
          enableCrossOsArchive: ${{ inputs.cache-enable-cross-os-archive }}
          fail-on-cache-miss: ${{ inputs.cache-fail-on-cache-miss }}
          lookup-only: ${{ inputs.cache-lookup-only }}

      - name: Build and push devcontainer
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          imageName: ${{ inputs.image-name }}
          imageTag: ${{ needs.validate.outputs.primary-tag }}-${{ matrix.platform_tag }}
          platform: ${{ matrix.platform }}
          configFile: ${{ inputs.devcontainer-config-file }}
          checkoutPath: ${{ inputs.devcontainer-checkout-path }}
          push: ${{ inputs.devcontainer-push }}
          refFilterForPush: ${{ inputs.devcontainer-ref-filter-for-push }}
          eventFilterForPush: ${{ inputs.devcontainer-event-filter-for-push }}
          userDataFolder: ${{ inputs.devcontainer-user-data-folder }}
          cacheFrom: ${{ steps.build-settings.outputs.cache-from }}
          cacheTo: ${{ steps.build-settings.outputs.cache-to }}
          noCache: ${{ inputs.devcontainer-no-cache }}

      - name: Capture image digest
        if: inputs.merge-enabled && inputs.devcontainer-push != 'never'
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DIGEST_DIR: ${{ runner.temp }}/devflows-digests
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_TAG: ${{ needs.validate.outputs.primary-tag }}
          MATRIX_PLATFORM_TAG: ${{ matrix.platform_tag }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/devcontainer-build/capture-digest.py"

      - name: Upload platform digest
        if: inputs.merge-enabled && inputs.devcontainer-push != 'never'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: devflows-devcontainer-digest-${{ needs.validate.outputs.primary-tag }}-${{ matrix.platform_tag }}
          path: ${{ runner.temp }}/devflows-digests/${{ matrix.platform_tag }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true

      # Build-only proof: for a push-never run, devcontainers/ci exports the image
      # to an OCI archive (type=oci,dest=/tmp/output.tar) instead of loading it into
      # the local daemon, so `docker image inspect` finds nothing. Read the manifest
      # digest straight out of that archive and upload it. The archive only exists
      # when a build actually produced an image, so this fails on a vacuous (no-op)
      # build. DIGEST_OCI_ARCHIVE is the path the pinned devcontainers/ci hard-codes.
      # Credential-free and hosted-safe.
      - name: Capture build-only image digest
        if: inputs.build-digest-artifact-name != '' && inputs.devcontainer-push == 'never'
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DIGEST_DIR: ${{ runner.temp }}/devflows-build-only-digest
          DIGEST_SOURCE: oci
          DIGEST_OCI_ARCHIVE: /tmp/output.tar
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_TAG: ${{ needs.validate.outputs.primary-tag }}
          MATRIX_PLATFORM_TAG: ${{ matrix.platform_tag }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/devcontainer-build/capture-digest.py"

      - name: Upload build-only image digest
        if: inputs.build-digest-artifact-name != '' && inputs.devcontainer-push == 'never'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.build-digest-artifact-name }}-${{ matrix.platform_tag }}
          path: ${{ runner.temp }}/devflows-build-only-digest/${{ matrix.platform_tag }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true

  merge-devcontainer:
    name: Merge multi-arch manifest
    needs: [validate, build-devcontainer]
    if: inputs.merge-enabled && inputs.devcontainer-push != 'never'
    runs-on: ${{ inputs.merge-runner }}
    outputs:
      image-ref: ${{ steps.merge.outputs.image-ref }}
      sha-image-ref: ${{ steps.merge.outputs.sha-image-ref }}
    steps:
      - name: Docker login
        if: inputs.docker-login-enabled
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ inputs.docker-registry }}
          username: ${{ inputs.docker-username }}
          password: ${{ secrets.docker-password || (inputs.docker-registry == 'ghcr.io' && github.token) || '' }}
          ecr: ${{ inputs.docker-ecr }}
          scope: ${{ inputs.docker-scope }}
          logout: ${{ inputs.docker-logout }}

      - name: Set up Docker Buildx
        if: inputs.buildx-enabled
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: ${{ inputs.buildx-version }}
          driver: ${{ inputs.buildx-driver }}
          driver-opts: ${{ inputs.buildx-driver-opts }}
          buildkitd-flags: ${{ inputs.buildx-buildkitd-flags }}
          buildkitd-config: ${{ inputs.buildx-buildkitd-config }}
          buildkitd-config-inline: ${{ inputs.buildx-buildkitd-config-inline }}
          use: ${{ inputs.buildx-use }}
          name: ${{ inputs.buildx-name }}
          endpoint: ${{ inputs.buildx-endpoint }}
          platforms: ${{ inputs.buildx-platforms }}
          append: ${{ inputs.buildx-append }}
          keep-state: ${{ inputs.buildx-keep-state }}
          cache-binary: ${{ inputs.buildx-cache-binary }}
          cleanup: ${{ inputs.buildx-cleanup }}

      - name: Download platform digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: devflows-devcontainer-digest-${{ needs.validate.outputs.primary-tag }}-*
          path: ${{ runner.temp }}/devflows-digests
          merge-multiple: true

      - name: Merge manifest
        id: merge
        shell: bash
        env:
          BUILD_MATRIX: ${{ inputs.build-matrix }}
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          DIGEST_DIR: ${{ runner.temp }}/devflows-digests
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_SHA_TAG_ENABLED: ${{ inputs.image-sha-tag-enabled }}
          IMAGE_SHA_TAG_PREFIX: ${{ inputs.image-sha-tag-prefix }}
          IMAGE_TAGS: ${{ inputs.image-tags }}
          SOURCE_SHA: ${{ github.sha }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/devcontainer-build/merge-manifest.py"

name: "[Reusable]: Hello World"

on:
  workflow_call:
    inputs:
      message:
        description: Message to include in the generated greeting.
        required: false
        type: string
        default: Hello from DevFlows
    outputs:
      greeting:
        description: Greeting generated by the workflow.
        value: ${{ jobs.hello.outputs.greeting }}

permissions:
  contents: read

jobs:
  hello:
    name: Generate greeting
    runs-on: ubuntu-latest
    outputs:
      greeting: ${{ steps.greeting.outputs.greeting }}
    steps:
      - name: Create greeting
        id: greeting
        shell: bash
        env:
          MESSAGE: ${{ inputs.message }}
        run: |
          greeting="${MESSAGE}"
          echo "greeting=${greeting}" >> "$GITHUB_OUTPUT"
          echo "${greeting}"

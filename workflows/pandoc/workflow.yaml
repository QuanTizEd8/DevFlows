name: "[Reusable]: Pandoc"

on:
  workflow_call:
    inputs:
      pandoc-arguments:
        description: Arguments passed to the pandoc command.
        type: string
        required: false
        default: --help
      pandoc-image:
        description: Pandoc Docker image reference to run.
        type: string
        required: false
        default: pandoc/latex:3-ubuntu
      pandoc-working-directory:
        description: Directory under the checked out workspace where pandoc runs.
        type: string
        required: false
        default: "."

permissions:
  contents: read

jobs:
  pandoc:
    name: Convert with Pandoc
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Run Pandoc
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PANDOC_ARGUMENTS: ${{ inputs.pandoc-arguments }}
          PANDOC_IMAGE: ${{ inputs.pandoc-image }}
          PANDOC_WORKING_DIRECTORY: ${{ inputs.pandoc-working-directory }}
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/pandoc/run-pandoc.py"

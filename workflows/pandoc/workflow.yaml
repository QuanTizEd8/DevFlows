name: "[Reusable]: Pandoc"

on:
  workflow_call:
    inputs:
      pandoc-arguments:
        description: Arguments passed to the pandoc command. Required; a bare call must not silently do nothing.
        type: string
        required: true
      pandoc-image:
        description:
          Pandoc Docker image reference to run, as [registry/]name[:tag][@digest]. Any syntactically valid
          reference is accepted (official images, GHCR mirrors, or derived pandoc-filter images), so the
          caller is trusted to supply an image whose contents they trust; it runs with the workspace mounted.
        type: string
        required: false
        default: pandoc/latex:3-ubuntu
      pandoc-working-directory:
        description: Directory under the checked out workspace where pandoc runs.
        type: string
        required: false
        default: "."
      pandoc-timeout-minutes:
        description: Maximum minutes the Pandoc conversion job may run before it is cancelled.
        type: number
        required: false
        default: 15

permissions:
  contents: read

jobs:
  pandoc:
    name: Convert with Pandoc
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.pandoc-timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Run Pandoc
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PANDOC_ARGUMENTS: ${{ inputs.pandoc-arguments }}
          PANDOC_IMAGE: ${{ inputs.pandoc-image }}
          PANDOC_WORKING_DIRECTORY: ${{ inputs.pandoc-working-directory }}
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/pandoc/run-pandoc.py"

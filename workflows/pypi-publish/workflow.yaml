name: "[Reusable]: PyPI Publish"

on:
  workflow_call:
    inputs:
      publish-index:
        description:
          Target index; exactly 'pypi' or 'testpypi' (validated). Arbitrary repository URLs are
          deliberately rejected - pypi-publish uploads only via OIDC trusted publishing, which PyPI
          and TestPyPI alone support, so a URL input could only ever mean an unsupported token flow.
          Staging flow - call once with 'testpypi', then again with 'pypi' (two sequential calls,
          not a matrix). repository-url is derived from this in validate and never caller-supplied.
        type: string
        required: false
        default: pypi
      publish-dist-manifest:
        description:
          REQUIRED. The dist-manifest JSON output of python-build (schema 1 - files[{name, sha256,
          size, kind}], artifacts{sdist, wheels, conda-channel}). This is the integrity contract -
          only files listed here with kind sdist or wheel, byte-for-byte digest-matched, are ever
          uploaded. Chain publish-dist-manifest from python-build's dist-manifest output
          (needs.build.outputs.dist-manifest); non-python-build producers may hand-construct a
          schema-1 manifest. Validated non-empty, valid JSON, schema 1, and carrying at least one
          sdist or wheel entry.
        type: string
        required: true
      publish-dist-path:
        description:
          REQUIRED. Workspace-relative directory holding the downloaded distributions, scanned
          recursively; typically the same value as artifact-download-path. There is no default on
          purpose - an explicit path prevents publishing the wrong directory (publishing is
          irreversible). Absolute paths and '..' are rejected.
        type: string
        required: true
      publish-expected-version:
        description:
          Optional exact version guard. When non-empty, verification fails unless every
          distribution's parsed version equals it - chain python-build's package-version output or
          the release tag to make tag/artifact skew impossible before an irreversible upload. Empty
          disables the guard; the internal single-consistent-version check always runs.
        type: string
        required: false
        default: ""
      publish-environment-name:
        description:
          GitHub environment the publish job binds to (validated non-empty). Configure required
          reviewers and deployment branch rules here to gate releases; the environment URL is set to
          the published project page. Must match the environment registered in the index's
          trusted-publisher configuration. Callers targeting TestPyPI should pass a distinct
          environment (for example 'testpypi') so each index gets its own protection rules.
        type: string
        required: false
        default: pypi
      publish-attestations-enabled:
        description:
          Generate and upload PEP 740 digital attestations (gh-action-pypi-publish attestations
          input). Default true, matching the upstream default since v1.11.0; attestations require
          trusted publishing against PyPI/TestPyPI, which is the only mode this workflow supports, so
          the default is always valid. Opt out only for index-side incidents or org policy.
        type: boolean
        required: false
        default: true
      publish-verify-metadata-enabled:
        description:
          Run the action's metadata check (twine check equivalent) on the distributions before
          upload (verify-metadata input; upstream default true).
        type: boolean
        required: false
        default: true
      publish-skip-existing-enabled:
        description:
          Do not fail when a distribution file already exists on the index (skip-existing input).
          Default false so an accidental re-publish fails loudly; enable only for idempotent retry of
          a partially uploaded set. PyPI never allows replacing an existing filename either way.
        type: boolean
        required: false
        default: false
      publish-dry-run-enabled:
        description:
          When true the run stops after the credential-free verify job - artifacts are downloaded,
          digest-verified against the manifest, and the release plan is summarized, but the publish
          job is skipped entirely, so no OIDC token is minted, no environment or deployment record is
          created, and no required reviewer is pinged. published-url is empty. Intended as a
          pull-request check and the credential-free scenario surface. Incompatible with
          install-check-enabled (validated).
        type: boolean
        required: false
        default: false
      publish-timeout-minutes:
        description:
          timeout-minutes applied to both the verify and publish jobs.
        type: number
        required: false
        default: 15
      install-check-enabled:
        description:
          Run the post-publish install-check job - wait for the published version to appear on the
          target index, install it exact-pinned into a fresh environment, and import-test it.
          Requires publish-dry-run-enabled false (validated); runs only when the publish job
          succeeded.
        type: boolean
        required: false
        default: false
      install-check-python-version:
        description:
          Python version for the install-check environment (setup-uv python-version passthrough).
          Empty defers to the tool default.
        type: string
        required: false
        default: ""
      install-check-import-names:
        description:
          Newline-separated top-level module names to import after installation. Explicit on purpose
          - deriving the import name from the distribution name is unreliable. Empty means an
          install-only smoke check.
        type: string
        required: false
        default: ""
      install-check-arguments:
        description:
          Extra arguments appended to the install command (for example --no-binary to force building
          from the sdist rather than a wheel). Environment-mediated and shlex-split by the DevFlows
          script, never interpolated into shell text. Guarded by a strict allowlist of build-mode flags - only
          --no-binary, --only-binary, and --no-deps are accepted. Index selection (-i/--index-url/
          --extra-index-url/--index/--default-index/-f/--find-links/--no-index/--index-strategy),
          --requirement/-r, and bare package names are rejected - the index is chosen by publish-index
          and the target version is exact-pinned.
        type: string
        required: false
        default: ""
      install-check-timeout-minutes:
        description:
          timeout-minutes for the install-check job; also bounds the index-propagation polling loop.
        type: number
        required: false
        default: 15
    outputs:
      package-version:
        description:
          Version of the verified distribution set (verify job output, parsed from the actual files,
          cross-checked for internal consistency and against publish-expected-version). Set in dry-run
          too - it is the version that was, or would have been, published.
        value: ${{ jobs.verify.outputs.package-version }}
      package-name:
        description:
          PEP 503 normalized distribution name parsed from the verified files (verify job output).
          Set in dry-run too; useful for badge/announcement chaining and external install checks.
        value: ${{ jobs.verify.outputs.package-name }}
      published-url:
        description:
          Project page URL of the published release on the selected index
          (https://pypi.org/project/<name>/<version>/ or the test.pypi.org equivalent). Empty string
          when publish-dry-run-enabled is true or the publish job did not run - downstream consumers
          must guard on a non-empty value.
        value: ${{ jobs.publish.outputs.published-url }}

permissions: {}

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      repository-url: ${{ steps.validate.outputs.repository-url }}
    steps:
      - name: Validate inputs
        id: validate
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_INDEX: ${{ inputs.publish-index }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_ENVIRONMENT_NAME: ${{ inputs.publish-environment-name }}
          PUBLISH_DRY_RUN_ENABLED: ${{ inputs.publish-dry-run-enabled }}
          INSTALL_CHECK_ENABLED: ${{ inputs.install-check-enabled }}
          INSTALL_CHECK_ARGUMENTS: ${{ inputs.install-check-arguments }}
          ARTIFACT_DOWNLOAD_ENABLED: ${{ inputs.artifact-download-enabled }}
          ARTIFACT_DOWNLOAD_NAME: ${{ inputs.artifact-download-name }}
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/pypi-publish/validate-inputs.py"

  verify:
    name: Verify distributions
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    permissions:
      actions: read
    outputs:
      package-name: ${{ steps.verify.outputs.package-name }}
      package-version: ${{ steps.verify.outputs.package-version }}
      release-url: ${{ steps.verify.outputs.release-url }}
    steps:
      - name: Verify distributions against the manifest
        id: verify
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_INDEX: ${{ inputs.publish-index }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          DEVFLOWS_STAGE_DIR: .devflows-publish/dist
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/pypi-publish/verify-dist.py"

  publish:
    name: Publish to the index
    needs:
      - validate
      - verify
    if: ${{ !inputs.publish-dry-run-enabled }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.publish-timeout-minutes }}
    permissions:
      actions: read
      id-token: write
    environment:
      name: ${{ inputs.publish-environment-name }}
      url: ${{ needs.verify.outputs.release-url }}
    concurrency:
      group: pypi-publish-${{ inputs.publish-environment-name }}
      cancel-in-progress: false
    outputs:
      published-url: ${{ needs.verify.outputs.release-url }}
    steps:
      - name: Re-verify distributions against the manifest
        id: verify
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_INDEX: ${{ inputs.publish-index }}
          PUBLISH_DIST_MANIFEST: ${{ inputs.publish-dist-manifest }}
          PUBLISH_DIST_PATH: ${{ inputs.publish-dist-path }}
          PUBLISH_EXPECTED_VERSION: ${{ inputs.publish-expected-version }}
          DEVFLOWS_STAGE_DIR: .devflows-publish/dist
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/pypi-publish/verify-dist.py"
      - name: Publish distributions via trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: .devflows-publish/dist
          repository-url: ${{ needs.validate.outputs.repository-url }}
          verify-metadata: ${{ inputs.publish-verify-metadata-enabled }}
          skip-existing: ${{ inputs.publish-skip-existing-enabled }}
          attestations: ${{ inputs.publish-attestations-enabled }}

  install-check:
    name: Install check
    needs:
      - verify
      - publish
    if: ${{ inputs.install-check-enabled && needs.publish.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.install-check-timeout-minutes }}
    permissions: {}
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ inputs.install-check-python-version }}
          enable-cache: false
      - name: Install and import the published distribution
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          PUBLISH_INDEX: ${{ inputs.publish-index }}
          PACKAGE_NAME: ${{ needs.verify.outputs.package-name }}
          PACKAGE_VERSION: ${{ needs.verify.outputs.package-version }}
          INSTALL_CHECK_IMPORT_NAMES: ${{ inputs.install-check-import-names }}
          INSTALL_CHECK_ARGUMENTS: ${{ inputs.install-check-arguments }}
          INSTALL_CHECK_TIMEOUT_MINUTES: ${{ inputs.install-check-timeout-minutes }}
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/pypi-publish/install-check.py"

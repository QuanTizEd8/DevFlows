id: python-lint
name: Python Lint
summary:
  Run tool-based Python linting -- ruff check, ruff format --check, and a
  selectable type checker (mypy, pyright, or ty) -- as a read-only gate by
  default, with an optional lint-fix mode, a consolidated job summary, inline
  annotations, and machine-readable outcomes.
status: active
owners:
  - DevFlows maintainers
release:
  type: simple
  major: 0
docs:
  category: Python
  keywords:
    - python
    - lint
    - ruff
    - mypy
    - type-check
io:
  job: python-lint
  runtime: true
  job-output: true
  checkout: true
  artifact-download: true
  artifact-upload: true
  patch-emit: true
notes:
  - >-
    Least privilege: the workflow runs at contents: read. The generator's
    artifact-download/upload and patch-emit channels add only actions: read to the
    lint job (for the artifact/patch uploads), so a caller grants permissions:
    contents: read, actions: read on the calling job (GitHub validates
    called-workflow permissions before the run starts). patch-emit adds NO
    contents: write; even in lint-fix mode this workflow never commits or pushes.
  - >-
    lint-fix (default false) turns the read-only gate into a fixer: when true the
    job runs `ruff check --fix` and `ruff format` (mutating files in place) in
    addition to reporting, so the still-reported findings reflect what remains
    after autofix. It never commits: pair lint-fix with patch-emit-enabled to
    capture the fixes as a patch artifact, then compose the writeback workflow (in
    a separate contents: write job) to apply and push them. With lint-fix false the
    behavior is unchanged -- ruff runs read-only and --fix stays rejected in
    ruff-check-arguments -- so existing callers are unaffected.
  - >-
    lint-enforce controls only whether findings fail the job. Outputs, the job
    summary, annotations, and report files always report per-tool outcomes; with
    lint-enforce false the job stays green (advisory mode) while lint-outcome and
    the per-tool *-outcome outputs still report failure. Input-validation errors
    and tool crashes always fail the job regardless of lint-enforce.
  - >-
    When lint-enforce is true and findings fail the job, GitHub still propagates
    the job outputs from the completed lint step. Downstream jobs that read them
    must guard their needs with if: ${{ !cancelled() }} and check for a non-empty
    value, because a cancelled run produces no outputs.
  - >-
    Default tool versions are the latest releases (freshness over
    reproducibility). Pin ruff-version and typecheck-version for a reproducible
    gate.
  - >-
    ruff runs in an isolated uvx environment (it never imports the project, so the
    project environment is irrelevant to its results); pin ruff-version to match
    your local ruff. uv-sync-enabled governs only the type checker: when true, the
    checker resolves first-party imports against the synced project environment.
    With uv-sync-enabled and an empty ruff-version, ruff runs from the synced
    project (which must provide ruff); otherwise pin ruff-version.
  - >-
    Type checkers: mypy is the default (mature, plugin support). pyright runs via
    its PyPI wrapper, which bootstraps Node on the runner on first use. ty is
    Astral's checker and is experimental/beta as of mid-2026 -- offered as an
    opt-in value, not the default; revisit the default when ty reaches 1.0.
  - >-
    When lint-annotations-enabled is false, no inline ::error annotations are
    emitted; the job summary and outputs still report every finding. Annotations
    are capped at 10 per tool (GitHub renders at most ~10 per step) and use
    workspace-relative paths derived from structured tool output.
  - >-
    Setting lint-report-directory both writes the machine-readable reports there
    and makes the workflow upload them as the lint-report-artifact-name artifact
    (default python-lint-report). That upload is gated on !cancelled(), so reports
    are published even when lint-enforce fails the job -- the fix for findings
    never reaching an artifact. The generic artifact-upload channel stays
    success-gated and reserved for build outputs; use the dedicated report channel
    for lint reports. Invoking this workflow more than once in a run needs distinct
    lint-report-artifact-name values.
  - >-
    CodeQL and dependency review are intentionally NOT wrapped by this workflow.
    Both are GitHub-native two-click setups: enable code scanning at
    https://docs.github.com/code-security/code-scanning and dependency review at
    https://docs.github.com/code-security/supply-chain-security. Wrapping them
    would force security-events: write / pull-requests: write onto every caller.
  - >-
    The lint job runs on ubuntu-latest (pandoc precedent). A future retargeting
    input would follow the convention name lint-runner (string, default
    ubuntu-latest) as a compatible minor change.
  - >-
    Local (act) scenarios resolve ruff and the type checker from PyPI / the Astral
    mirror at run time, so they need network egress and can flake if that egress
    is unavailable.
  - >-
    Post-v1 candidates recorded here: a caller-supplied non-uv environment setup
    command. (The ruff --fix autofix mode landed as lint-fix, captured for commit
    via the patch-emit channel rather than a built-in writer.)
examples:
  - name: Lint on pull requests
    path: tests/fixtures/python-lint/pull-request.yaml
  - name: Advisory lint with a pinned toolchain
    path: tests/fixtures/python-lint/advisory-pinned.yaml
tests:
  scenarios:
    - id: clean-local
      name: Clean project passes locally
      runs:
        - local
      cleanup:
        - .devflows-test/python-lint/clean-local
      inputs:
        checkout-enabled: false
        lint-working-directory: tests/scenarios/python-lint/clean
        lint-report-directory: .devflows-test/python-lint/clean-local
      assertions:
        - type: file-exists
          path: .devflows-test/python-lint/clean-local/results.json
        - type: file-contains
          path: .devflows-test/python-lint/clean-local/results.json
          text: '"violations": 0'
    - id: clean-report-hosted
      name: Clean project reports success and uploads the report artifact
      runs:
        - hosted
      artifact:
        name: python-lint-clean-report
        path: .devflows-test-artifacts/python-lint/clean-report
      inputs:
        lint-working-directory: tests/scenarios/python-lint/clean
        lint-report-directory: .devflows-test/python-lint/clean-report
        artifact-upload-enabled: true
        artifact-upload-name: python-lint-clean-report
        artifact-upload-path: .devflows-test/python-lint/clean-report
        artifact-upload-if-no-files-found: error
      assertions:
        - type: workflow-output-equals
          name: lint-outcome
          value: success
        - type: workflow-output-equals
          name: ruff-check-outcome
          value: success
        - type: workflow-output-equals
          name: ruff-format-outcome
          value: success
        - type: workflow-output-equals
          name: typecheck-outcome
          value: success
        - type: file-exists
          path: results.json
        - type: file-contains
          path: results.json
          text: '"version": 1'
    - id: violations-advisory-hosted
      name: Advisory mode reports failure but keeps the run green
      runs:
        - hosted
      inputs:
        lint-working-directory: tests/scenarios/python-lint/violations
        lint-enforce: false
        typecheck-enabled: false
      assertions:
        - type: workflow-output-equals
          name: lint-outcome
          value: failure
        - type: workflow-output-equals
          name: ruff-check-outcome
          value: failure
        - type: workflow-output-equals
          name: ruff-format-outcome
          value: failure
        - type: workflow-output-equals
          name: typecheck-outcome
          value: skipped
    # Failure-path scenarios exercise validate-inputs.py directly (no reusable
    # call) through the expect: validation-failure harness, so they run under both
    # act and hosted CI. They rely only on the default lint-paths/working-directory
    # ('.'), which resolve inside the checked-out workspace; each pins a stable
    # substring of the deterministic input rejection it targets.
    - id: invalid-typecheck-tool
      name: Unknown typecheck tool fails validation
      runs:
        - local
        - hosted
      expect: validation-failure
      failure-message-contains: "typecheck-tool must be one of"
      inputs:
        typecheck-enabled: true
        typecheck-tool: pytype
    - id: no-lint-tools
      name: All lint tools disabled fails validation
      runs:
        - local
        - hosted
      expect: validation-failure
      failure-message-contains: "At least one of ruff-check-enabled"
      inputs:
        ruff-check-enabled: false
        ruff-format-enabled: false
        typecheck-enabled: false
    - id: invalid-uv-cache-mode
      name: Invalid uv-cache-mode fails validation
      runs:
        - local
        - hosted
      expect: validation-failure
      failure-message-contains: "uv-cache-mode must be one of"
      inputs:
        uv-cache-mode: sometimes

name: "[Reusable]: Python Lint"

on:
  workflow_call:
    inputs:
      lint-paths:
        description: >-
          Newline-separated files or directories (relative to lint-working-directory) passed as
          target arguments to ruff check, ruff format, and the type checker. Each path must exist
          and stay inside the workspace; an empty value fails validation.
        type: string
        required: false
        default: "."
      lint-working-directory:
        description: >-
          Directory under the checked-out workspace where all tools run (monorepo support). Must
          exist and stay inside GITHUB_WORKSPACE.
        type: string
        required: false
        default: "."
      lint-enforce:
        description: >-
          When true (default), the job fails if any enabled tool reports findings. When false,
          findings are still fully reported (job summary, annotations, outputs, report files) but
          the job succeeds -- advisory mode for gradual adoption. Never suppresses
          input-validation errors or tool crashes; a misconfigured call always fails loudly.
        type: boolean
        required: false
        default: true
      lint-fix:
        description: >-
          When true, ruff mutates files in place: 'ruff check --fix' applies safe lint fixes and
          'ruff format' reformats, in addition to the normal reporting (the reported findings then
          reflect what remains after autofix). This workflow still never commits or pushes -- pair
          lint-fix with patch-emit-enabled and compose the writeback workflow to persist the
          changes. Default false keeps the read-only gate: ruff runs with --check only and --fix
          stays rejected in ruff-check-arguments.
        type: boolean
        required: false
        default: false
      lint-annotations-enabled:
        description: >-
          Whether to emit GitHub inline annotations for findings, capped at 10 per tool. The job
          summary and outputs are unaffected. Annotations are emitted by the DevFlows scripts from
          structured tool output, so paths are workspace-relative.
        type: boolean
        required: false
        default: true
      lint-report-directory:
        description: >-
          When set, machine-readable reports are written there (results.json, ruff-check.json,
          ruff-format.diff, typecheck-<pyver>.txt) and the workflow uploads them as the
          lint-report-artifact-name artifact even when the job fails (see that input). Relative
          to the workspace; must stay inside it. Empty (default) disables file reports; the job
          summary is always rendered.
        type: string
        required: false
        default: ""
      lint-report-artifact-name:
        description: >-
          Name of the workflow-owned artifact that publishes the lint-report-directory contents.
          Uploaded on '!cancelled()' whenever lint-report-directory is set, so findings that fail
          the job (lint-enforce) are still published -- unlike the success-gated generic
          artifact-upload channel, which stays reserved for build outputs. Callers invoking this
          workflow more than once in the same run must pass distinct names.
        type: string
        required: false
        default: python-lint-report
      lint-timeout-minutes:
        description: Maximum minutes the lint job may run before it is cancelled.
        type: number
        required: false
        default: 15
      lint-python-version:
        description: >-
          Python version passed to setup-uv (sets the interpreter environment). Empty (default)
          lets uv resolve from the project's .python-version/pyproject.toml, falling back to the
          latest stable CPython. Per-target-version type checking is controlled separately by
          typecheck-python-versions.
        type: string
        required: false
        default: ""
      uv-version:
        description: >-
          uv version passed to setup-uv. Empty (default) resolves from the caller's
          uv.toml/pyproject.toml, then the latest release.
        type: string
        required: false
        default: ""
      uv-cache-mode:
        description: >-
          setup-uv cache passthrough (its enable-cache input). One of auto, true, or false; auto
          (default) enables the uv cache only on GitHub-hosted runners.
        type: string
        required: false
        default: auto
      uv-sync-enabled:
        description: >-
          When true, runs 'uv sync' in lint-working-directory before the tools, and the type
          checker resolves first-party imports against that project environment. Requires the
          caller repo to be a uv project (pyproject.toml present, validated). Default false runs
          tools in isolated uvx environments with zero project assumptions.
        type: boolean
        required: false
        default: false
      uv-sync-arguments:
        description: >-
          Extra arguments appended to 'uv sync' (for example --locked --all-extras --group
          typing). Shlex-split via env-var mediation; only used when uv-sync-enabled is true
          (setting it otherwise fails validation).
        type: string
        required: false
        default: ""
      ruff-check-enabled:
        description: Whether to run 'ruff check' (lint rules).
        type: boolean
        required: false
        default: true
      ruff-check-arguments:
        description: >-
          Extra arguments appended to 'ruff check' (for example --select, --preview, --config
          path). Shlex-split via env-var mediation. Validation rejects --fix / --fix-only /
          --unsafe-fixes (this workflow is read-only) and --output-format (the workflow owns
          output capture for reporting).
        type: string
        required: false
        default: ""
      ruff-format-enabled:
        description: >-
          Whether to run 'ruff format --check --diff' (formatting gate). The diff is rendered into
          the job summary, truncated to a documented byte cap.
        type: boolean
        required: false
        default: true
      ruff-format-arguments:
        description: >-
          Extra arguments appended to 'ruff format' after the fixed --check --diff flags (for
          example --config path, --preview). Shlex-split via env-var mediation. Arguments
          incompatible with --check surface as a tool crash, which fails loudly regardless of
          lint-enforce.
        type: string
        required: false
        default: ""
      ruff-version:
        description: >-
          Exact ruff version to run (bare PEP 440 version, for example 0.14.2; no specifiers or
          whitespace). Empty (default) runs the latest ruff via uvx. Pin this for reproducible
          gates.
        type: string
        required: false
        default: ""
      typecheck-enabled:
        description: Whether to run the type checker.
        type: boolean
        required: false
        default: true
      typecheck-tool:
        description: >-
          Type checker to run: mypy (default, mature ecosystem and plugin support), pyright
          (highest typing-spec conformance; runs via the PyPI wrapper which bootstraps Node on the
          runner), or ty (Astral's checker; experimental/beta as of mid-2026). Any other value
          fails input validation loudly.
        type: string
        required: false
        default: mypy
      typecheck-version:
        description: >-
          Exact version of the selected type checker (bare PEP 440 version; validated). Empty runs
          the latest release. Pin for reproducible gates.
        type: string
        required: false
        default: ""
      typecheck-arguments:
        description: >-
          Extra arguments passed to the type checker (for example --strict, --config-file path,
          --platform win32 for mypy). Shlex-split via env-var mediation. Target paths come from
          lint-paths; the per-version flag is owned by typecheck-python-versions (a caller-supplied
          --python-version/--pythonversion here is rejected to avoid conflicting duplicates).
        type: string
        required: false
        default: ""
      typecheck-python-versions:
        description: >-
          Newline-separated target Python versions, for example 3.11 then 3.13 on its own line.
          Each entry must match a 3.<minor> pattern. Each entry produces one checker invocation
          with the tool's target-version flag inside the single job -- no job matrix, no
          interpreter installs per version. Empty (default) runs one invocation with the tool's
          own default.
        type: string
        required: false
        default: ""
      typecheck-with:
        description: >-
          Newline-separated additional PyPI requirement specifiers installed alongside the type
          checker (stub packages like types-requests, checker plugins, or '.' to install the
          caller's project into the checker environment). Passed as repeated --with flags to uvx /
          uv run; each line is validated as a requirement specifier.
        type: string
        required: false
        default: ""
    outputs:
      lint-outcome:
        description: >-
          "success" when every enabled tool passed; "failure" when any enabled tool reported
          findings or crashed. Set even when lint-enforce is false and the job succeeds, so callers
          can gate downstream jobs in advisory mode (guard needs with if !cancelled()).
        value: ${{ jobs.python-lint.outputs.lint-outcome }}
      ruff-check-outcome:
        description: '"success", "failure", or "skipped" (when ruff-check-enabled is false).'
        value: ${{ jobs.python-lint.outputs.ruff-check-outcome }}
      ruff-format-outcome:
        description: '"success", "failure", or "skipped".'
        value: ${{ jobs.python-lint.outputs.ruff-format-outcome }}
      typecheck-outcome:
        description: '"success", "failure", or "skipped". Failure if any target-version run failed.'
        value: ${{ jobs.python-lint.outputs.typecheck-outcome }}
      lint-results:
        description: >-
          Stable-schema JSON (sorted keys, no timestamps) describing per-tool outcomes and counts.
          The same document is written to lint-report-directory/results.json when that input is
          set.
        value: ${{ jobs.python-lint.outputs.lint-results }}

permissions:
  contents: read

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.lint-timeout-minutes }}
    permissions:
      contents: read
    outputs:
      lint-outcome: ${{ steps.lint.outputs.lint-outcome }}
      ruff-check-outcome: ${{ steps.lint.outputs.ruff-check-outcome }}
      ruff-format-outcome: ${{ steps.lint.outputs.ruff-format-outcome }}
      typecheck-outcome: ${{ steps.lint.outputs.typecheck-outcome }}
      lint-results: ${{ steps.lint.outputs.lint-results }}
    steps:
      # Validate inputs BEFORE Set up uv so an invalid uv-cache-mode (or any other
      # input) is rejected by the pinned validation message rather than reaching
      # setup-uv's enable-cache first. The validate script needs only plain python
      # plus the materialized DevFlows runtime, not the provisioned uv environment.
      - name: Validate inputs
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          LINT_PATHS: ${{ inputs.lint-paths }}
          LINT_WORKING_DIRECTORY: ${{ inputs.lint-working-directory }}
          LINT_REPORT_DIRECTORY: ${{ inputs.lint-report-directory }}
          LINT_FIX: ${{ inputs.lint-fix }}
          LINT_UV_CACHE_MODE: ${{ inputs.uv-cache-mode }}
          LINT_UV_SYNC_ENABLED: ${{ inputs.uv-sync-enabled }}
          LINT_UV_SYNC_ARGUMENTS: ${{ inputs.uv-sync-arguments }}
          LINT_RUFF_CHECK_ENABLED: ${{ inputs.ruff-check-enabled }}
          LINT_RUFF_CHECK_ARGUMENTS: ${{ inputs.ruff-check-arguments }}
          LINT_RUFF_FORMAT_ENABLED: ${{ inputs.ruff-format-enabled }}
          LINT_RUFF_FORMAT_ARGUMENTS: ${{ inputs.ruff-format-arguments }}
          LINT_RUFF_VERSION: ${{ inputs.ruff-version }}
          LINT_TYPECHECK_ENABLED: ${{ inputs.typecheck-enabled }}
          LINT_TYPECHECK_TOOL: ${{ inputs.typecheck-tool }}
          LINT_TYPECHECK_VERSION: ${{ inputs.typecheck-version }}
          LINT_TYPECHECK_ARGUMENTS: ${{ inputs.typecheck-arguments }}
          LINT_TYPECHECK_PYTHON_VERSIONS: ${{ inputs.typecheck-python-versions }}
          LINT_TYPECHECK_WITH: ${{ inputs.typecheck-with }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/python-lint/validate-inputs.py"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ inputs.uv-version }}
          python-version: ${{ inputs.lint-python-version }}
          enable-cache: ${{ inputs.uv-cache-mode }}
          working-directory: ${{ inputs.lint-working-directory }}
      - name: Run lint
        id: lint
        shell: bash
        env:
          DEVFLOWS_SCRIPT_ROOT: ${{ steps.devflows-runtime.outputs.script-root }}
          LINT_PATHS: ${{ inputs.lint-paths }}
          LINT_WORKING_DIRECTORY: ${{ inputs.lint-working-directory }}
          LINT_ENFORCE: ${{ inputs.lint-enforce }}
          LINT_FIX: ${{ inputs.lint-fix }}
          LINT_ANNOTATIONS_ENABLED: ${{ inputs.lint-annotations-enabled }}
          LINT_REPORT_DIRECTORY: ${{ inputs.lint-report-directory }}
          LINT_UV_SYNC_ENABLED: ${{ inputs.uv-sync-enabled }}
          LINT_UV_SYNC_ARGUMENTS: ${{ inputs.uv-sync-arguments }}
          LINT_RUFF_CHECK_ENABLED: ${{ inputs.ruff-check-enabled }}
          LINT_RUFF_CHECK_ARGUMENTS: ${{ inputs.ruff-check-arguments }}
          LINT_RUFF_FORMAT_ENABLED: ${{ inputs.ruff-format-enabled }}
          LINT_RUFF_FORMAT_ARGUMENTS: ${{ inputs.ruff-format-arguments }}
          LINT_RUFF_VERSION: ${{ inputs.ruff-version }}
          LINT_TYPECHECK_ENABLED: ${{ inputs.typecheck-enabled }}
          LINT_TYPECHECK_TOOL: ${{ inputs.typecheck-tool }}
          LINT_TYPECHECK_VERSION: ${{ inputs.typecheck-version }}
          LINT_TYPECHECK_ARGUMENTS: ${{ inputs.typecheck-arguments }}
          LINT_TYPECHECK_PYTHON_VERSIONS: ${{ inputs.typecheck-python-versions }}
          LINT_TYPECHECK_WITH: ${{ inputs.typecheck-with }}
        run: python "${DEVFLOWS_SCRIPT_ROOT}/python-lint/run-lint.py"
      # Workflow-owned report upload. Runs on !cancelled() so lint findings that fail
      # the job (lint-enforce) still publish results.json / ruff-*/typecheck-* reports;
      # the success-gated generic artifact-upload channel below cannot (a failed Run
      # lint step skips it). Guarded on lint-report-directory being set, mirroring
      # python-test's report upload.
      - name: Upload lint report
        if: ${{ !cancelled() && inputs.lint-report-directory != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.lint-report-artifact-name }}
          path: ${{ inputs.lint-report-directory }}
          if-no-files-found: warn

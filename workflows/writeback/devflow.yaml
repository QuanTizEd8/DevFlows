id: writeback
name: Writeback
summary: Apply a patch artifact to a branch and push (the sole commit executor).
status: active
owners:
  - DevFlows maintainers
release:
  type: simple
  major: 0
docs:
  category: Utilities
  keywords:
    - writeback
    - commit
    - patch
    - generated-files
io:
  job: writeback
  runtime: true
  job-output: true
notes:
  - >-
    Writeback is the decoupled second half of the commit/push capability: any
    workflow emits its workspace changes as a patch artifact (the patch-emit
    channel), and this workflow consumes that artifact, git-applies it to a
    checked-out target branch, and pushes. It is the ONLY catalog workflow that
    holds contents: write, so no ordinary workflow forces that scope on its
    callers.
  - >-
    The patch (changes.patch) is applied with `git apply --index --3way`, so it
    still applies when the target branch advanced past the SHA the patch was
    generated against -- git falls back to a three-way merge using the base blobs
    named in the patch. A patch that truly conflicts fails loudly rather than
    committing a bad merge.
  - >-
    git apply is the integrity and containment boundary: it rejects paths that
    escape the repository and refuses to follow a symlink out of the tree. Treat
    the artifact upload/download channel and this job's contents: write permission
    as the trust boundary -- an attacker who can substitute the whole artifact can
    author any patch, exactly as they could author any payload.
  - >-
    An empty patch (emitted when the source workspace had no changes) is a clean
    no-op, and a patch that applies to no net change commits nothing rather than
    creating an empty commit.
  - >-
    commit-expected-base-sha optionally guards the target: when set, the checkout
    must already point at that SHA or the writeback aborts before applying,
    protecting against a branch that moved between patch emission and apply.
  - >-
    The workflow is intended to run with contents: write and actions: read.
examples: []
tests:
  scenarios:
    - id: ephemeral-branch-writeback
      name: Writeback to ephemeral branch
      runs:
        - hosted
      mutation:
        type: ephemeral-branch
        branch-prefix: devflows/e2e/writeback
        fixture-path: .devflows-e2e/writeback
        initial-files:
          - path: generated/stale.html
            content: |
              stale generated content
          - path: remove.html
            content: |
              remove this file
      writeback-payload:
        artifact-name: writeback-e2e-payload
        paths:
          - generated
        delete-paths:
          # remove.html exists on the branch; absent-on-branch.html never did.
          # Deleting a path absent from the target must succeed (idempotent
          # deletion), which this scenario now exercises end-to-end.
          - remove.html
          - absent-on-branch.html
        files:
          - path: generated/index.html
            content: |
              <h1>Updated by writeback</h1>
      inputs:
        commit-author-name: DevFlows E2E
        commit-author-email: devflows-e2e@example.test
        commit-message: "test: writeback e2e"
        commit-push: true
      assertions:
        - type: branch-file-contains
          path: generated/index.html
          text: "Updated by writeback"
        - type: branch-file-missing
          path: generated/stale.html
        - type: branch-file-missing
          path: remove.html
        - type: branch-file-missing
          path: absent-on-branch.html
        - type: latest-commit-message-equals
          value: "test: writeback e2e"

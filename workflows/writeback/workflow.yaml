name: "[Reusable]: Writeback"

on:
  workflow_call:
    inputs:
      patch-artifact-name:
        description: Name of the workspace-patch artifact to download and apply.
        type: string
        required: false
        default: devflows-patch
      patch-artifact-path:
        description: Directory where the patch artifact is downloaded.
        type: string
        required: false
        default: .devflows-writeback/patch
      commit-repository:
        description: Repository name with owner to commit to.
        type: string
        required: false
        default: ${{ github.repository }}
      commit-branch:
        description: Branch to check out and push generated changes to.
        type: string
        required: false
        default: ${{ github.ref_name }}
      commit-message:
        description: Commit message for the applied patch.
        type: string
        required: false
        default: "chore: update generated files"
      commit-author-name:
        description: Git author name for generated file commits.
        type: string
        required: false
        default: github-actions[bot]
      commit-author-email:
        description: Git author email for generated file commits.
        type: string
        required: false
        default: 41898282+github-actions[bot]@users.noreply.github.com
      commit-push:
        description: Whether to push the generated commit.
        type: boolean
        required: false
        default: true
      commit-expected-base-sha:
        description:
          Optional SHA that the target branch must point to before committing.
        type: string
        required: false
        default: ""
      checkout-fetch-depth:
        description: Number of commits to fetch for the target checkout.
        type: number
        required: false
        default: 1
    secrets:
      commit-token:
        description:
          Token used by the writeback job. Must be able to write contents when
          commit-push is true.
        required: false

permissions:
  contents: read

jobs:
  writeback:
    name: Apply writeback patch
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout commit target
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.commit-repository }}
          ref: ${{ inputs.commit-branch }}
          token: ${{ secrets.commit-token || github.token }}
          fetch-depth: ${{ inputs.checkout-fetch-depth }}
          persist-credentials: true

      - name: Download workspace patch
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.patch-artifact-name }}
          path: ${{ inputs.patch-artifact-path }}

      # The "Materialize DevFlows runtime scripts" step (id: devflows-runtime),
      # which writes apply-patch.py to $RUNNER_TEMP/devflows and exports
      # script-root, is injected by the generator via io.runtime in devflow.yaml.
      - name: Apply writeback patch
        env:
          COMMIT_AUTHOR_EMAIL: ${{ inputs.commit-author-email }}
          COMMIT_AUTHOR_NAME: ${{ inputs.commit-author-name }}
          COMMIT_BRANCH: ${{ inputs.commit-branch }}
          COMMIT_MESSAGE: ${{ inputs.commit-message }}
          COMMIT_PUSH: ${{ inputs.commit-push }}
          DEVFLOWS_SCRIPT_ROOT:
            ${{ steps.devflows-runtime.outputs.script-root }}
          WRITEBACK_EXPECTED_BASE_SHA: ${{ inputs.commit-expected-base-sha }}
          WRITEBACK_PATCH_FILE:
            ${{ inputs.patch-artifact-path }}/changes.patch
        shell: bash
        run: python "${DEVFLOWS_SCRIPT_ROOT}/writeback/apply-patch.py"
